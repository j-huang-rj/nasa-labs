---
# Mail DNS service identity variables shared by DNS and mail hosts.

# Mail endpoint host
mail_endpoint_host: dmz-client-01

# Mail service FQDNs
mail_smtp_fqdn: "smtp.{{ bind9_forward_zone_name }}"
mail_imap_fqdn: "imap.{{ bind9_forward_zone_name }}"

# Mail endpoint IPs (split-view: DMZ for private, VPN for public)
mail_endpoint_dmz_ip: "{{ hostvars[mail_endpoint_host].ansible_host }}"
mail_endpoint_vpn_ip: "{{ bind9_vpn_client_ip }}"

# MX record
mail_mx_priority: 10
mail_mx_target: "smtp.{{ bind9_forward_zone_name }}."
mail_mx_value: "{{ mail_mx_priority }} {{ mail_mx_target }}"

# Second managed domain
mail_domain_name: "mail.{{ bind9_forward_zone_name }}"

# DKIM public DNS identity. The public TXT value is supplied by the DNS
# primary's local secrets; the private signing key stays on the mail host.
mail_dkim_selector: "2026-na"

# SPF (identical in both views; a: mechanism resolves per-view)
mail_spf_value: '"v=spf1 a:smtp.{{ bind9_forward_zone_name }} ~all"'

# DMARC
mail_dmarc_value: '"v=DMARC1; p=quarantine; rua=mailto:dmarc-report-rua@{{ bind9_forward_zone_name }}"'
