---
# Mail DNS service identity variables shared by DNS and mail hosts

# Mail endpoint host
mail_endpoint_host: dmz-client-01

# Mail endpoint IPs (split-view)
mail_endpoint_dmz_ip: "{{ hostvars[mail_endpoint_host].ansible_host }}"
mail_endpoint_vpn_ip: "{{ bind9_vpn_client_ip }}"

# DNS zone bridge
mail_zone_name: "{{ bind9_forward_zone_name }}"

# Second managed domain
mail_alias_domain: "mail.{{ mail_zone_name }}"

# Mail service FQDNs
mail_smtp_fqdn: "smtp.{{ mail_zone_name }}"
mail_imap_fqdn: "imap.{{ mail_zone_name }}"

# MX record
mail_mx_target: "smtp.{{ mail_zone_name }}."
mail_mx_value: "{{ mail_mx_priority }} {{ mail_mx_target }}"
mail_mx_priority: 10

# DKIM public DNS identity
mail_dkim_selector: "2026-na"

# SPF
mail_spf_value: '"v=spf1 ip4:{{ mail_endpoint_vpn_ip }} ~all"'

# DMARC
mail_dmarc_value: '"v=DMARC1; p=quarantine; rua=mailto:dmarc-report-rua@{{ mail_zone_name }}"'
