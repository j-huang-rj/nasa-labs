---
# BIND role inputs for the dns inventory group.

# Zone identity
bind9_forward_zone_name: "{{ lab_domain }}"
bind9_vpn_child_reverse_zone_name: "{{ lab_id }}-sub28.0.168.192.in-addr.arpa"
bind9_primary_mname: "private-ns.{{ lab_domain }}."

# Network ranges and reverse zones
bind9_dmz_cidr: "{{ lab_dmz_cidr }}"
bind9_internal_cidr: "{{ lab_internal_cidr }}"
bind9_dmz_reverse_zone: "{{ (bind9_dmz_cidr.split('/')[0].split('.')[:3] | reverse | join('.')) ~ '.in-addr.arpa' }}"
bind9_internal_reverse_zone: "{{ (bind9_internal_cidr.split('/')[0].split('.')[:3] | reverse | join('.')) ~ '.in-addr.arpa' }}"

# DNS infrastructure
bind9_nasa_root_ip: "192.168.255.1"
bind9_primary_ns_ip: "{{ lab_primary_ns_ip }}"
bind9_secondary_ns_ip: "{{ lab_secondary_ns_ip }}"
bind9_dns_resolver_ip: "{{ lab_resolver_ip }}"

# Private lab addresses
bind9_router_dmz_ip: "{{ lab_router_dmz_ip }}"
bind9_router_internal_ip: "{{ lab_router_internal_ip }}"
bind9_dmz_agent_ip: "{{ lab_dmz_agent_ip }}"
bind9_internal_agent_ip: "{{ lab_internal_agent_ip }}"
bind9_dmz_client_ip: "{{ lab_dmz_client_ip }}"
bind9_workstation1_ip: "{{ lab_workstation1_ip }}"
bind9_workstation2_ip: "{{ lab_workstation2_ip }}"
bind9_ldap_ip: "{{ lab_ldap_ip }}"

# VPN/public addresses
bind9_vpn_router_ip: "{{ lab_vpn_router_ip }}"
bind9_vpn_client_ip: "{{ lab_vpn_client_ip }}"
bind9_vpn_ns_ip: "{{ lab_vpn_ns_ip }}"
bind9_vpn_workstation1_ip: "{{ lab_vpn_workstation1_ip }}"
bind9_vpn_workstation2_ip: "{{ lab_vpn_workstation2_ip }}"

# Resolver routing groups
bind9_nasa_root_forward_zone: nasa
bind9_nasa_root_reverse_zone: 168.192.in-addr.arpa

bind9_nasa_root_zones:
  - "{{ bind9_nasa_root_forward_zone }}"
  - "{{ bind9_nasa_root_reverse_zone }}"

bind9_lab_forward_zone: "{{ lab_domain }}"
bind9_lab_reverse_superzone: 16.172.in-addr.arpa

bind9_lab_primary_zones:
  - "{{ bind9_lab_forward_zone }}"
  - "{{ bind9_lab_reverse_superzone }}"

bind9_dnssec_delegated_child_zones:
  - "{{ mail_alias_domain }}"
