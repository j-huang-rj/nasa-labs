---
# Copy to secrets.yml and replace placeholder values.

# VPN settings
#
# wireguard_address: 192.168.0.0/28
# wireguard_private_key: <wireguard_private_key>
# wireguard_peer_public_key: <wireguard_peer_public_key>
# wireguard_preshared_key: <wireguard_preshared_key>
# wireguard_allowed_ips: 192.168.0.0/16
# wireguard_peer_endpoint: vpn.example.edu:5000

# Mail secrets
#
# DKIM signing private key for selector 2026-na.
# The real value belongs in the gitignored file:
#   ansible/inventory/host_vars/dmz-client-01/secrets.yml
# Do NOT generate DKIM secrets automatically in tracked automation (D-03).
# The private key must match the published DNS public DKIM TXT record.
#
# mail_dkim_private_keys:
#   2026-na: |
#     -----BEGIN RSA PRIVATE KEY-----
#     <dkim_private_key_pem>
#     -----END RSA PRIVATE KEY-----
#
# mail_tls_private_key: |
#   <tls_private_key_pem>
# mail_tls_certificate: |
#   <tls_certificate_pem>
#
# mail_local_user_password_hashes:
#   admin: <password_hash>
#   test: <password_hash>
#
# mail_ldap_bind_dn: <ldap_bind_dn>
# mail_ldap_bind_password: <ldap_bind_password>
