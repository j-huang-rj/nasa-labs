---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: dmz
    ip4: 172.16.0.1/24
    gw4: 172.16.0.254
    dns4:
      - 172.16.1.153
      - 1.1.1.1
    conn_name: dmz-static
    default_conn_name: "cloud-init eth0"

# WireGuard Config
# DMZ client is a VPN endpoint advertised as client.${ID}.nasa A
# (192.168.0.226 for lab ID 14). It exists primarily to be reachable
# at its VPN address from the grader.
wireguard_enabled: true

# Firewall Config
firewall_custom_zones:
  - vpn

firewall_bindings:
  - ifname: wg0
    zone: vpn
