---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: external
    conn_name: external-dhcp
    default_conn_name: "cloud-init eth0"

  - ifname: eth1
    zone: dmz
    ip4: "{{ lab_router_dmz_ip }}/24"
    conn_name: dmz-static
    default_conn_name: "cloud-init eth1"

  - ifname: eth2
    zone: internal
    ip4: "{{ lab_router_internal_ip }}/24"
    conn_name: internal-static
    default_conn_name: "cloud-init eth2"

# Hosts File Config
hosts_file_entries:
  - address: "{{ lab_router_dmz_ip }}"
    canonical: "router.{{ lab_domain }}"
    aliases:
      - router
      - router-01

  - address: "{{ lab_router_internal_ip }}"
    canonical: "router.{{ lab_domain }}"
    aliases: []

# WireGuard Config
wireguard_enabled: true

# Firewall Config
firewall_custom_zones:
  - vpn

firewall_bindings:
  - ifname: wg0
    zone: vpn

firewall_policies:
  - name: vpn-to-lan
    priority: -200
    target: REJECT
    ingress_zones:
      - vpn
    egress_zones:
      - dmz
      - internal
    protocols: []
    ports:
      - port: 2222
        proto: tcp

  - name: allow-icmp
    priority: -100
    target: CONTINUE
    ingress_zones:
      - ANY
    egress_zones:
      - ANY
    protocols:
      - icmp
    ports: []

  - name: dmz-to-internal-ldaps
    priority: -55
    target: CONTINUE
    ingress_zones:
      - dmz
    egress_zones:
      - internal
    protocols: []
    ports:
      - port: 636
        proto: tcp

  - name: dmz-to-internal-nfs
    priority: -54
    target: CONTINUE
    ingress_zones:
      - dmz
    egress_zones:
      - internal
    protocols: []
    ports: []
    rich_rules:
      - >-
        rule family="ipv4"
        source address="{{ lab_workstation1_ip }}/32"
        destination address="{{ lab_ldap_ip }}/32"
        port port="2049" protocol="tcp"
        accept
      - >-
        rule family="ipv4"
        source address="{{ lab_workstation2_ip }}/32"
        destination address="{{ lab_ldap_ip }}/32"
        port port="2049" protocol="tcp"
        accept

  - name: dmz-to-internal
    priority: -50
    target: REJECT
    ingress_zones:
      - dmz
    egress_zones:
      - internal
    protocols: []
    ports:
      - port: 55688
        proto: tcp
      - port: 53
        proto: udp
      - port: 53
        proto: tcp

  - name: internal-to-vpn
    priority: -40
    target: REJECT
    ingress_zones:
      - internal
    egress_zones:
      - vpn
    protocols: []
    ports:
      - port: 53
        proto: udp
      - port: 53
        proto: tcp

  - name: internal-to-dmz
    priority: -30
    target: ACCEPT
    ingress_zones:
      - internal
    egress_zones:
      - dmz
    protocols: []
    ports: []

  - name: lan-to-wan
    priority: -10
    target: ACCEPT
    ingress_zones:
      - dmz
      - internal
    egress_zones:
      - external
    protocols: []
    ports: []

firewall_masquerade_zones:
  - dmz
  - internal
  - vpn

# Preserve resolver client source IPs
firewall_masquerade_exempt_destinations:
  - "{{ lab_resolver_ip }}/32"

# Preserve source IPs for authoritative DNS transfers/NOTIFY between primary
# and secondary NS hosts even though general inter-LAN traffic is masqueraded
firewall_masquerade_preserve_source_pairs:
  - source: "{{ lab_secondary_ns_ip }}"
    destination: "{{ lab_primary_ns_ip }}"

  - source: "{{ lab_primary_ns_ip }}"
    destination: "{{ lab_secondary_ns_ip }}"

  - source: "{{ lab_workstation1_ip }}"
    destination: "{{ lab_ldap_ip }}"

  - source: "{{ lab_workstation2_ip }}"
    destination: "{{ lab_ldap_ip }}"

firewall_forward_ports:
  - zone: vpn
    port: 10001
    proto: tcp
    toport: 2222
    toaddr: "{{ lab_dmz_agent_ip }}"

  - zone: vpn
    port: 10002
    proto: tcp
    toport: 2222
    toaddr: "{{ lab_internal_agent_ip }}"

firewall_rich_rules:
  - zone: vpn
    rule: 'rule service name="ssh" reject'
