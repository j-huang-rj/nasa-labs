---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: internal
    ip4: "{{ lab_internal_agent_ip }}/24"
    gw4: "{{ lab_router_internal_ip }}"
    dns4:
      - "{{ lab_resolver_ip }}"
      - "{{ lab_bootstrap_dns_ip }}"
    conn_name: internal-static
    default_conn_name: "cloud-init eth0"

network_bootstrap_dns4:
  - "{{ lab_bootstrap_dns_ip }}"

# Hosts File Config
hosts_file_entries:
  - address: "{{ lab_internal_agent_ip }}"
    canonical: "internal-agent.{{ lab_domain }}"
    aliases:
      - internal-agent
      - internal-agent-01

# Firewall Config
firewall_zone_ports:
  - zone: internal
    port: 2222
    proto: tcp

  - zone: internal
    port: 55688
    proto: tcp

# Docker Workload Config
docker_enabled: true

docker_image_archives:
  - name: nap-agent
    src: nap-agent.tar
    image: nap-agent:latest
    dest: /var/lib/nap/image-archives/nap-agent.tar

docker_containers:
  - name: nap-agent
    image: nap-agent:latest
    restart_policy: unless-stopped
    network_mode: host
    hostname: internal-agent-01
    etc_hosts:
      internal-agent-01: 127.0.1.1
    dns_servers: "{{ network_interfaces[0].dns4 }}"
