---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: dmz
    ip4: 172.16.0.53/24
    gw4: 172.16.0.254
    dns4:
      - 1.1.1.1
      - 8.8.8.8
    conn_name: dmz-static
    default_conn_name: "cloud-init eth0"

# WireGuard Config
wireguard_enabled: true

# Firewall Config
firewall_custom_zones:
  - vpn

firewall_bindings:
  - ifname: wg0
    zone: vpn

firewall_zone_ports:
  - zone: dmz
    port: 53
    proto: udp

  - zone: dmz
    port: 53
    proto: tcp

  - zone: vpn
    port: 53
    proto: udp

  - zone: vpn
    port: 53
    proto: tcp

firewall_rich_rules:
  - zone: vpn
    rule: 'rule service name="ssh" reject'

# BIND9 Config
bind9_enabled: true
bind9_mode: authoritative_secondary
bind9_listen_ipv4:
  - 127.0.0.1
  - 172.16.0.53

# View policy: mirror the primary's split-view structure
bind9_views:
  - name: private
    order: 10
    match_clients:
      - "localhost"
      - "dmz_clients"
      - "internal_clients"

  - name: public
    order: 99
    match_clients:
      - "any"

# Read-only zone data: mirror every zone the primary serves
bind9_zones:
  # --- Private forward zone ---
  - name: "{{ bind9_forward_zone_name }}"
    view: private
    type: slave
    masters:
      - "172.16.1.53"
    allow_transfer:
      - "none"
    file: "slaves/private/db.{{ bind9_forward_zone_name }}"

  # --- Public forward zone ---
  - name: "{{ bind9_forward_zone_name }}"
    view: public
    type: slave
    masters:
      - "172.16.1.53"
    allow_transfer:
      - "none"
    file: "slaves/public/db.{{ bind9_forward_zone_name }}"

  # --- Private reverse zone: 172.16.0/24 ---
  - name: "0.16.172.in-addr.arpa"
    view: private
    type: slave
    masters:
      - "172.16.1.53"
    allow_transfer:
      - "none"
    file: "slaves/private/db.0.16.172.in-addr.arpa"

  # --- Private reverse zone: 172.16.1/24 ---
  - name: "1.16.172.in-addr.arpa"
    view: private
    type: slave
    masters:
      - "172.16.1.53"
    allow_transfer:
      - "none"
    file: "slaves/private/db.1.16.172.in-addr.arpa"

  # --- Public RFC 2317 child zone (delegated /28 reverse) ---
  - name: "{{ bind9_vpn_child_reverse_zone_name }}"
    view: public
    type: slave
    masters:
      - "172.16.1.53"
    allow_transfer:
      - "none"
    file: "slaves/public/db.{{ bind9_vpn_child_reverse_zone_name }}"
