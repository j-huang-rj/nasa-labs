---
# Copy to secrets.yml and replace placeholder values.

# wireguard_address: 192.168.0.0/28
# wireguard_private_key: <wireguard_private_key>
# wireguard_peer_public_key: <wireguard_peer_public_key>
# wireguard_preshared_key: <wireguard_preshared_key>
# wireguard_allowed_ips: 192.168.0.0/16
# wireguard_peer_endpoint: vpn.example.edu:5000

# TSIG key for dynamic DNS updates (DDNS), shared with primary.
# Generate with: tsig-keygen -a hmac-sha256 lab_ddns_shared
#
# bind9_tsig_key:
#   name: lab_ddns_shared
#   algorithm: hmac-sha256
#   secret: <tsig_secret>

# TSIG key for public-view AXFR view selection, shared with primary.
# Used to sign outbound AXFR for public-view slave zones so the primary
# matches the connection into its public view rather than via source IP.
# Generate with: tsig-keygen -a hmac-sha256 lab_axfr_public
#
# bind9_axfr_key:
#   name: lab_axfr_public
#   algorithm: hmac-sha256
#   secret: <tsig_secret>
