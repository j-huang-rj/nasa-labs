---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: dmz
    ip4: "{{ lab_dmz_agent_ip }}/24"
    gw4: "{{ lab_router_dmz_ip }}"
    dns4:
      - "{{ lab_resolver_ip }}"
      - "{{ lab_bootstrap_dns_ip }}"
    conn_name: dmz-static
    default_conn_name: "cloud-init eth0"

network_bootstrap_dns4:
  - "{{ lab_bootstrap_dns_ip }}"

# Hosts File Config
hosts_file_entries:
  - address: "{{ lab_dmz_agent_ip }}"
    canonical: "agent.{{ lab_domain }}"
    aliases:
      - agent
      - dmz-agent-01

# Firewall Config
firewall_zone_ports:
  - zone: dmz
    port: 2222
    proto: tcp

# Docker Workload Config
docker_enabled: true

docker_image_archives:
  - name: nap-agent
    image: nap-agent:latest
    src: nap-agent.tar
    dest: /var/lib/nap/image-archives/nap-agent.tar

docker_containers:
  - name: nap-agent
    image: nap-agent:latest
    restart_policy: unless-stopped
    network_mode: host
    hostname: dmz-agent-01
    etc_hosts:
      dmz-agent-01: 127.0.1.1
    dns_servers: "{{ network_interfaces[0].dns4 }}"
