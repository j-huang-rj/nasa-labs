---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: dmz
    ip4: 172.16.0.123/24
    gw4: 172.16.0.254
    dns4:
      - 172.16.1.153
      - 1.1.1.1
    conn_name: dmz-static
    default_conn_name: "cloud-init eth0"

# Firewall Config
firewall_zone_ports:
  - zone: dmz
    port: 2222
    proto: tcp

# Docker Workload Config
docker_enabled: true
docker_binfmt_enabled: true

docker_image_archives:
  - name: nap-agent
    image: nap-agent:latest
    src: nap-agent.tar
    dest: /var/lib/nap/image-archives/nap-agent.tar

docker_containers:
  - name: nap-agent
    image: nap-agent:latest
    network_mode: host
    platform: linux/amd64
    restart_policy: unless-stopped
    dns_servers: "{{ network_interfaces[0].dns4 }}"
