---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: internal
    ip4: 172.16.1.153/24
    gw4: 172.16.1.254
    dns4:
      - 1.1.1.1
      - 8.8.8.8
    conn_name: internal-static
    default_conn_name: "cloud-init eth0"

# Firewall Config
firewall_zone_ports:
  - zone: internal
    port: 53
    proto: udp

  - zone: internal
    port: 53
    proto: tcp

# BIND9 Config
bind9_enabled: true
bind9_mode: resolver

bind9_listen_ipv4:
  - 127.0.0.1
  - 172.16.1.153

bind9_forwarders:
  - 1.1.1.1

# Cross-host references — derived from inventory so a host's IP change
# only needs to be made in that host's own host_vars.
bind9_primary_ns_ip: "{{ hostvars['primary-ns-01'].ansible_host }}"

bind9_zones:
  - name: nasa
    type: forward
    forward: only
    forwarders:
      - "{{ bind9_course_root_ip }}"

  - name: 168.192.in-addr.arpa
    type: forward
    forward: only
    forwarders:
      - "{{ bind9_course_root_ip }}"

  - name: "{{ bind9_forward_zone_name }}"
    type: forward
    forward: only
    forwarders:
      - "{{ bind9_primary_ns_ip }}"

  - name: 16.172.in-addr.arpa
    type: forward
    forward: only
    forwarders:
      - "{{ bind9_primary_ns_ip }}"
