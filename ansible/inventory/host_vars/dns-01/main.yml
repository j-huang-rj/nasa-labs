---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: internal
    ip4: 172.16.1.153/24
    gw4: 172.16.1.254
    dns4:
      - 1.1.1.1
      - 8.8.8.8
    conn_name: internal-static
    default_conn_name: "cloud-init eth0"

# Firewall Config
firewall_zone_ports:
  - zone: internal
    port: 53
    proto: udp

  - zone: internal
    port: 53
    proto: tcp

# BIND9 Config
bind9_enabled: true
bind9_mode: resolver
bind9_listen_ipv4:
  - 127.0.0.1
  - 172.16.1.153

# Cloudflare forwarder for all domains outside per-zone forward routing (RES-04)
bind9_forwarders:
  - 1.1.1.1

# Resolver per-zone forward routing (RES-02, RES-03, RES-05)
# Global-scoped (no view field).  Per-zone `type forward; forward only;`
# blocks override the global `forward only` policy on these specific
# names; ARM Reference is explicit that `type forward` zones bypass
# global forwarding while `static-stub` zones do not.  Required so
# DNSSEC-validated answers come from the lab authoritative servers
# instead of the public Cloudflare resolver.
bind9_zones:
  - name: nasa
    type: forward
    forward: only
    forwarders:
      - 192.168.255.1

  - name: 168.192.in-addr.arpa
    type: forward
    forward: only
    forwarders:
      - 192.168.255.1

  - name: "{{ bind9_forward_zone_name }}"
    type: forward
    forward: only
    forwarders:
      - 172.16.1.53

  - name: 16.172.in-addr.arpa
    type: forward
    forward: only
    forwarders:
      - 172.16.1.53
