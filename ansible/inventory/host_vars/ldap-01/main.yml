---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: internal
    ip4: 172.16.1.10/24
    gw4: 172.16.1.254
    dns4:
      - 172.16.1.153
      - 1.1.1.1
    conn_name: internal-static
    default_conn_name: "cloud-init eth0"

network_bootstrap_dns4:
  - 1.1.1.1

# Firewall Config
firewall_zone_ports:
  - zone: internal
    port: 636
    proto: tcp
  - zone: internal
    port: 2049
    proto: tcp

# Service enablement
openldap_enabled: true
nfs_server_enabled: true
