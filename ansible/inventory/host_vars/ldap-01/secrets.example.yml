---
# Copy to secrets.yml and replace placeholder values.

# Root/manager DN bind password.
# Generate hash with: slappasswd -s <password>
#
# openldap_admin_password: <plaintext_password>
# openldap_admin_password_hash: <hashed_password>

# Service bind password used for Ansible LDAP operations.
# Generate hash with: slappasswd -s <password>
#
# openldap_bind_password: <plaintext_password>
# openldap_bind_password_hash: <hashed_password>

# Initial user password hashes keyed by username.
# Generate with: slappasswd -s <password>
#
# openldap_user_password_hashes:
#   generalta: <hashed_password>
#   mailta: <hashed_password>
#   stu: <hashed_password>

# TOTP secrets (raw bytes, base64-encoded for LDIF).
# Decode from Base32 TOTP seed, then base64-encode the raw bytes.
#
# openldap_generalta_totp_secret: <base64_raw_bytes>
# openldap_stu_totp_secret: <base64_raw_bytes>

# LDAPS server TLS private key (2048-bit RSA).
# Generate with: openssl genrsa -out ldap.key 2048
#
# openldap_tls_private_key: |
#   -----BEGIN PRIVATE KEY-----
#   <key_data>
#   -----END PRIVATE KEY-----

# LDAPS server TLS self-signed certificate (SAN includes FQDN + IP).
# Generate with: openssl req -new -x509 -days 3650 \
#   -key ldap.key -out ldap.crt \
#   -subj "/CN=ldap.<STUID>.nasa" \
#   -addext "subjectAltName=DNS:ldap.<STUID>.nasa,IP:172.16.1.10"
#
# openldap_tls_certificate: |
#   -----BEGIN CERTIFICATE-----
#   <cert_data>
#   -----END CERTIFICATE-----

# ─── Phase 12 additions ───

# TA plaintext password for validation binds (non-root ACL/ppolicy/TOTP proof).
# Kept ONLY in gitignored secrets.yml; never committed.
#
# openldap_ta_password: <plaintext_TA_password>

# TOTP secrets (raw bytes, base64-encoded for LDIF).
