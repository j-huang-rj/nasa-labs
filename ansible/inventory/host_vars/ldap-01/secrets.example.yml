---
# Copy to secrets.yml and replace placeholder values.
#
# OpenLDAP credentials
#
# openldap_credentials:
#   directory_manager:
#     password_plaintext: <admin password>
#     password_hash: <hashed password>
#
#   service_bind:
#     password_plaintext: <bind password>
#     password_hash: <hashed password>
#
#   users:
#     generalta:
#       password_plaintext: <TA plaintext password>
#       password_hash: <hashed password>
#       totp_secret_raw_b64: <base64-encoded raw TOTP secret bytes>
#
#     mailta:
#       password_plaintext: <TA plaintext password>
#       password_hash: <hashed password>
#       totp_secret_raw_b64: null
#
#     stu:
#       password_plaintext: <TA plaintext password>
#       password_hash: <hashed password>
#       totp_secret_raw_b64: <base64-encoded raw TOTP secret bytes>

# LDAPS server TLS private key
# Generate with: openssl genrsa -out ldap.key 2048
#
# openldap_tls_private_key: |
#   -----BEGIN PRIVATE KEY-----
#   <key_data>
#   -----END PRIVATE KEY-----

# LDAPS server TLS self-signed certificate
# Generate with: openssl req -new -x509 -days 3650 \
#   -key ldap.key -out ldap.crt \
#   -subj "/CN=ldap.<STUID>.nasa" \
#   -addext "subjectAltName=DNS:ldap.<STUID>.nasa,IP:172.16.1.10"
#
# openldap_tls_certificate: |
#   -----BEGIN CERTIFICATE-----
#   <cert_data>
#   -----END CERTIFICATE-----
