---
# Copy to secrets.yml and replace placeholder values.

# Root/manager DN bind password hash.
# Generate with: slappasswd -s <password>
#
# openldap_admin_password_hash: <hashed_password>

# Service bind password hash used for Ansible LDAP operations.
# Generate with: slappasswd -s <password>
#
# openldap_bind_password_hash: <hashed_password>

# Initial user password hashes.
# Generate with: slappasswd -s <password>
#
# openldap_generalta_password_hash: <hashed_password>
# openldap_mailta_password_hash: <hashed_password>
# openldap_stu_password_hash: <hashed_password>

# TOTP secrets (raw bytes, base64-encoded for LDIF).
# Decode from Base32 TOTP seed, then base64-encode the raw bytes.
#
# openldap_generalta_totp_secret: <base64_raw_bytes>
# openldap_stu_totp_secret: <base64_raw_bytes>

# LDAPS server TLS private key (2048-bit RSA).
# Generate with: openssl genrsa -out ldap-key.pem 2048
#
# openldap_tls_private_key: |
#   -----BEGIN PRIVATE KEY-----
#   <key_data>
#   -----END PRIVATE KEY-----

# LDAPS server TLS self-signed certificate (SAN includes FQDN + IP).
# Generate with: openssl req -new -x509 -days 3650 \
#   -key ldap-key.pem -out ldap-cert.pem \
#   -subj "/CN=ldap.<STUID>.nasa" \
#   -addext "subjectAltName=DNS:ldap.<STUID>.nasa,IP:172.16.1.10"
#
# openldap_tls_certificate: |
#   -----BEGIN CERTIFICATE-----
#   <cert_data>
#   -----END CERTIFICATE-----

# SSH public key shared by all LDAP users (lab-provided key).
#
# openldap_ssh_public_key: "ssh-ed25519 AAAAC3N..."
