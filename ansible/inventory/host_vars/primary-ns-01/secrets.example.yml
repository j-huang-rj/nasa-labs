---
# Copy to secrets.yml and replace placeholder values.

# TSIG key for dynamic DNS updates (DDNS). Used by nsupdate clients and
# by the primary's update-policy directives.
# Generate with: tsig-keygen -a hmac-sha256 lab_ddns_shared
#
# bind9_tsig_key:
#   name: lab_ddns_shared
#   algorithm: hmac-sha256
#   secret: <tsig_secret>

# TSIG key for public-view AXFR view selection. Used by the secondary
# when fetching public-view slave zones, and referenced in the primary's
# public-view match-clients to discriminate keyed AXFR connections from
# IP-based view matching.
# Generate with: tsig-keygen -a hmac-sha256 lab_axfr_public
#
# bind9_axfr_key:
#   name: lab_axfr_public
#   algorithm: hmac-sha256
#   secret: <tsig_secret>

# DNSSEC Combined Signing Key (CSK) material for zone signing.
# Each entry distributes a pre-generated key triplet (.key, .private, .state)
# to the primary NS key directory. The .state file pins the key's role
# (KSK + ZSK = CSK) so dnssec-policy's keymgr accepts the pre-distributed
# keys instead of retiring them and generating fresh ones on every restart.
#
# Generate via the policy so dnssec-keygen writes a matching .state:
#   cat > /tmp/policy.conf <<EOF
#   dnssec-policy "nasa-lab" {
#       keys { csk lifetime unlimited algorithm ECDSAP256SHA256; };
#   };
#   EOF
#   mkdir -p /tmp/keys
#   dnssec-keygen -k nasa-lab -l /tmp/policy.conf -K /tmp/keys <zone>
#
# bind9_dnssec_key_material:
#   - zone: "{{ bind9_forward_zone_name }}"
#     basename: "K{{ bind9_forward_zone_name }}.+013+NNNNN"
#     public: |
#       <contents of the .key file>
#     private: |
#       <contents of the .private file>
#     state: |
#       <contents of the .state file>
#
#   - zone: "{{ bind9_vpn_child_reverse_zone_name }}"
#     basename: "K{{ bind9_vpn_child_reverse_zone_name }}.+013+NNNNN"
#     public: |
#       <contents of the .key file>
#     private: |
#       <contents of the .private file>
#     state: |
#       <contents of the .state file>
#
#   - zone: "0.16.172.in-addr.arpa"
#     basename: "K0.16.172.in-addr.arpa.+013+NNNNN"
#     public: |
#       <contents of the .key file>
#     private: |
#       <contents of the .private file>
#     state: |
#       <contents of the .state file>
#
#   - zone: "1.16.172.in-addr.arpa"
#     basename: "K1.16.172.in-addr.arpa.+013+NNNNN"
#     public: |
#       <contents of the .key file>
#     private: |
#       <contents of the .private file>
#     state: |
#       <contents of the .state file>
