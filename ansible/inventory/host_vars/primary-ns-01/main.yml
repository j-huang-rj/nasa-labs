---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: internal
    ip4: 172.16.1.53/24
    gw4: 172.16.1.254
    dns4:
      - 1.1.1.1
      - 8.8.8.8
    conn_name: internal-static
    default_conn_name: "cloud-init eth0"

# Firewall Config
firewall_zone_ports:
  - zone: internal
    port: 53
    proto: udp

  - zone: internal
    port: 53
    proto: tcp

# BIND9 Config
bind9_enabled: true
bind9_mode: authoritative_primary
bind9_listen_ipv4:
  - 127.0.0.1
  - "{{ ansible_host }}"

# Cross-host references — derived from inventory so a host's IP change
# only needs to be made in that host's own host_vars.
bind9_secondary_ns_ip: "{{ hostvars['secondary-ns-01'].ansible_host }}"

# View policy: public view evaluated first to capture keyed AXFR before
# IP-based negation; private view catches everything that falls through.
bind9_views:
  - name: public
    order: 10
    match_clients:
      - "key {{ bind9_axfr_key.name }}"
      - "!internal_clients"
      - "!dmz_clients"
      - "any"

  - name: private
    order: 99
    match_clients:
      - "localhost"
      - "dmz_clients"
      - "internal_clients"

# Zone data — forward zones for private and public views
bind9_zones:
  # --- Private forward zone ---
  - name: "{{ bind9_forward_zone_name }}"
    view: private
    type: master
    file: "private/db.{{ bind9_forward_zone_name }}"
    dnssec_policy: nasa-lab
    dynamic_update_scope: forward_a_hosts
    allow_transfer:
      - "{{ bind9_secondary_ns_ip }}"
    also_notify:
      - "{{ bind9_secondary_ns_ip }}"
    soa:
      admin: "{{ bind9_soa_admin }}.{{ bind9_forward_zone_name }}."
      refresh: 3600
      retry: 1800
      expire: 604800
      minimum: 86400
    ns:
      - "private-ns.{{ bind9_forward_zone_name }}."
      - "ns.{{ bind9_forward_zone_name }}."
    records:
      - name: "ns"
        type: "A"
        value: "{{ bind9_secondary_ns_ip }}"
      - name: "private-ns"
        type: "A"
        value: "172.16.1.53"
      - name: "dns"
        type: "A"
        value: "172.16.1.153"
      - name: "router"
        type: "A"
        value: "172.16.0.254"
      - name: "router"
        type: "A"
        value: "172.16.1.254"
      - name: "agent"
        type: "A"
        value: "172.16.0.123"
      - name: "internal-agent"
        type: "A"
        value: "172.16.1.123"

  # --- Public forward zone ---
  - name: "{{ bind9_forward_zone_name }}"
    view: public
    type: master
    file: "public/db.{{ bind9_forward_zone_name }}"
    dnssec_policy: nasa-lab
    allow_transfer:
      - "{{ bind9_secondary_ns_ip }}"
    also_notify:
      - address: "{{ bind9_secondary_ns_ip }}"
        key: "{{ bind9_axfr_key.name }}"
    soa:
      admin: "{{ bind9_soa_admin }}.{{ bind9_forward_zone_name }}."
      refresh: 3600
      retry: 1800
      expire: 604800
      minimum: 86400
    ns:
      - "ns.{{ bind9_forward_zone_name }}."
    records:
      - name: "ns"
        type: "A"
        value: "{{ bind9_vpn_ns_ip }}"
      - name: "router"
        type: "A"
        value: "{{ bind9_vpn_router_ip }}"
      - name: "agent"
        type: "A"
        value: "{{ bind9_vpn_router_ip }}"
      - name: "internal-agent"
        type: "A"
        value: "{{ bind9_vpn_router_ip }}"
      - name: "client"
        type: "A"
        value: "{{ bind9_vpn_client_ip }}"

  # --- Private reverse zone: 172.16.0/24 ---
  - name: "0.16.172.in-addr.arpa"
    view: private
    type: master
    file: "private/db.0.16.172.in-addr.arpa"
    dnssec_policy: nasa-lab
    dynamic_update_scope: ptr_zonesub
    allow_transfer:
      - "{{ bind9_secondary_ns_ip }}"
    also_notify:
      - "{{ bind9_secondary_ns_ip }}"
    soa:
      admin: "{{ bind9_soa_admin }}.{{ bind9_forward_zone_name }}."
      refresh: 3600
      retry: 1800
      expire: 604800
      minimum: 86400
    ns:
      - "private-ns.{{ bind9_forward_zone_name }}."
      - "ns.{{ bind9_forward_zone_name }}."
    records:
      - name: "53"
        type: "PTR"
        value: "ns.{{ bind9_forward_zone_name }}."
      - name: "254"
        type: "PTR"
        value: "router.{{ bind9_forward_zone_name }}."
      - name: "123"
        type: "PTR"
        value: "agent.{{ bind9_forward_zone_name }}."

  # --- Private reverse zone: 172.16.1/24 ---
  - name: "1.16.172.in-addr.arpa"
    view: private
    type: master
    file: "private/db.1.16.172.in-addr.arpa"
    dnssec_policy: nasa-lab
    dynamic_update_scope: ptr_zonesub
    allow_transfer:
      - "{{ bind9_secondary_ns_ip }}"
    also_notify:
      - "{{ bind9_secondary_ns_ip }}"
    soa:
      admin: "{{ bind9_soa_admin }}.{{ bind9_forward_zone_name }}."
      refresh: 3600
      retry: 1800
      expire: 604800
      minimum: 86400
    ns:
      - "private-ns.{{ bind9_forward_zone_name }}."
      - "ns.{{ bind9_forward_zone_name }}."
    records:
      - name: "53"
        type: "PTR"
        value: "private-ns.{{ bind9_forward_zone_name }}."
      - name: "153"
        type: "PTR"
        value: "dns.{{ bind9_forward_zone_name }}."
      - name: "254"
        type: "PTR"
        value: "router.{{ bind9_forward_zone_name }}."
      - name: "123"
        type: "PTR"
        value: "internal-agent.{{ bind9_forward_zone_name }}."

  # --- Public RFC 2317 child zone (delegated /28 reverse) ---
  - name: "{{ bind9_vpn_child_reverse_zone_name }}"
    view: public
    type: master
    file: "public/db.{{ bind9_vpn_child_reverse_zone_name }}"
    dnssec_policy: nasa-lab
    allow_transfer:
      - "{{ bind9_secondary_ns_ip }}"
    also_notify:
      - address: "{{ bind9_secondary_ns_ip }}"
        key: "{{ bind9_axfr_key.name }}"
    soa:
      admin: "{{ bind9_soa_admin }}.{{ bind9_forward_zone_name }}."
      refresh: 3600
      retry: 1800
      expire: 604800
      minimum: 86400
    ns:
      - "ns.{{ bind9_forward_zone_name }}."
    records:
      - name: "{{ bind9_vpn_router_ip.split('.')[-1] }}"
        type: "PTR"
        value: "router.{{ bind9_forward_zone_name }}."
      - name: "{{ bind9_vpn_client_ip.split('.')[-1] }}"
        type: "PTR"
        value: "client.{{ bind9_forward_zone_name }}."
      - name: "{{ bind9_vpn_ns_ip.split('.')[-1] }}"
        type: "PTR"
        value: "ns.{{ bind9_forward_zone_name }}."
