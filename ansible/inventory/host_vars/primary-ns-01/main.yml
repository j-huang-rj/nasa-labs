---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: internal
    ip4: 172.16.1.53/24
    gw4: 172.16.1.254
    dns4:
      - 8.8.8.8
      - 1.1.1.1
    conn_name: internal-static
    default_conn_name: "cloud-init eth0"

# Firewall Config
firewall_zone_ports:
  - zone: internal
    port: 53
    proto: udp

  - zone: internal
    port: 53
    proto: tcp

# BIND9 Config
bind9_enabled: true
bind9_mode: authoritative_primary
bind9_listen_ipv4:
  - 127.0.0.1
  - 172.16.1.53

# View policy: private view must precede public view (BIND9 first-match)
bind9_views:
  - name: private
    order: 10
    match_clients:
      - "bind9_dmz_clients"
      - "bind9_internal_clients"
  - name: public
    order: 99
    match_clients:
      - "any"

# Zone data — forward zones for private and public views
bind9_zones:
  - name: "{{ bind9_forward_zone_name }}"
    view: private
    type: master
    file: "private/db.{{ bind9_forward_zone_name }}"
    soa:
      admin: "hostmaster.{{ bind9_forward_zone_name }}."
      serial: "{{ bind9_soa_serial }}"
      refresh: 3600
      retry: 1800
      expire: 604800
      minimum: 86400
    ns:
      - "ns.{{ bind9_forward_zone_name }}."
      - "private-ns.{{ bind9_forward_zone_name }}."
    records:
      - { name: "router", type: "A", value: "172.16.0.254" }
      - { name: "router", type: "A", value: "172.16.1.254" }
      - { name: "ns", type: "A", value: "172.16.0.53" }
      - { name: "agent", type: "A", value: "172.16.0.123" }
      - { name: "private-ns", type: "A", value: "172.16.1.53" }
      - { name: "dns", type: "A", value: "172.16.1.153" }
      - { name: "internal-agent", type: "A", value: "172.16.1.123" }

  - name: "{{ bind9_forward_zone_name }}"
    view: public
    type: master
    file: "public/db.{{ bind9_forward_zone_name }}"
    soa:
      admin: "hostmaster.{{ bind9_forward_zone_name }}."
      serial: "{{ bind9_soa_serial }}"
      refresh: 3600
      retry: 1800
      expire: 604800
      minimum: 86400
    ns:
      - "ns.{{ bind9_forward_zone_name }}."
    records:
      - { name: "router", type: "A", value: "{{ bind9_vpn_router_ip }}" }
      - { name: "client", type: "A", value: "{{ bind9_vpn_client_ip }}" }
      - { name: "ns", type: "A", value: "{{ bind9_vpn_ns_ip }}" }
      - { name: "agent", type: "A", value: "{{ bind9_vpn_router_ip }}" }
      - { name: "internal-agent", type: "A", value: "{{ bind9_vpn_router_ip }}" }
