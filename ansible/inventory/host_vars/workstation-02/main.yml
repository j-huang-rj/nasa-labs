---
# Network Config
network_interfaces:
  - ifname: eth0
    zone: dmz
    ip4: 172.16.0.2/24
    gw4: 172.16.0.254
    dns4:
      - 172.16.1.153
      - 1.1.1.1
    conn_name: dmz-static
    default_conn_name: "cloud-init eth0"

network_bootstrap_dns4:
  - 1.1.1.1

# LDAP Client Config
ldap_client_enabled: true

# NFS Config
nfs_enabled: true
