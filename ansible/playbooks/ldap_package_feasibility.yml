---
# yamllint disable rule:line-length
# Prerequisites:
#   - bootstrap.yml (operator-prepared VMs are already converged through site.yml)
#   - ldap-01 is reachable and in a vanilla LDAP state

- name: LDAP Package Feasibility Spike
  hosts: ldap-01
  gather_facts: true
  become: true
  vars:
    openldap_feasibility_package_names:
      - epel-release
      - openldap-servers
      - openldap-clients
    openldap_feasibility_module_dir: /usr/lib64/openldap
    openldap_feasibility_required_modules:
      - name: ppolicy
        path: /usr/lib64/openldap/ppolicy.so
      - name: otp
        path: /usr/lib64/openldap/otp.so
      - name: sssvlv
        path: /usr/lib64/openldap/sssvlv.so
      - name: check_password
        path: /usr/lib64/openldap/check_password.so
      - name: check_password_config
        path: /etc/openldap/check_password.conf
    openldap_feasibility_check_password_config_path: /etc/openldap/check_password.conf
    openldap_feasibility_temp_dir: /var/tmp/openldap-feasibility
    openldap_feasibility_report_path: "{{ playbook_dir }}/../../.planning/phases/08-package-feasibility-spike/08-FEASIBILITY-REPORT.md"
    openldap_feasibility_defaults_notes_path: "{{ playbook_dir }}/../../.planning/phases/08-package-feasibility-spike/openldap-defaults-notes.yml"

  pre_tasks:
    - name: "PHASE [preflight : START]"
      become: false
      ansible.builtin.debug:
        msg: "Validate ldap-01 feasibility target"

    - name: "PHASE [preflight : Assert Only ldap-01 Is Targeted]"
      ansible.builtin.assert:
        quiet: true
        that:
          - inventory_hostname == 'ldap-01'
          - ansible_facts['distribution'] == 'AlmaLinux'
          - ansible_host | default('') == lab_ldap_ip
        fail_msg: >-
          Phase 8 must run only on prepared AlmaLinux ldap-01 ({{ lab_ldap_ip }});
          refusing to run on {{ inventory_hostname }}.

    - name: "PHASE [preflight : END]"
      become: false
      ansible.builtin.debug:
        msg: "Completed preflight phase"

  tasks:
    # ─── Package install and source probe stage ───
    - name: "PHASE [packages : START]"
      become: false
      ansible.builtin.debug:
        msg: "Install OpenLDAP feasibility packages"

    - name: "PHASE [packages : Install EPEL Release Repository]"
      ansible.builtin.dnf:
        name: epel-release
        state: present

    - name: "PHASE [packages : Install OpenLDAP Server And Client Packages]"
      ansible.builtin.dnf:
        name:
          - openldap-servers
          - openldap-clients
        state: present

    - name: "PHASE [packages : Record OpenLDAP Package Versions And Sources]"
      ansible.builtin.command:
        argv:
          - dnf
          - repoquery
          - --qf
          - "%{name} %{evr} %{repoid} %{arch} %{sourcerpm}"
          - epel-release
          - openldap
          - openldap-clients
          - openldap-servers
      changed_when: false
      register: openldap_repoquery

    - name: "PHASE [packages : Record Installed RPM Versions]"
      ansible.builtin.command:
        argv:
          - rpm
          - -q
          - epel-release
          - openldap
          - openldap-clients
          - openldap-servers
      changed_when: false
      register: openldap_rpm_query

    - name: "PHASE [packages : Compute Package Probe Result]"
      ansible.builtin.set_fact:
        openldap_package_probe_pass: >-
          {{ 'openldap-servers' in openldap_repoquery.stdout
             and 'openldap-clients' in openldap_repoquery.stdout }}

    - name: "PHASE [packages : END]"
      become: false
      ansible.builtin.debug:
        msg: "Completed package install phase"

    # ─── Module file inventory stage ───
    - name: "PHASE [modules : START]"
      become: false
      ansible.builtin.debug:
        msg: "Inventory required OpenLDAP module files"

    - name: "PHASE [modules : Stat Required OpenLDAP Module Files]"
      ansible.builtin.stat:
        path: "{{ item.path }}"
      loop: "{{ openldap_feasibility_required_modules }}"
      loop_control:
        label: "{{ item.name }} → {{ item.path }}"
      register: openldap_required_module_stats

    - name: "PHASE [modules : Query RPM Owner For Each Required Module File]"  # noqa: command-instead-of-module
      ansible.builtin.command:
        cmd: "rpm -qf {{ item.item.path }}"
      loop: "{{ openldap_required_module_stats.results }}"
      loop_control:
        label: "{{ item.item.name }} → {{ item.item.path }}"
      changed_when: false
      register: openldap_module_owner_queries

    - name: "PHASE [modules : Compute Missing Required Module Files]"
      ansible.builtin.set_fact:
        openldap_missing_required_modules: >-
          {{ openldap_required_module_stats.results
             | selectattr('stat.exists', 'equalto', false)
             | map(attribute='item.name')
             | list }}

    - name: "PHASE [modules : Compute Module Inventory Result]"
      ansible.builtin.set_fact:
        openldap_module_inventory_pass: >-
          {{ openldap_missing_required_modules | length == 0 }}

    - name: "PHASE [modules : END]"
      become: false
      ansible.builtin.debug:
        msg: "Completed module inventory phase"

    # ─── Non-invasive OLC-based loadability stage ───
    # Copies system OLC config, adds ppolicy/otp/sssvlv module
    # loads via slapadd, and validates with slaptest -F -u.
    # Detected deviation: slaptest -f (slapd.conf) is broken
    # on this AlmaLinux 10 build; OLC path is the supported
    # approach. See 08-RESEARCH.md Pitfall 2 for OLC guidelines.
    - name: "PHASE [loadability : START]"
      become: false
      ansible.builtin.debug:
        msg: "Test OpenLDAP module loadability"

    - name: "PHASE [loadability : Probe OpenLDAP Module Loadability]"
      block:
        - name: "PHASE [loadability : Copy System OLC Config For Isolated Testing]"
          ansible.builtin.copy:
            src: /etc/openldap/slapd.d/
            dest: "{{ openldap_feasibility_temp_dir }}/slapd.d/"
            remote_src: true
            mode: preserve

        - name: "PHASE [loadability : Build Module Load LDIF]"
          ansible.builtin.copy:
            content: |
              dn: cn=module{0},cn=config
              objectClass: olcModuleList
              cn: module{0}
              olcModulePath: {{ openldap_feasibility_module_dir }}
              olcModuleLoad: ppolicy.so
              olcModuleLoad: otp.so
              olcModuleLoad: sssvlv.so
            dest: "{{ openldap_feasibility_temp_dir }}/module.ldif"
            mode: "0644"

        - name: "PHASE [loadability : Add Module Loads To Isolated OLC]"
          ansible.builtin.command:
            argv:
              - slapadd
              - -F
              - "{{ openldap_feasibility_temp_dir }}/slapd.d"
              - -b
              - cn=config
              - -l
              - "{{ openldap_feasibility_temp_dir }}/module.ldif"
          changed_when: false
          failed_when: false
          register: _olc_slapadd_probe

        - name: "PHASE [loadability : Test Module Loadability With slaptest]"
          ansible.builtin.command:
            argv:
              - slaptest
              - -F
              - "{{ openldap_feasibility_temp_dir }}/slapd.d"
              - -u
          changed_when: false
          failed_when: false
          register: openldap_slaptest_probe

        - name: "PHASE [loadability : Compute Loadability Result]"
          ansible.builtin.set_fact:
            openldap_loadability_pass: "{{ _olc_slapadd_probe.rc == 0 and openldap_slaptest_probe.rc == 0 }}"

      always:
        - name: "PHASE [loadability : Clean Up Temporary slaptest Config]"
          ansible.builtin.file:
            path: "{{ openldap_feasibility_temp_dir }}"
            state: absent
          changed_when: false

    - name: "PHASE [loadability : END]"
      become: false
      ansible.builtin.debug:
        msg: "Completed loadability phase"

    # ─── Durable observed-fact artifacts stage ───
    # Writes feasibility report and defaults notes via delegate_to
    # localhost before the final contingency assertion.
    - name: "PHASE [report : START]"
      become: false
      ansible.builtin.debug:
        msg: "Generate feasibility report and default notes"

    - name: "PHASE [report : Assemble Feasibility Report Content]"
      ansible.builtin.set_fact:
        openldap_feasibility_report_content: |
          # Phase 8: OpenLDAP Package Feasibility Report

          **Target:** ldap-01 ({{ lab_ldap_ip }})
          **Executed:** {{ ansible_facts['date_time']['iso8601'] }}
          **Playbook:** `ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/ldap_package_feasibility.yml --limit ldap-01`

          ## Summary

          {% set pkg_ok = 'openldap-servers' in openldap_repoquery.stdout and 'openldap-clients' in openldap_repoquery.stdout -%}
          {% set mod_ok = openldap_missing_required_modules | length == 0 -%}
          {% set load_ok = _olc_slapadd_probe.rc == 0 and openldap_slaptest_probe.rc == 0 -%}
          {% set all_ok = pkg_ok and mod_ok and load_ok %}
          {% if all_ok %}
          All required OpenLDAP package, module, and loadability checks passed on ldap-01.
          {% else %}
          BLOCKING: One or more required capabilities are missing. See Contingency Status below.
          {% endif %}

          ## Package Versions

          ### dnf repoquery (source RPM metadata)
          ```
          {{ openldap_repoquery.stdout }}
          ```

          ### rpm -q (installed versions)
          ```
          {{ openldap_rpm_query.stdout }}
          ```

          | Package | Status |
          |---------|--------|
          | epel-release | {% if 'epel-release' in openldap_repoquery.stdout %}Found{% else %}Missing{% endif %} |
          | openldap | {% if 'openldap' in openldap_repoquery.stdout %}Found{% else %}Missing{% endif %} |
          | openldap-clients | {% if 'openldap-clients' in openldap_repoquery.stdout %}Found{% else %}Missing{% endif %} |
          | openldap-servers | {% if 'openldap-servers' in openldap_repoquery.stdout %}Found{% else %}Missing{% endif %} |

          ## Module File Inventory

          | Module | Path | Exists | RPM Source |
          |--------|------|--------|-------------|
          {% for result in openldap_required_module_stats.results %}
          | {{ result.item.name }} | `{{ result.item.path }}` | {% if result.stat.exists %}✓{% else %}✗{% endif %} | {% if result.stat.exists %}{{ openldap_module_owner_queries.results[loop.index0].stdout | trim }}{% else %}N/A{% endif %} |
          {% endfor %}

          ## Loadability Results

          **Method:** Isolated OLC config copy — `slapadd` for module loads, `slaptest -F -u` for validation. (Deviation: `slaptest -f` slapd.conf format is incompatible with AlmaLinux 10 OpenLDAP 2.6.10 build.)

          | Check | Result | Details |
          |-------|--------|---------|
          | Module LDIF load (slapadd) | {% if _olc_slapadd_probe.rc == 0 %}PASS{% else %}FAIL (rc={{ _olc_slapadd_probe.rc }}){% endif %} | Adds ppolicy.so, otp.so, sssvlv.so to isolated OLC |
          | OLC config validation (slaptest) | {% if openldap_slaptest_probe.rc == 0 %}PASS{% else %}FAIL (rc={{ openldap_slaptest_probe.rc }}){% endif %} | `slaptest -F <isolated-config> -u` |

          **Probe details (slapadd):**
          ```
          {% if _olc_slapadd_probe.stdout | default('') | trim != '' %}stdout={{ _olc_slapadd_probe.stdout }}
          {% endif %}{% if _olc_slapadd_probe.stderr | default('') | trim != '' %}stderr={{ _olc_slapadd_probe.stderr }}
          {% endif %}
          ```
          **Probe details (slaptest):**
          ```
          {% if openldap_slaptest_probe.stdout | default('') | trim != '' %}stdout={{ openldap_slaptest_probe.stdout }}
          {% endif %}{% if openldap_slaptest_probe.stderr | default('') | trim != '' %}stderr={{ openldap_slaptest_probe.stderr }}
          {% endif %}
          ```

          **Loaded module names:** ppolicy, otp, sssvlv (via olcModuleLoad in isolated OLC)
          **Check module path:** `/usr/lib64/openldap/check_password.so` (verified by file stat + RPM ownership)
          **Check module config:** `/etc/openldap/check_password.conf` (verified by file stat)

          ## Downstream OpenLDAP Default Names

          See `openldap-defaults-notes.yml` for variable definitions for future `openldap` role defaults.

          ## Contingency Status

          {% if all_ok %}
          All required OpenLDAP capabilities are present and verified on ldap-01. No blocking findings. Downstream LDAP phases (schema, ACL, client, NFS, mail LDAP) may proceed with the recorded package/module assumptions.
          {% else %}
          ### BLOCKING FINDINGS

          {% if not pkg_ok %}
          **Package probe failed:** Required OpenLDAP packages are not available from configured repositories on ldap-01. Review `openldap_repoquery` output above for details.
          {% endif %}
          {% if not mod_ok %}
          **Missing module files:** {{ openldap_missing_required_modules | join(', ') }}. The following downstream paths are affected:
          {% for missing in openldap_missing_required_modules %}
          {% if missing == 'otp' %}
          - **otp missing** → TOTP/LOTP work is BLOCKED. Do not substitute PAM/OATH or source-build fallback without explicit approval — this changes graded authentication semantics and must be escalated.
          {% elif missing == 'check_password' %}
          - **check_password missing** → Password quality enforcement is BLOCKED. Do not weaken password requirements (length only, no character-class check).
          {% elif missing == 'sssvlv' %}
          - **sssvlv missing** → Fortune sorting/pagination is BLOCKED. Do not replace server-side sorting/pagination with client-side workarounds without explicit approval.
          {% elif missing == 'ppolicy' %}
          - **ppolicy missing** → Password policy overlay is BLOCKED. History, length, and quality enforcement cannot be implemented.
          {% elif missing == 'check_password_config' %}
          - **check_password_config missing** → Check password config file is absent. The module file may exist but the config is required for ppolicy quality checking.
          {% else %}
          - **{{ missing }} missing** → Blocked. Requires investigation before proceeding.
          {% endif %}
          {% endfor %}
          {% endif %}
          {% if not load_ok %}
          **Loadability check failed:** `slaptest -u` returned exit code {{ openldap_slaptest_probe.rc }}. Modules may be present on disk but not loadable by slapd. Verify module compatibility with the installed OpenLDAP version and check `openldap_slaptest_probe` output above.
          {% endif %}

          **Action required:** Resolve all blocking findings before any downstream LDAP implementation (DIT, ACLs, ppolicy, TOTP, Fortune, clients, NFS, mail LDAP).
          {% endif %}

          ## Verification Commands

          To reproduce the feasibility probe:
          ```bash
          ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/ldap_package_feasibility.yml --limit ldap-01
          ```

    - name: "PHASE [report : Ensure Report Output Directory Exists]"
      ansible.builtin.file:
        path: "{{ openldap_feasibility_report_path | dirname }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false

    - name: "PHASE [report : Write Feasibility Report]"
      ansible.builtin.copy:
        content: "{{ openldap_feasibility_report_content }}"
        dest: "{{ openldap_feasibility_report_path }}"
        mode: "0644"
      delegate_to: localhost
      become: false

    - name: "PHASE [report : Assemble Defaults Notes Content]"
      ansible.builtin.set_fact:
        openldap_defaults_notes_content: |
          ---
          # OpenLDAP future role default notes — Phase 8 observed values
          # DO NOT copy this file directly into a role. Use as a reference when
          # creating ansible/playbooks/roles/openldap/defaults/main.yml in a later phase.
          #
          # Source: ldap-01 dnf repoquery and slaptest probe on {{ ansible_facts['date_time']['iso8601'] }}.

          # EPEL dependency
          openldap_epel_package: epel-release

          # Packages
          openldap_server_packages:
            - openldap-servers
            - openldap-clients

          # Service
          openldap_service_name: slapd

          # Filesystem paths
          openldap_module_dir: /usr/lib64/openldap

          # Required modules (load name → file path)
          openldap_required_modules:
            ppolicy:
              load_name: ppolicy
              path: /usr/lib64/openldap/ppolicy.so
            otp:
              load_name: otp
              path: /usr/lib64/openldap/otp.so
            sssvlv:
              load_name: sssvlv
              path: /usr/lib64/openldap/sssvlv.so

          # Password quality check module
          openldap_ppolicy_check_module_path: /usr/lib64/openldap/check_password.so
          openldap_check_password_config_path: /etc/openldap/check_password.conf

    - name: "PHASE [report : Write Defaults Notes]"
      ansible.builtin.copy:
        content: "{{ openldap_defaults_notes_content }}"
        dest: "{{ openldap_feasibility_defaults_notes_path }}"
        mode: "0644"
      delegate_to: localhost
      become: false

    - name: "PHASE [report : END]"
      become: false
      ansible.builtin.debug:
        msg: "Completed report generation phase"

    # ─── Final hard-block contingency gate ───
    # Writes artifacts first, THEN asserts required capabilities.
    # Fails non-zero if any required capability is missing, with
    # explicit downstream block text per D-16 through D-19.
    - name: "PHASE [contingency : START]"
      become: false
      ansible.builtin.debug:
        msg: "Validate required OpenLDAP capabilities"

    - name: "PHASE [contingency : Build Blocking Findings List]"
      ansible.builtin.set_fact:
        openldap_blocking_findings: []
      changed_when: false

    - name: "PHASE [contingency : Accumulate Missing Package Capability Finding]"
      ansible.builtin.set_fact:
        openldap_blocking_findings: >-
          {{ openldap_blocking_findings + [{
            'category': 'packages',
            'detail': 'dnf repoquery did not find openldap-servers or openldap-clients from EPEL/BaseOS on ldap-01. Install epel-release and verify repo availability.'
          }] }}
      when: not openldap_package_probe_pass

    - name: "PHASE [contingency : Accumulate Missing Module File Findings]"
      ansible.builtin.set_fact:
        openldap_blocking_findings: >-
          {{ openldap_blocking_findings + [{
            'category': 'modules',
            'detail': 'Missing: ' ~ item ~ '. Block the following downstream paths: ' ~ ({
              'ppolicy': 'Password policy overlay blocked. Do not proceed with ppolicy configuration.',
              'otp': 'TOTP/LOTP blocked. Do not substitute PAM/OATH or source-build fallback — escalate before changing graded authentication semantics.',
              'sssvlv': 'Fortune server-side sorting/pagination blocked. Do not use client-side workarounds.',
              'check_password': 'Password quality enforcement blocked. Do not ship only length/reuse checks without character-class enforcement.',
              'check_password_config': 'Check password config file is missing. The module file may exist but ppolicy quality checking requires this config.'
            })[item] | default('Blocked — requires investigation.')
          }] }}
      loop: "{{ openldap_missing_required_modules }}"
      loop_control:
        loop_var: item
      when: openldap_missing_required_modules | length > 0

    - name: "PHASE [contingency : Accumulate Missing Loadability Finding]"
      ansible.builtin.set_fact:
        openldap_blocking_findings: >-
          {{ openldap_blocking_findings + [{
            'category': 'loadability',
            'detail': 'OLC isolated loadability probe FAILED. slapadd rc=' ~ (_olc_slapadd_probe.rc | string) ~ ', slaptest rc=' ~ (openldap_slaptest_probe.rc | string) ~ '. Modules (ppolicy.so, otp.so, sssvlv.so) could not be loaded into an isolated OLC config copy. Verify module compatibility with installed OpenLDAP version.'
          }] }}
      when: not openldap_loadability_pass

    - name: "PHASE [contingency : Assert Required OpenLDAP Capabilities Are Present]"
      ansible.builtin.assert:
        quiet: true
        that:
          - openldap_package_probe_pass
          - openldap_module_inventory_pass
          - openldap_loadability_pass
          - openldap_missing_required_modules | length == 0
          - openldap_blocking_findings | length == 0
        fail_msg: |-
          Phase 8 feasibility HARD-BLOCK: {{ openldap_blocking_findings | length }} required
          OpenLDAP capabilities are missing on ldap-01 ({{ lab_ldap_ip }}).

          {% for finding in openldap_blocking_findings %}
          - [{{ finding.category }}] {{ finding.detail }}
          {% endfor %}

          The feasibility report has been written to {{ openldap_feasibility_report_path }}.
          Do not proceed with downstream LDAP implementation until ALL blocking findings are resolved.

    - name: "PHASE [contingency : END]"
      become: false
      ansible.builtin.debug:
        msg: "Completed contingency validation phase"
