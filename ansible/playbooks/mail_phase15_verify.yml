# ================================================================
# Mail Flow Verification (SMTP + IMAP)
# ================================================================
- name: "Phase15 Mail Flow Verification"
  hosts: mail_smtp
  gather_facts: false
  become: true
  tags:
    - mail_flow
  vars:
    _p15_ldap_creds: "{{ hostvars['ldap-01'].ldap_server_credentials | default({}) }}"
  tasks:
    - name: "PHASE [mail_flow : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 live SMTP/IMAP mail flow verification"

    - name: "PHASE [mail_flow : Fail Closed If mailta Password Material Unavailable]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_ldap_creds.users.mailta.password_plaintext | default('') | length > 0
        fail_msg: "mailta password not available -- cannot run mail flow verification. Gate fails closed."
      no_log: true

    - name: "PHASE [mail_flow : SMTP Send via mailta]"
      ansible.builtin.shell:
        cmd: |
          python3 - <<'PY'
          import email, smtplib, ssl, uuid
          from email.mime.text import MIMEText

          domain = "{{ mail_zone_name }}"
          user = "mailta"
          password = "{{ _p15_ldap_creds.users.mailta.password_plaintext }}"
          sender = f"{user}@{domain}"
          recipient = sender
          canary = f"P15-CANARY-{uuid.uuid4().hex[:12]}"
          subject = f"Phase15 Mail Flow Verification {canary}"

          # 1. Build message
          msg = MIMEText(f"Phase 15 mail flow verification canary: {canary}\n")
          msg["From"] = sender
          msg["To"] = recipient
          msg["Subject"] = subject
          msg["Message-ID"] = f"<{uuid.uuid4().hex}@nasa-mail-flow-verify>"
          msg["Date"] = email.utils.formatdate(localtime=True)

          # 2. Send via SMTP submission port 587 with STARTTLS
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          with smtplib.SMTP("127.0.0.1", 587, timeout=30) as smtp:
              smtp.ehlo()
              smtp.starttls(context=ctx)
              smtp.ehlo()
              smtp.login(user, password)
              smtp.sendmail(sender, [recipient], msg.as_string())
          print(canary)
          PY
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: _p15_mail_flow_send
      no_log: true

    - name: "PHASE [mail_flow : Assert SMTP Send Succeeded]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_mail_flow_send.rc == 0
          - _p15_mail_flow_send.stdout | trim | length > 0
        fail_msg: "SMTP submission canary send failed."
      no_log: true

    - name: "PHASE [mail_flow : Search Canary On Active IMAP Host]"
      ansible.builtin.command:
        argv:
          - doveadm
          - search
          - -u
          - mailta
          - mailbox
          - INBOX
          - subject
          - "{{ _p15_mail_flow_send.stdout | trim }}"
      changed_when: false
      register: _p15_mail_flow_search
      delegate_to: "{{ mail_imap_host }}"
      retries: 15
      delay: 2
      until: _p15_mail_flow_search.stdout | trim | length > 0

    - name: "PHASE [mail_flow : Assert Canary Landed On Active IMAP Host]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_mail_flow_search.rc == 0
          - _p15_mail_flow_search.stdout | trim | length > 0
        fail_msg: >-
          Mail flow canary was sent through SMTP but not found on
          {{ mail_imap_host }} via doveadm search.

    - name: "PHASE [mail_flow : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 mail flow verification complete"

# ================================================================
# Regression Checks (Non-Secret Lightweight)
# ================================================================
- name: "Phase15 Regression Checks"
  hosts: mail_smtp
  gather_facts: false
  become: true
  tags:
    - regression
  tasks:
    - name: "PHASE [regression : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 regression checks"

    - name: "PHASE [regression : postfix check]"
      ansible.builtin.command:
        cmd: postfix check
      changed_when: false
      register: _p15_reg_pf

    - name: "PHASE [regression : Assert postfix check Passes]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_reg_pf.rc == 0
        fail_msg: "postfix check failed in regression."

    - name: "PHASE [regression : doveconf -n]"
      ansible.builtin.command:
        cmd: doveconf -n
      changed_when: false
      register: _p15_reg_dc

    - name: "PHASE [regression : Assert doveconf Runs]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_reg_dc.rc == 0
        fail_msg: "doveconf failed in regression."

    - name: "PHASE [regression : Gather Service Facts]"
      ansible.builtin.service_facts:

    - name: "PHASE [regression : Assert All Services Active]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "ansible_facts.services[item + '.service'].state == 'running'"
        fail_msg: "Service {{ item }} is not running (state: {{ ansible_facts.services[item + '.service'].state | default('unknown') }})"
      loop:
        - postfix
        - dovecot
        - "{{ mail_list_api_service_name | default('nasa-mail-list-api') }}"

    - name: "PHASE [regression : Local admin Sender Map]"
      ansible.builtin.command:
        cmd: >-
          postmap -q admin@{{ (mail_managed_domains | default([mail_zone_name, mail_alias_domain])) | first }}
          lmdb:{{ mail_postfix_conf_dir | default('/etc/postfix') }}/sender_login_maps
      changed_when: false
      register: _p15_reg_admin

    - name: "PHASE [regression : Assert admin Sender Map Resolves]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'admin' in _p15_reg_admin.stdout"
        fail_msg: "Local admin sender map broken."

    - name: "PHASE [regression : Check smtpd_relay_restrictions]"
      ansible.builtin.command:
        cmd: "postconf -h smtpd_relay_restrictions"
      changed_when: false
      register: _p15_reg_srr

    - name: "PHASE [regression : Assert Relay Restrictions Contain reject And permit_sasl_authenticated]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'reject' in _p15_reg_srr.stdout"
          - "'permit_sasl_authenticated' in _p15_reg_srr.stdout"
        fail_msg: "smtpd_relay_restrictions missing required terms: {{ _p15_reg_srr.stdout }}"

    - name: "PHASE [regression : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 regression checks complete"

# ================================================================
# Idempotency Gate
# ================================================================
- name: "Phase15 Idempotency Gate"
  hosts: localhost
  gather_facts: false
  tags:
    - idempotency
  tasks:
    - name: "PHASE [idempotency : Run mail_configure.yml Second Time]"
      ansible.builtin.command:
        cmd: "ansible-playbook -i {{ playbook_dir }}/../inventory/hosts.yml {{ playbook_dir }}/mail_configure.yml"
      changed_when: false
      register: _p15_idempotency
      environment:
        ANSIBLE_CONFIG: "{{ playbook_dir }}/../ansible.cfg"

    - name: "PHASE [idempotency : Assert No Changes On Second Run]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_idempotency.rc == 0
          - "'failed=0' in _p15_idempotency.stdout"
          - _p15_idempotency.stdout is not search('changed=[1-9][0-9]*')
        fail_msg: "Idempotency check failed -- mail_configure.yml showed changes on second run. rc={{ _p15_idempotency.rc }}"

    - name: "PHASE [idempotency : END]"
      ansible.builtin.debug:
        msg: "Phase 15 idempotency gate passed"

# ================================================================
# Reboot Persistence Gates
# ================================================================
- name: "Phase15 Reboot mail host"
  hosts: mail_smtp
  gather_facts: false
  become: true
  tags:
    - reboot
    - never
  tasks:
    - name: "PHASE [reboot : Reboot mail host]"
      ansible.builtin.reboot:
        reboot_timeout: 300

- name: "Phase15 Post-Reboot Verification On mail host"
  hosts: mail_smtp
  gather_facts: false
  become: true
  tags:
    - reboot
    - never
  vars:
    _p15_ldap_creds: "{{ hostvars['ldap-01'].ldap_server_credentials | default({}) }}"
  tasks:
    - name: "PHASE [reboot : Post-Reboot postfix check]"
      ansible.builtin.command:
        cmd: postfix check
      changed_when: false
      register: _p15_rb_pf

    - name: "PHASE [reboot : Assert postfix check Passes After Reboot]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_rb_pf.rc == 0
        fail_msg: "postfix check failed after reboot."

    - name: "PHASE [reboot : Post-Reboot doveconf -n]"
      ansible.builtin.command:
        cmd: doveconf -n
      changed_when: false
      register: _p15_rb_dc

    - name: "PHASE [reboot : Assert doveconf Runs After Reboot]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_rb_dc.rc == 0
          - "'driver = ldap' in _p15_rb_dc.stdout"
        fail_msg: "doveconf failed or LDAP passdb missing after reboot."

    - name: "PHASE [reboot : Post-Reboot LDAPS Base Search]"
      ansible.builtin.command:
        cmd: "ldapsearch -H {{ _p15_mail_ldap_uri }} -b '' -s base -x '(objectClass=*)' dn"
      environment:
        LDAPTLS_CACERT: "{{ _p15_mail_ldap_ca_cert_path }}"
      changed_when: false
      register: _p15_rb_ldap

    - name: "PHASE [reboot : Assert LDAPS Functional After Reboot]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_rb_ldap.rc == 0
          - "'dn:' in _p15_rb_ldap.stdout"
        fail_msg: "LDAPS not functional after mail host reboot."

    - name: "PHASE [reboot : Post-Reboot doveadm auth test mailta]"
      ansible.builtin.command:
        cmd: "doveadm auth test mailta {{ _p15_ldap_creds.users.mailta.password_plaintext }}"
      changed_when: false
      failed_when: false
      register: _p15_rb_auth
      no_log: true
      when: _p15_ldap_creds.users.mailta.password_plaintext | default('') | length > 0

    - name: "PHASE [reboot : Assert mailta Auth Works After Reboot]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_rb_auth.rc == 0
        fail_msg: "Dovecot LDAP auth failed after reboot."
      no_log: true
      when: _p15_ldap_creds.users.mailta.password_plaintext | default('') | length > 0

    - name: "PHASE [reboot : Post-Reboot mailta Sender Map]"
      ansible.builtin.command:
        cmd: >-
          postmap -q mailta@{{ (mail_managed_domains | default([mail_zone_name, mail_alias_domain])) | first }}
          lmdb:{{ mail_postfix_conf_dir | default('/etc/postfix') }}/sender_login_maps
      changed_when: false
      register: _p15_rb_smap

    - name: "PHASE [reboot : Assert mailta Sender Map Works After Reboot]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'mailta' in _p15_rb_smap.stdout"
        fail_msg: "mailta sender map broken after reboot."

    - name: "PHASE [reboot : Post-Reboot List API Health Check]"
      ansible.builtin.shell:
        cmd: |
          python3 - <<'PY'
          import json, urllib.request
          req = urllib.request.Request("http://127.0.0.1:{{ mail_list_api_listen_port | default(8000) }}/health")
          with urllib.request.urlopen(req, timeout=10) as resp:
              body = json.loads(resp.read().decode())
              print(json.dumps({"status": resp.status, "body": body}))
          PY
        executable: /bin/bash
      changed_when: false
      register: _p15_rb_api

    - name: "PHASE [reboot : Assert List API Healthy After Reboot]"
      ansible.builtin.assert:
        quiet: true
        that:
          - (_p15_rb_api.stdout | from_json).status == 200
          - "(_p15_rb_api.stdout | from_json).body.status == 'ok'"
        fail_msg: "List API health check failed after reboot. Response: {{ _p15_rb_api.stdout }}"

# ================================================================
# Secret Safety And Full Matrix
# ================================================================
- name: "Phase15 Secret Safety And Full Matrix"
  hosts: localhost
  gather_facts: true
  tags:
    - secret_safety
    - full_matrix
  tasks:
    - name: "PHASE [secret_safety : START]"
      ansible.builtin.debug:
        msg: "Phase 15 secret safety and full matrix gates"

    - name: "PHASE [secret_safety : Assert No Missing no_log On Secret Tasks]"
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          python3 - <<'PY'
          import re
          from pathlib import Path

          playbook = Path("{{ playbook_dir }}") / "mail_phase15_verify.yml"
          lines = playbook.read_text(errors="replace").splitlines()
          register_re = re.compile(
              r"register:\s*(_p15_totp\w*|_p15_auth\w*|_p15_flow\w*|_p15_rb_auth\w*)"
          )
          missing = []
          for idx, line in enumerate(lines):
              if not register_re.search(line):
                  continue
              start = idx
              while start > 0 and not re.match(r"\s*- name:", lines[start]):
                  start -= 1
              end = idx + 1
              while end < len(lines) and not re.match(r"\s*- name:", lines[end]):
                  end += 1
              block = "\n".join(lines[start:end])
              if not re.search(r"no_log:\s*true", block):
                  missing.append(f"{playbook}:{idx + 1}: {line.strip()}")
          print("\n".join(missing))
          PY
        executable: /bin/bash
      changed_when: false
      register: _p15_missing_nolog

    - name: "PHASE [secret_safety : Assert All Secret Tasks Have no_log]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "_p15_missing_nolog.stdout | regex_replace('^\\s*#.*$', '', multiline=true) | trim | length == 0"
        fail_msg: "Secret-adjacent tasks may lack no_log: true. Matches: {{ _p15_missing_nolog.stdout }}"

    - name: "PHASE [full_matrix : Document Canonical Full-Suite Command]"
      ansible.builtin.debug:
        msg:
          - "Canonical Phase 15 full-suite verification command:"
          - "  ANSIBLE_CONFIG=ansible/ansible.cfg ansible-lint ansible/playbooks/mail_phase15_verify.yml"
          - "  && ANSIBLE_CONFIG=ansible/ansible.cfg ansible-playbook -i ansible/inventory/hosts.yml"
          - "     ansible/playbooks/mail_phase15_verify.yml"
          - ""
          - "Tags available: preflight, static, ca, dovecot, postfix, list_api,"
          - "  mail_flow, regression, idempotency, reboot, secret_safety, full_matrix"

    - name: "PHASE [secret_safety : END]"
      ansible.builtin.debug:
        msg: "Phase 15 full matrix secret safety gates complete"
