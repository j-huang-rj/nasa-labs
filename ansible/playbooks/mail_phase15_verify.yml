---
# Phase 15 validation playbook: Mail LDAP Integration.
# Static safety scanner, CA/LDAPS trust, Dovecot LDAP passdb,
# Postfix sender-login maps, list API member validation,
# live SMTP/IMAP mail flow, regression, idempotency, reboot
# persistence, and secret-safety gates.
#
# Canonical commands:
#   lint:
#     ANSIBLE_CONFIG=ansible/ansible.cfg ansible-lint
#       ansible/playbooks/mail_phase15_verify.yml
#
#   standard verifier:
#     ANSIBLE_CONFIG=ansible/ansible.cfg ansible-playbook
#       -i ansible/inventory/hosts.yml
#       ansible/playbooks/mail_phase15_verify.yml
#
#   reboot verifier:
#     ANSIBLE_CONFIG=ansible/ansible.cfg ansible-playbook
#       -i ansible/inventory/hosts.yml
#       ansible/playbooks/mail_phase15_verify.yml --tags reboot
#
# Available tags:
#   preflight, static, ca, dovecot, postfix, list_api,
#   mail_flow, regression, idempotency, reboot,
#   secret_safety, full_matrix

# ================================================================
# Preflight: Reachability And Mail LDAP Gate
# ================================================================
- name: "Phase15 Preflight Reachability And Prerequisites"
  hosts:
    - mail_smtp
    - mail_imap
    - ldap-01
  gather_facts: false
  become: true
  tags:
    - preflight
  tasks:
    - name: "PHASE [preflight : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 preflight -- target reachability, mail LDAP gates"

    - name: "PHASE [preflight : Ping Targets]"
      ansible.builtin.ping:

    - name: "PHASE [preflight : Assert mail_ldap_enabled On mail host]"
      ansible.builtin.assert:
        quiet: true
        that:
          - mail_ldap_enabled | default(false) | bool
        fail_msg: "mail_ldap_enabled is not true on {{ inventory_hostname }}."
      when: inventory_hostname in ((groups['mail_smtp'] | default([])) + (groups['mail_imap'] | default([])))

    - name: "PHASE [preflight : Assert mail_ldap_users Non-Empty On mail host]"
      ansible.builtin.assert:
        quiet: true
        that:
          - mail_ldap_users | default([]) | length > 0
        fail_msg: "mail_ldap_users is empty on {{ inventory_hostname }}"
      when: inventory_hostname in ((groups['mail_smtp'] | default([])) + (groups['mail_imap'] | default([])))

    - name: "PHASE [preflight : Assert stu Absent From mail_ldap_users]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'stu' not in (mail_ldap_users | default([]))"
        fail_msg: "'stu' must not appear in mail_ldap_users on {{ inventory_hostname }}."
      when: inventory_hostname in ((groups['mail_smtp'] | default([])) + (groups['mail_imap'] | default([])))

    - name: "PHASE [preflight : Assert /u Is Not Required On mail host]"
      ansible.builtin.stat:
        path: /u
      register: _p15_preflight_u_stat
      when: inventory_hostname in ((groups['mail_smtp'] | default([])) + (groups['mail_imap'] | default([])))

    - name: "PHASE [preflight : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 preflight complete"

# ================================================================
# Static Source Safety Gates (localhost)
# ================================================================
- name: "Phase15 Static Source Safety Gates"
  hosts: localhost
  gather_facts: true
  tags:
    - static
  vars:
    _p15_mail_role_dir: "{{ playbook_dir }}/roles/mail"
    _p15_inventory_dir: "{{ playbook_dir }}/../inventory"
  tasks:
    - name: "PHASE [static : START]"
      ansible.builtin.debug:
        msg: "Phase 15 static source safety gates -- scanning for forbidden patterns"

    - name: "PHASE [static : Scan Source With Portable Python Gates]"
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          python3 - <<'PY'
          import json, re
          from pathlib import Path

          playbook_dir = Path("{{ playbook_dir }}")
          inventory_dir = Path("{{ _p15_inventory_dir }}")
          scan_roots = [
              playbook_dir / "roles" / "mail",
          ]
          mail_hostvars = inventory_dir / "host_vars" / "{{ mail_smtp_host | default('smtp-01') }}"

          patterns = [
              ("Non-LDAPS ldap:// scheme", re.compile(r"ldap://")),
              ("Port 389 (cleartext LDAP)", re.compile(r":389\b")),
              ("StartTLS flags", re.compile(r"start\s*tls|starttls|\-ZZ", re.I)),
              ("TLS bypass", re.compile(r"LDAPTLS_REQCERT\s*=\s*never", re.I)),
              ("Ansible cert validation bypass", re.compile(r"validate_certs\s*:\s*false", re.I)),
              ("Dovecot tls_require_cert weak", re.compile(r"tls_require_cert\s*=\s*(never|no|allow|try)\b", re.I)),
              ("Unexpected Dovecot pass_filter in auth-bind config", re.compile(r"pass_filter")),
              ("stu in mail_ldap_users", re.compile(r"mail_ldap_users.*\bstu\b")),
          ]
          findings = []

          def iter_files(path):
              if path.is_dir():
                  for suffix in ("*.yml", "*.yaml", "*.j2"):
                      yield from path.rglob(suffix)
              elif path.exists():
                  yield path

          def normalized_lines(path):
              text = path.read_text(errors="replace")
              if path.name == "mail_phase15_verify.yml":
                  text = re.sub(
                      r"# Static Source Safety Gates.*?# CA.*?LDAPS Trust Verification",
                      "# CA LDAPS Trust Verification",
                      text, flags=re.S,
                  )
              for lineno, line in enumerate(text.splitlines(), 1):
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  if re.match(r"^(\s*-\s*)?(pattern|label|grep_args):", stripped):
                      continue
                  yield lineno, line

          for root in scan_roots:
              for path in iter_files(root):
                  for lineno, line in normalized_lines(path):
                      for label, regex in patterns:
                          if not regex.search(line):
                              continue
                          if path.name == "assert.yml" and label in (
                              "Non-LDAPS ldap:// scheme",
                              "StartTLS flags",
                          ):
                              continue
                          if label == "Non-LDAPS ldap:// scheme" and ("ldaps://" in line or "ldapi://" in line):
                              continue
                          if label == "StartTLS flags" and "not supported" in line.lower():
                              continue
                          if label == "Unexpected Dovecot pass_filter in auth-bind config" and path.name == "dovecot-ldap-account-gate.conf.ext.j2":
                              continue
                          if label == "stu in mail_ldap_users" and "not in" in line:
                              continue
                          findings.append({"label": label, "path": str(path), "line": lineno, "text": line.strip()})

          if mail_hostvars.exists():
              for path in iter_files(mail_hostvars):
                  for lineno, line in normalized_lines(path):
                      if re.search(r"mail_ldap_users.*\bstu\b", line) and "not in" not in line:
                          findings.append({
                              "label": "stu in mail host mail_ldap_users",
                              "path": str(path), "line": lineno, "text": line.strip(),
                          })

          print(json.dumps(findings, indent=2, sort_keys=True))
          PY
        executable: /bin/bash
      changed_when: false
      register: _p15_static_findings

    - name: "PHASE [static : Assert No Forbidden Phase 15 Patterns]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_static_findings.stdout | from_json | length == 0
        fail_msg: "Phase 15 content contains forbidden source patterns. Matches: {{ _p15_static_findings.stdout }}"

    - name: "PHASE [static : END]"
      ansible.builtin.debug:
        msg: "Phase 15 static source safety gates complete"

# ================================================================
# CA / LDAPS Trust Verification
# ================================================================
- name: "Phase15 CA LDAPS Trust Verification"
  hosts: mail_imap
  gather_facts: false
  become: true
  tags:
    - ca
  vars:
    _p15_mail_ldap_uri: "{{ mail_ldap_uri | default(ldap_server_uri) }}"
    _p15_mail_ldap_ca_cert_path: >-
      {{ mail_ldap_ca_cert_path | default(ldap_tls_ca_cert_path | default('/etc/pki/ca-trust/source/anchors/ldap-ca.crt')) }}
  tasks:
    - name: "PHASE [ca : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 CA/LDAPS trust verification"

    - name: "PHASE [ca : Assert LDAP CA Cert Exists]"
      ansible.builtin.stat:
        path: "{{ _p15_mail_ldap_ca_cert_path }}"
      register: _p15_ca_stat

    - name: "PHASE [ca : Assert CA Certificate Present]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_ca_stat.stat.exists
        fail_msg: "LDAP CA certificate missing at {{ _p15_mail_ldap_ca_cert_path }}."

    - name: "PHASE [ca : LDAPS RootDSE Search With CA Validation]"
      ansible.builtin.command:
        cmd: "ldapsearch -H {{ _p15_mail_ldap_uri }} -b '' -s base -x '(objectClass=*)' dn"
      environment:
        LDAPTLS_CACERT: "{{ _p15_mail_ldap_ca_cert_path }}"
      changed_when: false
      register: _p15_ca_rootdse

    - name: "PHASE [ca : Assert LDAPS RootDSE Reachable]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_ca_rootdse.rc == 0
          - "'dn:' in _p15_ca_rootdse.stdout"
        fail_msg: "LDAPS rootDSE search failed on {{ inventory_hostname }}. rc={{ _p15_ca_rootdse.rc }}"

    - name: "PHASE [ca : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 CA/LDAPS trust verification complete"

# ================================================================
# Dovecot LDAP Passdb Verification
# ================================================================
- name: "Phase15 Dovecot LDAP Passdb Verification"
  hosts: mail_imap
  gather_facts: false
  become: true
  tags:
    - dovecot
  vars:
    _p15_ldap_creds: "{{ hostvars['ldap-01'].ldap_server_credentials | default({}) }}"
    _p15_mail_ldap_uri: "{{ mail_ldap_uri | default(ldap_server_uri) }}"
    _p15_mail_ldap_ca_cert_path: >-
      {{ mail_ldap_ca_cert_path | default(ldap_tls_ca_cert_path | default('/etc/pki/ca-trust/source/anchors/ldap-ca.crt')) }}
  tasks:
    - name: "PHASE [dovecot : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 Dovecot LDAP passdb verification"

    - name: "PHASE [dovecot : Run doveconf -n]"
      ansible.builtin.command:
        cmd: doveconf -n
      changed_when: false
      register: _p15_doveconf

    - name: "PHASE [dovecot : Assert LDAP Passdb Present In Dovecot Config]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'passdb' in _p15_doveconf.stdout"
          - "'driver = ldap' in _p15_doveconf.stdout"
        fail_msg: "Dovecot LDAP passdb not found in doveconf -n output."

    - name: "PHASE [dovecot : Assert LDAP Account Gate Is Present]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'dovecot-ldap-account-gate.conf.ext' in _p15_doveconf.stdout"
          - "'result_failure = return-fail' in _p15_doveconf.stdout"
          - "'username_filter' not in _p15_doveconf.stdout"
        fail_msg: >-
          Dovecot must use the dynamic LDAP account-gate passdb and must not
          use a static username_filter.

    - name: "PHASE [dovecot : Read Rendered LDAP Account Gate Config]"
      ansible.builtin.command:
        cmd: "cat {{ mail_dovecot_ldap_account_gate_path | default('/etc/dovecot/dovecot-ldap-account-gate.conf.ext') }}"
      changed_when: false
      register: _p15_dovecot_account_gate_config

    - name: "PHASE [dovecot : Assert LDAP Account Gate Uses noauthenticate]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'uid=%n' in _p15_dovecot_account_gate_config.stdout"
          - "'uid=stu' in _p15_dovecot_account_gate_config.stdout"
          - "'pass_attrs = =noauthenticate=y' in _p15_dovecot_account_gate_config.stdout"
        fail_msg: >-
          Dovecot LDAP gate must check uid=%n, exclude forbidden static users,
          and return noauthenticate=y so the following auth-bind passdb still
          verifies the password/TOTP.

    - name: "PHASE [dovecot : Check Rendered LDAP Config For pass_filter]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          grep -iv '^[[:space:]]*#'
          {{ mail_dovecot_conf_dir | default('/etc/dovecot') }}/dovecot-ldap.conf.ext
          | grep -i 'pass_filter'
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: _p15_ldap_passfilter

    - name: "PHASE [dovecot : Assert No Active pass_filter In LDAP Config]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_ldap_passfilter.rc != 0
        fail_msg: >-
          pass_filter found in {{ mail_dovecot_conf_dir | default('/etc/dovecot') }}/dovecot-ldap.conf.ext;
          it must not be present when auth_bind_userdn is set.

    # --- TOTP generation (delegated to localhost for secret access) ---

    - name: "PHASE [dovecot : Generate Current TOTP For generalta]"
      ansible.builtin.shell:
        cmd: |
          python3 -c "
          import base64, hmac, hashlib, struct, time
          secret_b64 = '{{ _p15_ldap_creds.users.generalta.totp_secret_raw_b64 | default('') }}'
          if not secret_b64:
              print('NOT_CONFIGURED')
              exit(0)
          secret = base64.b64decode(secret_b64)
          t = int(time.time()) // {{ hostvars['ldap-01'].ldap_server_totp_time_step | default(60) }}
          msg = struct.pack('>Q', t)
          h = hmac.new(secret, msg, hashlib.sha1).digest()
          offset = h[-1] & 0x0f
          code = (struct.unpack('>I', h[offset:offset+4])[0] & 0x7fffffff) % 1000000
          print(f'{code:06d}')
          "
        executable: /bin/bash
      changed_when: false
      register: _p15_totp_generalta
      no_log: true
      delegate_to: localhost
      become: false

    - name: "PHASE [dovecot : Generate Current TOTP For stu]"
      ansible.builtin.shell:
        cmd: |
          python3 -c "
          import base64, hmac, hashlib, struct, time
          secret_b64 = '{{ _p15_ldap_creds.users.stu.totp_secret_raw_b64 | default('') }}'
          if not secret_b64:
              print('NOT_CONFIGURED')
              exit(0)
          secret = base64.b64decode(secret_b64)
          t = int(time.time()) // {{ hostvars['ldap-01'].ldap_server_totp_time_step | default(60) }}
          msg = struct.pack('>Q', t)
          h = hmac.new(secret, msg, hashlib.sha1).digest()
          offset = h[-1] & 0x0f
          code = (struct.unpack('>I', h[offset:offset+4])[0] & 0x7fffffff) % 1000000
          print(f'{code:06d}')
          "
        executable: /bin/bash
      changed_when: false
      register: _p15_totp_stu
      no_log: true
      delegate_to: localhost
      become: false

    # --- doveadm auth probes ---

    - name: "PHASE [dovecot : Fail Closed If mailta Password Material Unavailable]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_ldap_creds.users.mailta.password_plaintext | default('') | length > 0
        fail_msg: "mailta password not available -- cannot verify Dovecot LDAP auth."
      no_log: true

    - name: "PHASE [dovecot : doveadm auth test mailta (no TOTP)]"
      ansible.builtin.command:
        cmd: "doveadm auth test mailta {{ _p15_ldap_creds.users.mailta.password_plaintext }}"
      changed_when: false
      failed_when: false
      register: _p15_auth_mailta
      no_log: true

    - name: "PHASE [dovecot : Assert mailta Auth Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_auth_mailta.rc == 0
        fail_msg: "doveadm auth test mailta failed (rc={{ _p15_auth_mailta.rc }}). LDAP passdb is not authenticating TA users correctly."
      no_log: true

    - name: "PHASE [dovecot : Fail Closed If generalta Password+TOTP Material Unavailable]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_ldap_creds.users.generalta.password_plaintext | default('') | length > 0
          - _p15_totp_generalta.stdout | default('NOT_CONFIGURED') != 'NOT_CONFIGURED'
        fail_msg: "generalta password or TOTP material not available -- cannot verify TOTP auth."
      no_log: true

    - name: "PHASE [dovecot : doveadm auth test generalta (password + TOTP)]"
      ansible.builtin.command:
        cmd: "doveadm auth test generalta {{ _p15_ldap_creds.users.generalta.password_plaintext }}{{ _p15_totp_generalta.stdout }}"
      changed_when: false
      failed_when: false
      register: _p15_auth_generalta
      no_log: true

    - name: "PHASE [dovecot : Assert generalta Auth Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_auth_generalta.rc == 0
        fail_msg: "doveadm auth test generalta failed (rc={{ _p15_auth_generalta.rc }}). LDAP passdb is not authenticating TOTP users correctly."
      no_log: true

    - name: "PHASE [dovecot : doveadm auth test stu (must FAIL)]"
      ansible.builtin.command:
        cmd: "doveadm auth test stu {{ _p15_ldap_creds.users.stu.password_plaintext | default('') }}{{ _p15_totp_stu.stdout | default('') }}"
      changed_when: false
      failed_when: false
      register: _p15_auth_stu
      no_log: true
      when:
        - _p15_ldap_creds.users.stu.password_plaintext | default('') | length > 0
        - _p15_totp_stu.stdout | default('NOT_CONFIGURED') != 'NOT_CONFIGURED'

    - name: "PHASE [dovecot : Assert stu Auth Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_auth_stu.rc != 0
        fail_msg: "doveadm auth test stu unexpectedly succeeded (rc={{ _p15_auth_stu.rc }}). stu must not be able to authenticate via LDAP passdb."
      no_log: true
      when:
        - _p15_ldap_creds.users.stu.password_plaintext | default('') | length > 0
        - _p15_totp_stu.stdout | default('NOT_CONFIGURED') != 'NOT_CONFIGURED'

    - name: "PHASE [dovecot : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 Dovecot LDAP passdb verification complete"

# ================================================================
# Postfix Sender Login Map Verification
# ================================================================
- name: "Phase15 Postfix Sender Login Map Verification"
  hosts: mail_smtp
  gather_facts: false
  become: true
  tags:
    - postfix
  tasks:
    - name: "PHASE [postfix : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 Postfix sender login map verification"

    - name: "PHASE [postfix : postfix check]"
      ansible.builtin.command:
        cmd: postfix check
      changed_when: false
      register: _p15_postfix_check

    - name: "PHASE [postfix : Assert postfix check Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_postfix_check.rc == 0
        fail_msg: "postfix check failed (rc={{ _p15_postfix_check.rc }})."

    - name: "PHASE [postfix : postmap -q LDAP Users Across Domains]"
      ansible.builtin.command:
        cmd: "postmap -q {{ item.0 }}@{{ item.1 }} lmdb:{{ mail_postfix_conf_dir | default('/etc/postfix') }}/sender_login_maps"
      changed_when: false
      register: _p15_postmap_ldap
      loop: "{{ mail_ldap_users | product(mail_managed_domains | default([mail_zone_name, mail_alias_domain])) | list }}"

    - name: "PHASE [postfix : Assert All LDAP User Sender Maps Return Username]"
      ansible.builtin.assert:
        quiet: true
        that:
          - item.stdout | trim | length > 0
        fail_msg: "Sender-login map lookup for {{ item.item.0 }}@{{ item.item.1 }} returned empty."
      loop: "{{ _p15_postmap_ldap.results }}"
      loop_control:
        label: "{{ item.item.0 }}@{{ item.item.1 }}"

    - name: "PHASE [postfix : postmap -q LDAP Users In Virtual Mailbox Maps]"
      ansible.builtin.command:
        cmd: >-
          postmap -q {{ item.0 }}@{{ item.1 }}
          lmdb:{{ mail_virtual_mailbox_maps_path | default('/etc/postfix/virtual_mailbox_maps') }}
      changed_when: false
      register: _p15_postmap_ldap_mailbox
      loop: "{{ mail_ldap_users | product(mail_managed_domains | default([mail_zone_name, mail_alias_domain])) | list }}"

    - name: "PHASE [postfix : Assert All LDAP Users Are Valid Direct Recipients]"
      ansible.builtin.assert:
        quiet: true
        that:
          - item.stdout | trim | length > 0
        fail_msg: "Virtual mailbox lookup for {{ item.item.0 }}@{{ item.item.1 }} returned empty."
      loop: "{{ _p15_postmap_ldap_mailbox.results }}"
      loop_control:
        label: "{{ item.item.0 }}@{{ item.item.1 }}"

    - name: "PHASE [postfix : postmap -q stu Negative Check]"
      ansible.builtin.command:
        cmd: >-
          postmap -q stu@{{ (mail_managed_domains | default([mail_zone_name, mail_alias_domain])) | first }}
          lmdb:{{ mail_postfix_conf_dir | default('/etc/postfix') }}/sender_login_maps
      changed_when: false
      failed_when: false
      register: _p15_postmap_stu

    - name: "PHASE [postfix : Assert stu Sender Map Is Empty]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_postmap_stu.stdout | trim | length == 0
        fail_msg: "stu sender-login map unexpectedly returned '{{ _p15_postmap_stu.stdout }}'."

    - name: "PHASE [postfix : postmap -q stu Recipient Negative Check]"
      ansible.builtin.command:
        cmd: >-
          postmap -q stu@{{ (mail_managed_domains | default([mail_zone_name, mail_alias_domain])) | first }}
          lmdb:{{ mail_virtual_mailbox_maps_path | default('/etc/postfix/virtual_mailbox_maps') }}
      changed_when: false
      failed_when: false
      register: _p15_postmap_stu_mailbox

    - name: "PHASE [postfix : Assert stu Recipient Map Is Empty]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p15_postmap_stu_mailbox.stdout | trim | length == 0
        fail_msg: >-
          stu virtual mailbox map unexpectedly returned
          '{{ _p15_postmap_stu_mailbox.stdout }}'.

    - name: "PHASE [postfix : postmap -q Local admin User]"
      ansible.builtin.command:
        cmd: >-
          postmap -q admin@{{ (mail_managed_domains | default([mail_zone_name, mail_alias_domain])) | first }}
          lmdb:{{ mail_postfix_conf_dir | default('/etc/postfix') }}/sender_login_maps
      changed_when: false
      register: _p15_postmap_admin

    - name: "PHASE [postfix : Assert admin Sender Map Returns admin]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'admin' in _p15_postmap_admin.stdout"
        fail_msg: "admin sender-login map lookup failed. stdout={{ _p15_postmap_admin.stdout }}"

    - name: "PHASE [postfix : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 Postfix sender login map verification complete"

# ================================================================
# List API Verification
# ================================================================
- name: "Phase15 List API Verification"
  hosts: mail_smtp
  gather_facts: false
  become: true
  tags:
    - list_api
  tasks:
    - name: "PHASE [list_api : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 15 list API verification"

    - name: "PHASE [list_api : Read valid_users.txt]"
      ansible.builtin.command:
        cmd: "cat {{ mail_list_api_app_dir | default('/opt/nasa-mail-list-api/app') }}/valid_users.txt"
      changed_when: false
      register: _p15_valid_users

    - name: "PHASE [list_api : Assert Local Users In valid_users.txt]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "item in _p15_valid_users.stdout"
        fail_msg: "Local user '{{ item }}' missing from valid_users.txt."
