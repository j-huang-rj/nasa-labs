          - "'stu' not in (_p15_api_create.stdout | from_json).body.members"
        fail_msg: "List API member filtering failed. Expected mailta present (stu absent). Response: {{ _p15_api_create.stdout }}"

    - name: "PHASE [list_api : Create stu-Only List Via API (Expect 422)]"
