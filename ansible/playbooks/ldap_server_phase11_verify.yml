---
# Phase 11 validation playbook: LDAP preflight reachability,
# package facts, security-relevant source safety gates,
# LDAPS endpoint, OLC state, DIT identity entries,
# idempotency, and reboot persistence.
#
# Prerequisites:
#   - site.yml or ldap_configure.yml

# ──────────────────────────────────────────────────────────
# Preflight: Reachability And Package Facts
# ──────────────────────────────────────────────────────────
- name: "Phase11 Preflight Reachability And Package Facts"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - preflight
  tasks:
    - name: "PHASE [preflight : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 11 preflight reachability and package facts"

    - name: "PHASE [preflight : Ping ldap-01 Target]"
      ansible.builtin.ping:

    - name: "PHASE [preflight : DNF Repoquery OpenLDAP And OpenSSL Packages]"
      ansible.builtin.command:
        cmd: >-
          dnf repoquery epel-release openldap openldap-clients
          openldap-servers openssl ca-certificates
      changed_when: false
      register: _p11_repoquery

    - name: "PHASE [preflight : Assert DNF Repoquery Returned Packages]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_repoquery.rc == 0
          - "'epel-release' in _p11_repoquery.stdout"
          - "'openldap' in _p11_repoquery.stdout"
          - "'openldap-clients' in _p11_repoquery.stdout"
          - "'openldap-servers' in _p11_repoquery.stdout"
          - "'openssl' in _p11_repoquery.stdout"
          - "'ca-certificates' in _p11_repoquery.stdout"
        fail_msg: >-
          DNF repoquery missing expected packages.
          Got stdout: {{ _p11_repoquery.stdout | default('') }}

    - name: "PHASE [preflight : Gather Package Facts For OpenLDAP And OpenSSL]"
      ansible.builtin.package_facts:
        manager: rpm

    - name: "PHASE [preflight : Assert Required Packages Installed]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'epel-release' in ansible_facts.packages"
          - "'openldap' in ansible_facts.packages"
          - "'openldap-clients' in ansible_facts.packages"
          - "'openldap-servers' in ansible_facts.packages"
          - "'openssl' in ansible_facts.packages"
          - "'ca-certificates' in ansible_facts.packages"
        fail_msg: >-
          Required packages not installed.
          Installed packages: {{ ansible_facts.packages.keys() | list }}

    # noqa: command-instead-of-module
    - name: "PHASE [preflight : Systemctl Cat slapd Service Unit]"
      ansible.builtin.command:
        cmd: systemctl cat slapd
      changed_when: false
      register: _p11_systemctl_cat

    - name: "PHASE [preflight : Assert slapd Service Unit Readable]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_systemctl_cat.rc == 0
          - _p11_systemctl_cat.stdout | length > 0
        fail_msg: >-
          systemctl cat slapd failed or returned empty output.
          rc={{ _p11_systemctl_cat.rc }}

    # noqa: command-instead-of-module
    - name: "PHASE [preflight : RPM File List openldap-servers]"
      ansible.builtin.command:
        cmd: rpm -ql openldap-servers
      changed_when: false
      register: _p11_rpm_ql_servers

    - name: "PHASE [preflight : Assert RPM File List Returned Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_rpm_ql_servers.rc == 0
          - _p11_rpm_ql_servers.stdout | length > 0
        fail_msg: >-
          rpm -ql openldap-servers failed.
          rc={{ _p11_rpm_ql_servers.rc }}

    - name: "PHASE [preflight : Verify Module File Paths Exist]"
      ansible.builtin.stat:
        path: "{{ item.path }}"
      changed_when: false
      register: _p11_module_stat
      loop:
        - path: /usr/lib64/openldap/ppolicy.so
          label: "ppolicy.so (Phase 11 loaded module)"
        - path: /usr/lib64/openldap/otp.so
          label: "otp.so (Phase 11 loaded module)"
        - path: /usr/lib64/openldap/sssvlv.so
          label: "sssvlv.so (Phase 11 loaded module)"
        - path: /usr/lib64/openldap/check_password.so
          label: "check_password.so (password-quality file availability only; not a Phase 11 OLC load requirement)"
      loop_control:
        label: "{{ item.label }}"

    - name: "PHASE [preflight : Assert Required Module Files Present]"
      ansible.builtin.assert:
        quiet: true
        that:
          - item.stat.exists
        fail_msg: "Required module file not found: {{ item.item.path }}"
      loop: "{{ _p11_module_stat.results }}"
      loop_control:
        label: "{{ item.item.label }}"

    - name: "PHASE [preflight : Inventory Installed OpenLDAP Schema Files]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          rpm -ql openldap-servers | grep '/schema/' | sort
        executable: /bin/bash
      changed_when: false
      register: _p11_schema_inventory

    - name: "PHASE [preflight : Assert Schema File Inventory Returned Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_schema_inventory.rc == 0
          - _p11_schema_inventory.stdout | length > 0
        fail_msg: >-
          Schema file inventory from openldap-servers returned nothing.
          stdout={{ _p11_schema_inventory.stdout | default('') }}

    - name: "PHASE [preflight : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 11 preflight reachability and package facts complete"

# ──────────────────────────────────────────────────────────
# Static Source Safety Gates
# ──────────────────────────────────────────────────────────
- name: "Phase11 Static Source Safety Gates"
  hosts: localhost
  gather_facts: false
  become: false
  tags:
    - static
  vars:
    _p11_openldap_role_dir: "{{ playbook_dir }}/roles/openldap"
    _p11_forbidden_source_patterns:
      - pattern: '/etc/openldap/slapd\.d'
        label: 'Direct slapd.d file writes (template/copy/lineinfile/blockinfile/file modules targeting slapd.d directory)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" /etc/openldap/slapd\.d'
      - pattern: 'LDAPTLS_REQCERT\s*=\s*never'
        label: 'LDAPTLS_REQCERT=never (disables certificate validation)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" LDAPTLS_REQCERT'
      - pattern: 'validate_certs\s*:\s*false'
        label: 'validate_certs: false (disables Ansible LDAP module certificate validation)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "validate_certs:\s*false"'
      - pattern: '\-[Zz]{2}'
        label: 'StartTLS -ZZ flag (ldapsearch StartTLS)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "\-[Zz]\{2\}"'
      - pattern: 'ldap://[^s]'
        label: 'ldap:// scheme (non-SSL LDAP) excluding ldaps:// and ldapi://'
        grep_args: '-rn --include="*.yml" --include="*.yaml" --include="*.j2" "ldap://"'
      - pattern: ':389'
        label: 'Port 389 reference (plain LDAP)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" ":389"'
      - pattern: 'ldap_users'
        label: 'Explicit ldap_users reference (must use inventory identity model)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "ldap_users"'
      - pattern: 'ldap_groups'
        label: 'Explicit ldap_groups reference (must use inventory identity model)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "ldap_groups"'
    _p11_openldap_task_patterns:
      - module: 'ansible\.builtin\.template'
        label: 'template writes to slapd.d'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "ansible\.builtin\.template"'
      - module: 'ansible\.builtin\.copy'
        label: 'copy writes to slapd.d'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "ansible\.builtin\.copy"'
      - module: 'ansible\.builtin\.lineinfile'
        label: 'lineinfile writes to slapd.d'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "ansible\.builtin\.lineinfile"'
      - module: 'ansible\.builtin\.blockinfile'
        label: 'blockinfile writes to slapd.d'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "ansible\.builtin\.blockinfile"'
      - module: 'ansible\.builtin\.file'
        label: 'file writes to slapd.d'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "ansible\.builtin\.file"'
      - module: 'ansible\.builtin\.replace'
        label: 'replace writes to slapd.d'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "ansible\.builtin\.replace"'
  tasks:
    - name: "PHASE [static : START]"
      ansible.builtin.debug:
        msg: "Phase 11 static source safety gates — scanning for forbidden patterns in openldap role"

    - name: "PHASE [static : Scan For Forbidden Security Patterns In OpenLDAP Role]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          cd "{{ _p11_openldap_role_dir }}" 2>/dev/null || exit 0;
          grep {{ item.grep_args }} || true
        executable: /bin/bash
      changed_when: false
      register: _p11_forbidden_source_scan
      loop: "{{ _p11_forbidden_source_patterns }}"
      loop_control:
        label: "{{ item.label }}"

    - name: "PHASE [static : Assert No slapd.d File Writes In OpenLDAP Role]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p11_forbidden_source_scan.results[0].stdout | length == 0
        fail_msg: >-
          OpenLDAP role contains direct writes to /etc/openldap/slapd.d.
          OpenLDAP OLC must be managed through LDAP operations (ldapmodify/ldapadd),
          not direct LDIF file edits.
          Matches:
          {{ _p11_forbidden_source_scan.results[0].stdout }}

    - name: "PHASE [static : Assert No LDAPTLS_REQCERT=never In OpenLDAP Role]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p11_forbidden_source_scan.results[1].stdout | length == 0
        fail_msg: >-
          OpenLDAP role contains LDAPTLS_REQCERT=never — disabled certificate
          validation is forbidden. Use explicit CA trust instead.
          Matches:
          {{ _p11_forbidden_source_scan.results[1].stdout }}

    - name: "PHASE [static : Assert No validate_certs: false In OpenLDAP Role]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p11_forbidden_source_scan.results[2].stdout | length == 0
        fail_msg: >-
          OpenLDAP role contains validate_certs: false — disabled Ansible LDAP
          module certificate validation is forbidden.
          Matches:
          {{ _p11_forbidden_source_scan.results[2].stdout }}

    - name: "PHASE [static : Assert No StartTLS -ZZ Flag In OpenLDAP Role]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p11_forbidden_source_scan.results[3].stdout | length == 0
        fail_msg: >-
          OpenLDAP role contains StartTLS -ZZ flag — StartTLS is forbidden.
          Use LDAPS (ldaps://) with certificate validation instead.
          Matches:
          {{ _p11_forbidden_source_scan.results[3].stdout }}

    - name: "PHASE [static : Assert No ldap:// (Non-SSL) In OpenLDAP Role]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p11_forbidden_source_scan.results[4].stdout | length == 0
        fail_msg: >-
          OpenLDAP role contains ldap:// scheme — plain LDAP without SSL is
          forbidden. Use ldaps:// or ldapi:// instead.
          Matches:
          {{ _p11_forbidden_source_scan.results[4].stdout }}

    - name: "PHASE [static : Assert No Port 389 In OpenLDAP Role]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p11_forbidden_source_scan.results[5].stdout | length == 0
        fail_msg: >-
          OpenLDAP role contains port 389 reference — plain LDAP port is
          forbidden. Use LDAPS port 636 instead.
          Matches:
          {{ _p11_forbidden_source_scan.results[5].stdout }}

    - name: "PHASE [static : Assert ldap_users Usage In OpenLDAP Role (Must Use Inventory Model)]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p11_forbidden_source_scan.results[6].stdout | length > 0
        fail_msg: >-
          OpenLDAP role does not reference ldap_users — inventory identity model
          may be unused. The openldap role must consume ldap_users from the shared
          ldap_identity.yml model.
          Matches:
          {{ _p11_forbidden_source_scan.results[6].stdout }}

    - name: "PHASE [static : Assert ldap_groups Usage In OpenLDAP Role (Must Use Inventory Model)]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p11_forbidden_source_scan.results[7].stdout | length > 0
        fail_msg: >-
          OpenLDAP role does not reference ldap_groups — inventory identity model
          may be unused. The openldap role must consume ldap_groups from the shared
          ldap_identity.yml model.
          Matches:
          {{ _p11_forbidden_source_scan.results[7].stdout }}

    - name: "PHASE [static : END]"
      ansible.builtin.debug:
        msg: "Phase 11 static source safety gates complete"

# ──────────────────────────────────────────────────────────
# LDAPS Endpoint Validation
# ──────────────────────────────────────────────────────────
- name: "Phase11 LDAPS Endpoint Validation"
  hosts: ldap-01
  gather_facts: true
  become: true
  tags:
    - ldaps
  tasks:
    - name: "PHASE [ldaps : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 11 LDAPS endpoint validation with certificate verification"

    - name: "PHASE [ldaps : LDAPS Search Base DN With Certificate Validation]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -H {{ ldap_server_uri }}
          -x -b "{{ ldap_base_dn }}" '(objectClass=*)' dn
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path | default('/etc/openldap/certs/ldap.crt') }}"
      changed_when: false
      register: _p11_ldaps_search

    - name: "PHASE [ldaps : Assert LDAPS Search Returned Results]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_ldaps_search.rc == 0
          - ldap_base_dn in _p11_ldaps_search.stdout
        fail_msg: >-
          LDAPS search on {{ ldap_server_uri }} failed or base DN not found.
          rc={{ _p11_ldaps_search.rc }},
          stdout={{ _p11_ldaps_search.stdout | default('') }}

    - name: "PHASE [ldaps : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 11 LDAPS endpoint validation complete"

# ──────────────────────────────────────────────────────────
# OLC State Validation
# ──────────────────────────────────────────────────────────
- name: "Phase11 OLC State Validation"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - olc
  tasks:
    - name: "PHASE [olc : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 11 OLC cn=config state validation via ldapi"

    - name: "PHASE [olc : Search OLC TLS Config]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:/// -b cn=config
          '(|(olcTLSCertificateFile=*)(olcTLSCertificateKeyFile=*))'
          dn olcTLSCertificateFile olcTLSCertificateKeyFile
      changed_when: false
      register: _p11_olc_tls

    - name: "PHASE [olc : Assert OLC TLS Certificate And Key Configured]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_olc_tls.rc == 0
          - "'olcTLSCertificateFile' in _p11_olc_tls.stdout"
          - "'olcTLSCertificateKeyFile' in _p11_olc_tls.stdout"
        fail_msg: >-
          OLC TLS configuration missing olcTLSCertificateFile or
          olcTLSCertificateKeyFile.
          stdout={{ _p11_olc_tls.stdout | default('') }}

    - name: "PHASE [olc : Search OLC MDB Database Config]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:/// -b cn=config
          '(olcDatabase=mdb)' dn olcSuffix olcDatabase olcDbIndex
      changed_when: false
      register: _p11_olc_db

    - name: "PHASE [olc : Assert MDB Database Configured With Correct Suffix]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_olc_db.rc == 0
          - "'olcDatabase' in _p11_olc_db.stdout"
          - "'mdb' in _p11_olc_db.stdout"
          - ldap_base_dn in _p11_olc_db.stdout
        fail_msg: >-
          OLC MDB database missing or suffix mismatch.
          Expected suffix: {{ ldap_base_dn }}.
          stdout={{ _p11_olc_db.stdout | default('') }}

    - name: "PHASE [olc : Assert Required MDB Indexes Configured]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_olc_db.stdout | default('')
            | regex_search('olcDbIndex:\\s+objectClass\\s+eq') is not none
          - _p11_olc_db.stdout | default('')
            | regex_search('olcDbIndex:\\s+uid\\s+eq') is not none
          - _p11_olc_db.stdout | default('')
            | regex_search('olcDbIndex:\\s+cn\\s+eq') is not none
          - _p11_olc_db.stdout | default('')
            | regex_search('olcDbIndex:\\s+gidNumber\\s+eq') is not none
          - _p11_olc_db.stdout | default('')
            | regex_search('olcDbIndex:\\s+memberUid\\s+eq') is not none
          - _p11_olc_db.stdout | default('')
            | regex_search('olcDbIndex:\\s+mail\\s+eq') is not none
          - _p11_olc_db.stdout | default('')
            | regex_search('olcDbIndex:\\s+sshPublicKey\\s+eq') is not none
        fail_msg: >-
          OLC MDB database missing one or more required indexes.
          Expected: objectClass eq, uid eq, cn eq, gidNumber eq,
          memberUid eq, mail eq, sshPublicKey eq.
          stdout={{ _p11_olc_db.stdout | default('') }}

    - name: "PHASE [olc : Search OLC Loaded Modules]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:/// -b cn=config
          '(olcModuleLoad=*)' dn olcModuleLoad
      changed_when: false
      register: _p11_olc_modules

    - name: "PHASE [olc : Assert Required Modules Loaded]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_olc_modules.rc == 0
          - "'ppolicy' in _p11_olc_modules.stdout"
          - "'otp' in _p11_olc_modules.stdout"
          - "'sssvlv' in _p11_olc_modules.stdout"
        fail_msg: >-
          OLC modules missing ppolicy, otp, or sssvlv.
          stdout={{ _p11_olc_modules.stdout | default('') }}

    - name: "PHASE [olc : Search Loaded Schema Names]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:/// -b cn=schema,cn=config
          '(objectClass=olcSchemaConfig)' cn
      changed_when: false
      register: _p11_olc_schemas

    - name: "PHASE [olc : Assert Required Schemas Loaded]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_olc_schemas.rc == 0
          - "'core' in _p11_olc_schemas.stdout"
          - "'cosine' in _p11_olc_schemas.stdout"
          - "'inetorgperson' in _p11_olc_schemas.stdout"
          - "'nis' in _p11_olc_schemas.stdout"
        fail_msg: >-
          Required schemas (core, cosine, inetorgperson, nis)
          not found in cn=schema,cn=config.
          stdout={{ _p11_olc_schemas.stdout | default('') }}

    - name: "PHASE [olc : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 11 OLC state validation complete"

# ──────────────────────────────────────────────────────────
# DIT Identity Validation
# ──────────────────────────────────────────────────────────
- name: "Phase11 DIT Identity Validation"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - dit
  tasks:
    - name: "PHASE [dit : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 11 DIT identity validation — base DN, OUs, groups, users"

    - name: "PHASE [dit : Search Base DN And Organizational Units]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "{{ ldap_base_dn }}" '(objectClass=organizationalUnit)' dn ou
      changed_when: false
      register: _p11_dit_ous

    - name: "PHASE [dit : Assert Base DN OUs People Group Ppolicy SUDOers Fortune]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_dit_ous.rc == 0
          - "'ou=People' in _p11_dit_ous.stdout"
          - "'ou=Group' in _p11_dit_ous.stdout"
          - "'ou=Ppolicy' in _p11_dit_ous.stdout"
          - "'ou=SUDOers' in _p11_dit_ous.stdout"
          - "'ou=Fortune' in _p11_dit_ous.stdout"
        fail_msg: >-
          DIT missing one or more required OUs.
          Expected: People, Group, Ppolicy, SUDOers, Fortune.
          stdout={{ _p11_dit_ous.stdout | default('') }}

    - name: "PHASE [dit : Search TA Group Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "cn=ta,ou=Group,{{ ldap_base_dn }}" '(objectClass=posixGroup)'
          cn gidNumber memberUid
      changed_when: false
      register: _p11_dit_ta_group

    - name: "PHASE [dit : Assert TA Group Exists With Correct GID And Members]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_dit_ta_group.rc == 0
          - "'cn: ta' in _p11_dit_ta_group.stdout"
          - "'gidNumber: 10000' in _p11_dit_ta_group.stdout"
          - "'memberUid: generalta' in _p11_dit_ta_group.stdout"
          - "'memberUid: mailta' in _p11_dit_ta_group.stdout"
        fail_msg: >-
          TA group (cn=ta,ou=Group) missing or has wrong GID/members.
          Expected: gidNumber=10000, members=generalta,mailta.
          stdout={{ _p11_dit_ta_group.stdout | default('') }}

    - name: "PHASE [dit : Search STU Group Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "cn=stu,ou=Group,{{ ldap_base_dn }}" '(objectClass=posixGroup)'
          cn gidNumber memberUid
      changed_when: false
      register: _p11_dit_stu_group

    - name: "PHASE [dit : Assert STU Group Exists With Correct GID And Member]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_dit_stu_group.rc == 0
          - "'cn: stu' in _p11_dit_stu_group.stdout"
          - "'gidNumber: 20000' in _p11_dit_stu_group.stdout"
          - "'memberUid: stu' in _p11_dit_stu_group.stdout"
        fail_msg: >-
          STU group (cn=stu,ou=Group) missing or has wrong GID/member.
          Expected: gidNumber=20000, member=stu.
          stdout={{ _p11_dit_stu_group.stdout | default('') }}

    - name: "PHASE [dit : Search Generalta User Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "uid=generalta,ou=People,{{ ldap_base_dn }}"
          '(objectClass=posixAccount)'
          uid uidNumber gidNumber homeDirectory mail sshPublicKey userPassword
      changed_when: false
      register: _p11_dit_generalta
      no_log: true

    - name: "PHASE [dit : Assert Generalta User Attributes]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_dit_generalta.rc == 0
          - "'uid: generalta' in _p11_dit_generalta.stdout"
          - "'uidNumber: 10000' in _p11_dit_generalta.stdout"
          - "'gidNumber: 10000' in _p11_dit_generalta.stdout"
          - "'homeDirectory' in _p11_dit_generalta.stdout"
          - "'mail' in _p11_dit_generalta.stdout"
          - "'sshPublicKey' in _p11_dit_generalta.stdout"
          - "'userPassword' in _p11_dit_generalta.stdout"
        fail_msg: >-
          Generalta user entry missing or missing required attributes
          (uid, uidNumber=10000, gidNumber=10000, homeDirectory, mail,
          sshPublicKey, userPassword).
      no_log: true

    - name: "PHASE [dit : Search Mailta User Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "uid=mailta,ou=People,{{ ldap_base_dn }}"
          '(objectClass=posixAccount)'
          uid uidNumber gidNumber homeDirectory mail sshPublicKey userPassword
      changed_when: false
      register: _p11_dit_mailta
      no_log: true

    - name: "PHASE [dit : Assert Mailta User Attributes]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_dit_mailta.rc == 0
          - "'uid: mailta' in _p11_dit_mailta.stdout"
          - "'uidNumber: 10001' in _p11_dit_mailta.stdout"
          - "'gidNumber: 10000' in _p11_dit_mailta.stdout"
          - "'homeDirectory' in _p11_dit_mailta.stdout"
          - "'mail' in _p11_dit_mailta.stdout"
          - "'sshPublicKey' in _p11_dit_mailta.stdout"
          - "'userPassword' in _p11_dit_mailta.stdout"
        fail_msg: >-
          Mailta user entry missing or missing required attributes
          (uid, uidNumber=10001, gidNumber=10000, homeDirectory, mail,
          sshPublicKey, userPassword).
      no_log: true

    - name: "PHASE [dit : Search Stu User Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "uid=stu,ou=People,{{ ldap_base_dn }}"
          '(objectClass=posixAccount)'
          uid uidNumber gidNumber homeDirectory mail sshPublicKey userPassword
      changed_when: false
      register: _p11_dit_stu
      no_log: true

    - name: "PHASE [dit : Assert Stu User Attributes]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_dit_stu.rc == 0
          - "'uid: stu' in _p11_dit_stu.stdout"
          - "'uidNumber: 20000' in _p11_dit_stu.stdout"
          - "'gidNumber: 20000' in _p11_dit_stu.stdout"
          - "'homeDirectory' in _p11_dit_stu.stdout"
          - "'mail' in _p11_dit_stu.stdout"
          - "'sshPublicKey' in _p11_dit_stu.stdout"
          - "'userPassword' in _p11_dit_stu.stdout"
        fail_msg: >-
          Stu user entry missing or missing required attributes
          (uid, uidNumber=20000, gidNumber=20000, homeDirectory, mail,
          sshPublicKey, userPassword).
      no_log: true

    - name: "PHASE [dit : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 11 DIT identity validation complete"

# ──────────────────────────────────────────────────────────
# Idempotency Check
# ──────────────────────────────────────────────────────────
- name: "Phase11 Idempotency Check"
  hosts: localhost
  gather_facts: false
  become: false
  tags:
    - idempotency
  vars:
    _p11_inventory_file: >-
      {{ inventory_file
         | default(ansible_inventory_sources | first
                   | default((playbook_dir + '/../inventory/hosts.yml'))) }}
  tasks:
    - name: "PHASE [idempotency : START]"
      ansible.builtin.debug:
        msg: "Phase 11 idempotency: re-run ldap_configure.yml limited to ldap-01"

    - name: "PHASE [idempotency : Run ldap_configure.yml Second Time]"
      ansible.builtin.command:
        argv:
          - ansible-playbook
          - -i
          - "{{ _p11_inventory_file }}"
          - "{{ playbook_dir }}/ldap_configure.yml"
          - --limit
          - ldap-01
          - -e
          - >-
            {{ {
              'openldap_enabled': true,
              'ansible_user': ansible_user | default('student'),
              'ansible_ssh_common_args': ansible_ssh_common_args | default('')
            } | to_json }}
      changed_when: false
      register: _p11_idempotency_rerun

    - name: "PHASE [idempotency : Assert No Changes Failures Or Unreachable On Rerun]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'unreachable=0' in _p11_idempotency_rerun.stdout"
          - "'failed=0' in _p11_idempotency_rerun.stdout"
          - "'changed=0' in _p11_idempotency_rerun.stdout"
        fail_msg: >-
          Second ldap_configure.yml run reported unreachable, failed, or changed tasks.
          stdout={{ _p11_idempotency_rerun.stdout | default('') }}

    - name: "PHASE [idempotency : END]"
      ansible.builtin.debug:
        msg: "Phase 11 idempotency check complete"

# ──────────────────────────────────────────────────────────
# Reboot Persistence Check
# ──────────────────────────────────────────────────────────
- name: "Phase11 Reboot Persistence Check"
  hosts: ldap-01
  gather_facts: false
  become: true
  serial: 1
  tags:
    - reboot
  tasks:
    - name: "PHASE [reboot : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 11 reboot persistence check — reboot, then re-assert LDAPS, OLC, and DIT state"

    - name: "PHASE [reboot : Reboot ldap-01 And Wait For Return]"
      ansible.builtin.reboot:
        reboot_timeout: 300
        pre_reboot_delay: 5
        post_reboot_delay: 15

    - name: "PHASE [reboot : Post-Reboot LDAPS Search Base DN With Certificate Validation]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -H {{ ldap_server_uri }}
          -x -b "{{ ldap_base_dn }}" '(objectClass=*)' dn
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path | default('/etc/openldap/certs/ldap.crt') }}"
      changed_when: false
      register: _p11_reboot_ldaps

    - name: "PHASE [reboot : Assert Post-Reboot LDAPS Search Works]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_reboot_ldaps.rc == 0
          - ldap_base_dn in _p11_reboot_ldaps.stdout
        fail_msg: >-
          Post-reboot LDAPS search failed.
          rc={{ _p11_reboot_ldaps.rc }},
          stdout={{ _p11_reboot_ldaps.stdout | default('') }}

    - name: "PHASE [reboot : Post-Reboot OLC Module Search]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:/// -b cn=config
          '(olcModuleLoad=*)' dn olcModuleLoad
      changed_when: false
      register: _p11_reboot_olc

    - name: "PHASE [reboot : Assert Post-Reboot OLC Modules Intact]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_reboot_olc.rc == 0
          - "'ppolicy' in _p11_reboot_olc.stdout"
          - "'otp' in _p11_reboot_olc.stdout"
          - "'sssvlv' in _p11_reboot_olc.stdout"
        fail_msg: >-
          Post-reboot OLC module check failed or modules missing.
          stdout={{ _p11_reboot_olc.stdout | default('') }}

    - name: "PHASE [reboot : Post-Reboot DIT OU Search]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "{{ ldap_base_dn }}" '(objectClass=organizationalUnit)' dn ou
      changed_when: false
      register: _p11_reboot_dit

    - name: "PHASE [reboot : Assert Post-Reboot DIT OUs Intact]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p11_reboot_dit.rc == 0
          - "'ou=People' in _p11_reboot_dit.stdout"
          - "'ou=Group' in _p11_reboot_dit.stdout"
          - "'ou=Ppolicy' in _p11_reboot_dit.stdout"
          - "'ou=SUDOers' in _p11_reboot_dit.stdout"
          - "'ou=Fortune' in _p11_reboot_dit.stdout"
        fail_msg: >-
          Post-reboot DIT OU check failed or OUs missing.
          stdout={{ _p11_reboot_dit.stdout | default('') }}

    - name: "PHASE [reboot : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 11 reboot persistence check complete"
