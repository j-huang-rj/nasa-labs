---
# Phase 10 validation playbook: DNS LDAP/workstation answers,
# LDAP identity, LDAPS policy shape, NFS path/source policy,
# and firewall regression gates.
#
# Prerequisites:
#   - site.yml or bootstrap.yml + dns_configure.yml

# ──────────────────────────────────────────────────────────
# Preflight: Reachability
# ──────────────────────────────────────────────────────────
- name: "Phase10 Preflight Reachability"
  hosts: >-
    router-01,primary-ns-01,secondary-ns-01,dns-01,
    ldap-01,workstation-01,workstation-02
  gather_facts: false
  become: false
  tags:
    - preflight
  tasks:
    - name: "PHASE [preflight : START]"
      ansible.builtin.debug:
        msg: "Phase 10 preflight reachability check"

    - name: "PHASE [preflight : Ping All Phase 10 Targets]"
      ansible.builtin.ping:

    - name: "PHASE [preflight : END]"
      ansible.builtin.debug:
        msg: "Phase 10 preflight reachability complete"

# ──────────────────────────────────────────────────────────
# DNS LDAP/Workstation Private-View A Record Validation
# ──────────────────────────────────────────────────────────
- name: "Phase10 DNS Private-View A Record Validation"
  hosts: primary-ns-01
  gather_facts: false
  become: true
  tags:
    - dns-ldap-workstations
  vars:
    _p10_forward_zone: "{{ lab_domain }}"
    _p10_primary: "{{ bind9_listen_ipv4 | reject('equalto', '127.0.0.1') | first }}"
    _p10_a_checks:
      - name: ldap
        ip: "{{ bind9_ldap_ip }}"
      - name: workstation1
        ip: "{{ bind9_workstation1_ip }}"
      - name: workstation2
        ip: "{{ bind9_workstation2_ip }}"
  tasks:
    - name: "PHASE [dns-ldap-workstations : START]"
      ansible.builtin.debug:
        msg: "Phase 10 DNS private-view LDAP/workstation record validation"

    # --- Private A records ---
    - name: "PHASE [dns-ldap-workstations : Private-View LDAP/Workstation A Lookups]"
      ansible.builtin.command:
        cmd: >-
          dig @{{ _p10_primary }} {{ item.name }}.{{ _p10_forward_zone }} A +noall +comments +answer
      changed_when: false
      register: _p10_private_a
      loop: "{{ _p10_a_checks }}"
      loop_control:
        label: "{{ item.name }}.{{ _p10_forward_zone }} A → {{ item.ip }}"

    - name: "PHASE [dns-ldap-workstations : Assert Private-View A Records Resolve]"
      ansible.builtin.assert:
        quiet: true
        that:
          - item.ip in _p10_private_a.results[idx].stdout
          - "'flags: qr aa' in _p10_private_a.results[idx].stdout"
        fail_msg: >-
          Private-view A lookup for {{ item.name }}.{{ _p10_forward_zone }}
          did not return authoritative answer with {{ item.ip }}.
          Got: {{ _p10_private_a.results[idx].stdout | default('') }}
      loop: "{{ _p10_a_checks }}"
      loop_control:
        index_var: idx
        label: "{{ item.name }}.{{ _p10_forward_zone }} A → {{ item.ip }}"

    # --- Private PTR records ---
    - name: "PHASE [dns-ldap-workstations : Private-View LDAP/Workstation PTR Lookups]"
      ansible.builtin.command:
        cmd: >-
          dig @{{ _p10_primary }} -x {{ item.ip }} +noall +comments +answer
      changed_when: false
      register: _p10_private_ptr
      loop: "{{ _p10_a_checks }}"
      loop_control:
        label: "PTR {{ item.ip }} → {{ item.name }}.{{ _p10_forward_zone }}."

    - name: "PHASE [dns-ldap-workstations : Assert Private-View PTR Records Resolve]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            ("'" ~ item.name ~ "." ~ _p10_forward_zone ~ ".'") in _p10_private_ptr.results[idx].stdout
            or (item.name ~ "." ~ _p10_forward_zone ~ ".") in _p10_private_ptr.results[idx].stdout
        fail_msg: >-
          Private-view PTR lookup for {{ item.ip }}
          did not return {{ item.name }}.{{ _p10_forward_zone }}.
          Got: {{ _p10_private_ptr.results[idx].stdout | default('') }}
      loop: "{{ _p10_a_checks }}"
      loop_control:
        index_var: idx
        label: "PTR {{ item.ip }} → {{ item.name }}.{{ _p10_forward_zone }}."

    # --- Resolver-path DNS (through dns-01 resolver) ---
    - name: "PHASE [dns-ldap-workstations : Resolver LDAP/Workstation A Lookups]"
      ansible.builtin.command:
        cmd: >-
          docker exec nap-agent dig @{{ hostvars['dns-01'].bind9_listen_ipv4 | reject('equalto', '127.0.0.1') | first }}
          {{ item.name }}.{{ _p10_forward_zone }} A +short
      changed_when: false
      register: _p10_resolver_a
      delegate_to: dmz-agent-01
      loop: "{{ _p10_a_checks }}"
      loop_control:
        label: "resolver → {{ item.name }}.{{ _p10_forward_zone }} A"

    - name: "PHASE [dns-ldap-workstations : Assert Resolver Returns Correct A Records]"
      ansible.builtin.assert:
        quiet: true
        that:
          - item.ip in _p10_resolver_a.results[idx].stdout
        fail_msg: >-
          Resolver A lookup for {{ item.name }}.{{ _p10_forward_zone }}
          did not return {{ item.ip }}.
          Got: {{ _p10_resolver_a.results[idx].stdout | default('') }}
      loop: "{{ _p10_a_checks }}"
      loop_control:
        index_var: idx
        label: "resolver → {{ item.name }}.{{ _p10_forward_zone }} A → {{ item.ip }}"

    - name: "PHASE [dns-ldap-workstations : END]"
      ansible.builtin.debug:
        msg: "Phase 10 DNS private-view validation complete"

# ──────────────────────────────────────────────────────────
# Public-View Workstation And Private-Only LDAP Gate
# ──────────────────────────────────────────────────────────
- name: "Phase10 Public Workstation DNS Gate"
  hosts: primary-ns-01
  gather_facts: false
  become: false
  tags:
    - dns-ldap-workstations
  vars:
    _p10_forward_zone: "{{ lab_domain }}"
    _p10_public_workstation_checks:
      - name: workstation1
        ip: "{{ lab_vpn_workstation1_ip }}"
      - name: workstation2
        ip: "{{ lab_vpn_workstation2_ip }}"
  tasks:
    - name: "PHASE [dns-ldap-workstations : START - Public Workstation DNS]"
      ansible.builtin.debug:
        msg: "Phase 10 public-view workstation DNS gate — workstations are VPN-visible while LDAP remains private-view only"

    - name: "PHASE [dns-ldap-workstations : Collect Public-Zone Record Names]"
      ansible.builtin.set_fact:
        _p10_public_records: >-
          {{ bind9_zones
             | selectattr('view', 'equalto', 'public')
             | selectattr('name', 'equalto', _p10_forward_zone)
             | map(attribute='records')
             | flatten
             | map(attribute='name')
             | list }}

    - name: "PHASE [dns-ldap-workstations : Collect Public-Zone Records]"
      ansible.builtin.set_fact:
        _p10_public_zone_records: >-
          {{ bind9_zones
             | selectattr('view', 'equalto', 'public')
             | selectattr('name', 'equalto', _p10_forward_zone)
             | map(attribute='records')
             | flatten
             | list }}

    - name: "PHASE [dns-ldap-workstations : Assert No ldap In Public View]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'ldap' not in _p10_public_records"
        fail_msg: >-
          Public forward zone contains 'ldap' record. LDAP remains
          private-view-only because there is no router LDAPS DNAT path.
          Public records: {{ _p10_public_records }}

    - name: "PHASE [dns-ldap-workstations : Assert Public Workstation A Records]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            item.ip in (
              _p10_public_zone_records
              | selectattr('name', 'equalto', item.name)
              | selectattr('type', 'equalto', 'A')
              | map(attribute='value')
              | list
            )
        fail_msg: >-
          Public forward zone does not map {{ item.name }}.{{ _p10_forward_zone }}
          to VPN IP {{ item.ip }}. Public records: {{ _p10_public_zone_records }}
      loop: "{{ _p10_public_workstation_checks }}"
      loop_control:
        label: "{{ item.name }}.{{ _p10_forward_zone }} A → {{ item.ip }}"

    - name: "PHASE [dns-ldap-workstations : Collect Public VPN PTR Records]"
      ansible.builtin.set_fact:
        _p10_public_vpn_ptr_records: >-
          {{ bind9_zones
             | selectattr('view', 'equalto', 'public')
             | selectattr('name', 'equalto', bind9_vpn_child_reverse_zone_name)
             | map(attribute='records')
             | flatten
             | list }}

    - name: "PHASE [dns-ldap-workstations : Assert Public Workstation PTR Records]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            (item.name ~ '.' ~ _p10_forward_zone ~ '.') in (
              _p10_public_vpn_ptr_records
              | selectattr('name', 'equalto', item.ip.split('.')[-1])
              | selectattr('type', 'equalto', 'PTR')
              | map(attribute='value')
              | list
            )
        fail_msg: >-
          Public VPN reverse zone does not map {{ item.ip }}
          to {{ item.name }}.{{ _p10_forward_zone }}.
          Public PTR records: {{ _p10_public_vpn_ptr_records }}
      loop: "{{ _p10_public_workstation_checks }}"
      loop_control:
        label: "{{ item.ip }} PTR → {{ item.name }}.{{ _p10_forward_zone }}."

    - name: "PHASE [dns-ldap-workstations : END - Public Workstation DNS]"
      ansible.builtin.debug:
        msg: "Phase 10 public-view workstation DNS gate passed"

# ──────────────────────────────────────────────────────────
# LDAP Identity Validation (D-04)
# ──────────────────────────────────────────────────────────
- name: "Phase10 LDAP Identity Validation"
  hosts: primary-ns-01
  gather_facts: false
  become: false
  tags:
    - ldap-identity
  vars:
    _p10_ldap_domain: "{{ ldap_domain }}"
    _p10_ldap_base_dn: "{{ ldap_base_dn }}"
    _p10_ldap_server_fqdn: "{{ ldap_server_fqdn }}"
    _p10_ldap_server_uri: "{{ ldap_server_uri }}"
    _p10_forward_zone: "{{ lab_domain }}"
  tasks:
    - name: "PHASE [ldap-identity : START]"
      ansible.builtin.debug:
        msg: "Phase 10 LDAP identity derivation validation"

    - name: "PHASE [ldap-identity : Assert ldap_domain Equals lab_domain]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p10_ldap_domain == _p10_forward_zone
        fail_msg: >-
          ldap_domain ({{ _p10_ldap_domain }})
          must equal lab_domain ({{ _p10_forward_zone }}).

    - name: "PHASE [ldap-identity : Compute Expected ldap_base_dn]"
      ansible.builtin.set_fact:
        _p10_expected_base_dn: "dc={{ _p10_forward_zone | regex_replace('\\.', ',dc=') }}"

    - name: "PHASE [ldap-identity : Assert ldap_base_dn Derivation]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p10_ldap_base_dn == _p10_expected_base_dn
        fail_msg: >-
          ldap_base_dn ({{ _p10_ldap_base_dn }})
          does not match expected derivation from lab_domain
          ({{ _p10_forward_zone }}):
          expected={{ _p10_expected_base_dn }}.

    - name: "PHASE [ldap-identity : Compute Expected ldap_server_fqdn]"
      ansible.builtin.set_fact:
        _p10_expected_fqdn: "ldap.{{ _p10_forward_zone }}"

    - name: "PHASE [ldap-identity : Assert ldap_server_fqdn]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p10_ldap_server_fqdn == _p10_expected_fqdn
        fail_msg: >-
          ldap_server_fqdn ({{ _p10_ldap_server_fqdn }})
          does not match expected 'ldap.{{ _p10_forward_zone }}'.

    - name: "PHASE [ldap-identity : Compute Expected ldap_server_uri]"
      ansible.builtin.set_fact:
        _p10_expected_uri: "ldaps://{{ _p10_ldap_server_fqdn }}:636"

    - name: "PHASE [ldap-identity : Assert ldap_server_uri Uses ldaps:// With Port 636]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p10_ldap_server_uri == _p10_expected_uri
          - "'ldaps://' in _p10_ldap_server_uri"
          - "':636' in _p10_ldap_server_uri"
          - "'ldap://' not in _p10_ldap_server_uri"
          - "':389' not in _p10_ldap_server_uri"
        fail_msg: >-
          ldap_server_uri ({{ _p10_ldap_server_uri }})
          must use ldaps:// scheme with port 636 per D-04/D-12.
          Expected: {{ _p10_expected_uri }}.
          Scheme must NOT be ldap:// and port must NOT be 389.

    - name: "PHASE [ldap-identity : END]"
      ansible.builtin.debug:
        msg: "Phase 10 LDAP identity validation complete"

# ──────────────────────────────────────────────────────────
# LDAPS Policy Path-Shape Validation (D-12/D-13/D-14/D-15)
# ──────────────────────────────────────────────────────────
- name: "Phase10 LDAPS Policy Validation"
  hosts: router-01
  gather_facts: false
  become: false
  tags:
    - ldaps-policy
  vars:
    _p10_ldaps_policy: >-
      {{ firewall_policies
         | selectattr('name', 'equalto', 'dmz-to-internal-ldaps')
         | list
         | first }}
    _p10_ldap_zone_ports: >-
      {{ hostvars['ldap-01'].firewall_zone_ports | default([]) }}
    _p10_ldap_rich_rules: >-
      {{ hostvars['ldap-01'].firewall_rich_rules | default([]) }}
    _p10_dmz_client_mail_ldap: "{{ hostvars['dmz-client-01'].mail_ldap_enabled | default(false) }}"
  tasks:
    - name: "PHASE [ldaps-policy : START]"
      ansible.builtin.debug:
        msg: "Phase 10 LDAPS policy path-shape validation (path only — service behavior is Phase 11-owned per D-19)"

    - name: "PHASE [ldaps-policy : Assert dmz-to-internal-ldaps Policy Exists]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p10_ldaps_policy | length > 0
        fail_msg: >-
          Router policy 'dmz-to-internal-ldaps' not found in firewall_policies.

    - name: "PHASE [ldaps-policy : Assert LDAPS Policy Shape]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p10_ldaps_policy.priority == -55
          - _p10_ldaps_policy.target == 'CONTINUE'
          - "'dmz' in _p10_ldaps_policy.ingress_zones"
          - "'internal' in _p10_ldaps_policy.egress_zones"
        fail_msg: >-
          LDAPS policy shape mismatch.
          Expected: priority=-55, target=CONTINUE, ingress=dmz, egress=internal.
          Got: priority={{ _p10_ldaps_policy.priority }},
          target={{ _p10_ldaps_policy.target }},
          ingress={{ _p10_ldaps_policy.ingress_zones }},
          egress={{ _p10_ldaps_policy.egress_zones }}.

    - name: "PHASE [ldaps-policy : Assert LDAPS Policy Contains 636/tcp]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p10_ldaps_policy.ports | selectattr('port', 'equalto', 636) | selectattr('proto', 'equalto', 'tcp') | list | length > 0
        fail_msg: >-
          LDAPS policy missing port 636/tcp in ports list.
          Got: {{ _p10_ldaps_policy.ports | default([]) }}.

    - name: "PHASE [ldaps-policy : Assert ldap-01 Keeps 636/tcp Internal Zone Port]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p10_ldap_zone_ports
            | selectattr('zone', 'equalto', 'internal')
            | selectattr('port', 'equalto', 636)
            | selectattr('proto', 'equalto', 'tcp')
            | list | length > 0
        fail_msg: >-
          ldap-01 internal zone missing 636/tcp port.
          Got: {{ _p10_ldap_zone_ports }}.

    - name: "PHASE [ldaps-policy : Assert No 389/tcp In Any Router Policy Port]"
      ansible.builtin.set_fact:
        _p10_all_policy_ports: >-
          {{ firewall_policies
             | map(attribute='ports')
             | flatten
             | map(attribute='port') | map('string')
             | list }}
    - name: "PHASE [ldaps-policy : Verify No 389 Port In Router Policies]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'389' not in _p10_all_policy_ports"
        fail_msg: >-
          Router firewall_policies contain port 389 — Phase 10 forbids LDAP/389
          and StartTLS per D-14. Found ports: {{ _p10_all_policy_ports }}.

    - name: "PHASE [ldaps-policy : Assert No 389 In ldap-01 Zone Ports]"
      ansible.builtin.assert:
        quiet: true
        that:
          - (_p10_ldap_zone_ports | selectattr('port', 'equalto', 389) | list | length) == 0
        fail_msg: >-
          ldap-01 firewall_zone_ports contains port 389 — Phase 10 forbids LDAP/389
          and StartTLS per D-14.

    - name: "PHASE [ldaps-policy : Assert No 389 In ldap-01 Rich Rules]"
      ansible.builtin.assert:
        quiet: true
        that:
          - (_p10_ldap_rich_rules | selectattr('rule', 'search', 'port="389"') | list | length) == 0
        fail_msg: >-
          ldap-01 firewall_rich_rules contain port 389 — Phase 10 forbids LDAP/389.

    - name: "PHASE [ldaps-policy : Assert dmz-client-01 mail_ldap_enabled Is False]"
      ansible.builtin.assert:
        quiet: true
        that:
          - not _p10_dmz_client_mail_ldap
        fail_msg: >-
          dmz-client-01 mail_ldap_enabled is true — must remain false until Phase 15 per D-15.

    - name: "PHASE [ldaps-policy : END]"
      ansible.builtin.debug:
        msg: "Phase 10 LDAPS policy path-shape validation passed (service path verified; LDAPS service behavior is Phase 11-owned per D-19)"

# ──────────────────────────────────────────────────────────
# NFS Path-Shape Validation (D-07/D-08/D-09/D-10/D-11/D-18)
# ──────────────────────────────────────────────────────────
- name: "Phase10 NFS Path-Shape Validation"
  hosts: router-01
  gather_facts: false
  become: false
  tags:
    - nfs-path-source
  vars:
    _p10_nfs_policy: >-
      {{ firewall_policies
         | selectattr('name', 'equalto', 'dmz-to-internal-nfs')
         | list
         | first
         | default({}) }}
    _p10_preserve_pairs: "{{ firewall_masquerade_preserve_source_pairs | default([]) }}"
    _p10_ldap_zone_ports: >-
      {{ hostvars['ldap-01'].firewall_zone_ports | default([]) }}
    _p10_ldap_rich_rules: >-
      {{ hostvars['ldap-01'].firewall_rich_rules | default([]) }}
    _p10_dmz_to_internal_ports: >-
      {{ (firewall_policies
          | selectattr('name', 'equalto', 'dmz-to-internal')
          | map(attribute='ports')
          | flatten
          | list) }}
    _p10_ldaps_policy_ports: >-
      {{ (firewall_policies
          | selectattr('name', 'equalto', 'dmz-to-internal-ldaps')
          | map(attribute='ports')
          | flatten
          | list) }}
  tasks:
    - name: "PHASE [nfs-path-source : START]"
      ansible.builtin.debug:
        msg: "Phase 10 NFS path-shape validation (path only — NFS exports/mounts are Phase 13-owned per D-19)"

    - name: "PHASE [nfs-path-source : Assert dmz-to-internal-nfs Policy Exists]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p10_nfs_policy | length > 0
        fail_msg: >-
          Router policy 'dmz-to-internal-nfs' not found in firewall_policies.

    - name: "PHASE [nfs-path-source : Assert NFS Policy Shape]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p10_nfs_policy.priority == -54
          - _p10_nfs_policy.target == 'CONTINUE'
          - "'dmz' in _p10_nfs_policy.ingress_zones"
          - "'internal' in _p10_nfs_policy.egress_zones"
          - (_p10_nfs_policy.ports | default([]) | length) == 0
        fail_msg: >-
          NFS policy shape mismatch.
          Expected: priority=-54, target=CONTINUE, ingress=dmz, egress=internal, ports=[].
          Got: priority={{ _p10_nfs_policy.priority }},
          target={{ _p10_nfs_policy.target }},
          ingress={{ _p10_nfs_policy.ingress_zones }},
          egress={{ _p10_nfs_policy.egress_zones }},
          ports={{ _p10_nfs_policy.ports | default([]) }}.

    - name: "PHASE [nfs-path-source : Assert NFS Policy Has Workstation Source Rich Rules]"
      ansible.builtin.set_fact:
        _p10_nfs_rich_rules: "{{ _p10_nfs_policy.rich_rules | default([]) }}"
    - name: "PHASE [nfs-path-source : Verify NFS Rich Rules Shape]"
      ansible.builtin.assert:
        quiet: true
        that:
          - (_p10_nfs_rich_rules | length) == 2
          - (_p10_nfs_rich_rules | select('search', lab_workstation1_ip ~ '/32') | list | length) > 0
          - (_p10_nfs_rich_rules | select('search', lab_workstation2_ip ~ '/32') | list | length) > 0
          - (_p10_nfs_rich_rules | select('search', lab_ldap_ip ~ '/32') | list | length) == 2
          - (_p10_nfs_rich_rules | select('search', 'port="2049"') | list | length) == 2
          - (_p10_nfs_rich_rules | select('search', 'protocol="tcp"') | list | length) == 2
          - (_p10_nfs_rich_rules | select('search', 'accept') | list | length) == 2
        fail_msg: >-
          NFS policy rich rules shape mismatch.
          Expected: 2 rules each matching source {{ lab_workstation1_ip }}/32 or {{ lab_workstation2_ip }}/32,
          destination {{ lab_ldap_ip }}/32, port 2049, protocol tcp, accept.
          Got: {{ _p10_nfs_rich_rules }}.

    - name: "PHASE [nfs-path-source : Assert Preserve-Source Pairs For NFS]"
      ansible.builtin.assert:
        quiet: true
        that:
          - (_p10_preserve_pairs | selectattr('source', 'equalto', lab_workstation1_ip) | selectattr('destination', 'equalto', lab_ldap_ip) | list | length) > 0
          - (_p10_preserve_pairs | selectattr('source', 'equalto', lab_workstation2_ip) | selectattr('destination', 'equalto', lab_ldap_ip) | list | length) > 0
        fail_msg: >-
          Preserve-source pairs missing expected NFS entries.
          Expected pairs: {{ lab_workstation1_ip }} -> {{ lab_ldap_ip }},
          {{ lab_workstation2_ip }} -> {{ lab_ldap_ip }}.
          Got: {{ _p10_preserve_pairs }}.

    - name: "PHASE [nfs-path-source : Assert ldap-01 Has Source-Restricted NFS Rich Rules]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            (_p10_ldap_rich_rules
             | selectattr('zone', 'equalto', 'internal')
             | selectattr('rule', 'search', lab_workstation1_ip ~ '/32')
             | selectattr('rule', 'search', 'port="2049"')
             | list | length) > 0
          - >-
            (_p10_ldap_rich_rules
             | selectattr('zone', 'equalto', 'internal')
             | selectattr('rule', 'search', lab_workstation2_ip ~ '/32')
             | selectattr('rule', 'search', 'port="2049"')
             | list | length) > 0
          - >-
            (_p10_ldap_rich_rules
             | selectattr('zone', 'equalto', 'internal')
             | selectattr('rule', 'search', 'protocol="tcp"')
             | selectattr('rule', 'search', 'accept')
             | selectattr('rule', 'search', 'port="2049"')
             | list | length) >= 2
        fail_msg: >-
          ldap-01 host-local NFS rich rules missing or incorrect.
          Expected: internal-zone rich rules accepting port 2049/tcp from
          {{ lab_workstation1_ip }}/32 and {{ lab_workstation2_ip }}/32.
          Got: {{ _p10_ldap_rich_rules | selectattr('zone', 'equalto', 'internal') | list }}.

    - name: "PHASE [nfs-path-source : Assert No Broad 2049/tcp On ldap-01 Zone Ports]"
      ansible.builtin.assert:
        quiet: true
        that:
          - (_p10_ldap_zone_ports | selectattr('port', 'equalto', 2049) | selectattr('proto', 'equalto', 'tcp') | list | length) == 0
        fail_msg: >-
          ldap-01 still has broad internal-zone 2049/tcp port — should be
          replaced with source-restricted rich rules per D-10.

    - name: "PHASE [nfs-path-source : Assert No 2049/tcp In dmz-to-internal Policy]"
      ansible.builtin.assert:
        quiet: true
        that:
          - (_p10_dmz_to_internal_ports | selectattr('port', 'equalto', 2049) | list | length) == 0
        fail_msg: >-
          dmz-to-internal policy contains 2049/tcp — NFS should use separate
          dmz-to-internal-nfs policy per D-11.

    - name: "PHASE [nfs-path-source : Assert No 2049/tcp In dmz-to-internal-ldaps Policy]"
      ansible.builtin.assert:
        quiet: true
        that:
          - (_p10_ldaps_policy_ports | selectattr('port', 'equalto', 2049) | list | length) == 0
        fail_msg: >-
          dmz-to-internal-ldaps policy contains 2049/tcp — NFS should not be
          merged into LDAPS policy per D-11.

    - name: "PHASE [nfs-path-source : END]"
      ansible.builtin.debug:
        msg: "Phase 10 NFS path-shape validation passed (path verified; NFS exports/mounts are Phase 13-owned per D-19)"

# ──────────────────────────────────────────────────────────
# Firewall Regression Gates (D-16/D-17/D-18/D-19)
# ──────────────────────────────────────────────────────────
- name: "Phase10 Firewall Regression Gates"
  hosts: router-01
  gather_facts: false
  become: false
  tags:
    - firewall-regression
  vars:
    _p10_dnat_ports: "{{ firewall_forward_ports | default([]) }}"
    _p10_router_rich_rules: "{{ firewall_rich_rules | default([]) }}"
    _p10_all_policy_ports: >-
      {{ firewall_policies
         | map(attribute='ports')
         | flatten
         | map(attribute='port') | map('string')
         | list }}
    _p10_nfs_policy: >-
      {{ firewall_policies
         | selectattr('name', 'equalto', 'dmz-to-internal-nfs')
         | list
         | first
         | default({}) }}
  tasks:
    - name: "PHASE [firewall-regression : START]"
      ansible.builtin.debug:
        msg: "Phase 10 firewall regression validation — verifying required router and zone behavior is preserved"

    # --- NFS target gate ---
    - name: "PHASE [firewall-regression : Assert NFS Policy Target Is CONTINUE Not ACCEPT]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p10_nfs_policy.target | default('CONTINUE') == 'CONTINUE'
        fail_msg: >-
          dmz-to-internal-nfs policy target is not CONTINUE — must not use ACCEPT
          per D-14. Got: {{ _p10_nfs_policy.target | default('(policy absent)') }}.

    # --- No rpcbind/mountd/statd/lockd ---
    - name: "PHASE [firewall-regression : Assert No NFSv3 Helper Ports In Router Policies]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'111' not in _p10_all_policy_ports"
          - "'20048' not in _p10_all_policy_ports"
          - "'662' not in _p10_all_policy_ports"
          - "'32803' not in _p10_all_policy_ports"
        fail_msg: >-
          Router policy ports contain NFSv3 helper ports (rpcbind 111, mountd 20048,
          statd 662, lockd 32803) — Phase 10 allows NFSv4 TCP/2049 only per D-09.
          Found ports: {{ _p10_all_policy_ports }}.

    # --- DNAT port preservation ---
    - name: "PHASE [firewall-regression : Assert DNAT Ports 10001 and 10002 Preserved]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            (_p10_dnat_ports
             | selectattr('port', 'equalto', 10001)
             | selectattr('proto', 'equalto', 'tcp')
             | selectattr('toport', 'equalto', 2222)
             | selectattr('toaddr', 'equalto', lab_dmz_agent_ip)
             | list | length) > 0
          - >-
            (_p10_dnat_ports
             | selectattr('port', 'equalto', 10002)
             | selectattr('proto', 'equalto', 'tcp')
             | selectattr('toport', 'equalto', 2222)
             | selectattr('toaddr', 'equalto', lab_internal_agent_ip)
             | list | length) > 0
        fail_msg: >-
          DNAT port-forwarding rules changed.
          Expected: 10001/tcp -> dmz-agent-01:2222 ({{ lab_dmz_agent_ip }}),
          10002/tcp -> internal-agent-01:2222 ({{ lab_internal_agent_ip }}).
          Got: {{ _p10_dnat_ports }}.

    # --- VPN SSH reject preservation ---
    - name: "PHASE [firewall-regression : Assert VPN SSH Reject Rule Preserved]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            (_p10_router_rich_rules
             | selectattr('zone', 'equalto', 'vpn')
             | selectattr('rule', 'search', 'ssh')
             | selectattr('rule', 'search', 'reject')
             | list | length) > 0
        fail_msg: >-
          Router VPN-zone SSH reject rich rule missing or changed.
          Expected: vpn zone 'rule service name="ssh" reject'.
          Got: {{ _p10_router_rich_rules | selectattr('zone', 'equalto', 'vpn') | list }}.

    # --- Forbidden broad patterns ---
    - name: "PHASE [firewall-regression : Assert No rpcbind/mountd/statd/lockd In Router Rich Rules]"
      ansible.builtin.assert:
        quiet: true
        that:
          - (_p10_router_rich_rules | selectattr('rule', 'search', '111') | list | length) == 0
          - (_p10_router_rich_rules | selectattr('rule', 'search', 'rpcbind') | list | length) == 0
          - (_p10_router_rich_rules | selectattr('rule', 'search', 'mountd') | list | length) == 0
        fail_msg: >-
          Router rich rules contain rpcbind/mountd references — Phase 10 allows
          NFSv4 TCP/2049 only per D-09.

    - name: "PHASE [firewall-regression : END]"
      ansible.builtin.debug:
        msg: >-
          Phase 10 firewall regression gates passed (path-shape evidence recorded;
          service-level LDAPS/NFS checks are Phase 11/13-owned per D-19).
          HW1-0/HW1-1/HW1-2 behavior preserved.
