---
# Prerequisites:
#   - bootstrap.yml

- name: DNS Service Configuration
  hosts: dns
  gather_facts: true
  become: true
  pre_tasks:
    # ──────────────────────────────────────────────────────────
    # Lab identity coherence
    # ──────────────────────────────────────────────────────────
    - name: "PRE [dns : Validate Lab Identity Coherence]"
      when:
        - bind9_enabled | default(false) | bool
      block:
        - name: "PRE [dns : Compute Lab IDs From All WireGuard-Enabled Peers]"
          ansible.builtin.set_fact:
            _bind9_peer_lab_ids: >-
              {{ _bind9_peer_lab_ids | default([])
                 + [(item.split('/')[0].split('.')[2] | int * 16)
                    + (item.split('/')[0].split('.')[3] | int // 16)] }}
          loop: >-
            {{ groups['all']
               | map('extract', hostvars)
               | selectattr('wireguard_address', 'defined')
               | rejectattr('wireguard_address', 'equalto', '')
               | map(attribute='wireguard_address')
               | list }}
          loop_control:
            label: "{{ item }}"

        - name: "PRE [dns : Assert WireGuard-Enabled Peers Agree On Lab ID]"
          ansible.builtin.assert:
            that:
              - _bind9_peer_lab_ids | length > 0
              - _bind9_peer_lab_ids | unique | length == 1
              - (_bind9_peer_lab_ids | first) == (bind9_derived_lab_id | int)
            fail_msg: >-
              WireGuard-enabled peers disagree on derived lab ID
              (got {{ _bind9_peer_lab_ids | unique }} from
              {{ groups['all']
                 | map('extract', hostvars)
                 | selectattr('wireguard_address', 'defined')
                 | rejectattr('wireguard_address', 'equalto', '')
                 | map(attribute='inventory_hostname')
                 | list }}).
              All WG-enabled hosts must share the same /28 subnet so that
              lab identity is unambiguous. Check wireguard_address values
              in inventory.

    # ──────────────────────────────────────────────────────────
    # Trust-anchor fetch — resolver mode only
    # Queries the NASA root server for KSK DNSKEY records and
    # builds the bind9_trust_anchors fact for DNSSEC validation.
    # ──────────────────────────────────────────────────────────
    - name: "PRE [dns : Fetch NASA-Root Trust Anchors for Resolver Mode]"
      when:
        - bind9_enabled | default(false) | bool
        - bind9_mode | default('') == 'resolver'
      block:
        - name: "PRE [dns : Query KSK DNSKEYs from NASA Root]"
          ansible.builtin.command: dig @{{ bind9_nasa_root_ip }} {{ item }}. DNSKEY +noall +answer
          register: _bind9_trust_anchor_digs
          changed_when: false
          until: _bind9_trust_anchor_digs.rc == 0 and _bind9_trust_anchor_digs.stdout | length > 0
          retries: 3
          delay: 2
          loop: "{{ bind9_nasa_root_zones }}"
          loop_control:
            label: "{{ item }}"

        - name: "PRE [dns : Fail If Any Zone Has No KSK Records]"
          ansible.builtin.fail:
            msg: >-
              No KSK (flags 257) found in {{ item.item }}. DNSKEY response from
              {{ bind9_nasa_root_ip }}. Ensure the NASA root server is reachable
              and serving DNSKEY records for {{ item.item }}.
          loop: "{{ _bind9_trust_anchor_digs.results }}"
          loop_control:
            label: "{{ item.item }}"
          when: >-
            item.stdout_lines |
              select('regex', '\sDNSKEY\s+257\s+\d+\s+\d+\s+\S+') |
              list | length == 0

        - name: "PRE [dns : Parse Trust Anchors from DNSKEY Responses]"
          ansible.builtin.set_fact:
            bind9_trust_anchors: >-
              {{ bind9_trust_anchors | default([]) +
                 (item.stdout_lines |
                  select('regex', '\sDNSKEY\s+257\s+\d+\s+\d+\s+\S+') |
                  map('regex_replace',
                    '^\S+\s+\d+\s+\S+\s+DNSKEY\s+(\d+)\s+(\d+)\s+(\d+)\s+(.+?)\s*$',
                    '{"zone":"' ~ item.item ~ '.","flags":\1,"protocol":\2,"algorithm":\3,"key":"\4"}') |
                  map('from_json') | list) }}
          loop: "{{ _bind9_trust_anchor_digs.results }}"
          loop_control:
            label: "{{ item.item }}"

  roles:
    - role: bind9
      when: bind9_enabled

- name: DNS Client Resolver Configuration
  hosts: dmz-agent-01:dmz-client-01:internal-agent-01
  gather_facts: false
  become: true
  pre_tasks:
    - name: "PRE [network : Restore Final DNS Resolver Interfaces]"
      ansible.builtin.set_fact:
        network_interfaces: "{{ _network_final_interfaces }}"
      when: _network_final_interfaces is defined

  roles:
    - role: network
    - role: docker
      when: docker_enabled | default(false) | bool
