---
# Prerequisites:
#   - bootstrap.yml

- name: DNS Service Configuration
  hosts: dns
  gather_facts: true
  become: true
  roles:
    - role: bind9
      when: bind9_enabled

- name: DNS Client Resolver Configuration
  hosts: "dmz:internal:!dns"
  gather_facts: false
  become: true
  pre_tasks:
    - name: "PRE [network : Restore Final DNS Resolver Interfaces]"
      ansible.builtin.set_fact:
        network_interfaces: "{{ _network_final_interfaces }}"
      when: _network_final_interfaces is defined

  roles:
    - role: network

  tasks:
    - name: Run Docker Role
      ansible.builtin.include_role:
        name: docker
      when: docker_enabled | default(false) | bool

- name: DNS Hosts File Configuration
  hosts: "router:dmz:internal"
  gather_facts: false
  become: true
  tasks:
    - name: Assert managed /etc/hosts self entries exist
      ansible.builtin.assert:
        quiet: true
        that:
          - dns_hosts_file_self_entries[inventory_hostname] is defined
          - dns_hosts_file_self_entries[inventory_hostname] | length > 0
        fail_msg: >-
          Missing dns_hosts_file_self_entries for {{ inventory_hostname }}.

    - name: Deploy managed /etc/hosts
      ansible.builtin.template:
        src: etc_hosts.j2
        dest: /etc/hosts
        owner: root
        group: root
        mode: "0644"
