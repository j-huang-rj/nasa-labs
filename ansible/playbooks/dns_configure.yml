---
# Prerequisites in order:
#   - bootstrap.yml

- name: DNS Service Bootstrap
  hosts: dns
  gather_facts: true
  become: true
  vars:
    bind9_identity_source_host: "{{ groups['router'] | first }}"
  pre_tasks:
    # ──────────────────────────────────────────────────────────
    # VPN identity derivation — runs for ALL modes
    # ──────────────────────────────────────────────────────────
    - name: "PRE [dns : Derive bind9 VPN Identity Facts]"
      when:
        - bind9_enabled | default(false) | bool
      block:
        - name: "PRE [dns : Read Source Host wireguard_address]"
          ansible.builtin.set_fact:
            _bind9_source_wg_address: >-
              {{ hostvars[bind9_identity_source_host].wireguard_address
                 | default('') }}

        - name: "PRE [dns : Fail If VPN Address Unavailable]"
          ansible.builtin.fail:
            msg: >-
              bind9 role requires WireGuard address from '{{ bind9_identity_source_host }}'
              for zone name derivation, but wireguard_address is not defined.
              Ensure WireGuard is configured on '{{ bind9_identity_source_host }}' and
              the host is accessible in the play.
          when: _bind9_source_wg_address | length == 0

        - name: "PRE [dns : Derive VPN CIDR Octets]"
          ansible.builtin.set_fact:
            _bind9_wg_octets: "{{ _bind9_source_wg_address.split('/')[0].split('.') }}"
            _bind9_wg_prefix: "{{ _bind9_source_wg_address.split('/')[1] | default('28') }}"

        - name: "PRE [dns : Compute bind9_vpn_network_base And Lab ID]"
          ansible.builtin.set_fact:
            bind9_vpn_network_base: "{{ (_bind9_wg_octets[3] | int // 16) * 16 }}"
            bind9_derived_lab_id: >-
              {{ (_bind9_wg_octets[2] | int * 16) + (_bind9_wg_octets[3] | int // 16) }}

        - name: "PRE [dns : Compute Lab IDs From All WireGuard-Enabled Peers]"
          ansible.builtin.set_fact:
            _bind9_peer_lab_ids: >-
              {{ _bind9_peer_lab_ids | default([])
                 + [(item.split('/')[0].split('.')[2] | int * 16)
                    + (item.split('/')[0].split('.')[3] | int // 16)] }}
          loop: >-
            {{ groups['all']
               | map('extract', hostvars)
               | selectattr('wireguard_address', 'defined')
               | rejectattr('wireguard_address', 'equalto', '')
               | map(attribute='wireguard_address')
               | list }}
          loop_control:
            label: "{{ item }}"

        - name: "PRE [dns : Assert WireGuard-Enabled Peers Agree On Lab ID]"
          ansible.builtin.assert:
            that:
              - _bind9_peer_lab_ids | length > 0
              - _bind9_peer_lab_ids | unique | length == 1
              - (_bind9_peer_lab_ids | first) == (bind9_derived_lab_id | int)
            fail_msg: >-
              WireGuard-enabled peers disagree on derived lab ID
              (got {{ _bind9_peer_lab_ids | unique }} from
              {{ groups['all']
                 | map('extract', hostvars)
                 | selectattr('wireguard_address', 'defined')
                 | rejectattr('wireguard_address', 'equalto', '')
                 | map(attribute='inventory_hostname')
                 | list }}).
              All WG-enabled hosts must share the same /28 subnet so that
              lab identity is unambiguous. Check wireguard_address values
              in inventory.

        - name: "PRE [dns : Compute VPN Host IPs And DNS Identity Facts]"
          ansible.builtin.set_fact:
            bind9_vpn_router_ip: >-
              {{ _bind9_wg_octets[0] }}.{{ _bind9_wg_octets[1] }}.{{ _bind9_wg_octets[2] }}.{{ (bind9_vpn_network_base |
              int) + bind9_vpn_router_offset }}
            bind9_vpn_client_ip: >-
              {{ _bind9_wg_octets[0] }}.{{ _bind9_wg_octets[1] }}.{{ _bind9_wg_octets[2] }}.{{ (bind9_vpn_network_base |
              int) + bind9_vpn_client_offset }}
            bind9_vpn_ns_ip: >-
              {{ _bind9_wg_octets[0] }}.{{ _bind9_wg_octets[1] }}.{{ _bind9_wg_octets[2] }}.{{ (bind9_vpn_network_base |
              int) + bind9_vpn_ns_offset }}
            bind9_forward_zone_name: "{{ bind9_derived_lab_id }}.nasa"
            bind9_vpn_child_reverse_zone_name: >-
              {{ bind9_derived_lab_id }}-sub{{ _bind9_wg_prefix }}.{{ _bind9_wg_octets[2] }}.{{ _bind9_wg_octets[1] }}.{{
              _bind9_wg_octets[0] }}.in-addr.arpa
            bind9_primary_mname: "private-ns.{{ bind9_derived_lab_id }}.nasa."
            bind9_soa_serial_date: "{{ ansible_facts['date_time'].date | replace('-', '') }}"

    # ──────────────────────────────────────────────────────────
    # Trust-anchor fetch — resolver mode only
    # Queries the NASA root server for KSK DNSKEY records and
    # builds the bind9_trust_anchors fact for DNSSEC validation.
    # ──────────────────────────────────────────────────────────
    - name: "PRE [dns : Fetch NASA-Root Trust Anchors for Resolver Mode]"
      when:
        - bind9_enabled | default(false) | bool
        - bind9_mode | default('') == 'resolver'
      block:
        - name: "PRE [dns : Query nasa. DNSKEY from NASA Root]"
          ansible.builtin.command: dig @{{ bind9_nasa_root_ip }} nasa. DNSKEY +noall +answer
          register: _bind9_nasa_dnskey
          changed_when: false
          until: _bind9_nasa_dnskey.rc == 0 and _bind9_nasa_dnskey.stdout | length > 0
          retries: 3
          delay: 2

        - name: "PRE [dns : Query 168.192.in-addr.arpa. DNSKEY from NASA Root]"
          ansible.builtin.command: dig @{{ bind9_nasa_root_ip }} 168.192.in-addr.arpa. DNSKEY +noall +answer
          register: _bind9_reverse_dnskey
          changed_when: false
          until: _bind9_reverse_dnskey.rc == 0 and _bind9_reverse_dnskey.stdout | length > 0
          retries: 3
          delay: 2

        - name: "PRE [dns : Fail If No nasa. KSK Records Found]"
          ansible.builtin.fail:
            msg: >-
              No KSK (flags 257) found in nasa. DNSKEY response from
              {{ bind9_nasa_root_ip }}. Ensure the NASA root server is reachable
              and serving DNSKEY records for nasa.
          when: >-
            _bind9_nasa_dnskey.stdout_lines |
              select('regex', '\sDNSKEY\s+257\s+\d+\s+\d+\s+\S+') |
              list | length == 0

        - name: "PRE [dns : Fail If No 168.192.in-addr.arpa. KSK Records Found]"
          ansible.builtin.fail:
            msg: >-
              No KSK (flags 257) found in 168.192.in-addr.arpa. DNSKEY response
              from {{ bind9_nasa_root_ip }}. Ensure the NASA root server is reachable
              and serving DNSKEY records for 168.192.in-addr.arpa.
          when: >-
            _bind9_reverse_dnskey.stdout_lines |
              select('regex', '\sDNSKEY\s+257\s+\d+\s+\d+\s+\S+') |
              list | length == 0

        - name: "PRE [dns : Parse Trust Anchors from DNSKEY Responses]"
          ansible.builtin.set_fact:
            bind9_trust_anchors: >-
              {{ (
                  _bind9_nasa_dnskey.stdout_lines |
                  select('regex', '\sDNSKEY\s+257\s+\d+\s+\d+\s+\S+') |
                  map('regex_replace',
                    '^\S+\s+\d+\s+\S+\s+DNSKEY\s+(\d+)\s+(\d+)\s+(\d+)\s+(.+?)\s*$',
                    '{"zone":"nasa.","flags":\1,"protocol":\2,"algorithm":\3,"key":"\4"}') |
                  map('from_json') | list
                ) + (
                  _bind9_reverse_dnskey.stdout_lines |
                  select('regex', '\sDNSKEY\s+257\s+\d+\s+\d+\s+\S+') |
                  map('regex_replace',
                    '^\S+\s+\d+\s+\S+\s+DNSKEY\s+(\d+)\s+(\d+)\s+(\d+)\s+(.+?)\s*$',
                    '{"zone":"168.192.in-addr.arpa.","flags":\1,"protocol":\2,"algorithm":\3,"key":"\4"}') |
                  map('from_json') | list
                ) }}

  roles:
    - role: bind9
      when: bind9_enabled
