---
# Phase 12 validation playbook: ACL, ppolicy, TOTP, Fortune,
# server-side sort/paging, idempotency, and reboot persistence.
#
# Prerequisites:
#   - site.yml or ldap_configure.yml

# ──────────────────────────────────────────────────────────
# Preflight: Reachability And Module Readiness
# ──────────────────────────────────────────────────────────
- name: "Phase12 Preflight Reachability And Module Readiness"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - preflight
  tasks:
    - name: "PHASE [preflight : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 preflight — target reachability, MDB discovery, module checks, secret shape validation"

    - name: "PHASE [preflight : Ping ldap-01 Target]"
      ansible.builtin.ping:

    - name: "PHASE [preflight : Discover Target MDB By Suffix]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(&(objectClass=olcMdbConfig)(olcSuffix={{ ldap_base_dn }}))'
          dn
      changed_when: false
      failed_when: false
      register: _p12_mdb_search

    - name: "PHASE [preflight : Extract MDB Database DN]"
      when: _p12_mdb_search.rc == 0
      ansible.builtin.set_fact:
        _p12_mdb_dn: >-
          {{ _p12_mdb_search.stdout_lines | default([])
             | select('match', '^dn: olcDatabase=.*mdb,cn=config')
             | list
             | first
             | default('')
             | regex_replace('^dn: ', '')
             | trim }}

    - name: "PHASE [preflight : Assert Target MDB Database Found By Suffix]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_mdb_search.rc == 0
          - _p12_mdb_dn | default('') | length > 0
        fail_msg: >-
          Target MDB database not found by suffix {{ ldap_base_dn }}.
          Search rc={{ _p12_mdb_search.rc }},
          stdout={{ _p12_mdb_search.stdout | default('') }}

    - name: "PHASE [preflight : Search OLC Loaded Modules]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(olcModuleLoad=*)' dn olcModuleLoad
      changed_when: false
      register: _p12_module_search

    - name: "PHASE [preflight : Assert Required Modules Loaded]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_module_search.rc == 0
          - "'ppolicy' in _p12_module_search.stdout"
          - "'otp' in _p12_module_search.stdout"
          - "'sssvlv' in _p12_module_search.stdout"
        fail_msg: >-
          Required OpenLDAP modules not loaded (ppolicy, otp, sssvlv).
          stdout={{ _p12_module_search.stdout | default('') }}

    - name: "PHASE [preflight : Verify check_password.so Exists]"
      ansible.builtin.stat:
        path: /usr/lib64/openldap/check_password.so
      changed_when: false
      register: _p12_check_password_stat

    - name: "PHASE [preflight : Assert check_password.so Module File Present]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_check_password_stat.stat.exists
        fail_msg: >-
          Password quality check module not found at
          /usr/lib64/openldap/check_password.so.

    - name: "PHASE [preflight : Assert Required Phase 12 Secrets Defined]"
      ansible.builtin.assert:
        quiet: true
        that:
          - openldap_ta_password is defined
          - openldap_ta_password | length > 0
          - openldap_generalta_totp_secret is defined
          - openldap_generalta_totp_secret | length > 0
          - openldap_stu_totp_secret is defined
          - openldap_stu_totp_secret | length > 0
        fail_msg: >-
          Phase 12 secrets (openldap_ta_password, openldap_generalta_totp_secret,
          openldap_stu_totp_secret) must be defined and non-empty in
          host_vars/ldap-01/secrets.yml.
      no_log: true

    - name: "PHASE [preflight : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 preflight reachability and module readiness complete"

# ──────────────────────────────────────────────────────────
# Static Source Safety Gates (Phase 12)
# ──────────────────────────────────────────────────────────
- name: "Phase12 Static Source Safety Gates"
  hosts: localhost
  gather_facts: false
  become: false
  tags:
    - static
  vars:
    _p12_inventory_file: >-
      {{ inventory_file
         | default(ansible_inventory_sources | first
                   | default((playbook_dir + '/../inventory/hosts.yml'))) }}
    _p12_openldap_role_dir: "{{ playbook_dir }}/roles/openldap"
    _p12_forbidden_source_patterns:
      - pattern: '/etc/openldap/slapd\.d'
        label: 'Direct slapd.d file writes'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "/etc/openldap/slapd\.d"'
      - pattern: 'LDAPTLS_REQCERT\s*=\s*never'
        label: 'LDAPTLS_REQCERT=never (disables certificate validation)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "LDAPTLS_REQCERT"'
      - pattern: 'validate_certs\s*:\s*false'
        label: 'validate_certs: false (disables Ansible certificate validation)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "validate_certs:\s*false"'
      - pattern: '\-[Zz]{2}'
        label: 'StartTLS -ZZ flag (ldapsearch StartTLS)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "\-[Zz]\{2\}"'
      - pattern: 'ldap://[^s]'
        label: 'ldap:// scheme (non-SSL LDAP) excluding ldaps:// and ldapi://'
        grep_args: '-rn --include="*.yml" --include="*.yaml" --include="*.j2" "ldap://"'
      - pattern: ':389'
        label: 'Port 389 reference (plain LDAP)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" ":389"'
      - pattern: 'userPassword'
        label: 'Unfiltered userPassword output in failure messages'
        grep_args: >-
          -rn --include="*.yml" --include="*.yaml"
          -e 'fail_msg.*userPassword' -e 'msg.*userPassword'
      - pattern: 'no_log:\s*true'
        label: 'Secret-adjacent tasks without no_log (preflight secret checks only)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "no_log:\s*true"'
  tasks:
    - name: "PHASE [static : START]"
      ansible.builtin.debug:
        msg: "Phase 12 static source safety gates — scanning for forbidden patterns"

    - name: "PHASE [static : Scan For Forbidden Phase 12 Patterns]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          (
            cd "{{ _p12_openldap_role_dir }}" 2>/dev/null || exit 0;
            grep {{ item.grep_args }} || true
          );
          (
            cd "{{ playbook_dir }}" 2>/dev/null || exit 0;
            grep {{ item.grep_args }} openldap_phase12_verify.yml || true
          )
        executable: /bin/bash
      changed_when: false
      register: _p12_forbidden_source_scan
      loop: "{{ _p12_forbidden_source_patterns }}"
      loop_control:
        label: "{{ item.label }}"

    - name: "PHASE [static : Assert No slapd.d File Writes In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[0].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains direct writes to /etc/openldap/slapd.d.
          OpenLDAP OLC must be managed through LDAP operations (ldapmodify/ldapadd).
          Matches:
          {{ _p12_forbidden_source_scan.results[0].stdout }}

    - name: "PHASE [static : Assert No LDAPTLS_REQCERT=never In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[1].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains LDAPTLS_REQCERT=never.
          Matches:
          {{ _p12_forbidden_source_scan.results[1].stdout }}

    - name: "PHASE [static : Assert No validate_certs: false In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[2].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains validate_certs: false.
          Matches:
          {{ _p12_forbidden_source_scan.results[2].stdout }}

    - name: "PHASE [static : Assert No StartTLS -ZZ In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[3].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains StartTLS -ZZ flag.
          Matches:
          {{ _p12_forbidden_source_scan.results[3].stdout }}

    - name: "PHASE [static : Assert No ldap:// (Non-SSL) In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[4].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains ldap:// scheme (non-SSL LDAP).
          Matches:
          {{ _p12_forbidden_source_scan.results[4].stdout }}

    - name: "PHASE [static : Assert No Port 389 In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[5].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains port 389 reference.
          Matches:
          {{ _p12_forbidden_source_scan.results[5].stdout }}

    - name: "PHASE [static : Assert No userPassword Output In Failure Messages]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[6].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content may leak userPassword in failure messages
          or stdout output. Mark all secret-adjacent tasks no_log: true.
          Matches:
          {{ _p12_forbidden_source_scan.results[6].stdout }}

    - name: "PHASE [static : END]"
      ansible.builtin.debug:
        msg: "Phase 12 static source safety gates complete"

# ──────────────────────────────────────────────────────────
# ACL Matrix Validation: Delegation, Secrets, Self-Service
# ──────────────────────────────────────────────────────────
- name: "Phase12 ACL Matrix Validation"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - acl
    - secrets
    - self_service
  vars:
    _p12_generalta_dn: "uid=generalta,ou=People,{{ ldap_base_dn }}"
    _p12_mailta_dn: "uid=mailta,ou=People,{{ ldap_base_dn }}"
    _p12_stu_dn: "uid=stu,ou=People,{{ ldap_base_dn }}"
    _p12_admin_dn: "cn=admin,{{ ldap_base_dn }}"
  tasks:
    - name: "PHASE [acl : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 ACL matrix — delegation, secrets, self-service"

    # ─── MDB discovery (same pattern as preflight) ───
    - name: "PHASE [acl : Discover Target MDB By Suffix]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(&(objectClass=olcMdbConfig)(olcSuffix={{ ldap_base_dn }}))'
          dn
      changed_when: false
      failed_when: false
      register: _p12_acl_mdb_search

    - name: "PHASE [acl : Extract MDB Database DN]"
      when: _p12_acl_mdb_search.rc == 0
      ansible.builtin.set_fact:
        _p12_acl_mdb_dn: >-
          {{ _p12_acl_mdb_search.stdout_lines | default([])
             | select('match', '^dn: olcDatabase=.*mdb,cn=config')
             | list
             | first
             | default('')
             | regex_replace('^dn: ', '')
             | trim }}

    - name: "PHASE [acl : Search OLC Access Rules]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "{{ _p12_acl_mdb_dn }}" -s base '(objectClass=*)' olcAccess
      changed_when: false
      register: _p12_acl_olc_access

    # ─── ACL delegation: generalta can write non-secret user attribute ───
    - name: "PHASE [acl : Generalta Write Description On Stu Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_generalta_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          replace: description
          description: ACL delegation test - generalta
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true
      register: _p12_delegate_write

    - name: "PHASE [acl : Assert Generalta Can Write Non-Secret Attribute]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_delegate_write.rc == 0
        fail_msg: >-
          Delegated admin generalta could not write description on stu entry.
          rc={{ _p12_delegate_write.rc }}, stderr={{ _p12_delegate_write.stderr | default('') }}
      no_log: true

    # ─── Cleanup: restore description with admin bind ───
    - name: "PHASE [acl : Cleanup Restore Stu Description]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_admin_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          delete: description
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true

    # ─── ACL delegation: generalta can read group entry ───
    - name: "PHASE [acl : Generalta Read TA Group Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_generalta_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
          -b "cn=ta,ou=Group,{{ ldap_base_dn }}" -s base '(objectClass=posixGroup)'
          cn gidNumber memberUid
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      no_log: true
      register: _p12_delegate_group_read

    - name: "PHASE [acl : Assert Generalta Can Read TA Group]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_delegate_group_read.rc == 0
          - "'cn: ta' in _p12_delegate_group_read.stdout"
          - "'memberUid: generalta' in _p12_delegate_group_read.stdout"
        fail_msg: >-
          Delegated admin generalta could not read TA group entry.
      no_log: true

    # ─── ACL delegation: mailta can write non-secret user attribute ───
    - name: "PHASE [acl : Mailta Write Description On Stu Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_mailta_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          replace: description
          description: ACL delegation test - mailta
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true
      register: _p12_mailta_write

    - name: "PHASE [acl : Assert Mailta Can Write Non-Secret Attribute]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_mailta_write.rc == 0
        fail_msg: >-
          Delegated admin mailta could not write description on stu entry.
      no_log: true

    # ─── Cleanup: restore description with admin bind ───
    - name: "PHASE [acl : Cleanup Restore Stu Description Mailta]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_admin_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          delete: description
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true

    # ─── SECRETS: generalta cannot read/search userPassword ───
    - name: "PHASE [secrets : Generalta Search For UserPassword On Stu Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_generalta_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_stu_dn }}" -s base '(objectClass=*)' userPassword
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      no_log: true
      register: _p12_delegate_secret_search

    - name: "PHASE [secrets : Assert Generalta Cannot Read userPassword]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'userPassword' not in _p12_delegate_secret_search.stdout"
        fail_msg: >-
          Delegated admin generalta should not be able to read userPassword.
      no_log: true

    # ─── SECRETS: mailta cannot read/search userPassword ───
    - name: "PHASE [secrets : Mailta Search For userPassword On Stu Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_mailta_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_stu_dn }}" -s base '(objectClass=*)' userPassword
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      no_log: true
      register: _p12_mailta_secret_search

    - name: "PHASE [secrets : Assert Mailta Cannot Read userPassword]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'userPassword' not in _p12_mailta_secret_search.stdout"
        fail_msg: >-
          Delegated admin mailta should not be able to read userPassword.
      no_log: true

    # ─── SECRETS: anonymous cannot read userPassword ───
    - name: "PHASE [secrets : Anonymous Search For userPassword On Stu Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x
          -H {{ ldap_server_uri }}
          -b "{{ _p12_stu_dn }}" -s base '(objectClass=*)' userPassword
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      register: _p12_anonymous_secret_search

    - name: "PHASE [secrets : Assert Anonymous Cannot Read userPassword]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'userPassword' not in _p12_anonymous_secret_search.stdout"
        fail_msg: >-
          Anonymous bind should not be able to read userPassword.
      no_log: true

    # ─── ACL: delegated DN cannot search cn=config ───
    - name: "PHASE [acl : Generalta Search cn=config]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config -s base '(objectClass=*)' dn
      changed_when: false
      failed_when: false
      register: _p12_cnconfig_via_ldapi

    - name: "PHASE [acl : Assert Generalta Cannot Access cn=config Via Delegated Bind]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_cnconfig_via_ldapi.rc != 0 or 'cn=config' not in _p12_cnconfig_via_ldapi.stdout
        fail_msg: >-
          Delegated admin should not be able to access cn=config via SASL EXTERNAL.
      no_log: true

    # ─── SELF-SERVICE: stu can read normal user attributes ───
    - name: "PHASE [self_service : Stu Search Own Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_stu_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_stu_dn }}" -s base '(objectClass=*)'
          uid uidNumber gidNumber homeDirectory mail loginShell
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      no_log: true
      register: _p12_stu_self_read

    - name: "PHASE [self_service : Assert Stu Can Read Own Attributes]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_stu_self_read.rc == 0
          - "'uid: stu' in _p12_stu_self_read.stdout"
          - "'mail' in _p12_stu_self_read.stdout"
          - "'loginShell' in _p12_stu_self_read.stdout"
        fail_msg: >-
          Stu should be able to read own normal user attributes.
      no_log: true

    # ─── SELF-SERVICE: stu can modify own loginShell ───
    - name: "PHASE [self_service : Stu Modify Own loginShell]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_stu_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          replace: loginShell
          loginShell: /bin/sh
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true
      register: _p12_self_service_modify

    - name: "PHASE [self_service : Assert Stu Can Modify Own loginShell]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_self_service_modify.rc == 0
        fail_msg: >-
          Stu should be able to modify own loginShell.
      no_log: true

    # ─── Cleanup: restore stu loginShell via admin ───
    - name: "PHASE [self_service : Cleanup Restore Stu loginShell]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_admin_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          replace: loginShell
          loginShell: /bin/bash
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true

    # ─── SELF-SERVICE: stu cannot modify own mail ───
    - name: "PHASE [self_service : Stu Try Modify Own Mail]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_stu_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          replace: mail
          mail: hacked@evil.com
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_stu_mail_modify

    - name: "PHASE [self_service : Assert Stu Cannot Modify Own Mail]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_stu_mail_modify.rc != 0
        fail_msg: >-
          Stu should NOT be able to modify own mail attribute.
      no_log: true

    # ─── SELF-SERVICE: stu cannot modify another user attribute ───
    - name: "PHASE [self_service : Stu Try Modify Mailta loginShell]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_stu_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_mailta_dn }}
          changetype: modify
          replace: loginShell
          loginShell: /bin/sh
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_stu_other_modify

    - name: "PHASE [self_service : Assert Stu Cannot Modify Another User Mailta]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_stu_other_modify.rc != 0
        fail_msg: >-
          Stu should NOT be able to modify mailta loginShell.
      no_log: true

    - name: "PHASE [acl : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 ACL matrix validation complete"

# ──────────────────────────────────────────────────────────
# PPolicy Validation: Ordinary User Password Policy Behavior
# ──────────────────────────────────────────────────────────
- name: "Phase12 PPolicy Validation"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - ppolicy
  vars:
    _p12_mailta_dn: "uid=mailta,ou=People,{{ ldap_base_dn }}"
    _p12_admin_dn: "cn=admin,{{ ldap_base_dn }}"
    _p12_ppolicy_temp_pass: "Phase12-Temp9!"
    _p12_ppolicy_short_pass: "short"
    _p12_ppolicy_lc_digit_pass: "lowercase1"
    _p12_ppolicy_current_pass: "{{ openldap_ta_password }}"
  tasks:
    - name: "PHASE [ppolicy : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 ppolicy validation — ordinary mailta password-change behavior"

    # ─── Verify mailta can bind with current password ───
    - name: "PHASE [ppolicy : Bind As Mailta To Verify Connectivity]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_mailta_dn }}" -w "{{ _p12_ppolicy_current_pass }}"
          -H {{ ldap_server_uri }}
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      no_log: true
      register: _p12_ppolicy_mailta_bind

    - name: "PHASE [ppolicy : Assert Mailta Can Bind With Current Password]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_mailta_bind.rc == 0
        fail_msg: >-
          Mailta could not bind with current password.
          rc={{ _p12_ppolicy_mailta_bind.rc }}
      no_log: true

    # ─── Negative: password shorter than 8 characters ───
    - name: "PHASE [ppolicy : Attempt Short Password Change]"
      ansible.builtin.command:
        cmd: >-
          ldappasswd -x -D "{{ _p12_mailta_dn }}" -w "{{ _p12_ppolicy_current_pass }}"
          -H {{ ldap_server_uri }}
          -a "{{ _p12_mailta_dn }}"
          -s "{{ _p12_ppolicy_short_pass }}"
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_ppolicy_short_result

    - name: "PHASE [ppolicy : Assert Short Password Rejected]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_short_result.rc != 0
        fail_msg: >-
          Short password should have been rejected by ppolicy pwdMinLength: 8.
          rc={{ _p12_ppolicy_short_result.rc }}
      no_log: true

    # ─── Negative: password with only lowercase+digit classes (2 points < 3) ───
    - name: "PHASE [ppolicy : Attempt Missing Character Classes Password Change]"
      ansible.builtin.command:
        cmd: >-
          ldappasswd -x -D "{{ _p12_mailta_dn }}" -w "{{ _p12_ppolicy_current_pass }}"
          -H {{ ldap_server_uri }}
          -a "{{ _p12_mailta_dn }}"
          -s "{{ _p12_ppolicy_lc_digit_pass }}"
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_ppolicy_missing_classes_result

    - name: "PHASE [ppolicy : Assert Missing Character Classes Password Rejected]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_missing_classes_result.rc != 0
        fail_msg: >-
          Password with only lowercase+digit classes should have been rejected
          by check_password.so (minPoints 3, only 2 classes).
          rc={{ _p12_ppolicy_missing_classes_result.rc }}
      no_log: true

    # ─── Positive: valid password with all character classes ───
    - name: "PHASE [ppolicy : Set Valid Temporary Password]"
      ansible.builtin.command:
        cmd: >-
          ldappasswd -x -D "{{ _p12_mailta_dn }}" -w "{{ _p12_ppolicy_current_pass }}"
          -H {{ ldap_server_uri }}
          -a "{{ _p12_mailta_dn }}"
          -s "{{ _p12_ppolicy_temp_pass }}"
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true
      register: _p12_ppolicy_valid_pass_result

    - name: "PHASE [ppolicy : Assert Valid Temporary Password Set]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_valid_pass_result.rc == 0
        fail_msg: >-
          Valid temporary password should have been accepted.
          rc={{ _p12_ppolicy_valid_pass_result.rc }}
      no_log: true

    # ─── Negative: immediate reuse of previous password ───
    - name: "PHASE [ppolicy : Attempt Immediate Password Reuse]"
      ansible.builtin.command:
        cmd: >-
          ldappasswd -x -D "{{ _p12_mailta_dn }}" -w "{{ _p12_ppolicy_temp_pass }}"
          -H {{ ldap_server_uri }}
          -a "{{ _p12_mailta_dn }}"
          -s "{{ _p12_ppolicy_temp_pass }}"
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_ppolicy_reuse_result

    - name: "PHASE [ppolicy : Assert Password Reuse Rejected]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_reuse_result.rc != 0
        fail_msg: >-
          Password reuse should have been rejected by ppolicy pwdInHistory: 1.
          rc={{ _p12_ppolicy_reuse_result.rc }}
      no_log: true

    # ─── Cleanup: reset mailta password to original hash via admin bind ───
    - name: "PHASE [ppolicy : Cleanup Reset Mailta Password To Original Hash]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_admin_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_mailta_dn }}
          changetype: modify
          replace: userPassword
          userPassword: {{ openldap_user_password_hashes.mailta }}
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true
      register: _p12_ppolicy_cleanup_result

    - name: "PHASE [ppolicy : Assert Mailta Password Cleanup Succeeded]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_cleanup_result.rc == 0
        fail_msg: >-
          Cleanup failed — could not reset mailta password to original hash.
          rc={{ _p12_ppolicy_cleanup_result.rc }}
      no_log: true

    - name: "PHASE [ppolicy : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 ppolicy validation complete"

# ──────────────────────────────────────────────────────────
# TOTP Configuration, Bind, Replay, And SSH Key Validation
# ──────────────────────────────────────────────────────────
- name: "Phase12 TOTP Bind Replay And SSH Key Validation"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - totp
    - totp_config
    - totp_bind
    - ssh_public_key
  vars:
    _p12_totp_generalta_dn: "uid=generalta,ou=People,{{ ldap_base_dn }}"
    _p12_totp_stu_dn: "uid=stu,ou=People,{{ ldap_base_dn }}"
    _p12_totp_mailta_dn: "uid=mailta,ou=People,{{ ldap_base_dn }}"
    _p12_totp_admin_dn: "cn=admin,{{ ldap_base_dn }}"
    _p12_totp_wrong_code: "999999"
    _p12_totp_python_script: |
      import base64, hmac, hashlib, struct, time, sys
      secret_b64 = sys.argv[1]
      offset = int(sys.argv[2]) if len(sys.argv) > 2 else 0
      raw_key = base64.b64decode(secret_b64)
      counter = int(time.time() / 60) + offset
      counter_bytes = struct.pack('>Q', counter)
      h = hmac.new(raw_key, counter_bytes, hashlib.sha1).digest()
      offset_byte = h[-1] & 0x0F
      code = struct.unpack('>I', h[offset_byte:offset_byte+4])[0] & 0x7FFFFFFF
      print(f"{code % 1000000:06d}")
    _p12_totp_wait_script: |
      import time, sys
      remaining = 60 - (time.time() % 60)
      if remaining > 2:
          print(int(remaining + 2))
      else:
          print(0)
  tasks:
    # ─── TOTP config: overlay, params, user OATH links ───
    - name: "PHASE [totp_config : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 TOTP config verification — overlay, params, user OATH links"

    - name: "PHASE [totp_config : Discover Target MDB By Suffix]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(&(objectClass=olcMdbConfig)(olcSuffix={{ ldap_base_dn }}))'
          dn
      changed_when: false
      failed_when: false
      register: _p12_totp_mdb_search

    - name: "PHASE [totp_config : Extract MDB Database DN]"
      when: _p12_totp_mdb_search.rc == 0
      ansible.builtin.set_fact:
        _p12_totp_mdb_dn: >-
          {{ _p12_totp_mdb_search.stdout_lines | default([])
             | select('match', '^dn: olcDatabase=.*mdb,cn=config')
             | list
             | first
             | default('')
             | regex_replace('^dn: ', '')
             | trim }}

    - name: "PHASE [totp_config : Search OTP Overlay On Target MDB]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "olcOverlay=otp,{{ _p12_totp_mdb_dn }}" -s base
          '(objectClass=*)' dn
      changed_when: false
      register: _p12_totp_overlay_verify

    - name: "PHASE [totp_config : Assert OTP Overlay Present]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_overlay_verify.rc == 0
          - "'olcOverlay=otp' in _p12_totp_overlay_verify.stdout"
        fail_msg: >-
          OTP overlay missing from target MDB.
          stdout={{ _p12_totp_overlay_verify.stdout | default('') }}

    - name: "PHASE [totp_config : Search TOTP Params Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ openldap_totp_params_dn }}" -s base
          '(objectClass=*)' oathOTPLength oathTOTPTimeStepPeriod oathHMACAlgorithm
      changed_when: false
      register: _p12_totp_params_verify
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_config : Assert TOTP Params Correct]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_params_verify.rc == 0
          - "'oathOTPLength: 6' in _p12_totp_params_verify.stdout"
          - "'oathTOTPTimeStepPeriod: 60' in _p12_totp_params_verify.stdout"
          - "'oathHMACAlgorithm: 1.2.840.113549.2.7' in _p12_totp_params_verify.stdout"
        fail_msg: >-
          TOTP params entry missing or incorrect.
          stdout={{ _p12_totp_params_verify.stdout | default('') }}
      no_log: true

    - name: "PHASE [totp_config : Search Generalta For OATH Attributes]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_generalta_dn }}" -s base
          '(objectClass=posixAccount)' objectClass oathTOTPToken
      changed_when: false
      register: _p12_totp_user_generalta
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_config : Assert Generalta Has oathTOTPUser And oathTOTPToken]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_user_generalta.rc == 0
          - "'oathTOTPUser' in _p12_totp_user_generalta.stdout"
          - "'oathTOTPToken' in _p12_totp_user_generalta.stdout"
          - "'cn=totp-generalta' in _p12_totp_user_generalta.stdout"
        fail_msg: >-
          Generalta missing OATH user/token link.
          stdout={{ _p12_totp_user_generalta.stdout | default('') }}
      no_log: true

    - name: "PHASE [totp_config : Search Stu For OATH Attributes]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_stu_dn }}" -s base
          '(objectClass=posixAccount)' objectClass oathTOTPToken
      changed_when: false
      register: _p12_totp_user_stu
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_config : Assert Stu Has oathTOTPUser And oathTOTPToken]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_user_stu.rc == 0
          - "'oathTOTPUser' in _p12_totp_user_stu.stdout"
          - "'oathTOTPToken' in _p12_totp_user_stu.stdout"
          - "'cn=totp-stu' in _p12_totp_user_stu.stdout"
        fail_msg: >-
          Stu missing OATH user/token link.
          stdout={{ _p12_totp_user_stu.stdout | default('') }}
      no_log: true

    - name: "PHASE [totp_config : Search Mailta For OATH Attributes]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_mailta_dn }}" -s base
          '(objectClass=posixAccount)' objectClass oathTOTPToken
      changed_when: false
      register: _p12_totp_user_mailta
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_config : Assert Mailta Has No OATH Attributes]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_user_mailta.rc == 0
          - "'oathTOTPUser' not in _p12_totp_user_mailta.stdout"
          - "'oathTOTPToken' not in _p12_totp_user_mailta.stdout"
        fail_msg: >-
          Mailta should NOT have OATH attributes (password-only).
          stdout={{ _p12_totp_user_mailta.stdout | default('') }}
      no_log: true

    - name: "PHASE [totp_config : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 TOTP config verification complete"

    # ─── TOTP bind: password-only, wrong code, current code, replay, next step ───
    - name: "PHASE [totp_bind : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 TOTP bind/replay validation — generalta and stu"

    # Generate current TOTP codes for generalta and stu
    - name: "PHASE [totp_bind : Generate Current TOTP Code For Generalta]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_python_script }}" "{{ openldap_generalta_totp_secret }}" 0
      changed_when: false
      no_log: true
      register: _p12_totp_current_code

    - name: "PHASE [totp_bind : Set Current TOTP Code Fact]"
      ansible.builtin.set_fact:
        _p12_totp_current_code_val: "{{ _p12_totp_current_code.stdout | trim }}"
      no_log: true

    # ─── generalta: password-only → fail ───
    - name: "PHASE [totp_bind : Generalta Password-Only Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_generalta_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_password_only_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Password-Only Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_password_only_result.rc != 0
        fail_msg: >-
          Generalta password-only bind should fail — TOTP code required.
          rc={{ _p12_totp_password_only_result.rc }}
      no_log: true

    # ─── generalta: password + wrong code → fail ───
    - name: "PHASE [totp_bind : Generalta Password Plus Wrong Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_generalta_dn }}"
          -w "{{ openldap_ta_password }}{{ _p12_totp_wrong_code }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_wrong_code_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Wrong Code Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_wrong_code_result.rc != 0
        fail_msg: >-
          Generalta bind with wrong TOTP code should fail.
          rc={{ _p12_totp_wrong_code_result.rc }}
      no_log: true

    # ─── generalta: password + current code → succeed ───
    - name: "PHASE [totp_bind : Generalta Password Plus Current Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_generalta_dn }}"
          -w "{{ openldap_ta_password }}{{ _p12_totp_current_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      no_log: true
      register: _p12_totp_correct_code_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Current Code Bind Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_correct_code_result.rc == 0
        fail_msg: >-
          Generalta bind with password + current TOTP code should succeed.
          rc={{ _p12_totp_correct_code_result.rc }}
      no_log: true

    # ─── generalta: immediate replay → fail ───
    - name: "PHASE [totp_bind : Generalta Immediate Replay Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_generalta_dn }}"
          -w "{{ openldap_ta_password }}{{ _p12_totp_current_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_replay_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Replay Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_replay_result.rc != 0
        fail_msg: >-
          Generalta immediate replay with same TOTP code should fail.
          rc={{ _p12_totp_replay_result.rc }}
      no_log: true

    # ─── Wait for next time step + generate next code ───
    - name: "PHASE [totp_bind : Compute Wait Seconds To Next Time Step]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_wait_script }}"
      changed_when: false
      no_log: true
      register: _p12_totp_wait_seconds

    - name: "PHASE [totp_bind : Set Wait Seconds Fact]"
      ansible.builtin.set_fact:
        _p12_totp_wait_val: "{{ _p12_totp_wait_seconds.stdout | trim | int }}"
      no_log: true

    - name: "PHASE [totp_bind : Wait For Next TOTP Time Step]"
      when: _p12_totp_wait_val | int > 0
      ansible.builtin.wait_for:
        timeout: "{{ _p12_totp_wait_val | int }}"
      changed_when: false

    - name: "PHASE [totp_bind : Generate Next-Step TOTP Code For Generalta]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_python_script }}" "{{ openldap_generalta_totp_secret }}" 0
      changed_when: false
      no_log: true
      register: _p12_totp_next_code

    - name: "PHASE [totp_bind : Set Next-Step TOTP Code Fact]"
      ansible.builtin.set_fact:
        _p12_totp_next_code_val: "{{ _p12_totp_next_code.stdout | trim }}"
      no_log: true

    # ─── generalta: next-step code → succeed ───
    - name: "PHASE [totp_bind : Generalta Next-Step Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_generalta_dn }}"
          -w "{{ openldap_ta_password }}{{ _p12_totp_next_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      no_log: true
      register: _p12_totp_next_step_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Next-Step Code Bind Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_next_step_result.rc == 0
        fail_msg: >-
          Generalta next-step TOTP code bind should succeed.
          rc={{ _p12_totp_next_step_result.rc }}
      no_log: true

    # ─── stu: same flow (password-only fail, wrong code fail, current success, replay fail) ───
    - name: "PHASE [totp_bind : Generate Current TOTP Code For Stu]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_python_script }}" "{{ openldap_stu_totp_secret }}" 0
      changed_when: false
      no_log: true
      register: _p12_totp_stu_current_code

    - name: "PHASE [totp_bind : Set Stu Current TOTP Code Fact]"
      ansible.builtin.set_fact:
        _p12_totp_stu_current_code_val: "{{ _p12_totp_stu_current_code.stdout | trim }}"
      no_log: true

    - name: "PHASE [totp_bind : Stu Password-Only Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_stu_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_stu_password_only
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Stu Password-Only Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_stu_password_only.rc != 0
        fail_msg: >-
          Stu password-only bind should fail — TOTP code required.
      no_log: true

    - name: "PHASE [totp_bind : Stu Password Plus Wrong Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_stu_dn }}"
          -w "{{ openldap_ta_password }}{{ _p12_totp_wrong_code }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_stu_wrong_code
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Stu Wrong Code Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_stu_wrong_code.rc != 0
        fail_msg: >-
          Stu bind with wrong TOTP code should fail.
      no_log: true

    - name: "PHASE [totp_bind : Stu Password Plus Current Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_stu_dn }}"
          -w "{{ openldap_ta_password }}{{ _p12_totp_stu_current_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      no_log: true
      register: _p12_totp_stu_correct
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Stu Current Code Bind Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_stu_correct.rc == 0
        fail_msg: >-
          Stu bind with password + current TOTP code should succeed.
      no_log: true

    - name: "PHASE [totp_bind : Stu Immediate Replay Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_stu_dn }}"
          -w "{{ openldap_ta_password }}{{ _p12_totp_stu_current_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_stu_replay
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Stu Replay Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_stu_replay.rc != 0
        fail_msg: >-
          Stu immediate replay with same TOTP code should fail.
      no_log: true

    # ─── mailta: password-only bind → succeed ───
    - name: "PHASE [totp_bind : Mailta Password-Only Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_mailta_dn }}" -w "{{ openldap_ta_password }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      no_log: true
      register: _p12_totp_mailta_bind_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Mailta Password-Only Bind Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_mailta_bind_result.rc == 0
        fail_msg: >-
          Mailta password-only bind should succeed (no TOTP required).
          rc={{ _p12_totp_mailta_bind_result.rc }}
      no_log: true

    - name: "PHASE [totp_bind : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 TOTP bind/replay validation complete"

    # ─── SSH public key: assert readable for generalta and stu ───
    - name: "PHASE [ssh_public_key : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 SSH public key read verification"

    - name: "PHASE [ssh_public_key : Read Generalta sshPublicKey Via LDAPS]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_generalta_dn }}" -s base
          '(objectClass=*)' sshPublicKey
      changed_when: false
      register: _p12_sshkey_generalta
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [ssh_public_key : Assert Generalta sshPublicKey Readable]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_sshkey_generalta.rc == 0
          - "'sshPublicKey' in _p12_sshkey_generalta.stdout"
          - "'ssh-ed25519' in _p12_sshkey_generalta.stdout"
        fail_msg: >-
          Generalta sshPublicKey not readable via LDAPS.
      no_log: true

    - name: "PHASE [ssh_public_key : Read Stu sshPublicKey Via LDAPS]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_stu_dn }}" -s base
          '(objectClass=*)' sshPublicKey
      changed_when: false
      register: _p12_sshkey_stu
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [ssh_public_key : Assert Stu sshPublicKey Readable]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_sshkey_stu.rc == 0
          - "'sshPublicKey' in _p12_sshkey_stu.stdout"
          - "'ssh-ed25519' in _p12_sshkey_stu.stdout"
        fail_msg: >-
          Stu sshPublicKey not readable via LDAPS.
      no_log: true

    - name: "PHASE [ssh_public_key : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 SSH public key read verification complete"
