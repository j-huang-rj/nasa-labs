---
# Phase 12 validation playbook: ACL, ppolicy, TOTP, Fortune,
# server-side sort/paging, idempotency, and reboot persistence.
#
# Prerequisites:
#   - site.yml or ldap_configure.yml

# ──────────────────────────────────────────────────────────
# Preflight: Reachability And Module Readiness
# ──────────────────────────────────────────────────────────
- name: "Phase12 Preflight Reachability And Module Readiness"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - preflight
  tasks:
    - name: "PHASE [preflight : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 preflight — target reachability, MDB discovery, module checks, secret shape validation"

    - name: "PHASE [preflight : Ping ldap-01 Target]"
      ansible.builtin.ping:

    - name: "PHASE [preflight : Discover Target MDB By Suffix]"
      ansible.builtin.command:
        cmd: |
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(&(objectClass=olcMdbConfig)(olcSuffix={{ ldap_base_dn }}))'
          dn
      changed_when: false
      failed_when: false
      register: _p12_mdb_search

    - name: "PHASE [preflight : Extract MDB Database DN]"
      when: _p12_mdb_search.rc == 0
      ansible.builtin.set_fact:
        _p12_mdb_dn: >-
          {{ _p12_mdb_search.stdout_lines | default([])
             | select('match', '^dn: olcDatabase=.*mdb,cn=config')
             | list
             | first
             | default('')
             | regex_replace('^dn: ', '')
             | trim }}

    - name: "PHASE [preflight : Assert Target MDB Database Found By Suffix]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_mdb_search.rc == 0
          - _p12_mdb_dn | default('') | length > 0
        fail_msg: >-
          Target MDB database not found by suffix {{ ldap_base_dn }}.
          Search rc={{ _p12_mdb_search.rc }},
          stdout={{ _p12_mdb_search.stdout | default('') }}

    - name: "PHASE [preflight : Search OLC Loaded Modules]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(olcModuleLoad=*)' dn olcModuleLoad
      changed_when: false
      register: _p12_module_search

    - name: "PHASE [preflight : Assert Required Modules Loaded]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_module_search.rc == 0
          - "'ppolicy' in _p12_module_search.stdout"
          - "'otp' in _p12_module_search.stdout"
          - "'sssvlv' in _p12_module_search.stdout"
        fail_msg: >-
          Required OpenLDAP modules not loaded (ppolicy, otp, sssvlv).
          stdout={{ _p12_module_search.stdout | default('') }}

    - name: "PHASE [preflight : Verify check_password.so Exists]"
      ansible.builtin.stat:
        path: /usr/lib64/openldap/check_password.so
      changed_when: false
      register: _p12_check_password_stat

    - name: "PHASE [preflight : Assert check_password.so Module File Present]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_check_password_stat.stat.exists
        fail_msg: >-
          Password quality check module not found at
          /usr/lib64/openldap/check_password.so.

    - name: "PHASE [preflight : Normalize Credentials From openldap_credentials]"
      ansible.builtin.set_fact:
        openldap_tls_cert_path: "{{ openldap_tls_cert_path | default('/etc/openldap/certs/ldap.crt') }}"
        _openldap_admin_password: >-
          {{ (openldap_credentials.directory_manager | default({})).password_plaintext
             | default('', true) }}
        _openldap_admin_password_hash: >-
          {{ (openldap_credentials.directory_manager | default({})).password_hash
             | default('', true) }}
        _openldap_user_password_hashes: >-
          {%- set hashes = {} -%}
          {%- set credential_users = openldap_credentials.users | default({}) -%}
          {%- for uname, udata in ldap_users.items() -%}
          {%-   set hash_key = udata.password_hash_key | default(uname) -%}
          {%-   set user_cred = credential_users[uname] | default({}) -%}
          {%-   set _ = hashes.update({hash_key:
                user_cred.password_hash | default('', true) }) -%}
          {%- endfor -%}
          {{ hashes }}
        _openldap_user_plaintext_passwords: >-
          {%- set plains = {} -%}
          {%- set credential_users = openldap_credentials.users | default({}) -%}
          {%- for uname in ldap_users.keys() | list -%}
          {%-   set user_cred = credential_users[uname] | default({}) -%}
          {%-   set _ = plains.update({uname:
                user_cred.password_plaintext | default('', true) }) -%}
          {%- endfor -%}
          {{ plains }}
        _openldap_user_totp_secrets: >-
          {%- set secrets = {} -%}
          {%- set credential_users = openldap_credentials.users | default({}) -%}
          {%- for uname in ldap_users.keys() | list -%}
          {%-   set user_cred = credential_users[uname] | default({}) -%}
          {%-   set cred_totp = user_cred.totp_secret_raw_b64 | default('', true) -%}
          {%-   if cred_totp | length > 0 -%}
          {%-     set _ = secrets.update({uname: cred_totp}) -%}
          {%-   endif -%}
          {%- endfor -%}
          {{ secrets }}
      no_log: true

    - name: "PHASE [preflight : Assert Required Phase 12 Secrets Defined]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _openldap_user_plaintext_passwords.generalta is defined
          - _openldap_user_plaintext_passwords.generalta | length > 0
          - _openldap_user_plaintext_passwords.mailta is defined
          - _openldap_user_plaintext_passwords.mailta | length > 0
          - _openldap_user_plaintext_passwords.stu is defined
          - _openldap_user_plaintext_passwords.stu | length > 0
          - _openldap_user_totp_secrets.generalta is defined
          - _openldap_user_totp_secrets.generalta | length > 0
          - _openldap_user_totp_secrets.stu is defined
          - _openldap_user_totp_secrets.stu | length > 0
        fail_msg: >-
          Phase 12 secrets must be defined and non-empty.
          Source from openldap_credentials in host_vars/ldap-01/secrets.yml.
      no_log: true

    - name: "PHASE [preflight : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 preflight reachability and module readiness complete"

# ──────────────────────────────────────────────────────────
# Static Source Safety Gates (Phase 12)
# ──────────────────────────────────────────────────────────
- name: "Phase12 Static Source Safety Gates"
  hosts: localhost
  gather_facts: false
  become: false
  tags:
    - static
  vars:
    _p12_inventory_file: >-
      {{ inventory_file
         | default(ansible_inventory_sources | first
                   | default((playbook_dir + '/../inventory/hosts.yml'))) }}
    _p12_openldap_role_dir: "{{ playbook_dir }}/roles/openldap"
    _p12_forbidden_source_patterns:
      - pattern: '/etc/openldap/slapd\.d'
        label: 'Direct slapd.d file writes'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "/etc/openldap/slapd\.d"'
      - pattern: 'LDAPTLS_REQCERT\s*=\s*never'
        label: 'LDAPTLS_REQCERT=never (disables certificate validation)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "LDAPTLS_REQCERT"'
      - pattern: 'validate_certs\s*:\s*false'
        label: 'validate_certs: false (disables Ansible certificate validation)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "validate_certs:\s*false"'
      - pattern: '\-[Zz]{2}'
        label: 'StartTLS -ZZ flag (ldapsearch StartTLS)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "\-[Zz]\{2\}"'
      - pattern: 'ldap://[^s]'
        label: 'ldap:// scheme (non-SSL LDAP) excluding ldaps:// and ldapi://'
        grep_args: '-rn --include="*.yml" --include="*.yaml" --include="*.j2" "ldap://"'
      - pattern: ':389'
        label: 'Port 389 reference (plain LDAP)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" ":389"'
      - pattern: 'userPassword'
        label: 'Unfiltered userPassword output in failure messages'
        grep_args: >-
          -rn --include="*.yml" --include="*.yaml"
          -e 'fail_msg.*userPassword' -e 'msg.*userPassword'
      - pattern: 'no_log:\s*true'
        label: 'Secret-adjacent tasks without no_log (preflight secret checks only)'
        grep_args: '-rn --include="*.yml" --include="*.yaml" "no_log:\s*true"'
  tasks:
    - name: "PHASE [static : START]"
      ansible.builtin.debug:
        msg: "Phase 12 static source safety gates — scanning for forbidden patterns"

    - name: "PHASE [static : Scan For Forbidden Phase 12 Patterns]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          (
            cd "{{ _p12_openldap_role_dir }}" 2>/dev/null || exit 0;
            grep {{ item.grep_args }} || true
          );
          (
            cd "{{ playbook_dir }}" 2>/dev/null || exit 0;
            grep {{ item.grep_args }} openldap_phase12_verify.yml \
              | grep -v -E ':[[:space:]]*(-[[:space:]]*)?(pattern|label|grep_args|fail_msg|_p12_forbidden_source_patterns):' \
              | grep -v -E ':[[:space:]]*(-[[:space:]]*)?(name: "PHASE \[static : Assert|Matches:|Phase 12 content contains)' \
              | grep -v -E ':[[:space:]]*-e ' \
              || true
          )
        executable: /bin/bash
      changed_when: false
      register: _p12_forbidden_source_scan
      loop: "{{ _p12_forbidden_source_patterns }}"
      loop_control:
        label: "{{ item.label }}"

    - name: "PHASE [static : Assert No slapd.d File Writes In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[0].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains direct writes to /etc/openldap/slapd.d.
          OpenLDAP OLC must be managed through LDAP operations (ldapmodify/ldapadd).
          Matches:
          {{ _p12_forbidden_source_scan.results[0].stdout }}

    - name: "PHASE [static : Assert No LDAPTLS_REQCERT=never In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[1].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains LDAPTLS_REQCERT=never.
          Matches:
          {{ _p12_forbidden_source_scan.results[1].stdout }}

    - name: "PHASE [static : Assert No validate_certs: false In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[2].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains validate_certs: false.
          Matches:
          {{ _p12_forbidden_source_scan.results[2].stdout }}

    - name: "PHASE [static : Assert No StartTLS -ZZ In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[3].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains StartTLS -ZZ flag.
          Matches:
          {{ _p12_forbidden_source_scan.results[3].stdout }}

    - name: "PHASE [static : Assert No ldap:// (Non-SSL) In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[4].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains ldap:// scheme (non-SSL LDAP).
          Matches:
          {{ _p12_forbidden_source_scan.results[4].stdout }}

    - name: "PHASE [static : Assert No Port 389 In Phase 12 Content]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[5].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content contains port 389 reference.
          Matches:
          {{ _p12_forbidden_source_scan.results[5].stdout }}

    - name: "PHASE [static : Assert No userPassword Output In Failure Messages]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_forbidden_source_scan.results[6].stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 content may leak userPassword in failure messages
          or stdout output. Mark all secret-adjacent tasks no_log: true.
          Matches:
          {{ _p12_forbidden_source_scan.results[6].stdout }}

    - name: "PHASE [static : END]"
      ansible.builtin.debug:
        msg: "Phase 12 static source safety gates complete"

# ──────────────────────────────────────────────────────────
# ACL Matrix Validation: Delegation, Secrets, Self-Service
# ──────────────────────────────────────────────────────────
- name: "Phase12 ACL Matrix Validation"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - acl
    - secrets
    - self_service
  vars:
    _p12_tls_cert_path: "{{ openldap_tls_cert_path | default('/etc/openldap/certs/ldap.crt') }}"
    _p12_generalta_dn: "uid=generalta,ou=People,{{ ldap_base_dn }}"
    _p12_mailta_dn: "uid=mailta,ou=People,{{ ldap_base_dn }}"
    _p12_stu_dn: "uid=stu,ou=People,{{ ldap_base_dn }}"
    _p12_admin_dn: "cn=admin,{{ ldap_base_dn }}"
  tasks:
    - name: "PHASE [acl : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 ACL matrix — delegation, secrets, self-service"

    # ─── MDB discovery (same pattern as preflight) ───
    - name: "PHASE [acl : Discover Target MDB By Suffix]"
      ansible.builtin.command:
        cmd: |
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(&(objectClass=olcMdbConfig)(olcSuffix={{ ldap_base_dn }}))'
          dn
      changed_when: false
      failed_when: false
      register: _p12_acl_mdb_search

    - name: "PHASE [acl : Extract MDB Database DN]"
      when: _p12_acl_mdb_search.rc == 0
      ansible.builtin.set_fact:
        _p12_acl_mdb_dn: >-
          {{ _p12_acl_mdb_search.stdout_lines | default([])
             | select('match', '^dn: olcDatabase=.*mdb,cn=config')
             | list
             | first
             | default('')
             | regex_replace('^dn: ', '')
             | trim }}

    - name: "PHASE [acl : Search OLC Access Rules]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "{{ _p12_acl_mdb_dn }}" -s base '(objectClass=*)' olcAccess
      changed_when: false
      register: _p12_acl_olc_access

    # ─── ACL delegation: mailta can write non-secret user attribute ───
    - name: "PHASE [acl : Mailta Write Description On Stu Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_mailta_dn }}" -w "{{ _openldap_user_plaintext_passwords.mailta }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          replace: description
          description: ACL delegation test - mailta
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true
      register: _p12_delegate_write

    - name: "PHASE [acl : Assert Mailta Can Write Non-Secret Attribute]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_delegate_write.rc == 0
        fail_msg: >-
          Delegated admin mailta could not write description on stu entry.
          rc={{ _p12_delegate_write.rc }}, stderr={{ _p12_delegate_write.stderr | default('') }}
      no_log: true

    # ─── Cleanup: restore description with admin bind ───
    - name: "PHASE [acl : Cleanup Restore Stu Description]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_admin_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          delete: description
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true

    # ─── ACL delegation: mailta can read group entry ───
    - name: "PHASE [acl : Mailta Read TA Group Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_mailta_dn }}" -w "{{ _openldap_user_plaintext_passwords.mailta }}"
          -H {{ ldap_server_uri }}
          -b "cn=ta,ou=Group,{{ ldap_base_dn }}" -s base '(objectClass=posixGroup)'
          cn gidNumber memberUid
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      no_log: true
      register: _p12_delegate_group_read

    - name: "PHASE [acl : Assert Mailta Can Read TA Group]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_delegate_group_read.rc == 0
          - "'cn: ta' in _p12_delegate_group_read.stdout"
          - "'memberUid: generalta' in _p12_delegate_group_read.stdout"
        fail_msg: >-
          Delegated admin mailta could not read TA group entry.
      no_log: true

    # ─── SECRETS: delegated TA cannot read/search userPassword ───
    - name: "PHASE [secrets : Mailta Search For userPassword On Stu Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_mailta_dn }}" -w "{{ _openldap_user_plaintext_passwords.mailta }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_stu_dn }}" -s base '(objectClass=*)' userPassword
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      no_log: true
      register: _p12_delegate_secret_search

    - name: "PHASE [secrets : Assert Mailta Cannot Read userPassword]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_delegate_secret_search.stdout_lines | default([])
            | select('match', '^userPassword::? ') | list | length == 0
        fail_msg: >-
          Delegated admin mailta should not be able to read userPassword.
      no_log: true

    # ─── SECRETS: anonymous cannot read userPassword ───
    - name: "PHASE [secrets : Anonymous Search For userPassword On Stu Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x
          -H {{ ldap_server_uri }}
          -b "{{ _p12_stu_dn }}" -s base '(objectClass=*)' userPassword
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      register: _p12_anonymous_secret_search

    - name: "PHASE [secrets : Assert Anonymous Cannot Read userPassword]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_anonymous_secret_search.stdout_lines | default([])
            | select('match', '^userPassword::? ') | list | length == 0
        fail_msg: >-
          Anonymous bind should not be able to read userPassword.
      no_log: true

    # ─── ACL: delegated DN cannot search cn=config ───
    - name: "PHASE [acl : Mailta Search cn=config]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_mailta_dn }}" -w "{{ _openldap_user_plaintext_passwords.mailta }}"
          -H {{ ldap_server_uri }}
          -b cn=config -s base '(objectClass=*)' dn
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_cnconfig_via_generalta
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [acl : Assert Mailta Cannot Access cn=config]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_cnconfig_via_generalta.rc != 0 or 'cn=config' not in _p12_cnconfig_via_generalta.stdout
        fail_msg: >-
          Delegated admin mailta should not be able to access cn=config.
      no_log: true

    # ─── SELF-SERVICE: stu can read normal user attributes ───
    - name: "PHASE [self_service : Note Password-Only Stu Checks Are Skipped]"
      ansible.builtin.debug:
        msg: >-
          Password-only stu self-service checks are skipped because stu is TOTP-protected;
          stu authentication is validated in the TOTP bind/replay play.

    - name: "PHASE [self_service : Stu Search Own Entry]"
      when: _p12_password_only_stu_self_service_enabled | default(false) | bool
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_stu_dn }}" -w "{{ _openldap_user_plaintext_passwords.stu }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_stu_dn }}" -s base '(objectClass=*)'
          uid uidNumber gidNumber homeDirectory mail loginShell
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      no_log: true
      register: _p12_stu_self_read

    - name: "PHASE [self_service : Assert Stu Can Read Own Attributes]"
      when: _p12_password_only_stu_self_service_enabled | default(false) | bool
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_stu_self_read.rc == 0
          - "'uid: stu' in _p12_stu_self_read.stdout"
          - "'mail' in _p12_stu_self_read.stdout"
          - "'loginShell' in _p12_stu_self_read.stdout"
        fail_msg: >-
          Stu should be able to read own normal user attributes.
      no_log: true

    # ─── SELF-SERVICE: stu can modify own loginShell ───
    - name: "PHASE [self_service : Stu Modify Own loginShell]"
      when: _p12_password_only_stu_self_service_enabled | default(false) | bool
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_stu_dn }}" -w "{{ _openldap_user_plaintext_passwords.stu }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          replace: loginShell
          loginShell: /bin/sh
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true
      register: _p12_self_service_modify

    - name: "PHASE [self_service : Assert Stu Can Modify Own loginShell]"
      when: _p12_password_only_stu_self_service_enabled | default(false) | bool
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_self_service_modify.rc == 0
        fail_msg: >-
          Stu should be able to modify own loginShell.
      no_log: true

    # ─── Cleanup: restore stu loginShell via admin ───
    - name: "PHASE [self_service : Cleanup Restore Stu loginShell]"
      when: _p12_password_only_stu_self_service_enabled | default(false) | bool
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_admin_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          replace: loginShell
          loginShell: /bin/bash
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true

    # ─── SELF-SERVICE: stu cannot modify own mail ───
    - name: "PHASE [self_service : Stu Try Modify Own Mail]"
      when: _p12_password_only_stu_self_service_enabled | default(false) | bool
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_stu_dn }}" -w "{{ _openldap_user_plaintext_passwords.stu }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_stu_dn }}
          changetype: modify
          replace: mail
          mail: hacked@evil.com
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_stu_mail_modify

    - name: "PHASE [self_service : Assert Stu Cannot Modify Own Mail]"
      when: _p12_password_only_stu_self_service_enabled | default(false) | bool
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_stu_mail_modify.rc != 0
        fail_msg: >-
          Stu should NOT be able to modify own mail attribute.
      no_log: true

    # ─── SELF-SERVICE: stu cannot modify another user attribute ───
    - name: "PHASE [self_service : Stu Try Modify Mailta loginShell]"
      when: _p12_password_only_stu_self_service_enabled | default(false) | bool
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_stu_dn }}" -w "{{ _openldap_user_plaintext_passwords.stu }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_mailta_dn }}
          changetype: modify
          replace: loginShell
          loginShell: /bin/sh
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_stu_other_modify

    - name: "PHASE [self_service : Assert Stu Cannot Modify Another User Mailta]"
      when: _p12_password_only_stu_self_service_enabled | default(false) | bool
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_stu_other_modify.rc != 0
        fail_msg: >-
          Stu should NOT be able to modify mailta loginShell.
      no_log: true

    - name: "PHASE [acl : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 ACL matrix validation complete"

# ──────────────────────────────────────────────────────────
# PPolicy Validation: Ordinary User Password Policy Behavior
# ──────────────────────────────────────────────────────────
- name: "Phase12 PPolicy Validation"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - ppolicy
  vars:
    _p12_tls_cert_path: "{{ openldap_tls_cert_path | default('/etc/openldap/certs/ldap.crt') }}"
    _p12_mailta_dn: "uid=mailta,ou=People,{{ ldap_base_dn }}"
    _p12_admin_dn: "cn=admin,{{ ldap_base_dn }}"
    _p12_ppolicy_temp_pass: ""
    _p12_ppolicy_short_pass: "short"
    _p12_ppolicy_lc_digit_pass: "lowercase1"
    _p12_ppolicy_current_pass: "{{ _openldap_user_plaintext_passwords.mailta }}"
  tasks:
    - name: "PHASE [ppolicy : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 ppolicy validation — ordinary mailta password-change behavior"

    - name: "PHASE [ppolicy : Generate Unique Temporary Password]"
      ansible.builtin.set_fact:
        _p12_ppolicy_temp_pass: "Phase12-Temp{{ 999999999999 | random }}aA!"
      changed_when: false
      no_log: true

    # ─── Verify mailta can bind with current password ───
    - name: "PHASE [ppolicy : Bind As Mailta To Verify Connectivity]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_mailta_dn }}" -w "{{ _p12_ppolicy_current_pass }}"
          -H {{ ldap_server_uri }}
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      no_log: true
      register: _p12_ppolicy_mailta_bind

    - name: "PHASE [ppolicy : Assert Mailta Can Bind With Current Password]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_mailta_bind.rc == 0
        fail_msg: >-
          Mailta could not bind with current password.
          rc={{ _p12_ppolicy_mailta_bind.rc }}
      no_log: true

    # ─── Negative: password shorter than 8 characters ───
    - name: "PHASE [ppolicy : Attempt Short Password Change]"
      ansible.builtin.command:
        cmd: >-
          ldappasswd -x -D "{{ _p12_mailta_dn }}" -w "{{ _p12_ppolicy_current_pass }}"
          -H {{ ldap_server_uri }}
          -s "{{ _p12_ppolicy_short_pass }}"
          "{{ _p12_mailta_dn }}"
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_ppolicy_short_result

    - name: "PHASE [ppolicy : Assert Short Password Rejected]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_short_result.rc != 0
        fail_msg: >-
          Short password should have been rejected by ppolicy pwdMinLength: 8.
          rc={{ _p12_ppolicy_short_result.rc }}
      no_log: true

    # ─── Negative: password with only lowercase+digit classes (2 points < 3) ───
    - name: "PHASE [ppolicy : Attempt Missing Character Classes Password Change]"
      ansible.builtin.command:
        cmd: >-
          ldappasswd -x -D "{{ _p12_mailta_dn }}" -w "{{ _p12_ppolicy_current_pass }}"
          -H {{ ldap_server_uri }}
          -s "{{ _p12_ppolicy_lc_digit_pass }}"
          "{{ _p12_mailta_dn }}"
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_ppolicy_missing_classes_result

    - name: "PHASE [ppolicy : Assert Missing Character Classes Password Rejected]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_missing_classes_result.rc != 0
        fail_msg: >-
          Password with only lowercase+digit classes should have been rejected
          by check_password.so (minPoints 3, only 2 classes).
          rc={{ _p12_ppolicy_missing_classes_result.rc }}
      no_log: true

    # ─── Positive: valid password with all character classes ───
    - name: "PHASE [ppolicy : Set Valid Temporary Password]"
      ansible.builtin.command:
        cmd: >-
          ldappasswd -x -D "{{ _p12_mailta_dn }}" -w "{{ _p12_ppolicy_current_pass }}"
          -H {{ ldap_server_uri }}
          -s "{{ _p12_ppolicy_temp_pass }}"
          "{{ _p12_mailta_dn }}"
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true
      register: _p12_ppolicy_valid_pass_result

    - name: "PHASE [ppolicy : Assert Valid Temporary Password Set]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_valid_pass_result.rc == 0
        fail_msg: >-
          Valid temporary password should have been accepted.
          rc={{ _p12_ppolicy_valid_pass_result.rc }}
      no_log: true

    # ─── Negative: immediate reuse of previous password ───
    - name: "PHASE [ppolicy : Attempt Immediate Password Reuse]"
      ansible.builtin.command:
        cmd: >-
          ldappasswd -x -D "{{ _p12_mailta_dn }}" -w "{{ _p12_ppolicy_temp_pass }}"
          -H {{ ldap_server_uri }}
          -s "{{ _p12_ppolicy_current_pass }}"
          "{{ _p12_mailta_dn }}"
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_ppolicy_reuse_result

    - name: "PHASE [ppolicy : Assert Password Reuse Rejected]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_reuse_result.rc != 0
        fail_msg: >-
          Password reuse should have been rejected by ppolicy pwdInHistory: 1.
          rc={{ _p12_ppolicy_reuse_result.rc }}
      no_log: true

    # ─── Cleanup: reset mailta password to original hash via admin bind ───
    - name: "PHASE [ppolicy : Cleanup Reset Mailta Password To Original Hash]"
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "{{ _p12_admin_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
        stdin: |
          dn: {{ _p12_mailta_dn }}
          changetype: modify
          replace: userPassword
          userPassword: {{ _openldap_user_password_hashes.mailta }}
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: true
      no_log: true
      register: _p12_ppolicy_cleanup_result

    - name: "PHASE [ppolicy : Assert Mailta Password Cleanup Succeeded]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_ppolicy_cleanup_result.rc == 0
        fail_msg: >-
          Cleanup failed — could not reset mailta password to original hash.
          rc={{ _p12_ppolicy_cleanup_result.rc }}
      no_log: true

    - name: "PHASE [ppolicy : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 ppolicy validation complete"

# ──────────────────────────────────────────────────────────
# TOTP Configuration, Bind, Replay, And SSH Key Validation
# ──────────────────────────────────────────────────────────
- name: "Phase12 TOTP Bind Replay And SSH Key Validation"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - totp
    - totp_config
    - totp_bind
    - ssh_public_key
  vars:
    _p12_tls_cert_path: "{{ openldap_tls_cert_path | default('/etc/openldap/certs/ldap.crt') }}"
    _p12_totp_params_dn: "{{ openldap_totp_params_dn | default('cn=totp-default,ou=Ppolicy,' ~ ldap_base_dn) }}"
    _p12_totp_generalta_dn: "uid=generalta,ou=People,{{ ldap_base_dn }}"
    _p12_totp_stu_dn: "uid=stu,ou=People,{{ ldap_base_dn }}"
    _p12_totp_mailta_dn: "uid=mailta,ou=People,{{ ldap_base_dn }}"
    _p12_totp_admin_dn: "cn=admin,{{ ldap_base_dn }}"
    _p12_totp_wrong_code: "999999"
    _p12_totp_python_script: |
      import base64, hmac, hashlib, struct, time, sys
      secret_b64 = sys.argv[1]
      offset = int(sys.argv[2]) if len(sys.argv) > 2 else 0
      raw_key = base64.b64decode(secret_b64)
      counter = int(time.time() / 60) + offset
      counter_bytes = struct.pack('>Q', counter)
      h = hmac.new(raw_key, counter_bytes, hashlib.sha1).digest()
      offset_byte = h[-1] & 0x0F
      code = struct.unpack('>I', h[offset_byte:offset_byte+4])[0] & 0x7FFFFFFF
      print('%06d' % (code % 1000000))
    _p12_totp_wait_script: |
      import time
      remaining = 60 - (time.time() % 60)
      print(int(remaining + 2))
    _p12_totp_safe_wait_script: |
      import time
      remaining = 60 - (time.time() % 60)
      print(int(remaining + 2) if remaining < 10 else 0)
  tasks:
    # ─── TOTP config: overlay, params, user OATH links ───
    - name: "PHASE [totp_config : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 TOTP config verification — overlay, params, user OATH links"

    - name: "PHASE [totp_config : Discover Target MDB By Suffix]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(&(objectClass=olcMdbConfig)(olcSuffix={{ ldap_base_dn }}))'
          dn
      changed_when: false
      failed_when: false
      register: _p12_totp_mdb_search

    - name: "PHASE [totp_config : Extract MDB Database DN]"
      when: _p12_totp_mdb_search.rc == 0
      ansible.builtin.set_fact:
        _p12_totp_mdb_dn: >-
          {{ _p12_totp_mdb_search.stdout_lines | default([])
             | select('match', '^dn: olcDatabase=.*mdb,cn=config')
             | list
             | first
             | default('')
             | regex_replace('^dn: ', '')
             | trim }}

    - name: "PHASE [totp_config : Search OTP Overlay On Target MDB]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "{{ _p12_totp_mdb_dn }}" -s one
          '(objectClass=olcOverlayConfig)' dn olcOverlay
      changed_when: false
      register: _p12_totp_overlay_verify

    - name: "PHASE [totp_config : Assert OTP Overlay Present]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_overlay_verify.rc == 0
          - "'otp' in _p12_totp_overlay_verify.stdout"
          - >-
            _p12_totp_overlay_verify.stdout_lines | default([])
            | select('match', '^dn: olcOverlay=.*otp,') | list | length == 1
        fail_msg: >-
          OTP overlay missing from target MDB or duplicated.
          stdout={{ _p12_totp_overlay_verify.stdout | default('') }}

    - name: "PHASE [totp_config : Search TOTP Params Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_params_dn }}" -s base
          '(objectClass=*)' oathOTPLength oathTOTPTimeStepPeriod oathHMACAlgorithm
      changed_when: false
      register: _p12_totp_params_verify
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_config : Assert TOTP Params Correct]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_params_verify.rc == 0
          - "'oathOTPLength: 6' in _p12_totp_params_verify.stdout"
          - "'oathTOTPTimeStepPeriod: 60' in _p12_totp_params_verify.stdout"
          - "'oathHMACAlgorithm: 1.2.840.113549.2.7' in _p12_totp_params_verify.stdout"
        fail_msg: >-
          TOTP params entry missing or incorrect.
          stdout={{ _p12_totp_params_verify.stdout | default('') }}
      no_log: true

    - name: "PHASE [totp_config : Search Generalta For OATH Attributes]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_generalta_dn }}" -s base
          '(objectClass=posixAccount)' objectClass oathTOTPToken
      changed_when: false
      register: _p12_totp_user_generalta
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_config : Assert Generalta Has oathTOTPUser And oathTOTPToken]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_user_generalta.rc == 0
          - >-
            _p12_totp_user_generalta.stdout_lines | default([])
            | select('match', '^objectClass: oathTOTPUser$') | list | length > 0
          - >-
            _p12_totp_user_generalta.stdout_lines | default([])
            | select('match', '^oathTOTPToken: ') | list | length > 0
          - >-
            _p12_totp_user_generalta.stdout_lines | default([])
            | select('match', '^oathTOTPToken: cn=totp-generalta,') | list | length > 0
        fail_msg: >-
          Generalta missing OATH user/token link.
          stdout={{ _p12_totp_user_generalta.stdout | default('') }}
      no_log: true

    - name: "PHASE [totp_config : Search Stu For OATH Attributes]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_stu_dn }}" -s base
          '(objectClass=posixAccount)' objectClass oathTOTPToken
      changed_when: false
      register: _p12_totp_user_stu
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_config : Assert Stu Has oathTOTPUser And oathTOTPToken]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_user_stu.rc == 0
          - >-
            _p12_totp_user_stu.stdout_lines | default([])
            | select('match', '^objectClass: oathTOTPUser$') | list | length > 0
          - >-
            _p12_totp_user_stu.stdout_lines | default([])
            | select('match', '^oathTOTPToken: ') | list | length > 0
          - >-
            _p12_totp_user_stu.stdout_lines | default([])
            | select('match', '^oathTOTPToken: cn=totp-stu,') | list | length > 0
        fail_msg: >-
          Stu missing OATH user/token link.
          stdout={{ _p12_totp_user_stu.stdout | default('') }}
      no_log: true

    - name: "PHASE [totp_config : Search Mailta For OATH Attributes]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_mailta_dn }}" -s base
          '(objectClass=posixAccount)' objectClass oathTOTPToken
      changed_when: false
      register: _p12_totp_user_mailta
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_config : Assert Mailta Has No OATH Attributes]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_user_mailta.rc == 0
          - >-
            _p12_totp_user_mailta.stdout_lines | default([])
            | select('match', '^objectClass: oathTOTPUser$') | list | length == 0
          - >-
            _p12_totp_user_mailta.stdout_lines | default([])
            | select('match', '^oathTOTPToken: ') | list | length == 0
        fail_msg: >-
          Mailta should NOT have OATH attributes (password-only).
          stdout={{ _p12_totp_user_mailta.stdout | default('') }}
      no_log: true

    - name: "PHASE [totp_config : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 TOTP config verification complete"

    # ─── TOTP bind: password-only, wrong code, current code, replay, next step ───
    - name: "PHASE [totp_bind : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 TOTP bind/replay validation — generalta and stu"

    - name: "PHASE [totp_bind : Compute Wait Seconds To Fresh Time Step]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_wait_script }}"
      changed_when: false
      no_log: true
      register: _p12_totp_initial_wait_seconds

    - name: "PHASE [totp_bind : Set Fresh Time Step Wait Fact]"
      ansible.builtin.set_fact:
        _p12_totp_initial_wait_val: "{{ _p12_totp_initial_wait_seconds.stdout | trim | int }}"
      no_log: true

    - name: "PHASE [totp_bind : Wait For Fresh TOTP Time Step]"
      when: _p12_totp_initial_wait_val | int > 0
      ansible.builtin.wait_for:
        timeout: "{{ _p12_totp_initial_wait_val | int }}"
      changed_when: false

    # ─── generalta: password-only → fail ───
    - name: "PHASE [totp_bind : Generalta Password-Only Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_generalta_dn }}" -w "{{ _openldap_user_plaintext_passwords.generalta }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_password_only_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Password-Only Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_password_only_result.rc != 0
        fail_msg: >-
          Generalta password-only bind should fail — TOTP code required.
          rc={{ _p12_totp_password_only_result.rc }}
      no_log: true

    # ─── generalta: password + wrong code → fail ───
    - name: "PHASE [totp_bind : Generalta Password Plus Wrong Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_generalta_dn }}"
          -w "{{ _openldap_user_plaintext_passwords.generalta }}{{ _p12_totp_wrong_code }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_wrong_code_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Wrong Code Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_wrong_code_result.rc != 0
        fail_msg: >-
          Generalta bind with wrong TOTP code should fail.
          rc={{ _p12_totp_wrong_code_result.rc }}
      no_log: true

    - name: "PHASE [totp_bind : Compute Safe Wait Before Generalta Current Code]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_safe_wait_script }}"
      changed_when: false
      no_log: true
      register: _p12_totp_current_safe_wait

    - name: "PHASE [totp_bind : Set Generalta Current Safe Wait Fact]"
      ansible.builtin.set_fact:
        _p12_totp_current_safe_wait_val: "{{ _p12_totp_current_safe_wait.stdout | trim | int }}"
      no_log: true

    - name: "PHASE [totp_bind : Wait For Safe Generalta Current TOTP Window]"
      when: _p12_totp_current_safe_wait_val | int > 0
      ansible.builtin.wait_for:
        timeout: "{{ _p12_totp_current_safe_wait_val | int }}"
      changed_when: false

    - name: "PHASE [totp_bind : Generate Current TOTP Code For Generalta]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_python_script }}" "{{ _openldap_user_totp_secrets.generalta }}" 0
      changed_when: false
      no_log: true
      register: _p12_totp_current_code

    - name: "PHASE [totp_bind : Set Current TOTP Code Fact]"
      ansible.builtin.set_fact:
        _p12_totp_current_code_val: "{{ _p12_totp_current_code.stdout | trim }}"
      no_log: true

    # ─── generalta: password + current code → succeed ───
    - name: "PHASE [totp_bind : Generalta Password Plus Current Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_generalta_dn }}"
          -w "{{ _openldap_user_plaintext_passwords.generalta }}{{ _p12_totp_current_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      no_log: true
      register: _p12_totp_correct_code_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Current Code Bind Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_correct_code_result.rc == 0
        fail_msg: >-
          Generalta bind with password + current TOTP code should succeed.
          rc={{ _p12_totp_correct_code_result.rc }}
      no_log: true

    # ─── generalta: immediate replay → fail ───
    - name: "PHASE [totp_bind : Generalta Immediate Replay Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_generalta_dn }}"
          -w "{{ _openldap_user_plaintext_passwords.generalta }}{{ _p12_totp_current_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_replay_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Replay Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_replay_result.rc != 0
        fail_msg: >-
          Generalta immediate replay with same TOTP code should fail.
          rc={{ _p12_totp_replay_result.rc }}
      no_log: true

    # ─── Wait for next time step + generate next code ───
    - name: "PHASE [totp_bind : Compute Wait Seconds To Next Time Step]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_wait_script }}"
      changed_when: false
      no_log: true
      register: _p12_totp_wait_seconds

    - name: "PHASE [totp_bind : Set Wait Seconds Fact]"
      ansible.builtin.set_fact:
        _p12_totp_wait_val: "{{ _p12_totp_wait_seconds.stdout | trim | int }}"
      no_log: true

    - name: "PHASE [totp_bind : Wait For Next TOTP Time Step]"
      when: _p12_totp_wait_val | int > 0
      ansible.builtin.wait_for:
        timeout: "{{ _p12_totp_wait_val | int }}"
      changed_when: false

    - name: "PHASE [totp_bind : Generate Next-Step TOTP Code For Generalta]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_python_script }}" "{{ _openldap_user_totp_secrets.generalta }}" 0
      changed_when: false
      no_log: true
      register: _p12_totp_next_code

    - name: "PHASE [totp_bind : Set Next-Step TOTP Code Fact]"
      ansible.builtin.set_fact:
        _p12_totp_next_code_val: "{{ _p12_totp_next_code.stdout | trim }}"
      no_log: true

    # ─── generalta: next-step code → succeed ───
    - name: "PHASE [totp_bind : Generalta Next-Step Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_generalta_dn }}"
          -w "{{ _openldap_user_plaintext_passwords.generalta }}{{ _p12_totp_next_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      no_log: true
      register: _p12_totp_next_step_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Next-Step Code Bind Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_next_step_result.rc == 0
        fail_msg: >-
          Generalta next-step TOTP code bind should succeed.
          rc={{ _p12_totp_next_step_result.rc }}
      no_log: true

    # ─── stu: same flow (password-only fail, wrong code fail, current success, replay fail) ───
    - name: "PHASE [totp_bind : Stu Password-Only Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_stu_dn }}" -w "{{ _openldap_user_plaintext_passwords.stu }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_stu_password_only
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Stu Password-Only Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_stu_password_only.rc != 0
        fail_msg: >-
          Stu password-only bind should fail — TOTP code required.
      no_log: true

    - name: "PHASE [totp_bind : Stu Password Plus Wrong Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_stu_dn }}"
          -w "{{ _openldap_user_plaintext_passwords.stu }}{{ _p12_totp_wrong_code }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_stu_wrong_code
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Stu Wrong Code Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_stu_wrong_code.rc != 0
        fail_msg: >-
          Stu bind with wrong TOTP code should fail.
      no_log: true

    - name: "PHASE [totp_bind : Compute Safe Wait Before Stu Current Code]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_safe_wait_script }}"
      changed_when: false
      no_log: true
      register: _p12_totp_stu_current_safe_wait

    - name: "PHASE [totp_bind : Set Stu Current Safe Wait Fact]"
      ansible.builtin.set_fact:
        _p12_totp_stu_current_safe_wait_val: "{{ _p12_totp_stu_current_safe_wait.stdout | trim | int }}"
      no_log: true

    - name: "PHASE [totp_bind : Wait For Safe Stu Current TOTP Window]"
      when: _p12_totp_stu_current_safe_wait_val | int > 0
      ansible.builtin.wait_for:
        timeout: "{{ _p12_totp_stu_current_safe_wait_val | int }}"
      changed_when: false

    - name: "PHASE [totp_bind : Generate Current TOTP Code For Stu]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_totp_python_script }}" "{{ _openldap_user_totp_secrets.stu }}" 0
      changed_when: false
      no_log: true
      register: _p12_totp_stu_current_code

    - name: "PHASE [totp_bind : Set Stu Current TOTP Code Fact]"
      ansible.builtin.set_fact:
        _p12_totp_stu_current_code_val: "{{ _p12_totp_stu_current_code.stdout | trim }}"
      no_log: true

    - name: "PHASE [totp_bind : Stu Password Plus Current Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_stu_dn }}"
          -w "{{ _openldap_user_plaintext_passwords.stu }}{{ _p12_totp_stu_current_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      no_log: true
      register: _p12_totp_stu_correct
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Stu Current Code Bind Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_stu_correct.rc == 0
        fail_msg: >-
          Stu bind with password + current TOTP code should succeed.
      no_log: true

    - name: "PHASE [totp_bind : Stu Immediate Replay Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_stu_dn }}"
          -w "{{ _openldap_user_plaintext_passwords.stu }}{{ _p12_totp_stu_current_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      failed_when: false
      no_log: true
      register: _p12_totp_stu_replay
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Stu Replay Bind Fails]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_stu_replay.rc != 0
        fail_msg: >-
          Stu immediate replay with same TOTP code should fail.
      no_log: true

    # ─── mailta: password-only bind → succeed ───
    - name: "PHASE [totp_bind : Mailta Password-Only Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_totp_mailta_dn }}" -w "{{ _openldap_user_plaintext_passwords.mailta }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      no_log: true
      register: _p12_totp_mailta_bind_result
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [totp_bind : Assert Mailta Password-Only Bind Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_totp_mailta_bind_result.rc == 0
        fail_msg: >-
          Mailta password-only bind should succeed (no TOTP required).
          rc={{ _p12_totp_mailta_bind_result.rc }}
      no_log: true

    - name: "PHASE [totp_bind : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 TOTP bind/replay validation complete"

    # ─── SSH public key: assert readable for generalta and stu ───
    - name: "PHASE [ssh_public_key : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 SSH public key read verification"

    - name: "PHASE [ssh_public_key : Read Generalta sshPublicKey Via LDAPS]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_generalta_dn }}" -s base
          '(objectClass=*)' sshPublicKey
      changed_when: false
      register: _p12_sshkey_generalta
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [ssh_public_key : Assert Generalta sshPublicKey Readable]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_sshkey_generalta.rc == 0
          - "'sshPublicKey' in _p12_sshkey_generalta.stdout"
          - "'ssh-ed25519' in _p12_sshkey_generalta.stdout"
        fail_msg: >-
          Generalta sshPublicKey not readable via LDAPS.
      no_log: true

    - name: "PHASE [ssh_public_key : Read Stu sshPublicKey Via LDAPS]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "{{ _p12_totp_admin_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_stu_dn }}" -s base
          '(objectClass=*)' sshPublicKey
      changed_when: false
      register: _p12_sshkey_stu
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [ssh_public_key : Assert Stu sshPublicKey Readable]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_sshkey_stu.rc == 0
          - "'sshPublicKey' in _p12_sshkey_stu.stdout"
          - "'ssh-ed25519' in _p12_sshkey_stu.stdout"
        fail_msg: >-
          Stu sshPublicKey not readable via LDAPS.
      no_log: true

    - name: "PHASE [ssh_public_key : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 SSH public key read verification complete"

# ──────────────────────────────────────────────────────────
# Fortune Schema, Data, Sort, And Pagination Validation
# ──────────────────────────────────────────────────────────
- name: "Phase12 Fortune Schema Data Sort And Pagination Validation"
  hosts: ldap-01
  gather_facts: false
  become: true
  tags:
    - fortune
    - schema
    - data
    - sssvlv
  vars:
    _p12_tls_cert_path: "{{ openldap_tls_cert_path | default('/etc/openldap/certs/ldap.crt') }}"
    _p12_fortune_sample_ids:
      - "1"
      - "45"
      - "106"
      - "231"
      - "300"
    _p12_fortune_base: "ou=Fortune,{{ ldap_base_dn }}"
    _p12_fortune_yaml_path: "{{ playbook_dir }}/roles/openldap/files/fortunes.yml"
  tasks:
    - name: "PHASE [fortune : START]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 Fortune validation — schema, data, server-side sort and paging"

    # ─── Load fortunes.yml to compute expected row count ───
    - name: "PHASE [fortune : Read Fortune YAML Source]"
      ansible.builtin.set_fact:
        _p12_fortune_yaml_data: "{{ lookup('ansible.builtin.file', _p12_fortune_yaml_path) | from_yaml }}"
      changed_when: false

    - name: "PHASE [fortune : Set Expected Fortune Row Count]"
      ansible.builtin.set_fact:
        _p12_fortune_yaml_count: "{{ _p12_fortune_yaml_data | length }}"

    # ─── Schema: verify fortune schema in cn=config ───
    - name: "PHASE [schema : Search Fortune Schema In cn=config]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -o ldif-wrap=no
          -b cn=schema,cn=config
          '(&(objectClass=olcSchemaConfig)(cn=*fortune))'
          cn olcAttributeTypes olcObjectClasses
      changed_when: false
      register: _p12_fortune_schema_search

    - name: "PHASE [schema : Assert Fortune Schema OID Root And Author Matching Rules]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_fortune_schema_search.rc == 0
          - "'2.25.109749598841848522681210166878566339431' in _p12_fortune_schema_search.stdout"
          - "'caseIgnoreMatch' in _p12_fortune_schema_search.stdout"
          - "'caseIgnoreOrderingMatch' in _p12_fortune_schema_search.stdout"
          - "'caseIgnoreSubstringsMatch' in _p12_fortune_schema_search.stdout"
          - _p12_fortune_schema_search.stdout is search("NAME 'author'")
        fail_msg: >-
          Fortune schema missing UUID OID root or author case-insensitive matching rules.
          stdout={{ _p12_fortune_schema_search.stdout | default('') }}

    - name: "PHASE [schema : Assert Fortune Schema Integer id And SUP top And description]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_fortune_schema_search.rc == 0
          - "'integerMatch' in _p12_fortune_schema_search.stdout"
          - "'integerOrderingMatch' in _p12_fortune_schema_search.stdout"
          - _p12_fortune_schema_search.stdout is search("NAME 'id'")
          - "'SUP top' in _p12_fortune_schema_search.stdout"
          - "'description' in _p12_fortune_schema_search.stdout"
        fail_msg: >-
          Fortune schema missing integer id matching rules, SUP top, or description.
          stdout={{ _p12_fortune_schema_search.stdout | default('') }}

    # ─── Data: search all Fortune entries and compare count ───
    - name: "PHASE [data : Search All Fortune Entries In ou=Fortune]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_fortune_base }}" '(objectClass=fortune)' dn
      changed_when: false
      no_log: true
      register: _p12_fortune_data_search
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [data : Extract LDAP Fortune Entry Count]"
      ansible.builtin.set_fact:
        _p12_fortune_ldap_count: >-
          {{ _p12_fortune_data_search.stdout_lines | default([])
             | select('match', '^dn: cn=fortune-')
             | list
             | length }}

    - name: "PHASE [data : Assert Fortune LDAP Count Matches YAML Source]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_fortune_data_search.rc == 0
          - _p12_fortune_ldap_count | int == _p12_fortune_yaml_count | int
        fail_msg: >-
          Fortune LDAP entry count ({{ _p12_fortune_ldap_count }}) does not
          match YAML source count ({{ _p12_fortune_yaml_count }}).
      no_log: true

    # ─── Data: assert sample DNs and attributes for IDs 1, 45, 106, 231, 300 ───
    - name: "PHASE [data : Search Sample Fortune Entries By DN]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -o ldif-wrap=no
          -b "cn=fortune-{{ item }},{{ _p12_fortune_base }}" -s base
          '(objectClass=fortune)' cn id author description
      changed_when: false
      no_log: true
      register: _p12_fortune_sample_results
      loop: "{{ _p12_fortune_sample_ids }}"
      loop_control:
        label: "id={{ item }}"
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [data : Assert Sample Fortune Entry DN Found]"
      ansible.builtin.assert:
        quiet: true
        that:
          - item.rc == 0
          - "'cn: fortune-' ~ item.item in item.stdout"
          - "'id: ' ~ item.item in item.stdout"
          - >-
            item.stdout_lines | default([])
            | select('match', '^author::? ') | list | length > 0
          - >-
            item.stdout_lines | default([])
            | select('match', '^description::? ') | list | length > 0
        fail_msg: >-
          Fortune sample entry id={{ item.item }} missing or has wrong attributes.
          stdout={{ item.stdout | default('') }}
      loop: "{{ _p12_fortune_sample_results.results }}"
      loop_control:
        label: "id={{ item.item }}"
      no_log: true

    # ─── Data: case-insensitive author substring search ───
    - name: "PHASE [data : Search Fortune Entries By Author Feynman Substring Case Insensitive]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_fortune_base }}" '(author=*feynman*)' dn
      changed_when: false
      no_log: true
      register: _p12_fortune_feynman_search
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [data : Assert Author Substring Search Case Insensitive Finds Feynman]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_fortune_feynman_search.rc == 0
          - "'cn=fortune-' in _p12_fortune_feynman_search.stdout"
        fail_msg: >-
          Author substring search for 'feynman' (case-insensitive) returned no results.
      no_log: true

    # ─── sssvlv: discover MDB and search overlay ───
    - name: "PHASE [sssvlv : Discover Target MDB By Suffix]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(&(objectClass=olcMdbConfig)(olcSuffix={{ ldap_base_dn }}))'
          dn
      changed_when: false
      failed_when: false
      register: _p12_sssvlv_mdb_search

    - name: "PHASE [sssvlv : Extract MDB Database DN]"
      when: _p12_sssvlv_mdb_search.rc == 0
      ansible.builtin.set_fact:
        _p12_sssvlv_mdb_dn: >-
          {{ _p12_sssvlv_mdb_search.stdout_lines | default([])
             | select('match', '^dn: olcDatabase=.*mdb,cn=config')
             | list
             | first
             | default('')
             | regex_replace('^dn: ', '')
             | trim }}

    - name: "PHASE [sssvlv : Search sssvlv Overlay On Target MDB]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "{{ _p12_sssvlv_mdb_dn }}" -s one
          '(objectClass=olcSssVlvConfig)'
          dn olcSssVlvMax olcSssVlvMaxKeys olcSssVlvMaxPerConn
      changed_when: false
      register: _p12_sssvlv_overlay_verify

    - name: "PHASE [sssvlv : Assert sssvlv Overlay Present With Conservative Limits]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_sssvlv_overlay_verify.rc == 0
          - "'olcSssVlvMax' in _p12_sssvlv_overlay_verify.stdout"
          - "'olcSssVlvMaxKeys' in _p12_sssvlv_overlay_verify.stdout"
          - "'olcSssVlvMaxPerConn' in _p12_sssvlv_overlay_verify.stdout"
        fail_msg: >-
          sssvlv overlay missing limit attributes on target MDB.
          stdout={{ _p12_sssvlv_overlay_verify.stdout | default('') }}

    # ─── sssvlv: server-side sort by author with paged results ───
    - name: "PHASE [sssvlv : Run Server-Side Sort And Paged-Result ldapsearch]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -H {{ ldap_server_uri }}
          -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _openldap_admin_password }}"
          -b "{{ _p12_fortune_base }}"
          -E sss=author
          -E pr=10/noprompt
          '(objectClass=fortune)' cn id author description
      changed_when: false
      no_log: true
      register: _p12_fortune_sort_page_search
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [sssvlv : Assert Server-Side Sort And Paged Results Succeed]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_fortune_sort_page_search.rc == 0
          - "'cn=fortune-' in _p12_fortune_sort_page_search.stdout"
          - "'author::' in _p12_fortune_sort_page_search.stdout"
        fail_msg: >-
          Server-side sort and paged result search failed against ou=Fortune.
          rc={{ _p12_fortune_sort_page_search.rc }},
          stderr={{ _p12_fortune_sort_page_search.stderr | default('') }}
      no_log: true

    - name: "PHASE [fortune : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 Fortune schema, data, and sssvlv validation complete"

# ──────────────────────────────────────────────────────────
# Idempotency Check: Second Convergence Proof
# ──────────────────────────────────────────────────────────
- name: "Phase12 Idempotency Check"
  hosts: localhost
  gather_facts: false
  become: false
  tags:
    - idempotency
  vars:
    _p12_inventory_file: >-
      {{ inventory_file
         | default(ansible_inventory_sources | first
                   | default((playbook_dir + '/../inventory/hosts.yml'))) }}
  tasks:
    - name: "PHASE [idempotency : START]"
      ansible.builtin.debug:
        msg: "Phase 12 idempotency: re-run ldap_configure.yml limited to ldap-01"

    - name: "PHASE [idempotency : Run ldap_configure.yml Second Time]"
      ansible.builtin.command:
        argv:
          - ansible-playbook
          - -i
          - "{{ _p12_inventory_file }}"
          - "{{ playbook_dir }}/ldap_configure.yml"
          - --limit
          - ldap-01
          - -e
          - >-
            {{ {
              'openldap_enabled': true,
              'ansible_user': ansible_user | default('student'),
              'ansible_ssh_common_args': ansible_ssh_common_args | default('')
            } | to_json }}
      changed_when: false
      register: _p12_idempotency_rerun

    - name: "PHASE [idempotency : Assert No Changes Failures Or Unreachable On Rerun]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'unreachable=0' in _p12_idempotency_rerun.stdout"
          - "'failed=0' in _p12_idempotency_rerun.stdout"
          - "'changed=0' in _p12_idempotency_rerun.stdout"
        fail_msg: >-
          Second ldap_configure.yml run reported unreachable, failed, or changed tasks.
          stdout={{ _p12_idempotency_rerun.stdout | default('') }}

    - name: "PHASE [idempotency : END]"
      ansible.builtin.debug:
        msg: "Phase 12 idempotency check complete"

# ──────────────────────────────────────────────────────────
# Reboot Persistence Check: Post-Reboot Phase 12 State Proof
# ──────────────────────────────────────────────────────────
- name: "Phase12 Reboot Persistence Check"
  hosts: ldap-01
  gather_facts: false
  become: true
  serial: 1
  tags:
    - reboot
  vars:
    _p12_tls_cert_path: "{{ openldap_tls_cert_path | default('/etc/openldap/certs/ldap.crt') }}"
    _p12_totp_params_dn: "{{ openldap_totp_params_dn | default('cn=totp-default,ou=Ppolicy,' ~ ldap_base_dn) }}"
    _p12_reboot_generalta_dn: "uid=generalta,ou=People,{{ ldap_base_dn }}"
    _p12_reboot_stu_dn: "uid=stu,ou=People,{{ ldap_base_dn }}"
    _p12_reboot_fortune_base: "ou=Fortune,{{ ldap_base_dn }}"
    _p12_reboot_totp_script: |
      import base64, hmac, hashlib, struct, time, sys
      secret_b64 = sys.argv[1]
      raw_key = base64.b64decode(secret_b64)
      counter = int(time.time() / 60)
      counter_bytes = struct.pack('>Q', counter)
      h = hmac.new(raw_key, counter_bytes, hashlib.sha1).digest()
      offset_byte = h[-1] & 0x0F
      code = struct.unpack('>I', h[offset_byte:offset_byte+4])[0] & 0x7FFFFFFF
      print('%06d' % (code % 1000000))
  tasks:
    - name: "PHASE [reboot : START]"
      become: false
      ansible.builtin.debug:
        msg: >-
          Phase 12 reboot persistence check — reboot, then re-assert
          LDAPS, ACL, ppolicy, TOTP, Fortune, and sssvlv state

    - name: "PHASE [reboot : Reboot ldap-01 And Wait For Return]"
      ansible.builtin.reboot:
        reboot_timeout: 300
        pre_reboot_delay: 5
        post_reboot_delay: 15

    # ─── Post-reboot: LDAPS base search ───
    - name: "PHASE [reboot : Post-Reboot LDAPS Search Base DN With Certificate Validation]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -H {{ ldap_server_uri }}
          -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _openldap_admin_password }}"
          -b "{{ ldap_base_dn }}" -s base '(objectClass=*)' dn
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
      changed_when: false
      no_log: true
      register: _p12_reboot_ldaps_search

    - name: "PHASE [reboot : Assert Post-Reboot LDAPS Search Works]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_ldaps_search.rc == 0
          - ldap_base_dn in _p12_reboot_ldaps_search.stdout
        fail_msg: >-
          Post-reboot LDAPS search failed.
          rc={{ _p12_reboot_ldaps_search.rc }},
          stdout={{ _p12_reboot_ldaps_search.stdout | default('') }}
      no_log: true

    # ─── Post-reboot: Ordered ACLs ───
    - name: "PHASE [reboot : Post-Reboot Search OLC Access Rules]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(&(objectClass=olcMdbConfig)(olcSuffix={{ ldap_base_dn }}))'
          dn olcAccess
      changed_when: false
      register: _p12_reboot_acl_search

    - name: "PHASE [reboot : Assert Post-Reboot Ordered ACLs Intact]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_acl_search.rc == 0
          - "'olcAccess: {0}' in _p12_reboot_acl_search.stdout"
          - "'userPassword' in _p12_reboot_acl_search.stdout"
          - "'oathSecret' in _p12_reboot_acl_search.stdout"
        fail_msg: >-
          Post-reboot ordered ACLs missing.
          stdout={{ _p12_reboot_acl_search.stdout | default('') }}

    # ─── Post-reboot: ppolicy overlay and default policy ───
    - name: "PHASE [reboot : Post-Reboot Discover Target MDB By Suffix]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b cn=config
          '(&(objectClass=olcMdbConfig)(olcSuffix={{ ldap_base_dn }}))'
          dn
      changed_when: false
      failed_when: false
      register: _p12_reboot_mdb_search

    - name: "PHASE [reboot : Extract MDB Database DN]"
      when: _p12_reboot_mdb_search.rc == 0
      ansible.builtin.set_fact:
        _p12_reboot_mdb_dn: >-
          {{ _p12_reboot_mdb_search.stdout_lines | default([])
             | select('match', '^dn: olcDatabase=.*mdb,cn=config')
             | list
             | first
             | default('')
             | regex_replace('^dn: ', '')
             | trim }}

    - name: "PHASE [reboot : Post-Reboot Search PPolicy Overlay]"
      when: _p12_reboot_mdb_dn | default('') | length > 0
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "{{ _p12_reboot_mdb_dn }}" -s one
          '(objectClass=olcPPolicyConfig)'
          dn olcPPolicyDefault olcPPolicyCheckModule olcPPolicyHashCleartext
      changed_when: false
      register: _p12_reboot_ppolicy_search

    - name: "PHASE [reboot : Assert Post-Reboot PPolicy Overlay Intact]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_ppolicy_search.rc == 0
          - "'olcPPolicyDefault' in _p12_reboot_ppolicy_search.stdout"
          - "'olcPPolicyCheckModule' in _p12_reboot_ppolicy_search.stdout"
          - "'olcPPolicyHashCleartext' in _p12_reboot_ppolicy_search.stdout"
        fail_msg: >-
          Post-reboot ppolicy overlay missing.
          stdout={{ _p12_reboot_ppolicy_search.stdout | default('') }}

    - name: "PHASE [reboot : Post-Reboot Search Default PPolicy Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "cn=default,ou=Ppolicy,{{ ldap_base_dn }}" -s base
          '(objectClass=*)' pwdCheckQuality pwdMinLength pwdInHistory pwdUseCheckModule
      changed_when: false
      no_log: true
      register: _p12_reboot_ppolicy_entry
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [reboot : Assert Post-Reboot Default PPolicy Entry Intact]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_ppolicy_entry.rc == 0
          - "'pwdCheckQuality: 2' in _p12_reboot_ppolicy_entry.stdout"
          - "'pwdMinLength: 8' in _p12_reboot_ppolicy_entry.stdout"
          - "'pwdInHistory: 1' in _p12_reboot_ppolicy_entry.stdout"
          - "'pwdUseCheckModule: TRUE' in _p12_reboot_ppolicy_entry.stdout"
        fail_msg: >-
          Post-reboot default ppolicy entry missing or incorrect.
      no_log: true

    # ─── Post-reboot: OTP overlay, TOTP params, and user OATH links ───
    - name: "PHASE [reboot : Post-Reboot Search OTP Overlay]"
      when: _p12_reboot_mdb_dn | default('') | length > 0
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "{{ _p12_reboot_mdb_dn }}" -s one
          '(objectClass=olcOverlayConfig)' dn olcOverlay
      changed_when: false
      register: _p12_reboot_otp_overlay

    - name: "PHASE [reboot : Assert Post-Reboot OTP Overlay Intact]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_otp_overlay.rc == 0
          - "'otp' in _p12_reboot_otp_overlay.stdout"
          - >-
            _p12_reboot_otp_overlay.stdout_lines | default([])
            | select('match', '^dn: olcOverlay=.*otp,') | list | length == 1
        fail_msg: >-
          Post-reboot OTP overlay missing or duplicated.
          stdout={{ _p12_reboot_otp_overlay.stdout | default('') }}

    - name: "PHASE [reboot : Post-Reboot Search TOTP Params Entry]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_totp_params_dn }}" -s base
          '(objectClass=*)' oathOTPLength oathTOTPTimeStepPeriod oathHMACAlgorithm
      changed_when: false
      no_log: true
      register: _p12_reboot_totp_params
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [reboot : Assert Post-Reboot TOTP Params Intact]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_totp_params.rc == 0
          - "'oathOTPLength: 6' in _p12_reboot_totp_params.stdout"
          - "'oathTOTPTimeStepPeriod: 60' in _p12_reboot_totp_params.stdout"
        fail_msg: >-
          Post-reboot TOTP params missing or incorrect.
      no_log: true

    - name: "PHASE [reboot : Post-Reboot Search Generalta OATH Attributes]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_reboot_generalta_dn }}" -s base
          '(objectClass=posixAccount)' objectClass oathTOTPToken
      changed_when: false
      no_log: true
      register: _p12_reboot_generalta_oath
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [reboot : Assert Post-Reboot Generalta OATH Links Intact]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_generalta_oath.rc == 0
          - >-
            _p12_reboot_generalta_oath.stdout_lines | default([])
            | select('match', '^objectClass: oathTOTPUser$') | list | length > 0
          - >-
            _p12_reboot_generalta_oath.stdout_lines | default([])
            | select('match', '^oathTOTPToken: ') | list | length > 0
        fail_msg: >-
          Post-reboot generalta OATH links missing.
      no_log: true

    # ─── Post-reboot: TOTP password+code bind for generalta ───
    - name: "PHASE [reboot : Post-Reboot Generate TOTP Code For Generalta]"
      ansible.builtin.command:
        cmd: >-
          python3 -c "{{ _p12_reboot_totp_script }}" "{{ _openldap_user_totp_secrets.generalta }}"
      changed_when: false
      no_log: true
      register: _p12_reboot_totp_code

    - name: "PHASE [reboot : Set Post-Reboot TOTP Code Fact]"
      ansible.builtin.set_fact:
        _p12_reboot_totp_code_val: "{{ _p12_reboot_totp_code.stdout | trim }}"
      no_log: true

    - name: "PHASE [reboot : Post-Reboot Generalta Password Plus TOTP Code Bind]"
      ansible.builtin.command:
        cmd: >-
          ldapwhoami -x -D "{{ _p12_reboot_generalta_dn }}"
          -w "{{ _openldap_user_plaintext_passwords.generalta }}{{ _p12_reboot_totp_code_val }}"
          -H {{ ldap_server_uri }}
      changed_when: false
      no_log: true
      register: _p12_reboot_totp_bind
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [reboot : Assert Post-Reboot TOTP Bind Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_totp_bind.rc == 0
        fail_msg: >-
          Post-reboot generalta password+TOTP code bind failed.
          rc={{ _p12_reboot_totp_bind.rc }}
      no_log: true

    # ─── Post-reboot: Fortune entries ───
    - name: "PHASE [reboot : Post-Reboot Search Fortune Entries]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _openldap_admin_password }}"
          -H {{ ldap_server_uri }}
          -b "{{ _p12_reboot_fortune_base }}" '(objectClass=fortune)' dn
      changed_when: false
      no_log: true
      register: _p12_reboot_fortune_search
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [reboot : Assert Post-Reboot Fortune Entries Intact]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_fortune_search.rc == 0
          - "'cn=fortune-' in _p12_reboot_fortune_search.stdout"
        fail_msg: >-
          Post-reboot Fortune entries missing from ou=Fortune.
      no_log: true

    # ─── Post-reboot: sssvlv overlay and server-side sort/page ───
    - name: "PHASE [reboot : Post-Reboot Search sssvlv Overlay]"
      when: _p12_reboot_mdb_dn | default('') | length > 0
      ansible.builtin.command:
        cmd: >-
          ldapsearch -Y EXTERNAL -H ldapi:///
          -b "{{ _p12_reboot_mdb_dn }}" -s one
          '(objectClass=olcSssVlvConfig)'
          dn olcSssVlvMax olcSssVlvMaxKeys olcSssVlvMaxPerConn
      changed_when: false
      register: _p12_reboot_sssvlv_overlay

    - name: "PHASE [reboot : Assert Post-Reboot sssvlv Overlay Intact]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_sssvlv_overlay.rc == 0
          - "'olcSssVlvMax' in _p12_reboot_sssvlv_overlay.stdout"
          - "'olcSssVlvMaxKeys' in _p12_reboot_sssvlv_overlay.stdout"
          - "'olcSssVlvMaxPerConn' in _p12_reboot_sssvlv_overlay.stdout"
        fail_msg: >-
          Post-reboot sssvlv overlay missing.
          stdout={{ _p12_reboot_sssvlv_overlay.stdout | default('') }}

    - name: "PHASE [reboot : Post-Reboot Server-Side Sort And Paged Results Search]"
      ansible.builtin.command:
        cmd: >-
          ldapsearch -H {{ ldap_server_uri }}
          -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _openldap_admin_password }}"
          -b "{{ _p12_reboot_fortune_base }}"
          -E sss=author
          -E pr=10/noprompt
          '(objectClass=fortune)' cn id author description
      changed_when: false
      no_log: true
      register: _p12_reboot_sssvlv_search
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

    - name: "PHASE [reboot : Assert Post-Reboot Sort And Page Search Succeeds]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_reboot_sssvlv_search.rc == 0
          - "'cn=fortune-' in _p12_reboot_sssvlv_search.stdout"
          - "'author::' in _p12_reboot_sssvlv_search.stdout"
        fail_msg: >-
          Post-reboot server-side sort and paged results failed.
          rc={{ _p12_reboot_sssvlv_search.rc }}
      no_log: true

    - name: "PHASE [reboot : END]"
      become: false
      ansible.builtin.debug:
        msg: "Phase 12 reboot persistence check complete"

# ──────────────────────────────────────────────────────────
# Full Matrix Secret Safety Gates: Phase 12 File Leak Scan
# ──────────────────────────────────────────────────────────
#
# Canonical full-suite command:
#   ANSIBLE_CONFIG=ansible/ansible.cfg ansible-lint ansible/playbooks ansible/inventory
#   && ANSIBLE_CONFIG=ansible/ansible.cfg ansible-playbook -i ansible/inventory/hosts.yml
#      ansible/playbooks/openldap_phase12_verify.yml
- name: "Phase12 Full Matrix Secret Safety Gates"
  hosts: localhost
  gather_facts: false
  become: false
  tags:
    - secret_safety
    - full_matrix
  vars:
    _p12_openldap_role_dir: "{{ playbook_dir }}/roles/openldap"
    _p12_secret_var_names:
      - openldap_credentials
      - _openldap_admin_password
      - _openldap_admin_password_hash
      - _openldap_bind_password
      - _openldap_bind_password_hash
      - _openldap_user_password_hashes
      - _openldap_user_plaintext_passwords
      - _openldap_user_totp_secrets
    _p12_secret_attr_names:
      - userPassword
      - oathSecret
      - oathTOTPLastTimeStep
      - oathTOTPTimeStepDrift
  tasks:
    - name: "PHASE [secret_safety : START]"
      ansible.builtin.debug:
        msg: >-
          Phase 12 secret safety gates — scanning Phase 12 task files and verifier
          for missing no_log, secret-adjacent message leakage, and canonical
          full-suite command documentation

    # ─── Scan 1: Tasks referencing secret vars without no_log ───
    - name: "PHASE [secret_safety : Scan For Secret Variable References Without no_log]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          for f in tasks/acls.yml tasks/ppolicy.yml tasks/totp.yml tasks/totp_token.yml tasks/fortune.yml tasks/fortune_entry.yml; do
            [ -f "{{ _p12_openldap_role_dir }}/$f" ] || continue;
            grep -n -e 'openldap_credentials'
                     -e '_openldap_admin_password' -e '_openldap_admin_password_hash'
                     -e '_openldap_bind_password' -e '_openldap_bind_password_hash'
                     -e '_openldap_user_password_hashes' -e '_openldap_user_plaintext_passwords'
                     -e '_openldap_user_totp_secrets'
                     "{{ _p12_openldap_role_dir }}/$f" | grep -v '^[[:space:]]*#' || true;
          done
        executable: /bin/bash
      changed_when: false
      register: _p12_safety_secret_refs

    - name: "PHASE [secret_safety : Scan For no_log In Secret-Adjacent Tasks]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          for f in tasks/acls.yml tasks/ppolicy.yml tasks/totp.yml tasks/totp_token.yml tasks/fortune.yml tasks/fortune_entry.yml; do
            [ -f "{{ _p12_openldap_role_dir }}/$f" ] || continue;
            grep -n 'no_log:\s*true' "{{ _p12_openldap_role_dir }}/$f" || true;
          done
        executable: /bin/bash
      changed_when: false
      register: _p12_safety_nolog_lines

    - name: "PHASE [secret_safety : Cross-Reference Secret Tasks Without no_log]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          for f in tasks/acls.yml tasks/ppolicy.yml tasks/totp.yml tasks/totp_token.yml tasks/fortune.yml tasks/fortune_entry.yml; do
            [ -f "{{ _p12_openldap_role_dir }}/$f" ] || continue;
            python3 -c "
          import re, sys
          text = open('{{ _p12_openldap_role_dir }}/$f').read()
          blocks = re.split(r'^- name:', text, flags=re.MULTILINE)
          for block in blocks:
            if any(s in block for s in ['openldap_credentials',
                    '_openldap_admin_password', '_openldap_admin_password_hash',
                    '_openldap_bind_password', '_openldap_bind_password_hash',
                    '_openldap_user_password_hashes', '_openldap_user_plaintext_passwords',
                    '_openldap_user_totp_secrets']):
              if 'no_log: true' not in block:
                print(f'$f: task missing no_log: {block[:80].strip()!r}')
          " || true;
          done
        executable: /bin/bash
      changed_when: false
      register: _p12_safety_missing_nolog

    - name: "PHASE [secret_safety : Assert All Secret Tasks Have no_log]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_safety_missing_nolog.stdout | trim | length == 0
        fail_msg: >-
          Tasks referencing secret variables without no_log: true:
          {{ _p12_safety_missing_nolog.stdout }}

    # ─── Scan 2: fail_msg or msg patterns that could leak secrets ───
    - name: "PHASE [secret_safety : Scan For Secret Output In fail_msg And msg Patterns]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          (
            cd "{{ _p12_openldap_role_dir }}" 2>/dev/null;
            grep -rn --include="*.yml" --include="*.yaml"
              -e 'fail_msg.*userPassword' -e 'msg.*userPassword'
              -e 'fail_msg.*oathSecret' -e 'msg.*oathSecret'
              -e 'fail_msg.*openldap_credentials' -e 'msg.*openldap_credentials'
              -e 'fail_msg.*_openldap_admin_password' -e 'msg.*_openldap_admin_password'
              -e 'fail_msg.*_openldap_user_password_hashes' -e 'msg.*_openldap_user_password_hashes'
              -e 'fail_msg.*_openldap_user_plaintext_passwords' -e 'msg.*_openldap_user_plaintext_passwords'
              -e 'fail_msg.*_openldap_user_totp_secrets' -e 'msg.*_openldap_user_totp_secrets'
              -e 'fail_msg.*_openldap_bind_password' -e 'msg.*_openldap_bind_password'
              . || true
          );
          (
            cd "{{ playbook_dir }}" 2>/dev/null;
            grep -rn --include="openldap_phase12_verify.yml"
              -e 'fail_msg.*userPassword' -e 'msg.*userPassword'
              -e 'fail_msg.*oathSecret' -e 'msg.*oathSecret'
              -e 'fail_msg.*openldap_credentials' -e 'msg.*openldap_credentials'
              -e 'fail_msg.*_openldap_admin_password' -e 'msg.*_openldap_admin_password'
              -e 'fail_msg.*_openldap_user_password_hashes' -e 'msg.*_openldap_user_password_hashes'
              -e 'fail_msg.*_openldap_user_plaintext_passwords' -e 'msg.*_openldap_user_plaintext_passwords'
              -e 'fail_msg.*_openldap_user_totp_secrets' -e 'msg.*_openldap_user_totp_secrets'
              -e 'fail_msg.*_openldap_bind_password' -e 'msg.*_openldap_bind_password'
              openldap_phase12_verify.yml || true
          )
        executable: /bin/bash
      changed_when: false
      register: _p12_safety_fail_msg_scan

    - name: "PHASE [secret_safety : Assert No Secret Value Leakage In fail_msg Or Messages]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_safety_fail_msg_scan.stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 files contain secret variable names in fail_msg or debug
          messages that could leak values at runtime.
          Matches (comment lines filtered):
          {{ _p12_safety_fail_msg_scan.stdout
             | regex_replace('^\s*#.*$', '', multiline=true) }}

    # ─── Scan 3: LDAP stdout interpolation of secret attributes ───
    - name: "PHASE [secret_safety : Scan For LDAP Secret Attribute Output Interpolation]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          (
            cd "{{ playbook_dir }}" 2>/dev/null;
            grep -rn --include="openldap_phase12_verify.yml"
              -e '_p12.*\.stdout' -e '_openldap.*\.stdout'
              -e '\.stdout_lines'
              openldap_phase12_verify.yml || true
          )
        executable: /bin/bash
      changed_when: false
      register: _p12_safety_stdout_scan

    - name: "PHASE [secret_safety : Assert Stdout References Use no_log Protection]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _p12_safety_stdout_scan.rc == 0 or _p12_safety_stdout_scan.rc == 1
        fail_msg: >-
          Phase 12 verifier stdout scan error.
          rc={{ _p12_safety_stdout_scan.rc }}
      # Note: stdout references that use no_log: true ARE safe.
      # This scan documents all stdout references for auditability;
      # individual assertions in preceding tagged plays gate the
      # actual secret-adjacent tasks.

    # ─── Scan 4: Six-digit OTP code patterns in uncommented messages ───
    - name: "PHASE [secret_safety : Scan For Generated OTP Code Patterns In Messages]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          (
            cd "{{ _p12_openldap_role_dir }}" 2>/dev/null;
            grep -rn --include="*.yml" --include="*.yaml"
              -E '\b[0-9]{6}\b'
              tasks/totp.yml tasks/totp_token.yml || true
          ) | grep -v '^[[:space:]]*#' || true
        executable: /bin/bash
      changed_when: false
      register: _p12_safety_otp_code_scan
      failed_when: false

    - name: "PHASE [secret_safety : Assert No Hardcoded OTP Code Patterns In Task Files]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_safety_otp_code_scan.stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length == 0
        fail_msg: >-
          Phase 12 TOTP task files contain hardcoded 6-digit patterns that
          could be OTP seed artifacts (comment lines already filtered).
          Matches:
          {{ _p12_safety_otp_code_scan.stdout
             | regex_replace('^\s*#.*$', '', multiline=true) }}

    # ─── Scan 5: Verify all Phase 12 task files have no missing no_log ───
    - name: "PHASE [secret_safety : Collect All no_log References Across Phase 12 Tasks]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          for f in tasks/acls.yml tasks/ppolicy.yml tasks/totp.yml tasks/totp_token.yml tasks/fortune.yml tasks/fortune_entry.yml; do
            [ -f "{{ _p12_openldap_role_dir }}/$f" ] || continue;
            echo "=== $f ===";
            grep -c 'no_log:\s*true' "{{ _p12_openldap_role_dir }}/$f" || echo "0";
          done
        executable: /bin/bash
      changed_when: false
      register: _p12_safety_nolog_counts

    - name: "PHASE [secret_safety : Assert Secret-Adjacent Task Files Have no_log Coverage]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_safety_nolog_counts.stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length > 0
        fail_msg: >-
          No no_log references found in Phase 12 task files.
          All secret-adjacent tasks must use no_log: true.

    # ─── Scan 6: Verify verifier playbook itself has no secret leaks ───
    - name: "PHASE [secret_safety : Scan Verifier For Non-Comment Secret Adjacent Code]"
      ansible.builtin.shell:
        cmd: >-
          set -o pipefail;
          grep -n \
            -e 'openldap_credentials' \
            -e '_openldap_admin_password' \
            -e '_openldap_admin_password_hash' \
            -e '_openldap_bind_password' \
            -e '_openldap_bind_password_hash' \
            -e '_openldap_user_password_hashes' \
            -e '_openldap_user_plaintext_passwords' \
            -e '_openldap_user_totp_secrets' \
            "{{ playbook_dir }}/openldap_phase12_verify.yml" \
            | grep -v '^[[:space:]]*#' \
            | grep -v '^\s*$' \
            || true
        executable: /bin/bash
      changed_when: false
      register: _p12_safety_verifier_secret_refs

    - name: "PHASE [secret_safety : Assert Verifier Secret References All Under no_log]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            _p12_safety_verifier_secret_refs.stdout
            | regex_replace('^\s*#.*$', '', multiline=true)
            | trim | length > 0
        fail_msg: >-
          No secret variable references found in Phase 12 verifier.
          This is unexpected — verifier tasks should reference secrets
          for LDAP binds, all protected by no_log: true.

    # ─── Full matrix command documentation ───
    - name: "PHASE [full_matrix : Document Canonical Full-Suite Command]"
      ansible.builtin.debug:
        msg:
          - "Canonical Phase 12 full-suite verification command:"
          - "  ANSIBLE_CONFIG=ansible/ansible.cfg ansible-lint ansible/playbooks ansible/inventory"
          - "  && ANSIBLE_CONFIG=ansible/ansible.cfg ansible-playbook -i ansible/inventory/hosts.yml"
          - "     ansible/playbooks/openldap_phase12_verify.yml"
          - ""
          - "Tags available: preflight, static, acl, secrets, self_service,"
          - "  ppolicy, totp, totp_config, totp_bind, ssh_public_key,"
          - "  fortune, schema, data, sssvlv, idempotency, reboot,"
          - "  secret_safety, full_matrix"

    - name: "PHASE [secret_safety : END]"
      ansible.builtin.debug:
        msg: "Phase 12 full matrix secret safety gates complete"
