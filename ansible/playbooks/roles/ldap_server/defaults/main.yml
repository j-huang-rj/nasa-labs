---
# Feature flag
openldap_enabled: false

# Package and service defaults
openldap_epel_package: epel-release
openldap_packages:
  - openldap-servers
  - openldap-clients
  - openssl
  - ca-certificates
openldap_service_name: slapd

# Module paths
openldap_module_dir: /usr/lib64/openldap
openldap_required_modules:
  - load: ppolicy.la
    path: /usr/lib64/openldap/ppolicy.la
  - load: otp.la
    path: /usr/lib64/openldap/otp.la
  - load: sssvlv.la
    path: /usr/lib64/openldap/sssvlv.la

# Filesystem paths
openldap_tls_cert_dir: /etc/openldap/certs
openldap_tls_key_dir: /etc/openldap/private
openldap_tls_cert_path: "{{ openldap_tls_cert_dir }}/ldap.crt"
openldap_tls_key_path: "{{ openldap_tls_key_dir }}/ldap.key"
openldap_data_dir: /var/lib/ldap

# OLC / database identity
openldap_database_suffix: "{{ ldap_base_dn }}"
openldap_root_dn: "cn=admin,{{ ldap_base_dn }}"
openldap_olc_database_dn: olcDatabase={1}mdb,cn=config

# Schema defaults
openldap_schema_files:
  - name: cosine
    path: /etc/openldap/schema/cosine.ldif
  - name: inetorgperson
    path: /etc/openldap/schema/inetorgperson.ldif
  - name: nis
    path: /etc/openldap/schema/nis.ldif

openldap_custom_schema_templates:
  - name: sudo
    description: Sudo LDAP schema
  - name: openssh-lpk
    description: OpenSSH LDAP public key schema
  - name: fortune
    description: Fortune custom objectClass schema

openldap_fortune_schema_oid_root: "2.25.109749598841848522681210166878566339431"

# ACLs
openldap_acl_secret_attrs:
  - userPassword
  - oathSecret
  - oathTOTPLastTimeStep
  - oathTOTPTimeStepDrift

openldap_acl_delegate_dns:
  - "uid=generalta,ou=People,{{ ldap_base_dn }}"
  - "uid=mailta,ou=People,{{ ldap_base_dn }}"

# ppolicy
openldap_ppolicy_default_dn: "cn=default,ou=Ppolicy,{{ ldap_base_dn }}"
openldap_ppolicy_check_module: /usr/lib64/openldap/check_password.so
openldap_ppolicy_hash_cleartext: true
openldap_ppolicy_check_quality: 2
openldap_ppolicy_min_length: 8
openldap_ppolicy_in_history: 1
openldap_ppolicy_use_check_module: true

openldap_check_password_min_points: 3
openldap_check_password_min_upper: 0
openldap_check_password_min_lower: 0
openldap_check_password_min_digit: 0
openldap_check_password_min_punct: 0

# TOTP
openldap_totp_params_dn: "cn=totp,ou=Ppolicy,{{ ldap_base_dn }}"
openldap_totp_length: 6
openldap_totp_time_step: 60
openldap_totp_hmac_algorithm: "1.2.840.113549.2.7"

# Fortune / sssvlv
openldap_fortune_base_dn: "ou=Fortune,{{ ldap_base_dn }}"
openldap_sssvlv_max: 500
openldap_sssvlv_max_keys: 50
openldap_sssvlv_max_per_conn: 10

# sudoRole
openldap_sudo_roles:
  ta:
    cn: ta
    sudoUser: "%ta"
    sudoHost:
      - ALL
    sudoCommand:
      - ALL
    sudoRunAsUser: ALL
    sudoRunAsGroup: ALL
    sudoOption:
      - "!authenticate"

  stu:
    cn: stu
    sudoUser: "%stu"
    sudoHost:
      - workstation-01
      - "workstation1.{{ ldap_domain }}"
    sudoCommand:
      - "/usr/bin/ls"
    sudoRunAsUser: ALL
    sudoRunAsGroup: ALL
    sudoOption:
      - "!authenticate"

# Canonical credential bundle
openldap_credentials: {}

# Secrets
openldap_tls_private_key: ""
openldap_tls_certificate: ""
