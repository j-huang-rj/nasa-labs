---
- name: "PHASE [assert : START]"
  become: false
  ansible.builtin.debug:
    msg: "Validate ldap_server role variables"

- name: "PHASE [assert : Check ldap_server_enabled Is True]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - ldap_server_enabled | bool
      - inventory_hostname in groups['ldap_servers']
    fail_msg: "ldap_server role must run only on hosts in ldap_servers with ldap_server_enabled=true"

- name: "PHASE [assert : Check Required LDAP Identity Variables Are Defined]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - ldap_domain is defined
      - ldap_domain | length > 0
      - ldap_base_dn is defined
      - ldap_base_dn | length > 0
      - ldap_server_fqdn is defined
      - ldap_server_fqdn | length > 0
      - ldap_server_uri is defined
      - ldap_server_uri | length > 0
    fail_msg: "Required LDAP identity variables must be defined and non-empty"

# ─────────────────────────────────────────────────────────────────────────
# Check Required LDAP Data Model
# ─────────────────────────────────────────────────────────────────────────
- name: "PHASE [assert : Check Required LDAP Data Model]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      # Organizational Units must contain exactly the five required containers
      - ldap_ous | select('equalto', 'People') | list | length == 1
      - ldap_ous | select('equalto', 'Group') | list | length == 1
      - ldap_ous | select('equalto', 'Ppolicy') | list | length == 1
      - ldap_ous | select('equalto', 'SUDOers') | list | length == 1
      - ldap_ous | select('equalto', 'Fortune') | list | length == 1

      # ta group: GID 10000 with members generalta and mailta
      - ldap_groups.ta.gid | default(-1) == 10000
      - "'generalta' in (ldap_groups.ta.member_uids | default([]))"
      - "'mailta' in (ldap_groups.ta.member_uids | default([]))"

      # stu group: GID 20000 with member stu
      - ldap_groups.stu.gid | default(-1) == 20000
      - "'stu' in (ldap_groups.stu.member_uids | default([]))"

      # generalta: exact uid_number, gid_number, home, groups, ssh_public_key, password_hash_key
      - ldap_users.generalta.uid_number | default(-1) == 10000
      - ldap_users.generalta.gid_number | default(-1) == 10000
      - ldap_users.generalta.home | default('') == lab_home_root ~ '/ta/generalta'
      - "'ta' in (ldap_users.generalta.groups | default([]))"
      - ldap_users.generalta.ssh_public_key is defined
      - ldap_users.generalta.password_hash_key is defined
      - ldap_users.generalta.totp_required | default(false) == true

      # mailta: exact uid_number, gid_number, home, groups, ssh_public_key, password_hash_key
      - ldap_users.mailta.uid_number | default(-1) == 10001
      - ldap_users.mailta.gid_number | default(-1) == 10000
      - ldap_users.mailta.home | default('') == lab_home_root ~ '/ta/mailta'
      - "'ta' in (ldap_users.mailta.groups | default([]))"
      - ldap_users.mailta.ssh_public_key is defined
      - ldap_users.mailta.password_hash_key is defined
      - ldap_users.mailta.totp_required | default(true) == false

      # stu: exact uid_number, gid_number, home, groups, ssh_public_key, password_hash_key
      - ldap_users.stu.uid_number | default(-1) == 20000
      - ldap_users.stu.gid_number | default(-1) == 20000
      - ldap_users.stu.home | default('') == lab_home_root ~ '/stu/stu'
      - "'stu' in (ldap_users.stu.groups | default([]))"
      - ldap_users.stu.ssh_public_key is defined
      - ldap_users.stu.password_hash_key is defined
      - ldap_users.stu.totp_required | default(false) == true

    fail_msg: >-
      Required LDAP Data Model is incomplete or incorrect.
      ldap_ous must contain People, Group, Ppolicy, SUDOers, Fortune.
      ldap_groups.ta must have gid 10000 with members generalta and mailta.
      ldap_groups.stu must have gid 20000 with member stu.
      ldap_users must contain generalta (UID 10000), mailta (UID 10001), stu (UID 20000)
      with correct homes, groups, ssh_public_key, and password_hash_key.

# ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# Normalize credentials to internal facts from canonical ldap_server_credentials
# ──────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────────
- name: "PHASE [assert : Normalize Admin Password]"
  become: false
  ansible.builtin.set_fact:
    _ldap_server_admin_password: >-
      {{ (ldap_server_credentials.directory_manager | default({})).password_plaintext
         | default('', true) }}
    _ldap_server_admin_password_hash: >-
      {{ (ldap_server_credentials.directory_manager | default({})).password_hash
         | default('', true) }}
  no_log: true

- name: "PHASE [assert : Normalize Bind Password]"
  become: false
  ansible.builtin.set_fact:
    _ldap_server_bind_password: >-
      {{ (ldap_server_credentials.service_bind | default({})).password_plaintext
         | default('', true) }}
    _ldap_server_bind_password_hash: >-
      {{ (ldap_server_credentials.service_bind | default({})).password_hash
         | default('', true) }}
  no_log: true

- name: "PHASE [assert : Normalize User Password Hashes]"
  become: false
  ansible.builtin.set_fact:
    _ldap_server_user_password_hashes: >-
      {%- set hashes = {} -%}
      {%- set credential_users = ldap_server_credentials.users | default({}) -%}
      {%- for uname, udata in ldap_users.items() -%}
      {%-   set hash_key = udata.password_hash_key | default(uname) -%}
      {%-   set user_cred = credential_users[uname] | default({}) -%}
      {%-   set _ = hashes.update({hash_key:
            user_cred.password_hash | default('', true) }) -%}
      {%- endfor -%}
      {{ hashes }}
    _ldap_server_user_plaintext_passwords: >-
      {%- set plains = {} -%}
      {%- set credential_users = ldap_server_credentials.users | default({}) -%}
      {%- for uname in ldap_users.keys() | list -%}
      {%-   set user_cred = credential_users[uname] | default({}) -%}
      {%-   set _ = plains.update({uname:
            user_cred.password_plaintext | default('', true) }) -%}
      {%- endfor -%}
      {{ plains }}
    _ldap_server_user_totp_secrets: >-
      {%- set secrets = {} -%}
      {%- set credential_users = ldap_server_credentials.users | default({}) -%}
      {%- for uname in ldap_users.keys() | list -%}
      {%-   set user_cred = credential_users[uname] | default({}) -%}
      {%-   set cred_totp = user_cred.totp_secret_raw_b64 | default('', true) -%}
      {%-   if cred_totp | length > 0 -%}
      {%-     set _ = secrets.update({uname: cred_totp}) -%}
      {%-   endif -%}
      {%- endfor -%}
      {{ secrets }}
  no_log: true

- name: "PHASE [assert : Check Required OpenLDAP Admin Secret Shapes]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - _ldap_server_admin_password is defined
      - _ldap_server_admin_password | length > 0
      - _ldap_server_admin_password_hash is defined
      - _ldap_server_admin_password_hash | length > 0
    fail_msg: >-
      Required OpenLDAP admin secrets are missing.
      _ldap_server_admin_password and _ldap_server_admin_password_hash must be defined and non-empty.
  no_log: true

- name: "PHASE [assert : Check Required OpenLDAP User Password Hash Shapes]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - _ldap_server_user_password_hashes is defined
      - _ldap_server_user_password_hashes is mapping
      - item | length > 0
      - >-
        item is match('\{(SSHA512|SSHA256|SSHA|SHA|CRYPT|ARGON2)\}')
    fail_msg: >-
      User password hash for {{ _p12_user.key }} is missing or does not begin
      with an LDAP password hash marker: {SSHA}, {SSHA512}, {SSHA256}, {SHA}, {CRYPT}, {ARGON2}.
  loop: "{{ ldap_users | dict2items }}"
  loop_control:
    loop_var: _p12_user
    label: "{{ _p12_user.key }}"
  no_log: true
  vars:
    item: "{{ _ldap_server_user_password_hashes[_p12_user.value.password_hash_key] | default('') }}"

- name: "PHASE [assert : Check Required OpenLDAP User Plaintext Password Shapes]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - _ldap_server_user_plaintext_passwords is defined
      - _ldap_server_user_plaintext_passwords is mapping
      - "_ldap_server_user_plaintext_passwords.keys() | list | sort == ldap_users.keys() | list | sort"
      - item | length > 0
    fail_msg: >-
      Plaintext password for user {{ _p12_ptuser.key }} is missing or empty.
  loop: "{{ ldap_users | dict2items }}"
  loop_control:
    loop_var: _p12_ptuser
    label: "{{ _p12_ptuser.key }}"
  no_log: true
  vars:
    item: "{{ _ldap_server_user_plaintext_passwords[_p12_ptuser.key] | default('') }}"

- name: "PHASE [assert : Check Required OpenLDAP User TOTP Secret Shapes]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - _ldap_server_user_totp_secrets is defined
      - _ldap_server_user_totp_secrets is mapping
      - item | length > 0
    fail_msg: >-
      TOTP secret for user {{ _p12_totp_user.key }} (totp_required) is missing or empty.
  loop: "{{ ldap_users | dict2items | selectattr('value.totp_required', 'equalto', true) }}"
  loop_control:
    loop_var: _p12_totp_user
    label: "{{ _p12_totp_user.key }}"
  no_log: true
  vars:
    item: "{{ _ldap_server_user_totp_secrets[_p12_totp_user.key] | default('') }}"

# ───────────────────────────────────────────────────────────────────────────────
# Check Optional TLS Secret Pair Shape
# ───────────────────────────────────────────────────────────────────────────────
- name: "PHASE [assert : Check Optional TLS Secret Pair Shape]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - ldap_server_tls_private_key is defined
      - ldap_server_tls_certificate is defined
      - ldap_server_tls_private_key | length > 0 or ldap_server_tls_certificate | length == 0
      - ldap_server_tls_certificate | length > 0 or ldap_server_tls_private_key | length == 0
    fail_msg: >-
      Incomplete TLS secret shape: ldap_server_tls_private_key and ldap_server_tls_certificate
      must both be non-empty when supplied from secrets, or both be empty so
      tls.yml can generate a self-signed key/cert.
      Providing only one of the two values is not allowed.

# ───────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# Check Required Module And Schema Defaults
# ───────────────────────────────────────────────────────────────────────────────────────────────────────────────────
- name: "PHASE [assert : Check Required Module And Schema Defaults]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      # Required modules list must be non-empty
      - ldap_server_required_modules is defined
      - ldap_server_required_modules | length > 0

      # Schema files list must be non-empty
      - ldap_server_schema_files is defined
      - ldap_server_schema_files | length > 0
    fail_msg: >-
      Required module and schema defaults must be non-empty.
      ldap_server_required_modules must list ppolicy, otp, sssvlv entries.
      ldap_server_schema_files must list required schema LDIF paths.

# ───────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# Check Required Secret Shapes
# ───────────────────────────────────────────────────────────────────────────────────────────────────────────────────
- name: "PHASE [assert : Check Required Secret Shapes]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      # TA plaintext password for non-root validation binds
      - _ldap_server_user_plaintext_passwords.generalta is defined
      - _ldap_server_user_plaintext_passwords.generalta | length > 0
      - _ldap_server_user_plaintext_passwords.mailta is defined
      - _ldap_server_user_plaintext_passwords.mailta | length > 0
      - _ldap_server_user_plaintext_passwords.stu is defined
      - _ldap_server_user_plaintext_passwords.stu | length > 0

      # TOTP secrets (raw bytes, base64-encoded) for generalta and stu
      - _ldap_server_user_totp_secrets.generalta is defined
      - _ldap_server_user_totp_secrets.generalta | length > 0
      - _ldap_server_user_totp_secrets.stu is defined
      - _ldap_server_user_totp_secrets.stu | length > 0
    fail_msg: >-
      Required secret shapes are missing or empty.
      _ldap_server_user_plaintext_passwords must have non-empty values for generalta, mailta, stu.
      _ldap_server_user_totp_secrets must have non-empty values for generalta and stu.
      Source these from ldap_server_credentials in host_vars/ldap-01/secrets.yml.
  no_log: true

# ───────────────────────────────────────────────────────────────────────────────────────────────────────────────────
# Check Required Defaults
# ───────────────────────────────────────────────────────────────────────────────────────────────────────────────────
- name: "PHASE [assert : Check Required Defaults]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      # ACL defaults must be defined
      - ldap_server_acl_secret_attrs is defined
      - ldap_server_acl_secret_attrs | length > 0
      - ldap_server_acl_delegate_dns is defined
      - ldap_server_acl_delegate_dns | length > 0

      # PPolicy defaults must have valid values
      - ldap_server_ppolicy_default_dn is defined
      - ldap_server_ppolicy_default_dn | length > 0
      - ldap_server_ppolicy_check_module is defined
      - ldap_server_ppolicy_check_module | length > 0
      - ldap_server_ppolicy_hash_cleartext is defined
      - ldap_server_ppolicy_check_quality is defined
      - ldap_server_ppolicy_min_length | default(0) | int >= 1
      - ldap_server_ppolicy_in_history | default(-1) | int >= 0
      - ldap_server_ppolicy_use_check_module is defined

      # Check module defaults must have valid values
      - ldap_server_check_password_min_points | default(-1) | int >= 0
      - ldap_server_check_password_min_upper is defined
      - ldap_server_check_password_min_lower is defined
      - ldap_server_check_password_min_digit is defined
      - ldap_server_check_password_min_punct is defined

      # TOTP defaults must have valid values
      - ldap_server_totp_params_dn is defined
      - ldap_server_totp_params_dn | length > 0
      - ldap_server_totp_length | default(0) | int >= 1
      - ldap_server_totp_time_step | default(0) | int >= 1
      - ldap_server_totp_hmac_algorithm is defined
      - ldap_server_totp_hmac_algorithm | length > 0

      # Fortune/sssvlv defaults must have valid values
      - ldap_server_fortune_base_dn is defined
      - ldap_server_fortune_base_dn | length > 0
      - ldap_server_sssvlv_max | default(0) | int >= 1
      - ldap_server_sssvlv_max_keys | default(0) | int >= 1
      - ldap_server_sssvlv_max_per_conn | default(0) | int >= 1
    fail_msg: >-
      Required defaults are missing or invalid.
      ACL default lists must be non-empty.
      PPolicy defaults must include check module path, quality level, min length >= 1,
      in history >= 0, and hash_cleartext/use_check_module booleans.
      Check module min points must be >= 0.
      TOTP defaults must have valid params DN, length >= 1, time step >= 1,
      and HMAC algorithm OID.
      Fortune/sssvlv defaults must have valid base DN and max limits >= 1.

- name: "PHASE [assert : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed assert phase"
