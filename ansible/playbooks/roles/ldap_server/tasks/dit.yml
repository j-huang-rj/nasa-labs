---
- name: "PHASE [dit : START]"
  become: false
  ansible.builtin.debug:
    msg: "Create base DN and required OUs"

# ─────────────────────────────────────────────────────────────────────────
# Create temporary directory for rendered DIT LDIF files
# ─────────────────────────────────────────────────────────────────────────
- name: "PHASE [dit : Create Temporary DIT LDIF Render Directory]"
  ansible.builtin.file:
    path: /tmp/openldap-dit
    state: directory
    owner: root
    group: root
    mode: "0700"
  changed_when: false

# ─────────────────────────────────────────────────────────────────────────
# Base DN: Search before add
# ─────────────────────────────────────────────────────────────────────────
- name: "PHASE [dit : Render Base DN Entry LDIF]"
  ansible.builtin.template:
    src: openldap/dit-entry.ldif.j2
    dest: /tmp/openldap-dit/base.ldif
    owner: root
    group: root
    mode: "0600"
  changed_when: false
  vars:
    entry_type: base

- name: "PHASE [dit : Search Base DN]"
  ansible.builtin.command:
    cmd: >-
      ldapsearch -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _ldap_server_admin_password }}"
      -H {{ ldap_server_uri }} -b "{{ ldap_base_dn }}" -s base '(objectClass=*)' dn
  changed_when: false
  failed_when: false
  no_log: true
  register: _ldap_server_dit_base
  environment:
    LDAPTLS_CACERT: "{{ ldap_server_tls_cert_path }}"

- name: "PHASE [dit : Create Base DN If Missing]"
  when: _ldap_server_dit_base.rc != 0
  ansible.builtin.command:
    cmd: >-
      ldapadd -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ _ldap_server_admin_password }}"
      -H {{ ldap_server_uri }} -f /tmp/openldap-dit/base.ldif
  changed_when: true
  no_log: true
  environment:
    LDAPTLS_CACERT: "{{ ldap_server_tls_cert_path }}"

# ─────────────────────────────────────────────────────────────────────────
# Organizational Units: search before add for each required OU
# ─────────────────────────────────────────────────────────────────────────
- name: "PHASE [dit : Render OU Entry LDIF]"
  ansible.builtin.include_tasks: dit_ou.yml
  loop: "{{ ldap_ous }}"
  loop_control:
    loop_var: _dit_ou_name
    label: "ou={{ _dit_ou_name }}"

# ─────────────────────────────────────────────────────────────────────────
# Clean up temporary render directory
# ─────────────────────────────────────────────────────────────────────────
- name: "PHASE [dit : Remove Temporary DIT LDIF Render Directory]"
  ansible.builtin.file:
    path: /tmp/openldap-dit
    state: absent
  changed_when: false

- name: "PHASE [dit : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed DIT phase"
