---
argument_specs:
  main:
    short_description: Validate openldap role variables

    options:
      openldap_enabled:
        type: bool
        required: true
        description: Whether the openldap role should be active on this host

      openldap_epel_package:
        type: str
        required: false
        description: EPEL release package name for OpenLDAP server availability

      openldap_packages:
        type: list
        elements: str
        required: false
        description: DNF packages to install for OpenLDAP server and client tools

      openldap_service_name:
        type: str
        required: false
        description: Systemd unit name for the OpenLDAP service (slapd)

      openldap_module_dir:
        type: str
        required: false
        description: Directory containing OpenLDAP dynamically-loadable modules

      openldap_required_modules:
        type: list
        elements: dict
        required: false
        description: >-
          OpenLDAP modules to load idempotently. Each entry defines load (la name)
          and path (absolute filesystem path).

      openldap_tls_cert_dir:
        type: str
        required: false
        description: Directory for the LDAPS TLS certificate file

      openldap_tls_key_dir:
        type: str
        required: false
        description: Directory for the LDAPS TLS private key file

      openldap_tls_cert_path:
        type: str
        required: false
        description: Absolute path to the LDAPS TLS certificate file

      openldap_tls_key_path:
        type: str
        required: false
        description: Absolute path to the LDAPS TLS private key file

      openldap_data_dir:
        type: str
        required: false
        description: Directory for the OpenLDAP MDB database files

      openldap_database_suffix:
        type: str
        required: false
        description: MDB database suffix (equal to ldap_base_dn)

      openldap_root_dn:
        type: str
        required: false
        description: Root DN for the MDB database (cn=admin,<suffix>)

      openldap_olc_database_dn:
        type: str
        required: false
        description: OLC entry DN for the MDB database

      openldap_schema_files:
        type: list
        elements: dict
        required: false
        description: >-
          LDAP schema files to load idempotently. Each entry defines name (schema label)
          and path (absolute path to the LDIF schema file).

      openldap_custom_schema_templates:
        type: list
        elements: dict
        required: false
        description: >-
          Custom OLC schema definitions to load idempotently. Each entry defines
          a name and description for schema template rendering.

      openldap_fortune_schema_oid_root:
        type: str
        required: false
        description: >-
          UUID-based OID root for the custom Fortune objectClass schema branch
          (2.25.109749598841848522681210166878566339431).

      ldap_domain:
        type: str
        required: true
        description: LDAP domain name derived from DNS identity

      ldap_base_dn:
        type: str
        required: true
        description: LDAP base DN derived from ldap_domain

      ldap_server_host:
        type: str
        required: true
        description: Inventory hostname of the LDAP server (ldap-01)

      ldap_server_fqdn:
        type: str
        required: true
        description: FQDN of the LDAP service

      ldap_server_uri:
        type: str
        required: true
        description: LDAPS URI for the LDAP server

      ldap_ous:
        type: list
        elements: str
        required: true
        description: Organizational Unit names for DIT containers

      ldap_groups:
        type: dict
        required: true
        description: posixGroup definitions keyed by group name (e.g. ta, stu)

      ldap_users:
        type: dict
        required: true
        description: posixAccount definitions keyed by username (e.g. generalta, mailta, stu)

      openldap_user_password_hashes:
        type: dict
        required: false
        description: >-
          User password hashes keyed by username (e.g. generalta, mailta, stu).
          Populated from gitignored host_vars/*/secrets.yml.

      openldap_tls_private_key:
        type: str
        required: false
        description: >-
          LDAPS TLS private key PEM content.
          Populated from gitignored host_vars/*/secrets.yml.

      openldap_tls_certificate:
        type: str
        required: false
        description: >-
          LDAPS TLS certificate PEM content.
          Populated from gitignored host_vars/*/secrets.yml.

      openldap_acl_secret_attrs:
        type: list
        elements: str
        required: false
        description: >-
          LDAP attributes whose read/search access must be restricted
          (userPassword, oathSecret, oathTOTPLastTimeStep, oathTOTPTimeStepDrift).

      openldap_acl_delegate_dns:
        type: list
        elements: str
        required: false
        description: >-
          Full DNs of delegated administrators for data-tree write access
          (e.g., uid=generalta,ou=People,... and uid=mailta,ou=People,...).

      openldap_ppolicy_default_dn:
        type: str
        required: false
        description: DN of the default ppolicy entry (cn=default,ou=Ppolicy,...)

      openldap_ppolicy_check_module:
        type: str
        required: false
        description: Absolute path to the password quality check module .so file

      openldap_ppolicy_hash_cleartext:
        type: bool
        required: false
        description: Whether OpenLDAP should hash cleartext passwords server-side

      openldap_ppolicy_check_quality:
        type: int
        required: false
        description: Password quality check level (0=off, 1=accept, 2=refuse unchecked)

      openldap_ppolicy_min_length:
        type: int
        required: false
        description: Minimum password length enforced by ppolicy

      openldap_ppolicy_in_history:
        type: int
        required: false
        description: Number of previous passwords to retain in pwdHistory

      openldap_ppolicy_use_check_module:
        type: bool
        required: false
        description: Whether to invoke pwdCheckModule for extended quality checks

      openldap_check_password_min_points:
        type: int
        required: false
        description: Minimum character class points required by check_password.so

      openldap_check_password_min_upper:
        type: int
        required: false
        description: Minimum uppercase characters (0 means no explicit minimum)

      openldap_check_password_min_lower:
        type: int
        required: false
        description: Minimum lowercase characters (0 means no explicit minimum)

      openldap_check_password_min_digit:
        type: int
        required: false
        description: Minimum digit characters (0 means no explicit minimum)

      openldap_check_password_min_punct:
        type: int
        required: false
        description: Minimum punctuation characters (0 means no explicit minimum)

      openldap_totp_params_dn:
        type: str
        required: false
        description: DN of the shared OATH/TOTP parameters entry

      openldap_totp_length:
        type: int
        required: false
        description: OATH TOTP code length (default 6)

      openldap_totp_time_step:
        type: int
        required: false
        description: OATH TOTP time step period in seconds (default 60)

      openldap_totp_hmac_algorithm:
        type: str
        required: false
        description: >-
          OID for HMAC algorithm (SHA-1 OID 1.2.840.113549.2.7)

      openldap_fortune_base_dn:
        type: str
        required: false
        description: DN of the Fortune container (ou=Fortune,...)

      openldap_sssvlv_max:
        type: int
        required: false
        description: Maximum concurrent SSS/VLV requests

      openldap_sssvlv_max_keys:
        type: int
        required: false
        description: Maximum sort keys per SSS/VLV request

      openldap_sssvlv_max_per_conn:
        type: int
        required: false
        description: Maximum SSS/VLV requests per connection
