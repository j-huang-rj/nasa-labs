---
- name: "PHASE [install : START]"
  become: false
  ansible.builtin.debug:
    msg: "Install and start OpenLDAP services"

- name: "PHASE [install : Ensure EPEL Repository Is Present]"
  ansible.builtin.dnf:
    name: "{{ openldap_epel_package }}"
    state: present

- name: "PHASE [install : Install OpenLDAP Packages]"
  ansible.builtin.dnf:
    name: "{{ openldap_packages }}"
    state: present

- name: "PHASE [install : Assert Sysconfig File Exists]"
  ansible.builtin.stat:
    path: "{{ openldap_sysconfig_path }}"
  register: _openldap_sysconfig_stat

- name: "PHASE [install : Configure SLAPD_URLS For ldapi And LDAPS Only]"
  when: _openldap_sysconfig_stat.stat.exists
  ansible.builtin.lineinfile:
    path: "{{ openldap_sysconfig_path }}"
    regexp: '^\s*SLAPD_URLS='
    line: 'SLAPD_URLS="ldapi:/// ldaps:///"'
    state: present
  register: _openldap_slapd_urls_result

- name: "PHASE [install : Create OpenLDAP Systemd Override Directory]"
  when: not _openldap_sysconfig_stat.stat.exists
  ansible.builtin.file:
    path: /etc/systemd/system/slapd.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "PHASE [install : Configure Systemd Listener Override For ldapi And LDAPS Only]"
  when: not _openldap_sysconfig_stat.stat.exists
  ansible.builtin.copy:
    dest: /etc/systemd/system/slapd.service.d/listen-urls.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/sbin/slapd -u ldap -h "ldapi:/// ldaps:///"
  register: _openldap_systemd_listener_result

- name: "PHASE [install : Restart OpenLDAP Immediately After Listener URL Change]"  # noqa: no-handler
  when: >-
    _openldap_slapd_urls_result.changed | default(false)
    or _openldap_systemd_listener_result.changed | default(false)
  ansible.builtin.systemd_service:
    name: "{{ openldap_service_name }}"
    daemon_reload: true
    enabled: true
    state: restarted

- name: "PHASE [install : Enable And Start OpenLDAP Service]"
  ansible.builtin.systemd_service:
    name: "{{ openldap_service_name }}"
    enabled: true
    state: started

- name: "PHASE [install : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed install phase"
