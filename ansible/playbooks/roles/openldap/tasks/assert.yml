---
- name: "PHASE [assert : START]"
  become: false
  ansible.builtin.debug:
    msg: "Validate openldap role variables"

- name: "PHASE [assert : Check openldap_enabled Is True]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - openldap_enabled | bool
      - inventory_hostname in groups['ldap_servers']
    fail_msg: "openldap role must run only on hosts in ldap_servers with openldap_enabled=true"

- name: "PHASE [assert : Check Required LDAP Identity Variables Are Defined]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - ldap_domain is defined
      - ldap_domain | length > 0
      - ldap_base_dn is defined
      - ldap_base_dn | length > 0
      - ldap_server_fqdn is defined
      - ldap_server_fqdn | length > 0
      - ldap_server_uri is defined
      - ldap_server_uri | length > 0
    fail_msg: "Required LDAP identity variables must be defined and non-empty"

# ───────────────────────────────
# Check Required LDAP Data Model
# ───────────────────────────────
- name: "PHASE [assert : Check Required LDAP Data Model]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      # Organizational Units must contain exactly the five required containers
      - ldap_ous | select('equalto', 'People') | list | length == 1
      - ldap_ous | select('equalto', 'Group') | list | length == 1
      - ldap_ous | select('equalto', 'Ppolicy') | list | length == 1
      - ldap_ous | select('equalto', 'SUDOers') | list | length == 1
      - ldap_ous | select('equalto', 'Fortune') | list | length == 1

      # ta group: GID 10000 with members generalta and mailta
      - ldap_groups.ta.gid | default(-1) == 10000
      - "'generalta' in (ldap_groups.ta.member_uids | default([]))"
      - "'mailta' in (ldap_groups.ta.member_uids | default([]))"

      # stu group: GID 20000 with member stu
      - ldap_groups.stu.gid | default(-1) == 20000
      - "'stu' in (ldap_groups.stu.member_uids | default([]))"

      # generalta: exact uid_number, gid_number, home, groups, ssh_public_key, password_hash_key
      - ldap_users.generalta.uid_number | default(-1) == 10000
      - ldap_users.generalta.gid_number | default(-1) == 10000
      - ldap_users.generalta.home | default('') == '/u/ta/generalta'
      - "'ta' in (ldap_users.generalta.groups | default([]))"
      - ldap_users.generalta.ssh_public_key is defined
      - ldap_users.generalta.password_hash_key is defined
      - ldap_users.generalta.totp_required | default(false) == true

      # mailta: exact uid_number, gid_number, home, groups, ssh_public_key, password_hash_key
      - ldap_users.mailta.uid_number | default(-1) == 10001
      - ldap_users.mailta.gid_number | default(-1) == 10000
      - ldap_users.mailta.home | default('') == '/u/ta/mailta'
      - "'ta' in (ldap_users.mailta.groups | default([]))"
      - ldap_users.mailta.ssh_public_key is defined
      - ldap_users.mailta.password_hash_key is defined
      - ldap_users.mailta.totp_required | default(true) == false

      # stu: exact uid_number, gid_number, home, groups, ssh_public_key, password_hash_key
      - ldap_users.stu.uid_number | default(-1) == 20000
      - ldap_users.stu.gid_number | default(-1) == 20000
      - ldap_users.stu.home | default('') == '/u/stu/stu'
      - "'stu' in (ldap_users.stu.groups | default([]))"
      - ldap_users.stu.ssh_public_key is defined
      - ldap_users.stu.password_hash_key is defined
      - ldap_users.stu.totp_required | default(false) == true

    fail_msg: >-
      Required LDAP Data Model is incomplete or incorrect.
      ldap_ous must contain People, Group, Ppolicy, SUDOers, Fortune.
      ldap_groups.ta must have gid 10000 with members generalta and mailta.
      ldap_groups.stu must have gid 20000 with member stu.
      ldap_users must contain generalta (UID 10000), mailta (UID 10001), stu (UID 20000)
      with correct homes, groups, ssh_public_key, and password_hash_key.

# ─────────────────────────────────────────────────────────
# Normalize credentials to internal facts (canonical first,
# fallback to legacy flat vars)
# ─────────────────────────────────────────────────────────
- name: "PHASE [assert : Normalize Admin Password]"
  become: false
  ansible.builtin.set_fact:
    _openldap_admin_password: >-
      {{ openldap_credentials.directory_manager.password_plaintext
         | default(openldap_admin_password | default('')) }}
    _openldap_admin_password_hash: >-
      {{ openldap_credentials.directory_manager.password_hash
         | default(openldap_admin_password_hash | default('')) }}
  no_log: true

- name: "PHASE [assert : Normalize Bind Password]"
  become: false
  ansible.builtin.set_fact:
    _openldap_bind_password: >-
      {{ openldap_credentials.service_bind.password_plaintext
         | default(openldap_bind_password | default('')) }}
    _openldap_bind_password_hash: >-
      {{ openldap_credentials.service_bind.password_hash
         | default(openldap_bind_password_hash | default('')) }}
  no_log: true

- name: "PHASE [assert : Normalize User Password Hashes]"
  become: false
  ansible.builtin.set_fact:
    _openldap_user_password_hashes: >-
      {%- set hashes = {} -%}
      {%- for uname in ldap_users.keys() | list -%}
      {%-   set _ = hashes.update({uname:
            openldap_credentials.users[uname].password_hash
            | default(openldap_user_password_hashes[uname]
            | default(openldap_user_password_hashes[ldap_users[uname].password_hash_key]
            | default(''))) }) -%}
      {%- endfor -%}
      {{ hashes }}
    _openldap_user_plaintext_passwords: >-
      {%- set plains = {} -%}
      {%- for uname in ldap_users.keys() | list -%}
      {%-   set _ = plains.update({uname:
            openldap_credentials.users[uname].password_plaintext
            | default(openldap_ta_password | default('')) }) -%}
      {%- endfor -%}
      {{ plains }}
    _openldap_user_totp_secrets: >-
      {%- set secrets = {} -%}
      {%- for uname in ldap_users.keys() | list -%}
      {%-   set cred_totp = openldap_credentials.users[uname].totp_secret_raw_b64
             | default(none) -%}
      {%-   if cred_totp is not none and cred_totp | length > 0 -%}
      {%-     set _ = secrets.update({uname: cred_totp}) -%}
      {%-   elif uname == 'generalta' and openldap_generalta_totp_secret | default('') | length > 0 -%}
      {%-     set _ = secrets.update({uname: openldap_generalta_totp_secret}) -%}
      {%-   elif uname == 'stu' and openldap_stu_totp_secret | default('') | length > 0 -%}
      {%-     set _ = secrets.update({uname: openldap_stu_totp_secret}) -%}
      {%-   elif cred_totp is not none -%}
      {%-     set _ = secrets.update({uname: cred_totp}) -%}
      {%-   endif -%}
      {%- endfor -%}
      {{ secrets }}
  no_log: true

- name: "PHASE [assert : Check Required OpenLDAP Admin Secret Shapes]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - _openldap_admin_password is defined
      - _openldap_admin_password | length > 0
      - _openldap_admin_password_hash is defined
      - _openldap_admin_password_hash | length > 0
    fail_msg: >-
      Required OpenLDAP admin secrets are missing.
      _openldap_admin_password and _openldap_admin_password_hash must be defined and non-empty.
  no_log: true

- name: "PHASE [assert : Check Required OpenLDAP User Password Hash Shapes]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - _openldap_user_password_hashes is defined
      - _openldap_user_password_hashes is mapping
      - "_openldap_user_password_hashes.keys() | list | sort == ldap_users.keys() | list | sort"
      - item | length > 0
      - >-
        item is match('\{(SSHA512|SSHA256|SSHA|SHA|CRYPT|ARGON2)\}')
    fail_msg: >-
      User password hash for {{ _p12_user.key }} is missing or does not begin
      with an LDAP password hash marker: {SSHA}, {SSHA512}, {SSHA256}, {SHA}, {CRYPT}, {ARGON2}.
  loop: "{{ ldap_users | dict2items }}"
  loop_control:
    loop_var: _p12_user
    label: "{{ _p12_user.key }}"
  no_log: true
  vars:
    item: "{{ _openldap_user_password_hashes[_p12_user.key] | default('') }}"

- name: "PHASE [assert : Check Required OpenLDAP User Plaintext Password Shapes]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - _openldap_user_plaintext_passwords is defined
      - _openldap_user_plaintext_passwords is mapping
      - "_openldap_user_plaintext_passwords.keys() | list | sort == ldap_users.keys() | list | sort"
      - item | length > 0
    fail_msg: >-
      Plaintext password for user {{ _p12_ptuser.key }} is missing or empty.
  loop: "{{ ldap_users | dict2items }}"
  loop_control:
    loop_var: _p12_ptuser
    label: "{{ _p12_ptuser.key }}"
  no_log: true
  vars:
    item: "{{ _openldap_user_plaintext_passwords[_p12_ptuser.key] | default('') }}"

- name: "PHASE [assert : Check Required OpenLDAP User TOTP Secret Shapes]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - _openldap_user_totp_secrets is defined
      - _openldap_user_totp_secrets is mapping
      - item | length > 0
    fail_msg: >-
      TOTP secret for user {{ _p12_totp_user.key }} (totp_required) is missing or empty.
  loop: "{{ ldap_users | dict2items | selectattr('value.totp_required', 'equalto', true) }}"
  loop_control:
    loop_var: _p12_totp_user
    label: "{{ _p12_totp_user.key }}"
  no_log: true
  vars:
    item: "{{ _openldap_user_totp_secrets[_p12_totp_user.key] | default('') }}"

# ─────────────────────────────────────
# Check Optional TLS Secret Pair Shape
# ─────────────────────────────────────
- name: "PHASE [assert : Check Optional TLS Secret Pair Shape]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - openldap_tls_private_key is defined
      - openldap_tls_certificate is defined
      - openldap_tls_private_key | length > 0 or openldap_tls_certificate | length == 0
      - openldap_tls_certificate | length > 0 or openldap_tls_private_key | length == 0
    fail_msg: >-
      Incomplete TLS secret shape: openldap_tls_private_key and openldap_tls_certificate
      must both be non-empty when supplied from secrets, or both be empty so
      tls.yml can generate a self-signed key/cert.
      Providing only one of the two values is not allowed.

# ──────────────────────────────────────────
# Check Required Module And Schema Defaults
# ──────────────────────────────────────────
- name: "PHASE [assert : Check Required Module And Schema Defaults]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      # Required modules list must be non-empty
      - openldap_required_modules is defined
      - openldap_required_modules | length > 0

      # Schema files list must be non-empty
      - openldap_schema_files is defined
      - openldap_schema_files | length > 0
    fail_msg: >-
      Required module and schema defaults must be non-empty.
      openldap_required_modules must list ppolicy, otp, sssvlv entries.
      openldap_schema_files must list required schema LDIF paths.

# ──────────────────────────────────────────
# Check Required Phase 12 Secret Shapes
# (validates normalized facts that derive from openldap_credentials or legacy flat vars)
# ──────────────────────────────────────────
- name: "PHASE [assert : Check Required Phase 12 Secret Shapes]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      # TA plaintext password for Phase 12 non-root validation binds
      - _openldap_user_plaintext_passwords.generalta is defined
      - _openldap_user_plaintext_passwords.generalta | length > 0
      - _openldap_user_plaintext_passwords.mailta is defined
      - _openldap_user_plaintext_passwords.mailta | length > 0
      - _openldap_user_plaintext_passwords.stu is defined
      - _openldap_user_plaintext_passwords.stu | length > 0

      # TOTP secrets (raw bytes, base64-encoded) for generalta and stu
      - _openldap_user_totp_secrets.generalta is defined
      - _openldap_user_totp_secrets.generalta | length > 0
      - _openldap_user_totp_secrets.stu is defined
      - _openldap_user_totp_secrets.stu | length > 0
    fail_msg: >-
      Required Phase 12 secret shapes are missing or empty.
      _openldap_user_plaintext_passwords must have non-empty values for generalta, mailta, stu.
      _openldap_user_totp_secrets must have non-empty values for generalta and stu.
      Source these from openldap_credentials (preferred) or legacy flat vars in
      host_vars/ldap-01/secrets.yml.
  no_log: true

# ──────────────────────────────────────────
# Check Required Phase 12 Defaults
# ──────────────────────────────────────────
- name: "PHASE [assert : Check Required Phase 12 Defaults]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      # ACL defaults must be defined
      - openldap_acl_secret_attrs is defined
      - openldap_acl_secret_attrs | length > 0
      - openldap_acl_delegate_dns is defined
      - openldap_acl_delegate_dns | length > 0

      # PPolicy defaults must have valid values
      - openldap_ppolicy_default_dn is defined
      - openldap_ppolicy_default_dn | length > 0
      - openldap_ppolicy_check_module is defined
      - openldap_ppolicy_check_module | length > 0
      - openldap_ppolicy_hash_cleartext is defined
      - openldap_ppolicy_check_quality is defined
      - openldap_ppolicy_min_length | default(0) | int >= 1
      - openldap_ppolicy_in_history | default(-1) | int >= 0
      - openldap_ppolicy_use_check_module is defined

      # Check module defaults must have valid values
      - openldap_check_password_min_points | default(-1) | int >= 0
      - openldap_check_password_min_upper is defined
      - openldap_check_password_min_lower is defined
      - openldap_check_password_min_digit is defined
      - openldap_check_password_min_punct is defined

      # TOTP defaults must have valid values
      - openldap_totp_params_dn is defined
      - openldap_totp_params_dn | length > 0
      - openldap_totp_length | default(0) | int >= 1
      - openldap_totp_time_step | default(0) | int >= 1
      - openldap_totp_hmac_algorithm is defined
      - openldap_totp_hmac_algorithm | length > 0

      # Fortune/sssvlv defaults must have valid values
      - openldap_fortune_base_dn is defined
      - openldap_fortune_base_dn | length > 0
      - openldap_sssvlv_max | default(0) | int >= 1
      - openldap_sssvlv_max_keys | default(0) | int >= 1
      - openldap_sssvlv_max_per_conn | default(0) | int >= 1
    fail_msg: >-
      Required Phase 12 defaults are missing or invalid.
      ACL default lists must be non-empty.
      PPolicy defaults must include check module path, quality level, min length >= 1,
      in history >= 0, and hash_cleartext/use_check_module booleans.
      Check module min points must be >= 0.
      TOTP defaults must have valid params DN, length >= 1, time step >= 1,
      and HMAC algorithm OID.
      Fortune/sssvlv defaults must have valid base DN and max limits >= 1.

- name: "PHASE [assert : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed assert phase"
