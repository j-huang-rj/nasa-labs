---
# Per-fortune-item entry reconciliation (included from fortune.yml)
# Loop var: _fortune_item (item from fortunes.yml with ID, Author, Description)

- name: "PHASE [fortune_entry : Render Fortune LDIF] | id={{ _fortune_item.ID }}"
  ansible.builtin.template:
    src: openldap/fortune-entry.ldif.j2
    dest: "/tmp/openldap-phase12-fortunes/fortune-{{ _fortune_item.ID }}.ldif"
    owner: root
    group: root
    mode: "0600"
  changed_when: false
  vars:
    fortune_id: "{{ _fortune_item.ID }}"
    fortune_author: "{{ _fortune_item.Author }}"
    fortune_description: "{{ _fortune_item.Description }}"

- name: "PHASE [fortune_entry : Search Existing Fortune Entry] | id={{ _fortune_item.ID }}"
  ansible.builtin.command:
    cmd: >-
      ldapsearch -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ openldap_admin_password }}"
      -H {{ ldap_server_uri }}
      -b "cn=fortune-{{ _fortune_item.ID }},ou=Fortune,{{ ldap_base_dn }}" -s base
      '(objectClass=fortune)' cn id author description
  changed_when: false
  failed_when: false
  no_log: true
  register: _openldap_fortune_search
  environment:
    LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

- name: "PHASE [fortune_entry : Add Fortune Entry If Missing] | id={{ _fortune_item.ID }}"
  when: _openldap_fortune_search.rc != 0
  ansible.builtin.command:
    cmd: >-
      ldapadd -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ openldap_admin_password }}"
      -H {{ ldap_server_uri }}
      -f /tmp/openldap-phase12-fortunes/fortune-{{ _fortune_item.ID }}.ldif
  changed_when: true
  no_log: true
  environment:
    LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"

- name: "PHASE [fortune_entry : Reconcile Fortune Entry Attributes If Different] | id={{ _fortune_item.ID }}"
  when: _openldap_fortune_search.rc == 0
  block:
    - name: "PHASE [fortune_entry : Set Intended Fortune Entry Attributes] | id={{ _fortune_item.ID }}"
      ansible.builtin.set_fact:
        _openldap_fortune_intended_cn: "fortune-{{ _fortune_item.ID }}"
        _openldap_fortune_intended_id: "{{ _fortune_item.ID }}"
        _openldap_fortune_intended_author: "{{ _fortune_item.Author }}"
        _openldap_fortune_intended_description: "{{ _fortune_item.Description }}"

    - name: "PHASE [fortune_entry : Extract Current cn] | id={{ _fortune_item.ID }}"
      ansible.builtin.set_fact:
        _openldap_fortune_current_cn: >-
          {{ _openldap_fortune_search.stdout_lines | default([])
             | select('match', '^cn: ')
             | list
             | first
             | default('')
             | regex_replace('^cn: ', '') }}

    - name: "PHASE [fortune_entry : Extract Current id] | id={{ _fortune_item.ID }}"
      ansible.builtin.set_fact:
        _openldap_fortune_current_id: >-
          {{ _openldap_fortune_search.stdout_lines | default([])
             | select('match', '^id: ')
             | list
             | first
             | default('')
             | regex_replace('^id: ', '') }}

    - name: "PHASE [fortune_entry : Extract Current author] | id={{ _fortune_item.ID }}"
      ansible.builtin.set_fact:
        _openldap_fortune_current_author: >-
          {{ _openldap_fortune_search.stdout_lines | default([])
             | select('match', '^author::? ')
             | list
             | first
             | default('')
             | regex_replace('^author::? ', '') }}

    - name: "PHASE [fortune_entry : Extract Current description] | id={{ _fortune_item.ID }}"
      ansible.builtin.set_fact:
        _openldap_fortune_current_description: >-
          {{ _openldap_fortune_search.stdout_lines | default([])
             | select('match', '^description::? ')
             | list
             | first
             | default('')
             | regex_replace('^description::? ', '') }}

    - name: "PHASE [fortune_entry : Build Fortune Entry Modify LDIF] | id={{ _fortune_item.ID }}"
      ansible.builtin.set_fact:
        _openldap_fortune_entry_modify: >-
          {%- set lines = [] -%}
          {%- set lines = lines + ['dn: cn=fortune-' ~ _fortune_item.ID | string ~ ',ou=Fortune,' ~ ldap_base_dn] -%}
          {%- set lines = lines + ['changetype: modify'] -%}
          {%- if _openldap_fortune_current_cn != _openldap_fortune_intended_cn -%}
          {%-   set lines = lines + ['replace: cn'] -%}
          {%-   set lines = lines + ['cn: ' ~ _openldap_fortune_intended_cn] -%}
          {%-   set lines = lines + ['-'] -%}
          {%- endif -%}
          {%- if _openldap_fortune_current_id != _openldap_fortune_intended_id | string -%}
          {%-   set lines = lines + ['replace: id'] -%}
          {%-   set lines = lines + ['id: ' ~ _openldap_fortune_intended_id] -%}
          {%-   set lines = lines + ['-'] -%}
          {%- endif -%}
          {%- if _openldap_fortune_current_author != _openldap_fortune_intended_author -%}
          {%-   set lines = lines + ['replace: author'] -%}
          {%-   set lines = lines + ['author:: ' ~ _fortune_item.Author | b64encode] -%}
          {%-   set lines = lines + ['-'] -%}
          {%- endif -%}
          {%- if _openldap_fortune_current_description != _openldap_fortune_intended_description -%}
          {%-   set lines = lines + ['replace: description'] -%}
          {%-   set lines = lines + ['description:: ' ~ _fortune_item.Description | b64encode] -%}
          {%-   set lines = lines + ['-'] -%}
          {%- endif -%}
          {{ lines | join('\n') }}
      changed_when: false

    - name: "PHASE [fortune_entry : Apply Fortune Entry Modifications If Needed] | id={{ _fortune_item.ID }}"
      when: >-
        _openldap_fortune_current_cn != _openldap_fortune_intended_cn
        or _openldap_fortune_current_id != _openldap_fortune_intended_id | string
        or _openldap_fortune_current_author != _openldap_fortune_intended_author
        or _openldap_fortune_current_description != _openldap_fortune_intended_description
      ansible.builtin.command:
        cmd: >-
          ldapmodify -x -D "cn=admin,{{ ldap_base_dn }}" -w "{{ openldap_admin_password }}"
          -H {{ ldap_server_uri }}
        stdin: "{{ _openldap_fortune_entry_modify }}"
      changed_when: true
      no_log: true
      environment:
        LDAPTLS_CACERT: "{{ openldap_tls_cert_path }}"
