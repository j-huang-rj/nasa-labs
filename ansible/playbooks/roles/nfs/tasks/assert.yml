---
- name: "PHASE [assert : START]"
  become: false
  ansible.builtin.debug:
    msg: "Validate nfs role variables"

- name: "PHASE [assert : Check nfs_enabled Is True]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - nfs_enabled | bool
    fail_msg: "nfs_enabled must be true when the nfs role is invoked"

- name: "PHASE [assert : Check Host Belongs To NFS Server Or Client Groups]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - inventory_hostname in groups['nfs_servers'] or inventory_hostname in groups['nfs_clients']
    fail_msg: "nfs role must run only on hosts in nfs_servers or nfs_clients"

- name: "PHASE [assert : Validate NFS Server Exports Are Defined]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - nfs_server_enabled | bool
      - nfs_exports | length > 0
    fail_msg: "nfs_server_enabled must be true and nfs_exports must be non-empty for nfs_servers hosts"
  when: inventory_hostname in groups['nfs_servers']

- name: "PHASE [assert : Validate NFS Client Mounts Are Defined]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - nfs_client_enabled | bool
      - nfs_mounts | length > 0
    fail_msg: "nfs_client_enabled must be true and nfs_mounts must be non-empty for nfs_clients hosts"
  when: inventory_hostname in groups['nfs_clients']

- name: "PHASE [assert : Validate LDAP Identity Variables Available]"
  become: false
  ansible.builtin.assert:
    quiet: true
    that:
      - ldap_users is defined
      - ldap_groups is defined
      - ldap_users | length > 0
      - ldap_groups | length > 0
    fail_msg: "LDAP identity variables (ldap_users, ldap_groups) must be defined for home tree ownership"

- name: "PHASE [assert : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed assert phase"
