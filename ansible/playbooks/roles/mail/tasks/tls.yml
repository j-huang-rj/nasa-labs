---
- name: "PHASE [tls : START]"
  become: false
  ansible.builtin.debug:
    msg: "Deploy TLS certificates idempotently"

- name: "PHASE [tls : Create TLS Certificate Directory]"
  ansible.builtin.file:
    path: "{{ mail_tls_cert_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "PHASE [tls : Create TLS Private Key Directory]"
  ansible.builtin.file:
    path: "{{ mail_tls_key_path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: "PHASE [tls : Slurp Existing TLS Certificate]"
  ansible.builtin.slurp:
    src: "{{ mail_tls_cert_path }}"
  failed_when: false
  register: _mail_existing_tls_cert
  no_log: true

- name: "PHASE [tls : Validate TLS Certificate Slurp Failures Are ENOENT-Only]"
  ansible.builtin.assert:
    quiet: true
    that:
      - >-
        (_mail_existing_tls_cert.failed | default(false) == false
         or _mail_existing_tls_cert.msg | default('') | regex_search('(?i)not found|no such file|does not exist|could not stat')
        )
    fail_msg: >-
      Slurp of TLS certificate file reported a non-ENOENT failure
      (e.g. permission denied or read error). Investigate before proceeding.
  when: _mail_existing_tls_cert.failed | default(false)

- name: "PHASE [tls : Deploy TLS Certificate]"
  when: >-
    (_mail_existing_tls_cert.content | default('') | b64decode) != mail_tls_certificate
  ansible.builtin.copy:
    content: "{{ mail_tls_certificate }}"
    dest: "{{ mail_tls_cert_path }}"
    owner: root
    group: root
    mode: "0644"
  notify:
    - "PHASE [handler : Restart Postfix]"
    - "PHASE [handler : Restart Dovecot]"
  no_log: true

- name: "PHASE [tls : Slurp Existing TLS Private Key]"
  ansible.builtin.slurp:
    src: "{{ mail_tls_key_path }}"
  failed_when: false
  register: _mail_existing_tls_key
  no_log: true

- name: "PHASE [tls : Validate TLS Private Key Slurp Failures Are ENOENT-Only]"
  ansible.builtin.assert:
    quiet: true
    that:
      - >-
        (_mail_existing_tls_key.failed | default(false) == false
         or _mail_existing_tls_key.msg | default('') | regex_search('(?i)not found|no such file|does not exist|could not stat')
        )
    fail_msg: >-
      Slurp of TLS private key file reported a non-ENOENT failure
      (e.g. permission denied or read error). Investigate before proceeding.
  when: _mail_existing_tls_key.failed | default(false)

- name: "PHASE [tls : Deploy TLS Private Key]"
  when: >-
    (_mail_existing_tls_key.content | default('') | b64decode) != mail_tls_private_key
  ansible.builtin.copy:
    content: "{{ mail_tls_private_key }}"
    dest: "{{ mail_tls_key_path }}"
    owner: root
    group: root
    mode: "0600"
  notify:
    - "PHASE [handler : Restart Postfix]"
    - "PHASE [handler : Restart Dovecot]"
  no_log: true

- name: "PHASE [tls : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed TLS deployment phase"
