---
- name: "PHASE [postfix : START]"
  become: false
  ansible.builtin.debug:
    msg: "Configure Postfix SMTP, submission, relay prevention, and sender ownership"

- name: "PHASE [postfix : Create Postfix Templates Directory]"
  ansible.builtin.file:
    path: "{{ mail_postfix_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "PHASE [postfix : Render Postfix Main Configuration]"
  ansible.builtin.template:
    src: postfix/main.cf.j2
    dest: "{{ mail_postfix_conf_dir }}/main.cf"
    owner: root
    group: root
    mode: "0644"
  notify: "PHASE [handler : Restart Postfix]"

- name: "PHASE [postfix : Render Sender Login Maps]"
  ansible.builtin.template:
    src: postfix/sender_login_maps.j2
    dest: "{{ mail_postfix_conf_dir }}/sender_login_maps"
    owner: root
    group: root
    mode: "0644"
  notify: "PHASE [handler : Restart Postfix]"

- name: "PHASE [postfix : Render Virtual Mailbox Domains]"
  ansible.builtin.template:
    src: postfix/virtual_mailbox_domains.j2
    dest: "{{ mail_postfix_conf_dir }}/virtual_mailbox_domains"
    owner: root
    group: root
    mode: "0644"
  notify: "PHASE [handler : Restart Postfix]"

- name: "PHASE [postfix : Render Postfix Master Configuration]"
  ansible.builtin.template:
    src: postfix/master.cf.j2
    dest: "{{ mail_postfix_conf_dir }}/master.cf"
    owner: root
    group: root
    mode: "0644"
  notify: "PHASE [handler : Restart Postfix]"

- name: "PHASE [postfix : Stat Sender Login Maps Source]"
  ansible.builtin.stat:
    path: "{{ mail_postfix_conf_dir }}/sender_login_maps"
  register: mail_sender_login_maps_src_stat

- name: "PHASE [postfix : Stat Sender Login Maps Database]"
  ansible.builtin.stat:
    path: "{{ mail_postfix_conf_dir }}/sender_login_maps.db"
  register: mail_sender_login_maps_db_stat

- name: "PHASE [postfix : Build Sender Login Maps Database]"
  ansible.builtin.command:
    cmd: postmap {{ mail_postfix_conf_dir }}/sender_login_maps
  when: >-
    not mail_sender_login_maps_db_stat.stat.exists or
    (mail_sender_login_maps_src_stat.stat.exists and
     mail_sender_login_maps_db_stat.stat.mtime < mail_sender_login_maps_src_stat.stat.mtime)
  changed_when: true
  notify: "PHASE [handler : Restart Postfix]"

- name: "PHASE [postfix : Stat Virtual Mailbox Domains Source]"
  ansible.builtin.stat:
    path: "{{ mail_postfix_conf_dir }}/virtual_mailbox_domains"
  register: mail_virtual_mailbox_domains_src_stat

- name: "PHASE [postfix : Stat Virtual Mailbox Domains Database]"
  ansible.builtin.stat:
    path: "{{ mail_postfix_conf_dir }}/virtual_mailbox_domains.db"
  register: mail_virtual_mailbox_domains_db_stat

- name: "PHASE [postfix : Build Virtual Mailbox Domains Database]"
  ansible.builtin.command:
    cmd: postmap {{ mail_postfix_conf_dir }}/virtual_mailbox_domains
  when: >-
    not mail_virtual_mailbox_domains_db_stat.stat.exists or
    (mail_virtual_mailbox_domains_src_stat.stat.exists and
     mail_virtual_mailbox_domains_db_stat.stat.mtime < mail_virtual_mailbox_domains_src_stat.stat.mtime)
  changed_when: true
  notify: "PHASE [handler : Restart Postfix]"

- name: "PHASE [postfix : Validate Postfix Configuration]"
  ansible.builtin.command:
    cmd: postfix check
  changed_when: false

- name: "PHASE [postfix : Flush Handlers]"
  ansible.builtin.meta: flush_handlers

- name: "PHASE [postfix : Enable And Start Postfix]"
  ansible.builtin.systemd_service:
    name: "{{ mail_postfix_service_name }}"
    enabled: true
    state: started

- name: "PHASE [postfix : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed Postfix configuration phase"
