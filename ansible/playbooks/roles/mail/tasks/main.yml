---
- name: "START"
  become: false
  ansible.builtin.debug:
    msg: "Starting execution of mail role"

- name: "PHASE [main : Assert Role Variables]"
  ansible.builtin.import_tasks: assert.yml

- name: "PHASE [main : Configure Mail System]"
  ansible.builtin.import_tasks: setup.yml

- name: "END"
  become: false
  ansible.builtin.debug:
    msg: "Completed execution of mail role"
