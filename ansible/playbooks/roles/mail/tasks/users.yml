---
- name: "PHASE [users : START]"
  become: false
  ansible.builtin.debug:
    msg: "Create vmail identity, passwd-file, and directory structure"

- name: "PHASE [users : Create vmail System Group]"
  ansible.builtin.group:
    name: "{{ mail_vmail_group }}"
    system: true

- name: "PHASE [users : Create vmail System User]"
  ansible.builtin.user:
    name: "{{ mail_vmail_user }}"
    group: "{{ mail_vmail_group }}"
    system: true
    create_home: false
    home: "{{ mail_vmail_home }}"
    shell: /sbin/nologin

- name: "PHASE [users : Create vmail Home Directory]"
  ansible.builtin.file:
    path: "{{ mail_vmail_home }}"
    state: directory
    owner: "{{ mail_vmail_user }}"
    group: "{{ mail_vmail_group }}"
    mode: "0750"
    setype: mail_spool_t

- name: "PHASE [users : Create Dovecot Configuration Directory]"
  ansible.builtin.file:
    path: "{{ mail_dovecot_conf_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: "PHASE [users : Render Dovecot Passwd-File]"
  ansible.builtin.template:
    src: dovecot/passwd-file.j2
    dest: "{{ mail_dovecot_passwd_path }}"
    owner: root
    group: dovecot
    mode: "0640"
  no_log: true

- name: "PHASE [users : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed users phase"
