---
- name: "PHASE [opendkim : START]"
  become: false
  ansible.builtin.debug:
    msg: "Configure OpenDKIM DKIM signing milter"

- name: "PHASE [opendkim : Create OpenDKIM Configuration Directory]"
  ansible.builtin.file:
    path: "{{ mail_opendkim_conf_dir }}"
    state: directory
    owner: root
    group: "{{ mail_opendkim_group }}"
    mode: "0750"

- name: "PHASE [opendkim : Create OpenDKIM Keys Directory]"
  ansible.builtin.file:
    path: "{{ mail_opendkim_keys_dir }}"
    state: directory
    owner: root
    group: "{{ mail_opendkim_group }}"
    mode: "0750"

- name: "PHASE [opendkim : Slurp Existing DKIM Private Key]"
  ansible.builtin.slurp:
    src: "{{ mail_opendkim_private_key_path }}"
  failed_when: false
  register: _mail_existing_dkim_key
  no_log: true

- name: "PHASE [opendkim : Validate DKIM Private Key Slurp Failures Are ENOENT-Only]"
  ansible.builtin.assert:
    quiet: true
    that:
      - >-
        (_mail_existing_dkim_key.failed | default(false) == false
         or _mail_existing_dkim_key.msg | default('') | regex_search('(?i)not found|no such file|does not exist|could not stat')
        )
    fail_msg: >-
      Slurp of DKIM private key file reported a non-ENOENT failure
      (e.g. permission denied or read error). Investigate before proceeding.
  when: _mail_existing_dkim_key.failed | default(false)

- name: "PHASE [opendkim : Deploy DKIM Private Key]"
  when: >-
    (_mail_existing_dkim_key.content | default('') | b64decode) != mail_dkim_private_keys[mail_dkim_selector]
  ansible.builtin.copy:
    content: "{{ mail_dkim_private_keys[mail_dkim_selector] }}"
    dest: "{{ mail_opendkim_private_key_path }}"
    owner: root
    group: "{{ mail_opendkim_group }}"
    mode: "0640"
  notify:
    - "PHASE [handler : Restart OpenDKIM]"
  no_log: true

- name: "PHASE [opendkim : Render OpenDKIM Main Configuration]"
  ansible.builtin.template:
    src: opendkim/opendkim.conf.j2
    dest: "{{ mail_opendkim_main_config }}"
    owner: root
    group: "{{ mail_opendkim_group }}"
    mode: "0640"
  notify: "PHASE [handler : Restart OpenDKIM]"

- name: "PHASE [opendkim : Render OpenDKIM TrustedHosts]"
  ansible.builtin.template:
    src: opendkim/TrustedHosts.j2
    dest: "{{ mail_opendkim_conf_dir }}/TrustedHosts"
    owner: root
    group: "{{ mail_opendkim_group }}"
    mode: "0640"
  notify: "PHASE [handler : Restart OpenDKIM]"

- name: "PHASE [opendkim : Render OpenDKIM KeyTable]"
  ansible.builtin.template:
    src: opendkim/KeyTable.j2
    dest: "{{ mail_opendkim_conf_dir }}/KeyTable"
    owner: root
    group: "{{ mail_opendkim_group }}"
    mode: "0640"
  notify: "PHASE [handler : Restart OpenDKIM]"

- name: "PHASE [opendkim : Render OpenDKIM SigningTable]"
  ansible.builtin.template:
    src: opendkim/SigningTable.j2
    dest: "{{ mail_opendkim_conf_dir }}/SigningTable"
    owner: root
    group: "{{ mail_opendkim_group }}"
    mode: "0640"
  notify: "PHASE [handler : Restart OpenDKIM]"

- name: "PHASE [opendkim : Validate OpenDKIM Configuration]"
  ansible.builtin.command:
    cmd: opendkim -n -x {{ mail_opendkim_main_config }}
  changed_when: false

- name: "PHASE [opendkim : Flush Handlers]"
  ansible.builtin.meta: flush_handlers

- name: "PHASE [opendkim : Enable And Start OpenDKIM]"
  ansible.builtin.systemd_service:
    name: "{{ mail_opendkim_service_name }}"
    enabled: true
    state: started

- name: "PHASE [opendkim : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed OpenDKIM configuration phase"
