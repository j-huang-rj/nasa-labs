---
argument_specs:
  main:
    short_description: Validate mail role variables

    options:
      mail_enabled:
        type: bool
        required: true
        description: Whether the mail role should be active on this host

      mail_postfix_packages:
        type: list
        elements: str
        required: false
        description: DNF packages to install for Postfix SMTP

      mail_dovecot_packages:
        type: list
        elements: str
        required: false
        description: DNF packages to install for Dovecot IMAP

      mail_postfix_service_name:
        type: str
        required: false
        description: Systemd unit name for the Postfix service

      mail_dovecot_service_name:
        type: str
        required: false
        description: Systemd unit name for the Dovecot service

      mail_vmail_user:
        type: str
        required: false
        description: System username for the shared vmail identity

      mail_vmail_group:
        type: str
        required: false
        description: System group for the shared vmail identity

      mail_vmail_home:
        type: str
        required: false
        description: Home directory for the vmail user and Maildir storage root

      mail_postfix_conf_dir:
        type: str
        required: false
        description: Absolute path to the Postfix configuration directory

      mail_dovecot_conf_dir:
        type: str
        required: false
        description: Absolute path to the Dovecot configuration directory

      mail_tls_cert_path:
        type: str
        required: false
        description: Absolute path for the TLS certificate PEM file on the target host

      mail_tls_key_path:
        type: str
        required: false
        description: Absolute path for the TLS private key PEM file on the target host

      mail_dovecot_passwd_path:
        type: str
        required: false
        description: Absolute path for the Dovecot passwd-file on the target host

      mail_dovecot_auth_socket_path:
        type: str
        required: false
        description: >-
          Path for the Dovecot auth socket inside the Postfix chroot for SASL authentication

      mail_dovecot_lmtp_socket_path:
        type: str
        required: false
        description: >-
          Path for the Dovecot LMTP socket inside the Postfix chroot for mailbox delivery

      mail_managed_domains:
        type: list
        elements: str
        required: false
        description: >-
          List of domains managed by this mail server. Defaults to
          [bind9_forward_zone_name, mail_domain_name] derived from DNS identity.

      mail_local_users:
        type: list
        elements: str
        required: false
        description: Local virtual user names for passwd-file authentication (admin, test)

      mail_tls_certificate:
        type: str
        required: false
        description: >-
          PEM-encoded TLS certificate content. Must be provided by host_vars/*/secrets.yml.
          Asserted non-empty at runtime when mail_enabled is true (no_log: true).

      mail_tls_private_key:
        type: str
        required: false
        description: >-
          PEM-encoded TLS private key content. Must be provided by host_vars/*/secrets.yml.
          Asserted non-empty at runtime when mail_enabled is true (no_log: true).

      mail_local_user_password_hashes:
        type: dict
        required: false
        description: >-
          Dictionary mapping local user names to hashed passwords for Dovecot passwd-file.
          Must contain keys for all entries in mail_local_users.
          Asserted non-empty for each user at runtime when mail_enabled is true (no_log: true).

      mail_opendkim_packages:
        type: list
        elements: str
        required: false
        description: DNF packages to install for OpenDKIM signing and verification

      mail_opendkim_service_name:
        type: str
        required: false
        description: Systemd unit name for the OpenDKIM milter service

      mail_opendkim_user:
        type: str
        required: false
        description: System user identity for the OpenDKIM daemon

      mail_opendkim_group:
        type: str
        required: false
        description: System group identity for the OpenDKIM daemon

      mail_opendkim_conf_dir:
        type: str
        required: false
        description: Absolute path to the OpenDKIM configuration directory

      mail_opendkim_keys_dir:
        type: str
        required: false
        description: Absolute path to the OpenDKIM private key storage directory

      mail_dkim_selector:
        type: str
        required: false
        description: DKIM selector name used for both managed domains (D-01)

      mail_opendkim_private_key_path:
        type: str
        required: false
        description: >-
          Absolute path to the DKIM private key file derived from mail_opendkim_keys_dir
          and mail_dkim_selector

      mail_opendkim_socket:
        type: str
        required: false
        description: >-
          OpenDKIM-side milter socket address in inet:port@host syntax for the service listener

      mail_opendkim_postfix_socket:
        type: str
        required: false
        description: >-
          Milter socket address in Postfix inet:host:port syntax for the milter client

      mail_dkim_private_keys:
        type: dict
        required: false
        description: >-
          Dictionary mapping DKIM selector names to PEM-encoded private keys.
          Must contain a key matching mail_dkim_selector. Secret — provided by
          gitignored host_vars/*/secrets.yml.

      mail_pre_dkim_milters:
        type: list
        elements: str
        required: false
        description: >-
          List of milter socket addresses to insert before OpenDKIM in the
          Postfix milter chain. Empty in Phase 04; populated in Phase 06.

      mail_list_api_venv_dir:
        type: str
        required: false
        description: >-
          Absolute path for the list API Python virtual environment

      mail_list_api_app_dir:
        type: str
        required: false
        description: >-
          Absolute path for the list API application source directory on the target host

      mail_list_api_state_dir:
        type: str
        required: false
        description: >-
          Absolute path for root-owned dynamic list state and source/database map files

      mail_list_api_listen_host:
        type: str
        required: false
        description: IP address or hostname the API service listens on

      mail_list_api_listen_port:
        type: int
        required: false
        description: TCP port the API service listens on

      mail_list_api_service_name:
        type: str
        required: false
        description: Systemd unit name for the list API service

      mail_list_api_packages:
        type: list
        elements: str
        required: false
        description: DNF packages required for the list API runtime

      mail_list_api_python_requirements:
        type: list
        elements: str
        required: false
        description: >-
          Pip-installable Python package version pins for the list API runtime

      mail_list_static_alias_path:
        type: str
        required: false
        description: >-
          Absolute path for the Ansible-managed static list alias source map
          (rendered as a Postfix lmdb: source)

      mail_list_dynamic_source_path:
        type: str
        required: false
        description: >-
          Absolute path for the API-managed dynamic list alias source map
          (owned by the API service, not by Ansible)

      mail_list_reserved_names:
        type: list
        elements: str
        required: false
        description: >-
          List of reserved list names that the API must reject for create/delete
