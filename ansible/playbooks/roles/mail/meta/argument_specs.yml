---
argument_specs:
  main:
    short_description: Validate mail role variables

    options:
      mail_enabled:
        type: bool
        required: true
        description: Whether the mail role should be active on this host

      # Feature gates
      mail_postfix_enabled:
        type: bool
        required: false
        description: Whether to configure Postfix on this host

      mail_dovecot_enabled:
        type: bool
        required: false
        description: Whether to configure Dovecot on this host

      mail_dovecot_auth_enabled:
        type: bool
        required: false
        description: Whether Dovecot authentication configuration is enabled

      mail_dovecot_imap_enabled:
        type: bool
        required: false
        description: Whether Dovecot should expose IMAP service behavior on this host

      mail_dovecot_lmtp_enabled:
        type: bool
        required: false
        description: Whether Dovecot should expose LMTP service behavior on this host

      mail_dovecot_auth_socket_enabled:
        type: bool
        required: false
        description: Whether to render the local Postfix-facing Dovecot auth Unix socket

      mail_dovecot_lmtp_unix_socket_enabled:
        type: bool
        required: false
        description: Whether to render the local Postfix-facing Dovecot LMTP Unix socket

      mail_dovecot_lmtp_inet_listener_enabled:
        type: bool
        required: false
        description: Whether to render a Dovecot LMTP TCP listener

      mail_opendkim_enabled:
        type: bool
        required: false
        description: Whether to configure OpenDKIM on this host

      mail_filter_milter_enabled:
        type: bool
        required: false
        description: Whether to configure the filter/rewrite milter on this host

      mail_list_aliases_enabled:
        type: bool
        required: false
        description: Whether to configure Postfix mailing-list aliases on this host

      mail_list_api_enabled:
        type: bool
        required: false
        description: Whether to deploy the mailing-list API on this host

      mail_vmail_identity_enabled:
        type: bool
        required: false
        description: Whether to create the vmail user and group on this host

      mail_vmail_home_enabled:
        type: bool
        required: false
        description: Whether to create the vmail home/Maildir storage root on this host

      mail_dovecot_passwd_file_enabled:
        type: bool
        required: false
        description: Whether to render the local Dovecot passwd-file on this host

      mail_tls_enabled:
        type: bool
        required: false
        description: Whether to deploy mail TLS material on this host

      mail_ldap_verify_enabled:
        type: bool
        required: false
        description: Whether to run mail-role LDAPS verification from this host

      # DNS zone bridge
      mail_zone_name:
        type: str
        required: false
        description: >-
          DNS zone name for the mail server

      mail_alias_domain:
        type: str
        required: false
        description: >-
          Secondary virtual mailbox domain

      # Postfix
      mail_postfix_packages:
        type: list
        elements: str
        required: false
        description: DNF packages to install for Postfix SMTP

      mail_postfix_service_name:
        type: str
        required: false
        description: Systemd unit name for the Postfix service

      mail_postfix_conf_dir:
        type: str
        required: false
        description: Absolute path to the Postfix configuration directory

      mail_postfix_ldap_sender_login_maps_path:
        type: str
        required: false
        description: Absolute path to the Postfix LDAP sender-login map configuration

      mail_postfix_ldap_virtual_mailbox_maps_path:
        type: str
        required: false
        description: Absolute path to the Postfix LDAP virtual-mailbox map configuration

      # Dovecot
      mail_dovecot_packages:
        type: list
        elements: str
        required: false
        description: DNF packages to install for Dovecot IMAP

      mail_dovecot_service_name:
        type: str
        required: false
        description: Systemd unit name for the Dovecot service

      mail_dovecot_conf_dir:
        type: str
        required: false
        description: Absolute path to the Dovecot configuration directory

      mail_dovecot_passwd_path:
        type: str
        required: false
        description: Absolute path for the Dovecot passwd-file on the target host

      mail_dovecot_ldap_account_gate_path:
        type: str
        required: false
        description: Absolute path for the Dovecot LDAP account-gate configuration

      mail_dovecot_auth_socket_path:
        type: str
        required: false
        description: >-
          Path for the Dovecot auth socket inside the Postfix chroot for SASL authentication

      mail_dovecot_lmtp_socket_path:
        type: str
        required: false
        description: >-
          Path for the Dovecot LMTP socket inside the Postfix chroot for mailbox delivery

      mail_dovecot_lmtp_listen_address:
        type: str
        required: false
        description: Address for the optional Dovecot LMTP TCP listener

      mail_dovecot_lmtp_listen_port:
        type: int
        required: false
        description: Port for the optional Dovecot LMTP TCP listener

      mail_dovecot_protocols:
        type: list
        elements: str
        required: false
        description: Dovecot protocols enabled on this host

      mail_postfix_virtual_transport:
        type: str
        required: false
        description: Postfix virtual transport target for mailbox delivery

      mail_postfix_smtpd_sasl_path:
        type: str
        required: false
        description: Postfix Dovecot SASL path

      mail_postfix_mynetworks:
        type: list
        elements: str
        required: false
        description: >-
          List of trusted network CIDR ranges for Postfix mynetworks.
          Defaults to [127.0.0.0/8, 192.168.255.0/28].

      # Managed domains
      mail_managed_domains:
        type: list
        elements: str
        required: false
        description: >-
          List of domains managed by this mail server. Defaults to
          [mail_zone_name, mail_alias_domain] derived from DNS identity.

      # Virtual mailbox user
      mail_vmail_user:
        type: str
        required: false
        description: System username for the shared vmail identity

      mail_vmail_group:
        type: str
        required: false
        description: System group for the shared vmail identity

      mail_vmail_home:
        type: str
        required: false
        description: Home directory for the vmail user and Maildir storage root

      # Local virtual users
      mail_local_users:
        type: list
        elements: str
        required: false
        description: Local virtual user names for passwd-file authentication

      mail_local_user_password_hashes:
        type: dict
        required: false
        description: >-
          Dictionary mapping local user names to hashed passwords for Dovecot passwd-file.
          Must contain keys for all entries in mail_local_users.
          Asserted non-empty for each user at runtime when mail_enabled is true (no_log: true).

      # TLS
      mail_tls_certificate:
        type: str
        required: false
        description: >-
          PEM-encoded TLS certificate content.
          Asserted non-empty at runtime when mail_enabled is true (no_log: true).

      mail_tls_private_key:
        type: str
        required: false
        description: >-
          PEM-encoded TLS private key content.
          Asserted non-empty at runtime when mail_enabled is true (no_log: true).

      mail_tls_cert_path:
        type: str
        required: false
        description: Absolute path for the TLS certificate PEM file on the target host

      mail_tls_key_path:
        type: str
        required: false
        description: Absolute path for the TLS private key PEM file on the target host

      # DKIM
      mail_dkim_selector:
        type: str
        required: false
        description: DKIM selector name used for DNS TXT records and key file naming

      mail_dkim_private_keys:
        type: dict
        required: false
        description: >-
          Dictionary mapping DKIM selector names to PEM-encoded private keys.
          Must contain a key matching mail_dkim_selector.

      # OpenDKIM
      mail_opendkim_packages:
        type: list
        elements: str
        required: false
        description: DNF packages to install for OpenDKIM signing and verification

      mail_opendkim_user:
        type: str
        required: false
        description: System user identity for the OpenDKIM daemon

      mail_opendkim_group:
        type: str
        required: false
        description: System group identity for the OpenDKIM daemon

      mail_opendkim_service_name:
        type: str
        required: false
        description: Systemd unit name for the OpenDKIM milter service

      mail_opendkim_conf_dir:
        type: str
        required: false
        description: Absolute path to the OpenDKIM configuration directory

      mail_opendkim_main_config:
        type: str
        required: false
        description: Absolute path to the main OpenDKIM configuration file

      mail_opendkim_keys_dir:
        type: str
        required: false
        description: Absolute path to the OpenDKIM private key storage directory

      mail_opendkim_private_key_path:
        type: str
        required: false
        description: >-
          Absolute path to the DKIM private key file derived from mail_opendkim_keys_dir
          and mail_dkim_selector

      mail_opendkim_socket_port:
        type: int
        required: false
        description: >-
          TCP port for the OpenDKIM milter listener; used to derive both socket format strings

      mail_opendkim_socket:
        type: str
        required: false
        description: >-
          OpenDKIM-side milter socket address in inet:port@host syntax for the service listener

      mail_opendkim_postfix_socket:
        type: str
        required: false
        description: >-
          Milter socket address in Postfix inet:host:port syntax for the milter client

      # Mailing-list API
      mail_list_api_service_name:
        type: str
        required: false
        description: Systemd unit name for the list API service

      mail_list_api_listen_host:
        type: str
        required: false
        description: IP address or hostname the API service listens on

      mail_list_api_listen_port:
        type: int
        required: false
        description: TCP port the API service listens on

      mail_list_api_packages:
        type: list
        elements: str
        required: false
        description: DNF packages required for the list API runtime

      mail_list_api_python_requirements:
        type: list
        elements: str
        required: false
        description: >-
          Pip-installable Python package version pins for the list API runtime

      mail_list_api_venv_dir:
        type: str
        required: false
        description: >-
          Absolute path for the list API Python virtual environment

      mail_list_api_app_dir:
        type: str
        required: false
        description: >-
          Absolute path for the list API application source directory on the target host

      mail_list_api_state_dir:
        type: str
        required: false
        description: >-
          Absolute path for root-owned dynamic list state and source/database map files

      mail_list_static_alias_path:
        type: str
        required: false
        description: >-
          Absolute path for the Ansible-managed static list alias source map

      mail_list_dynamic_source_path:
        type: str
        required: false
        description: >-
          Absolute path for the API-managed dynamic list alias source map

      mail_virtual_mailbox_maps_path:
        type: str
        required: false
        description: >-
          Absolute path for the Postfix virtual mailbox recipient source map

      mail_list_reserved_names:
        type: list
        elements: str
        required: false
        description: >-
          List of reserved list names that the API must reject for create/delete

      # Filter/rewrite milter defaults
      mail_filter_milter_service_name:
        type: str
        required: false
        description: Systemd unit name for the filter/rewrite milter service

      mail_filter_milter_user:
        type: str
        required: false
        description: System user identity for the filter/rewrite milter daemon

      mail_filter_milter_group:
        type: str
        required: false
        description: System group identity for the filter/rewrite milter daemon

      mail_filter_milter_packages:
        type: list
        elements: str
        required: false
        description: DNF packages required for the filter/rewrite milter runtime

      mail_filter_milter_python_requirements:
        type: list
        elements: str
        required: false
        description: Pip-installable Python package version pins for the milter runtime

      mail_filter_milter_venv_dir:
        type: str
        required: false
        description: Absolute path for the filter milter Python virtual environment

      mail_filter_milter_app_dir:
        type: str
        required: false
        description: Absolute path for the filter milter application directory on the target host

      mail_filter_milter_app_path:
        type: str
        required: false
        description: Absolute path for the rendered milter application module

      mail_filter_milter_socket_port:
        type: int
        required: false
        description: TCP port the filter milter listens on; used to derive both socket format strings

      mail_filter_milter_socket_addr:
        type: str
        required: false
        description: Milter socket address in inet:port@host syntax for the milter service listener

      mail_filter_milter_postfix_socket:
        type: str
        required: false
        description: Milter socket address in Postfix inet:host:port syntax for the milter client

      mail_filter_milter_timeout:
        type: int
        required: false
        description: Milter I/O timeout in seconds for the Postfix client connection

      mail_filter_spam_tag:
        type: str
        required: false
        description: Subject tag prepended to messages identified as spam

      mail_filter_test_prefix:
        type: str
        required: false
        description: Subject prefix prepended to mail sent by the test user

      # Milter slot
      mail_pre_dkim_milters:
        type: list
        elements: str
        required: false
        description: >-
          List of milter socket addresses to insert before OpenDKIM in the
          Postfix milter chain

      # LDAP
      mail_ldap_enabled:
        type: bool
        required: false
        description: >-
          Whether LDAP integration is active

      mail_ldap_host:
        type: str
        required: false
        description: >-
          FQDN of the LDAP server to connect to. Defaults to ldap_server_fqdn
          from the shared LDAP identity (ldap_identity.yml).

      mail_ldap_base_dn:
        type: str
        required: false
        description: >-
          Base DN for LDAP searches. Defaults to ldap_base_dn from the shared
          LDAP identity (ldap_identity.yml).

      mail_ldap_uri:
        type: str
        required: false
        description: >-
          LDAPS URI for the LDAP server. Defaults to ldap_server_uri from the
          shared LDAP identity (ldap_identity.yml).

      mail_ldap_ca_cert_path:
        type: str
        required: false
        description: >-
          Absolute path to the LDAP CA certificate on the target host.
          Defaults to ldap_tls_ca_cert_path from the shared LDAP identity.

      mail_ldap_ca_cert:
        type: str
        required: false
        description: >-
          Optional PEM-encoded LDAP CA certificate content to deploy on the mail host.
          Defaults to ldap_tls_ca_certificate from the shared LDAP identity.

      ldap_tls_ca_certificate:
        type: str
        required: false
        description: >-
          Shared LDAP CA certificate PEM content from ldap_identity.yml.
          Used as fallback when mail_ldap_ca_cert is empty.

      ldap_tls_ca_cert_path:
        type: str
        required: false
        description: >-
          Shared LDAP CA certificate anchor path from ldap_identity.yml.
          Default for mail_ldap_ca_cert_path.

      ldap_tls_ca_source_host:
        type: str
        required: false
        description: >-
          Shared inventory hostname to slurp the LDAP CA certificate from.
          Used when both mail_ldap_ca_cert and ldap_tls_ca_certificate are empty.

      ldap_tls_ca_source_path:
        type: str
        required: false
        description: >-
          Shared absolute path to the LDAP CA certificate on the source host.
          Used when both mail_ldap_ca_cert and ldap_tls_ca_certificate are empty.

      mail_ldap_bind_dn:
        type: str
        required: false
        description: >-
          Optional LDAP bind DN for mail-role LDAPS verification searches

      mail_ldap_bind_password:
        type: str
        required: false
        description: >-
          Optional LDAP bind password for mail-role LDAPS verification searches

      mail_dovecot_ldap_packages:
        type: list
        elements: str
        required: false
        description: DNF packages required for Dovecot LDAP support

      mail_ldap_assert_packages:
        type: list
        elements: str
        required: false
        description: DNF packages required for LDAP connectivity assertions

      mail_ldap_users:
        type: list
        elements: str
        required: false
        description: >-
          List of LDAP usernames for verifier and sender-login maps

      mail_ldap_forbidden_users:
        type: list
        elements: str
        required: false
        description: >-
          LDAP usernames that must never be accepted by mail LDAP allow-lists
