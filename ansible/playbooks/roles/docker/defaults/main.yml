---
# Component gate. Hosts opt into Docker by setting this true in host_vars.
docker_enabled: false

docker_image_archives: []
docker_containers: []
docker_container_network_mode: bridge
docker_container_restart_policy: unless-stopped

docker_binfmt_enabled: false
docker_binfmt_image: tonistiigi/binfmt:qemu-v10.0.4
docker_binfmt_test_image: alpine:3.23
