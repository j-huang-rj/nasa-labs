---
- name: "PHASE [install : START]"
  become: false
  ansible.builtin.debug:
    msg: "Install packages and enable Docker service"
- name: "PHASE [install : Add Docker CE Repository]"
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: Docker CE Stable
    baseurl: https://download.docker.com/linux/rhel/$releasever/$basearch/stable
    gpgcheck: true
    gpgkey: https://download.docker.com/linux/rhel/gpg

- name: "PHASE [install : Install Docker CE Packages]"
  ansible.builtin.dnf:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: "PHASE [install : Add User To Docker Group]"
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true

- name: "PHASE [install : Enable And Start Docker Service]"
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: "PHASE [install : Reset Connection For Group Changes]"
  ansible.builtin.meta: reset_connection

- name: "PHASE [install : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed install phase"
