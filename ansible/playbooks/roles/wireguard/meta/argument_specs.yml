---
argument_specs:
  main:
    short_description: Validate wireguard role variables

    options:
      wireguard_enabled:
        type: bool
        required: false
        default: false
        description: Whether the wireguard role should be active on this host

      wireguard_address:
        type: str
        required: true
        description: Tunnel IP address with prefix (e.g. 10.10.10.2/28)

      wireguard_private_key:
        type: str
        required: true
        no_log: true
        description: Base64-encoded private key for this peer

      wireguard_peer_public_key:
        type: str
        required: true
        description: Base64-encoded public key of the remote peer

      wireguard_preshared_key:
        type: str
        required: true
        no_log: true
        description: Base64-encoded preshared key for extra layer of security

      wireguard_allowed_ips:
        type: str
        required: true
        description: Comma-separated CIDRs routed through the tunnel (e.g. 0.0.0.0/0)

      wireguard_peer_endpoint:
        type: str
        required: true
        description: Remote peer address and port for initial connection (e.g. 1.2.3.4:51820)

      wireguard_persistent_keepalive:
        type: int
        required: false
        default: 5
        description: Seconds between keepalive packets; 0 disables keepalive

      wireguard_healthcheck_targets:
        type: list
        elements: str
        required: false
        default:
          - "{{ lab_nasa_root_ip }}"
        description: ICMP targets that must be reachable after the tunnel starts; empty disables health checks

      wireguard_healthcheck_retries:
        type: int
        required: false
        default: 3
        description: Number of retries for post-restart health verification

      wireguard_healthcheck_delay:
        type: int
        required: false
        default: 2
        description: Delay in seconds between post-restart health verification attempts

      wireguard_healthcheck_timeout:
        type: int
        required: false
        default: 2
        description: Per-ping timeout in seconds for WireGuard health checks
