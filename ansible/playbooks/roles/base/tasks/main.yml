---
- name: "START"
  become: false
  ansible.builtin.debug:
    msg: "Starting execution of base role"

- name: "PHASE [main : Verify SSH Connectivity]"
  ansible.builtin.import_tasks: ping.yml

- name: "PHASE [main : Assert Role Variables]"
  ansible.builtin.import_tasks: assert.yml

- name: "PHASE [main : Configure Base System]"
  ansible.builtin.import_tasks: setup.yml

- name: "END"
  become: false
  ansible.builtin.debug:
    msg: "Completed execution of base role"
