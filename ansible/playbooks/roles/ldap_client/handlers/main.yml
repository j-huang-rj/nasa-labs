---
- name: "PHASE [handler : Restart SSSD]"
  ansible.builtin.systemd_service:
    name: sssd
    daemon_reload: true
    enabled: true
    state: restarted

- name: "PHASE [handler : Restart sshd]"
  ansible.builtin.systemd_service:
    name: sshd
    daemon_reload: true
    enabled: true
    state: restarted
