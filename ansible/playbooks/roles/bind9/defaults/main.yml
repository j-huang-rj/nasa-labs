---
# Package and service defaults
bind9_packages:
  - bind
  - bind-utils
bind9_service_name: named

# Filesystem paths
bind9_conf_path: /etc/named.conf
bind9_conf_dir: /etc/named
bind9_zone_dir: /var/named
bind9_dynamic_zone_dir: /var/named/dynamic

# Runtime identity to derive VPN subnet info from
bind9_identity_source_host: router-01

# SOA admin contact
bind9_soa_admin: "admin"

# ACL CIDR defaults
bind9_dmz_cidr: "172.16.0.0/24"
bind9_internal_cidr: "172.16.1.0/24"

# VPN host IP offsets
bind9_vpn_router_offset: 1
bind9_vpn_client_offset: 2
bind9_vpn_ns_offset: 3

# SOA serial format: YYYYMMDDHH (10 digits, fits uint32).
# Idempotent within an hour; auto-bumps each hour so same-day re-edits during
# lab testing produce a higher serial without manual intervention.
# If you need sub-hour bumping, manually increment zone data or wait for the
# hour to roll over. For production, consider a content-hash or read-and-bump serial.

# View and zone data for authoritative_primary mode
bind9_views: []
bind9_zones: []

# Upstream forwarders for resolver mode. When non-empty, resolver config
# emits `forwarders { ... }; forward only;` and skips root-based recursion.
bind9_forwarders: []

# Whether the resolver verify task should assert external recursion works.
# Leave false until forwarders (and any static-stub zones) are configured;
# otherwise the verify step fails by design.
bind9_resolver_expect_external: false

# TSIG key configuration — loaded from gitignored host_vars/*/secrets.yml
# on authoritative hosts. The secret itself is never committed; only the
# schema and default name/algorithm are tracked here.
bind9_tsig_key:
  name: lab_ddns_shared
  algorithm: hmac-sha256
  secret: ""

# Path for the rendered TSIG key include file.
bind9_keys_conf_path: /etc/named/named.keys.conf
