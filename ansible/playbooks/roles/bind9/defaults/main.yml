---
# Package and service defaults
bind9_packages:
  - bind
  - bind-utils
bind9_service_name: named

# Filesystem paths
bind9_conf_path: /etc/named.conf
bind9_conf_dir: /etc/named
bind9_zone_dir: /var/named
bind9_dynamic_zone_dir: /var/named/dynamic

# SOA admin contact
bind9_soa_admin: "admin"

# ACL CIDR defaults
bind9_dmz_cidr: "172.16.0.0/24"
bind9_internal_cidr: "172.16.1.0/24"

# VPN host IP offsets
bind9_vpn_router_offset: 1
bind9_vpn_client_offset: 2
bind9_vpn_ns_offset: 3

# View and zone data for authoritative_primary mode
bind9_views: []
bind9_zones: []

# Dynamic update hosts. The role's update-policy template binds these names
# (e.g. "dynamic1.<zone>") to the bind9_tsig_key.
bind9_dynamic_hosts:
  - "dynamic1"
  - "dynamic2"
  - "dynamic3"
  - "dynamic4"

# Upstream forwarders for resolver mode. When non-empty, resolver config
# emits `forwarders { ... }; forward only;` and skips root-based recursion.
bind9_forwarders: []

# TSIG key configuration
bind9_tsig_key:
  name: lab_ddns_shared
  algorithm: hmac-sha256
  secret: ""

# Optional second TSIG key, used to discriminate public-view AXFR
# connections from IP-based view selection on the primary. When the
# secret is empty (default) the key block is not rendered into
# named.keys.conf and is treated as absent.
bind9_axfr_key:
  name: lab_axfr_public
  algorithm: hmac-sha256
  secret: ""

# Path for the rendered TSIG key
bind9_keys_conf_path: /etc/named/named.keys.conf

# DNSSEC signing policy for authoritative zones.
# When at least one zone declares dnssec_policy,
# BIND signs that zone using this policy's algorithm and digest settings.
bind9_dnssec_policy:
  name: nasa-lab
  key_directory: /etc/named/keys
  csk:
    algorithm: ECDSAP256SHA256
    lifetime: unlimited

# Pre-generated DNSSEC key material for distribution to the primary NS.
# Each item is a dict with keys: zone, basename, public, private, state.
# The .state file pins the key's role (KSK + ZSK = CSK) so dnssec-policy's
# keymgr accepts the pre-distributed key instead of retiring it and minting
# a fresh one on every restart.
# Populated from secrets.yml on the control node; the empty default means
# no keys are distributed when the variable is omitted.
bind9_dnssec_key_material: []

# Runtime metadata that BIND 9.18 keymgr writes into key files at runtime.
# These lines are CDS-rollover and last-rotation timestamps — irrelevant
# under our pinned-CSK + unlimited-lifetime model. We strip them from both
# desired and on-disk content before comparing, so distribution tasks only
# report `changed` when the actual key material drifts (e.g., on rotation),
# not when keymgr merely annotates its own state.
# Patterns are POSIX ERE compatible with Jinja2 regex_replace (`(?m)` inline).
bind9_keymgr_runtime_strip:
  key: '(?m)^;\s*SyncPublish:.*\n?'
  private: '(?m)^SyncPublish:.*\n?'
  state: '(?m)^(PublishCDS|DNSKEYChange|ZRRSIGChange|KRRSIGChange|DSChange|DNSKEYState|ZRRSIGState|KRRSIGState|DSState|GoalState):.*\n?'

# SOA serial: computed per-zone via the bind9_zone_serial filter plugin
# using a read-and-bump strategy.
#
# On each playbook run, the bind9_zone_state module reads the current serial
# and content hash from each existing zone file. The filter then:
#   1. Computes a content hash from zone data (name, MNAME, SOA minus serial,
#      NS records, resource records).
#   2. If the hash matches the stored hash, the serial is unchanged (idempotent).
#   3. If the hash differs, the serial is bumped: max(current + 1, YYYYMMDD00).
#   4. For first deployment, the serial starts at YYYYMMDD00.
#
# The content hash is stored in a `<zone_file>.hash` sidecar file alongside
# each zone so it can be read back on the next playbook run. The sidecar
# is used because BIND rewrites zones with update-policy in canonical format
# whenever the journal is merged, which strips embedded comments.
# The role gates re-render on hash equality, so an idempotent run leaves DDNS
# zones and their journals untouched.
#
# Known limitation: any inventory change to a DDNS-managed zone WILL
# discard the live journal and overwrite live dynamic records with the
# static model. DDNS zones should be seeded once and then excluded from
# ongoing templating, or managed separately.
