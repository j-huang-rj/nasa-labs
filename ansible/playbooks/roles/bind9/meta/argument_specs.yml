---
argument_specs:
  main:
    short_description: Validate bind9 role variables
    options:
      bind9_enabled:
        type: bool
        required: true
      bind9_mode:
        type: str
        required: true
        choices:
          - authoritative_primary
          - authoritative_secondary
          - resolver
      bind9_listen_ipv4:
        type: list
        elements: str
        required: true
      bind9_packages:
        type: list
        elements: str
        required: false
      bind9_service_name:
        type: str
        required: false
      bind9_conf_path:
        type: str
        required: false
      bind9_conf_dir:
        type: str
        required: false
      bind9_zone_dir:
        type: str
        required: false
      bind9_dynamic_zone_dir:
        type: str
        required: false
      bind9_identity_source_host:
        type: str
        required: false
      bind9_views:
        type: list
        elements: dict
        required: false
        description: >-
          List of view definitions for authoritative_primary mode.
          Each entry must have name, order, and match_clients keys.
      bind9_zones:
        type: list
        elements: dict
        required: false
        description: >-
          List of zone definitions for authoritative_primary mode.
          Each entry must have name, view, type, and file keys.
