---
argument_specs:
  main:
    short_description: Validate bind9 role variables
    options:
      bind9_enabled:
        type: bool
        required: true
      bind9_mode:
        type: str
        required: true
        choices:
          - authoritative_primary
          - authoritative_secondary
          - resolver
      bind9_listen_ipv4:
        type: list
        elements: str
        required: true
      bind9_packages:
        type: list
        elements: str
        required: false
      bind9_service_name:
        type: str
        required: false
      bind9_conf_path:
        type: str
        required: false
      bind9_conf_dir:
        type: str
        required: false
      bind9_zone_dir:
        type: str
        required: false
      bind9_dynamic_zone_dir:
        type: str
        required: false
      bind9_config_validate_enabled:
        type: bool
        required: false
      bind9_runtime_verify_enabled:
        type: bool
        required: false
      bind9_identity_source_host:
        type: str
        required: false
