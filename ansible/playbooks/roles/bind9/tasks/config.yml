---
- name: "PHASE [config : START]"
  become: false
  ansible.builtin.debug:
    msg: "Generate bind9 configuration"

- name: "PHASE [config : Create bind9 Configuration Directory]"
  ansible.builtin.file:
    path: "{{ bind9_conf_dir }}"
    state: directory
    owner: root
    group: named
    mode: "0750"
    setype: "named_conf_t"

- name: "PHASE [config : Create Dynamic Zone Directory]"
  ansible.builtin.file:
    path: "{{ bind9_dynamic_zone_dir }}"
    state: directory
    owner: named
    group: named
    mode: "0750"
    setype: "named_cache_t"

- name: "PHASE [config : Render Main named.conf]"
  ansible.builtin.template:
    src: named.conf.j2
    dest: "{{ bind9_conf_path }}"
    owner: root
    group: named
    mode: "0640"
    setype: "named_conf_t"
  notify: "PHASE [handler : Restart named]"

- name: "PHASE [config : Render named Options Conf]"
  ansible.builtin.template:
    src: named.options.conf.j2
    dest: "{{ bind9_conf_dir }}/named.options.conf"
    owner: root
    group: named
    mode: "0640"
    setype: "named_conf_t"
  notify: "PHASE [handler : Restart named]"

- name: "PHASE [config : Render ACL Conf]"
  ansible.builtin.template:
    src: named.acl.conf.j2
    dest: "{{ bind9_conf_dir }}/named.acl.conf"
    owner: root
    group: named
    mode: "0640"
    setype: "named_conf_t"
  notify: "PHASE [handler : Restart named]"

- name: "PHASE [config : Render TSIG Keys Conf]"
  when: bind9_mode != 'resolver'
  ansible.builtin.template:
    src: named.keys.conf.j2
    dest: "{{ bind9_keys_conf_path }}"
    owner: root
    group: named
    mode: "0640"
    setype: "named_conf_t"
  notify: "PHASE [handler : Restart named]"

- name: "PHASE [config : Render Zones Conf]"
  when: bind9_mode != 'resolver'
  ansible.builtin.template:
    src: named.zones.conf.j2
    dest: "{{ bind9_conf_dir }}/named.zones.conf"
    owner: root
    group: named
    mode: "0640"
    setype: "named_conf_t"
  notify: "PHASE [handler : Restart named]"

- name: "PHASE [config : Create Private Zone Directory]"
  when: bind9_mode == 'authoritative_primary'
  ansible.builtin.file:
    path: "{{ bind9_zone_dir }}/private"
    state: directory
    owner: named
    group: named
    mode: "0750"
    setype: "named_zone_t"

- name: "PHASE [config : Create Public Zone Directory]"
  when: bind9_mode == 'authoritative_primary'
  ansible.builtin.file:
    path: "{{ bind9_zone_dir }}/public"
    state: directory
    owner: named
    group: named
    mode: "0750"
    setype: "named_zone_t"

- name: "PHASE [config : Create Slave Zone Directory]"
  when: bind9_mode == 'authoritative_secondary'
  ansible.builtin.file:
    path: "{{ bind9_zone_dir }}/slaves"
    state: directory
    owner: named
    group: named
    mode: "0750"
    setype: "named_cache_t"

- name: "PHASE [config : Create Slave Per-View Subdirectories]"
  when: bind9_mode == 'authoritative_secondary'
  ansible.builtin.file:
    path: "{{ bind9_zone_dir }}/slaves/{{ item }}"
    state: directory
    owner: named
    group: named
    mode: "0750"
    setype: "named_cache_t"
  loop:
    - private
    - public

- name: "PHASE [config : Read Current Zone State]"
  when: bind9_mode == 'authoritative_primary'
  bind9_zone_state:
    zone_dir: "{{ bind9_zone_dir }}"
    zone_files: "{{ bind9_zones | selectattr('type', 'equalto', 'master') | map(attribute='file') | list }}"
  register: bind9_zone_state_raw

- name: "PHASE [config : Set Zone Current State Fact]"
  when: bind9_mode == 'authoritative_primary'
  ansible.builtin.set_fact:
    bind9_zone_current_state: "{{ bind9_zone_state_raw.zone_state }}"

# Compute the desired serial + hash for every primary zone once.
# Pre-computing means the template render and the sidecar write share a
# single source of truth, and downstream tasks can gate on a stable
# hash-equality check (`render_state.hash != current_state.hash`) instead
# of relying on file-content diffing — which is unreliable for DDNS zones
# because BIND rewrites those files in canonical format.
- name: "PHASE [config : Compute Zone Render State]"
  when: bind9_mode == 'authoritative_primary'
  ansible.builtin.set_fact:
    bind9_zone_render_state: >-
      {{ bind9_zone_render_state | default({}) | combine({
        item.file: item | bind9_zone_serial(
          primary_mname=bind9_primary_mname,
          date_prefix=bind9_soa_serial_date,
          current_serial=bind9_zone_current_state[item.file].serial,
          current_hash=bind9_zone_current_state[item.file].hash
        )
      }) }}
  loop: "{{ bind9_zones | selectattr('type', 'equalto', 'master') | list }}"
  loop_control:
    label: "{{ item.name }}"

# DDNS journals are only stale relative to the static template if we are
# actually about to re-render the zone. Gate on hash-equality so an
# idempotent run leaves both the static file and the live journal alone.
- name: "PHASE [config : Remove Stale DDNS Journal Files Before Re-Render]"
  when:
    - bind9_mode == 'authoritative_primary'
    - item.dynamic_update_scope is defined
    - bind9_zone_render_state[item.file].hash != bind9_zone_current_state[item.file].hash
  ansible.builtin.file:
    path: "{{ bind9_zone_dir }}/{{ item.file }}.jnl"
    state: absent
  loop: "{{ bind9_zones | selectattr('type', 'equalto', 'master') | list }}"
  loop_control:
    label: "{{ item.name }} ({{ item.view }})"
  notify: "PHASE [handler : Restart named]"

# Skip the render entirely when the inventory hash already matches the
# on-disk hash. This keeps DDNS zones idempotent: BIND is free to rewrite
# the file in canonical format and merge journal entries, but as long as
# the static inventory model hasn't changed, we leave the file alone.
- name: "PHASE [config : Render Zone Data Files]"
  when:
    - bind9_mode == 'authoritative_primary'
    - bind9_zone_render_state[item.file].hash != bind9_zone_current_state[item.file].hash
  ansible.builtin.template:
    src: db.zone.j2
    dest: "{{ bind9_zone_dir }}/{{ item.file }}"
    owner: named
    group: named
    mode: "0640"
    setype: "{{ 'named_cache_t' if (item.dynamic_update_scope is defined) else 'named_zone_t' }}"
  loop: "{{ bind9_zones | selectattr('type', 'equalto', 'master') | list }}"
  loop_control:
    label: "{{ item.name }}"
  notify: "PHASE [handler : Restart named]"

# Persist the content hash in a sidecar file alongside each zone. BIND
# never touches `<zone_file>.hash`, so it survives the canonical rewrite
# that would otherwise strip an in-zone `; zone-hash:` comment. This is
# the durable change-detection marker that the next run reads back via
# the bind9_zone_state module.
- name: "PHASE [config : Write Zone Hash Sidecar Files]"
  when:
    - bind9_mode == 'authoritative_primary'
    - bind9_zone_render_state[item.file].hash != bind9_zone_current_state[item.file].hash
  ansible.builtin.copy:
    content: "{{ bind9_zone_render_state[item.file].hash }}\n"
    dest: "{{ bind9_zone_dir }}/{{ item.file }}.hash"
    owner: root
    group: named
    mode: "0640"
  loop: "{{ bind9_zones | selectattr('type', 'equalto', 'master') | list }}"
  loop_control:
    label: "{{ item.name }}"

- name: "PHASE [config : Flush Handlers]"
  ansible.builtin.meta: flush_handlers

- name: "PHASE [config : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed config phase"
