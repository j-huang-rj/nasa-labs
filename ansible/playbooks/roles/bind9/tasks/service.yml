---
- name: "PHASE [service : START]"
  become: false
  ansible.builtin.debug:
    msg: "Start and validate bind9 service"

- name: "PHASE [service : Validate named Configuration]"
  ansible.builtin.command:
    cmd: named-checkconf {{ bind9_conf_path }}
  changed_when: false

- name: "PHASE [service : Validate Zone Files]"
  when: bind9_mode == 'authoritative_primary'
  ansible.builtin.command:
    cmd: named-checkzone {{ item.name }} {{ bind9_zone_dir }}/{{ item.file }}
  loop: "{{ bind9_zones | selectattr('type', 'equalto', 'master') | list }}"
  loop_control:
    label: "{{ item.name }} ({{ item.view | default('global') }})"
  changed_when: false

- name: "PHASE [service : Enable And Start named Service]"
  ansible.builtin.systemd_service:
    name: "{{ bind9_service_name }}"
    enabled: true
    state: started

- name: "PHASE [service : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed service phase"
