---
- name: "PHASE [verify : START]"
  become: false
  ansible.builtin.debug:
    msg: "Verify bind9 configuration and service state"

- name: "PHASE [verify : Check named service is enabled]"
  ansible.builtin.command:
    cmd: systemctl is-enabled named
  changed_when: false
  register: _bind9_verify_enabled
  failed_when: _bind9_verify_enabled.rc != 0

- name: "PHASE [verify : Check named service is active]"
  ansible.builtin.command:
    cmd: systemctl is-active named
  changed_when: false
  register: _bind9_verify_active
  failed_when: _bind9_verify_active.rc != 0

- name: "PHASE [verify : Check named is listening on configured addresses]"
  ansible.builtin.shell:
    cmd: >-
      ss -ltnu | grep -E '({{ bind9_listen_ipv4 | map("regex_replace", "\\.", "\\.") | join("|") }}):53\s'
  changed_when: false
  register: _bind9_verify_listen
  failed_when: _bind9_verify_listen.rc != 0

- name: "PHASE [verify : Ensure no hardcoded ${ID} in rendered config]"
  ansible.builtin.shell:
    cmd: grep -R '\${ID}' {{ bind9_conf_path }} {{ bind9_conf_dir }}/*.conf || true
  changed_when: false
  register: _bind9_verify_no_id
  failed_when: _bind9_verify_no_id.stdout | length > 0

- name: "PHASE [verify : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed verify phase"