---
- name: "PHASE [verify : START]"
  become: false
  ansible.builtin.debug:
    msg: "Verify bind9 configuration and service state"

- name: "PHASE [verify : Check named service is enabled]"
  ansible.builtin.systemd_service:
    name: "{{ bind9_service_name }}"
    enabled: true
  check_mode: true
  register: _bind9_verify_enabled

- name: "PHASE [verify : Check named service is active]"
  ansible.builtin.systemd_service:
    name: "{{ bind9_service_name }}"
    state: started
  check_mode: true
  register: _bind9_verify_active

- name: "PHASE [verify : Check named is listening on each configured address]"
  ansible.builtin.shell:
    cmd: "set -o pipefail && ss -ltnu | grep -E '{{ item | replace('.', '\\.') }}:53[[:space:]]'"
    executable: /bin/bash
  loop: "{{ bind9_listen_ipv4 }}"
  changed_when: false
  register: _bind9_verify_listen
  failed_when: _bind9_verify_listen.rc != 0

- name: "PHASE [verify : END]"
  become: false
  ansible.builtin.debug:
    msg: "Completed verify phase"
