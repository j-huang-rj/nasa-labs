---
# Cross-host playbook for the resolver, authoritative,
# DNSSEC artifacts, and dynamic-update propagation.
#
# Prerequisites:
#   - site.yml or bootstrap.yml

- name: DNS Services
  ansible.builtin.import_playbook: dns_configure.yml

# ──────────────────────────────────────────────────────────
# E2E: DMZ Agent — resolver queries through dns-01
# ──────────────────────────────────────────────────────────
- name: "E2E DMZ Agent Resolver Verification"
  hosts: dmz-agent-01
  gather_facts: false
  become: true
  vars:
    _e2e_resolver: "{{ hostvars['dns-01'].bind9_listen_ipv4 | reject('equalto', '127.0.0.1') | first }}"
    _e2e_forward_zone: "{{ bind9_forward_zone_name }}"
  tasks:
    - name: "PHASE [e2e-dmz : START]"
      ansible.builtin.debug:
        msg: "E2E resolver verification from DMZ Agent"

    # Private-NS A lookup through resolver
    - name: "PHASE [e2e-dmz : Resolver Private-NS Forward Lookup]"
      ansible.builtin.command:
        cmd: >-
          docker exec nap-agent dig @{{ _e2e_resolver }} private-ns.{{ _e2e_forward_zone }} A +short
      changed_when: false
      register: _e2e_dmz_private_ns

    - name: "PHASE [e2e-dmz : Assert Private-NS Resolves To 172.16.1.53]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'172.16.1.53' in _e2e_dmz_private_ns.stdout"
        fail_msg: >-
          DMZ agent private-ns forward lookup did not return 172.16.1.53 via resolver.
          Got: {{ _e2e_dmz_private_ns.stdout | default('') }}

    # Reverse lookup through resolver
    - name: "PHASE [e2e-dmz : Resolver Reverse Lookup For 172.16.1.53]"
      ansible.builtin.command:
        cmd: "docker exec nap-agent dig @{{ _e2e_resolver }} -x 172.16.1.53 +short"
      changed_when: false
      register: _e2e_dmz_reverse

    - name: "PHASE [e2e-dmz : Assert 172.16.1.53 Reverse Returns Private-NS]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            ('private-ns.' ~ _e2e_forward_zone ~ '.')
            in _e2e_dmz_reverse.stdout
        fail_msg: >-
          DMZ agent reverse lookup for 172.16.1.53 did not return private-ns.{{ _e2e_forward_zone }}.
          Got: {{ _e2e_dmz_reverse.stdout | default('') }}

    # Cloudflare forwarding
    - name: "PHASE [e2e-dmz : Resolver Recursive Google Lookup]"
      ansible.builtin.command:
        cmd: "docker exec nap-agent dig @{{ _e2e_resolver }} google.com A"
      changed_when: false
      register: _e2e_dmz_google
      until: >-
        _e2e_dmz_google.rc == 0
        and 'status: NOERROR' in _e2e_dmz_google.stdout
        and 'ANSWER: 0' not in _e2e_dmz_google.stdout
      retries: 5
      delay: 2

    - name: "PHASE [e2e-dmz : Assert External Domain Resolution]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _e2e_dmz_google.rc == 0
          - "'status: NOERROR' in _e2e_dmz_google.stdout"
          - "'ANSWER: 0' not in _e2e_dmz_google.stdout"
        fail_msg: >-
          DMZ agent cannot resolve external domains through resolver.
          rc={{ _e2e_dmz_google.rc }},
          stdout={{ _e2e_dmz_google.stdout | default('') }},
          stderr={{ _e2e_dmz_google.stderr | default('') }}

    # AD-bit DNSSEC validation — forward zone SOA
    - name: "PHASE [e2e-dmz : Forward Zone SOA AD-bit Check]"
      ansible.builtin.command:
        cmd: >-
          docker exec nap-agent dig @{{ _e2e_resolver }} {{ _e2e_forward_zone }} SOA +dnssec
      changed_when: false
      register: _e2e_dmz_fwd_ad

    - name: "PHASE [e2e-dmz : Assert Forward Zone SOA Has AD Flag]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'ad' in (_e2e_dmz_fwd_ad.stdout | regex_search('flags:[^;]*') | default('') | split())"
          - "'ANSWER: 0' not in _e2e_dmz_fwd_ad.stdout"
        fail_msg: >-
          DMZ agent forward zone SOA response from resolver missing AD flag or has empty answer.
          DNSSEC validation may not be working for {{ _e2e_forward_zone }}.
          stdout={{ _e2e_dmz_fwd_ad.stdout | default('') }}

    - name: "PHASE [e2e-dmz : END]"
      ansible.builtin.debug:
        msg: "E2E DMZ agent resolver verification complete"

# ──────────────────────────────────────────────────────────
# E2E: Private Agent — resolver queries through dns-01
# ──────────────────────────────────────────────────────────
- name: "E2E Private Agent Resolver Verification"
  hosts: internal-agent-01
  gather_facts: false
  become: true
  vars:
    _e2e_resolver: "{{ hostvars['dns-01'].bind9_listen_ipv4 | reject('equalto', '127.0.0.1') | first }}"
    _e2e_forward_zone: "{{ bind9_forward_zone_name }}"
  tasks:
    - name: "PHASE [e2e-private : START]"
      ansible.builtin.debug:
        msg: "E2E Private agent resolver verification"

    # Private-NS A lookup through resolver
    - name: "PHASE [e2e-private : Resolver Private-NS Forward Lookup]"
      ansible.builtin.command:
        cmd: >-
          docker exec nap-agent dig @{{ _e2e_resolver }} private-ns.{{ _e2e_forward_zone }} A +short
      changed_when: false
      register: _e2e_private_private_ns

    - name: "PHASE [e2e-private : Assert Private-NS Resolves To 172.16.1.53]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'172.16.1.53' in _e2e_private_private_ns.stdout"
        fail_msg: >-
          Private agent private-ns forward lookup did not return 172.16.1.53 via resolver.
          Got: {{ _e2e_private_private_ns.stdout | default('') }}

    # Reverse lookup through resolver
    - name: "PHASE [e2e-private : Resolver Reverse Lookup For 172.16.1.53]"
      ansible.builtin.command:
        cmd: "docker exec nap-agent dig @{{ _e2e_resolver }} -x 172.16.1.53 +short"
      changed_when: false
      register: _e2e_private_reverse

    - name: "PHASE [e2e-private : Assert 172.16.1.53 Reverse Returns Private-NS]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            ('private-ns.' ~ _e2e_forward_zone ~ '.')
            in _e2e_private_reverse.stdout
        fail_msg: >-
          Private agent reverse lookup for 172.16.1.53 did not return private-ns.{{ _e2e_forward_zone }}.
          Got: {{ _e2e_private_reverse.stdout | default('') }}

    # Cloudflare forwarding
    - name: "PHASE [e2e-private : Resolver Recursive Google Lookup]"
      ansible.builtin.command:
        cmd: "docker exec nap-agent dig @{{ _e2e_resolver }} google.com A"
      changed_when: false
      register: _e2e_private_google
      until: >-
        _e2e_private_google.rc == 0
        and 'status: NOERROR' in _e2e_private_google.stdout
        and 'ANSWER: 0' not in _e2e_private_google.stdout
      retries: 5
      delay: 2

    - name: "PHASE [e2e-private : Assert External Domain Resolution]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _e2e_private_google.rc == 0
          - "'status: NOERROR' in _e2e_private_google.stdout"
          - "'ANSWER: 0' not in _e2e_private_google.stdout"
        fail_msg: >-
          Private agent cannot resolve external domains through resolver.
          rc={{ _e2e_private_google.rc }},
          stdout={{ _e2e_private_google.stdout | default('') }},
          stderr={{ _e2e_private_google.stderr | default('') }}

    # AD-bit DNSSEC validation — forward zone SOA
    - name: "PHASE [e2e-private : Forward Zone SOA AD-bit Check]"
      ansible.builtin.command:
        cmd: >-
          docker exec nap-agent dig @{{ _e2e_resolver }} {{ _e2e_forward_zone }} SOA +dnssec
      changed_when: false
      register: _e2e_private_fwd_ad

    - name: "PHASE [e2e-private : Assert Forward Zone SOA Has AD Flag]"
      ansible.builtin.assert:
        quiet: true
        that:
          - "'ad' in (_e2e_private_fwd_ad.stdout | regex_search('flags:[^;]*') | default('') | split())"
          - "'ANSWER: 0' not in _e2e_private_fwd_ad.stdout"
        fail_msg: >-
          Private agent forward zone SOA response from resolver missing AD flag or has empty answer.
          DNSSEC validation may not be working for {{ _e2e_forward_zone }}.
          stdout={{ _e2e_private_fwd_ad.stdout | default('') }}

    - name: "PHASE [e2e-private : END]"
      ansible.builtin.debug:
        msg: "E2E Private agent resolver verification complete"

# ──────────────────────────────────────────────────────────
# E2E: Mail DNS records and secondary mail-zone mirroring
# ──────────────────────────────────────────────────────────
- name: "E2E Mail DNS Verification"
  hosts: primary-ns-01
  gather_facts: false
  become: true
  vars:
    _e2e_resolver: "{{ hostvars['dns-01'].bind9_listen_ipv4 | reject('equalto', '127.0.0.1') | first }}"
    _e2e_primary: "{{ bind9_listen_ipv4 | reject('equalto', '127.0.0.1') | first }}"
    _e2e_secondary: "{{ bind9_secondary_ns_ip }}"
    _e2e_forward_zone: "{{ bind9_forward_zone_name }}"
    _e2e_mail_domain: "{{ mail_alias_domain }}"
    _e2e_client_fqdn: "client.{{ bind9_forward_zone_name }}."
    _e2e_mail_private_ip: "{{ mail_endpoint_dmz_ip }}"
    _e2e_public_client_reverse_label: >-
      {{ (bind9_vpn_network_base | int) + (bind9_vpn_client_offset | int) }}
    _e2e_mail_private_a_checks:
      - label: smtp
        qname: "smtp.{{ bind9_forward_zone_name }}"
      - label: imap
        qname: "imap.{{ bind9_forward_zone_name }}"
    _e2e_mail_mx_checks:
      - label: primary domain
        qname: "{{ bind9_forward_zone_name }}"
      - label: mail domain
        qname: "{{ mail_alias_domain }}"
    _e2e_mail_txt_checks:
      - label: primary SPF
        qname: "{{ bind9_forward_zone_name }}"
        token: "{{ mail_spf_value }}"
      - label: primary DKIM
        qname: "{{ mail_dkim_selector }}._domainkey.{{ bind9_forward_zone_name }}"
        token: "v=DKIM1"
      - label: primary DMARC
        qname: "_dmarc.{{ bind9_forward_zone_name }}"
        token: "{{ mail_dmarc_value }}"
      - label: mail-domain SPF
        qname: "{{ mail_alias_domain }}"
        token: "{{ mail_spf_value }}"
      - label: mail-domain DKIM
        qname: >-
          {{ mail_dkim_selector }}._domainkey.{{ mail_alias_domain }}
        token: "v=DKIM1"
      - label: mail-domain DMARC
        qname: "_dmarc.{{ mail_alias_domain }}"
        token: "{{ mail_dmarc_value }}"
  tasks:
    - name: "PHASE [e2e-mail : START]"
      ansible.builtin.debug:
        msg: "E2E mail DNS record and secondary mirror verification"

    - name: "PHASE [e2e-mail : Render Scoped TSIG Keyfile]"
      ansible.builtin.include_tasks: roles/bind9/tasks/tsig_setup.yml
      vars:
        _keyfiles_label_prefix: "E2E Mail - "

    - name: "PHASE [e2e-mail : Mail DNS Exercise]"
      block:
        - name: "PHASE [e2e-mail : Flush Resolver Cache]"
          ansible.builtin.command:
            cmd: rndc flush
          changed_when: false
          become: true
          delegate_to: dns-01

        - name: "PHASE [e2e-mail : Resolver Mail A Lookups]"
          ansible.builtin.command:
            cmd: >-
              docker exec nap-agent dig @{{ _e2e_resolver }} {{ item.qname }} A +short
          changed_when: false
          register: _e2e_mail_a
          delegate_to: dmz-agent-01
          loop: "{{ _e2e_mail_private_a_checks }}"
          loop_control:
            label: "{{ item.label }}"

        - name: "PHASE [e2e-mail : Assert Mail A Records Resolve Privately]"
          ansible.builtin.assert:
            quiet: true
            that:
              - _e2e_mail_private_ip in _e2e_mail_a.results[idx].stdout
            fail_msg: >-
              Mail {{ item.label }} A lookup did not return {{ _e2e_mail_private_ip }}
              through the private resolver. Got: {{ _e2e_mail_a.results[idx].stdout | default('') }}
          loop: "{{ _e2e_mail_private_a_checks }}"
          loop_control:
            index_var: idx
            label: "{{ item.label }}"

        - name: "PHASE [e2e-mail : Resolver Mail MX Lookups]"
          ansible.builtin.command:
            cmd: >-
              docker exec nap-agent dig @{{ _e2e_resolver }} {{ item.qname }} MX +dnssec +noall +comments +answer
          changed_when: false
          register: _e2e_mail_mx
          delegate_to: dmz-agent-01
          loop: "{{ _e2e_mail_mx_checks }}"
          loop_control:
            label: "{{ item.label }}"

        - name: "PHASE [e2e-mail : Assert Mail MX Records]"
          ansible.builtin.assert:
            quiet: true
            that:
              - "'status: NOERROR' in _e2e_mail_mx.results[idx].stdout"
              - mail_mx_value in _e2e_mail_mx.results[idx].stdout
              - "'ad' in (_e2e_mail_mx.results[idx].stdout | regex_search('flags:[^;]*') | default('') | split())"
            fail_msg: >-
              Mail MX lookup for {{ item.label }} did not return
              {{ mail_mx_value }} with DNSSEC AD validation.
              Got: {{ _e2e_mail_mx.results[idx].stdout | default('') }}
          loop: "{{ _e2e_mail_mx_checks }}"
          loop_control:
            index_var: idx
            label: "{{ item.label }}"

        - name: "PHASE [e2e-mail : Check Resolver Has No Mail Static-Key Anchor]"
          ansible.builtin.command:
            cmd: >-
              grep -F {{ _e2e_mail_domain }}. /etc/named/named.trust-anchors.conf
          changed_when: false
          failed_when: false
          register: _e2e_mail_static_key_anchor
          delegate_to: dns-01

        - name: "PHASE [e2e-mail : Assert Mail Trust Uses Parent DS]"
          ansible.builtin.assert:
            quiet: true
            that:
              - _e2e_mail_static_key_anchor.rc != 0
            fail_msg: >-
              Resolver still has a local static-key anchor for {{ _e2e_mail_domain }};
              mail DNSSEC validation should chain through the parent DS instead.

        - name: "PHASE [e2e-mail : Check Resolver Has No Mail Forward Zone]"
          ansible.builtin.command:
            cmd: >-
              grep -F 'zone "{{ _e2e_mail_domain }}"' /etc/named/named.zones.conf
          changed_when: false
          failed_when: false
          register: _e2e_mail_forward_zone
          delegate_to: dns-01

        - name: "PHASE [e2e-mail : Assert Mail Resolves Through Parent Delegation]"
          ansible.builtin.assert:
            quiet: true
            that:
              - _e2e_mail_forward_zone.rc != 0
            fail_msg: >-
              Resolver still has an explicit forward zone for {{ _e2e_mail_domain }};
              mail DNSSEC validation should route through the parent-zone delegation.

        - name: "PHASE [e2e-mail : Resolver Mail Parent DS Lookup]"
          ansible.builtin.command:
            cmd: >-
              docker exec nap-agent dig @{{ _e2e_resolver }} {{ _e2e_mail_domain }} DS +dnssec +noall +comments +answer
          changed_when: false
          register: _e2e_mail_parent_ds
          delegate_to: dmz-agent-01

        - name: "PHASE [e2e-mail : Derive Mail Child DS From DNSKEY]"
          ansible.builtin.shell:
            cmd: >-
              set -o pipefail &&
              dig @{{ _e2e_primary }} {{ _e2e_mail_domain }} DNSKEY +noall +answer
              | dnssec-dsfromkey -f - {{ _e2e_mail_domain }}
          changed_when: false
          register: _e2e_mail_child_ds

        - name: "PHASE [e2e-mail : Extract Mail DS Lines]"
          ansible.builtin.set_fact:
            _e2e_mail_parent_ds_line: >-
              {{ _e2e_mail_parent_ds.stdout_lines
                 | reject('search', 'RRSIG')
                 | select('search', 'DS')
                 | first | default('') }}
            _e2e_mail_child_ds_line: >-
              {{ _e2e_mail_child_ds.stdout_lines
                 | reject('search', 'RRSIG')
                 | select('search', 'DS')
                 | first | default('') }}

        - name: "PHASE [e2e-mail : Tokenize Mail DS Lines]"
          ansible.builtin.set_fact:
            _e2e_mail_parent_ds_tokens: "{{ _e2e_mail_parent_ds_line.split() }}"
            _e2e_mail_child_ds_tokens: "{{ _e2e_mail_child_ds_line.split() }}"

        - name: "PHASE [e2e-mail : Normalize Mail DS RDATA]"
          ansible.builtin.set_fact:
            _e2e_mail_parent_ds_rdata: >-
              {{ _e2e_mail_parent_ds_tokens[(_e2e_mail_parent_ds_tokens.index('DS') + 1) :] | join('') }}
            _e2e_mail_child_ds_rdata: >-
              {{ _e2e_mail_child_ds_tokens[(_e2e_mail_child_ds_tokens.index('DS') + 1) :] | join('') }}

        - name: "PHASE [e2e-mail : Assert Mail Parent DS Validates Child DNSKEY]"
          ansible.builtin.assert:
            quiet: true
            that:
              - "'status: NOERROR' in _e2e_mail_parent_ds.stdout"
              - _e2e_mail_parent_ds_line | length > 0
              - "'DS' in _e2e_mail_parent_ds_tokens"
              - _e2e_mail_parent_ds_tokens[(_e2e_mail_parent_ds_tokens.index('DS') + 2)] == '13'
              - _e2e_mail_parent_ds_tokens[(_e2e_mail_parent_ds_tokens.index('DS') + 3)] == '2'
              - "'ad' in (_e2e_mail_parent_ds.stdout | regex_search('flags:[^;]*') | default('') | split())"
              - _e2e_mail_parent_ds_rdata | length > 0
              - _e2e_mail_child_ds_rdata | length > 0
              - _e2e_mail_parent_ds_rdata == _e2e_mail_child_ds_rdata
            fail_msg: >-
              Mail parent DS did not validate against the child DNSKEY-derived DS.
              parent={{ _e2e_mail_parent_ds.stdout | default('') }}
              child={{ _e2e_mail_child_ds.stdout | default('') }}

        - name: "PHASE [e2e-mail : Resolver Mail TXT Lookups]"
          ansible.builtin.command:
            cmd: >-
              docker exec nap-agent dig @{{ _e2e_resolver }} {{ item.qname }} TXT +short
          changed_when: false
          register: _e2e_mail_txt
          delegate_to: dmz-agent-01
          loop: "{{ _e2e_mail_txt_checks }}"
          loop_control:
            label: "{{ item.label }}"

        - name: "PHASE [e2e-mail : Assert Mail TXT Records]"
          ansible.builtin.assert:
            quiet: true
            that:
              - item.token in _e2e_mail_txt.results[idx].stdout
            fail_msg: >-
              Mail TXT lookup for {{ item.label }} did not include {{ item.token }}.
              Got: {{ _e2e_mail_txt.results[idx].stdout | default('') }}
          loop: "{{ _e2e_mail_txt_checks }}"
          loop_control:
            index_var: idx
            label: "{{ item.label }}"

        - name: "PHASE [e2e-mail : Resolver Private Client PTR Lookup]"
          ansible.builtin.command:
            cmd: >-
              docker exec nap-agent dig @{{ _e2e_resolver }} -x {{ _e2e_mail_private_ip }} +short
          changed_when: false
          register: _e2e_mail_private_ptr
          delegate_to: dmz-agent-01

        - name: "PHASE [e2e-mail : Assert Private Client PTR]"
          ansible.builtin.assert:
            quiet: true
            that:
              - _e2e_client_fqdn in _e2e_mail_private_ptr.stdout
            fail_msg: >-
              Private mail endpoint PTR for {{ _e2e_mail_private_ip }} did not return
              canonical client name {{ _e2e_client_fqdn }}. Got: {{ _e2e_mail_private_ptr.stdout | default('') }}

        - name: "PHASE [e2e-mail : Secondary Private Mail Zone SOA]"
          ansible.builtin.command:
            cmd: >-
              docker exec nap-agent dig @{{ _e2e_secondary }} {{ _e2e_mail_domain }} SOA +short
          changed_when: false
          register: _e2e_mail_secondary_private_soa
          delegate_to: dmz-agent-01

        - name: "PHASE [e2e-mail : Assert Secondary Private Mail Zone SOA]"
          ansible.builtin.assert:
            quiet: true
            that:
              - _e2e_mail_secondary_private_soa.stdout | length > 0
              - ('private-ns.' ~ _e2e_forward_zone ~ '.') in _e2e_mail_secondary_private_soa.stdout
            fail_msg: >-
              Secondary private view did not serve {{ _e2e_mail_domain }} SOA.
              Got: {{ _e2e_mail_secondary_private_soa.stdout | default('') }}

        - name: "PHASE [e2e-mail : Secondary Public Mail Zone SOA]"
          ansible.builtin.command:
            cmd: >-
              dig @{{ _e2e_secondary }} -k {{ _bind9_axfr_keyfile.path }}
              {{ _e2e_mail_domain }} SOA +short
          changed_when: false
          register: _e2e_mail_secondary_public_soa

        - name: "PHASE [e2e-mail : Assert Secondary Public Mail Zone SOA]"
          ansible.builtin.assert:
            quiet: true
            that:
              - _e2e_mail_secondary_public_soa.stdout | length > 0
              - ('private-ns.' ~ _e2e_forward_zone ~ '.') in _e2e_mail_secondary_public_soa.stdout
            fail_msg: >-
              Secondary public view did not serve {{ _e2e_mail_domain }} SOA.
              Got: {{ _e2e_mail_secondary_public_soa.stdout | default('') }}

        - name: "PHASE [e2e-mail : Secondary Public Client PTR Lookup]"
          ansible.builtin.command:
            cmd: >-
              dig @{{ _e2e_secondary }} -k {{ _bind9_axfr_keyfile.path }}
              {{ _e2e_public_client_reverse_label }}.{{ bind9_vpn_child_reverse_zone_name }} PTR +short
          changed_when: false
          register: _e2e_public_client_ptr

        - name: "PHASE [e2e-mail : Assert Secondary Public Client PTR]"
          ansible.builtin.assert:
            quiet: true
            that:
              - ('client.' ~ _e2e_forward_zone ~ '.') in _e2e_public_client_ptr.stdout
            fail_msg: >-
              Public VPN client PTR did not return client.{{ _e2e_forward_zone }}.
              Got: {{ _e2e_public_client_ptr.stdout | default('') }}
      always:
        - name: "PHASE [e2e-mail : Cleanup - Remove Scoped TSIG Keyfile]"
          ansible.builtin.include_tasks: roles/bind9/tasks/tsig_teardown.yml
          vars:
            _keyfiles_label_prefix: "E2E Mail - "

    - name: "PHASE [e2e-mail : END]"
      ansible.builtin.debug:
        msg: "E2E mail DNS verification complete"

# ──────────────────────────────────────────────────────────
# E2E: Blocked-client probe from VPN subnet
# ──────────────────────────────────────────────────────────
- name: "E2E Blocked Client Verification"
  hosts: router-01
  gather_facts: false
  vars:
    _e2e_resolver: "{{ hostvars['dns-01'].bind9_listen_ipv4 | reject('equalto', '127.0.0.1') | first }}"
  tasks:
    - name: "PHASE [e2e-blocked : START]"
      ansible.builtin.debug:
        msg: "E2E blocked-client probe from VPN subnet"

    - name: "PHASE [e2e-blocked : Resolver Blocked Client Probe From VPN Subnet]"
      ansible.builtin.command:
        argv:
          - python3
          - "-"
          - "{{ wireguard_address.split('/')[0] }}"
          - "{{ _e2e_resolver }}"
        stdin: |
          import random
          import socket
          import struct
          import sys

          source_ip = sys.argv[1]
          resolver_ip = sys.argv[2]
          query_id = random.randrange(0, 65536)
          qname = b''.join(
              bytes([len(label)]) + label.encode('ascii')
              for label in 'google.com'.split('.')
          ) + b'\0'
          packet = (
              struct.pack('!HHHHHH', query_id, 0x0100, 1, 0, 0, 0)
              + qname
              + struct.pack('!HH', 1, 1)
          )
          rcodes = {
              0: 'NOERROR',
              1: 'FORMERR',
              2: 'SERVFAIL',
              3: 'NXDOMAIN',
              4: 'NOTIMP',
              5: 'REFUSED',
          }

          sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
          sock.settimeout(2)
          sock.bind((source_ip, 0))
          try:
              sock.sendto(packet, (resolver_ip, 53))
              response, _ = sock.recvfrom(512)
          except socket.timeout:
              print('status=TIMEOUT')
          except OSError as exc:
              print(f'status=UNREACHABLE error={exc}')
          else:
              flags = struct.unpack('!H', response[2:4])[0]
              print(f'status={rcodes.get(flags & 0x000F, flags & 0x000F)}')
      changed_when: false
      register: _e2e_blocked_probe
      failed_when: false

    - name: "PHASE [e2e-blocked : Assert Blocked Client Query Was Refused]"
      ansible.builtin.assert:
        quiet: true
        that:
          - >-
            'status=REFUSED' in _e2e_blocked_probe.stdout
            or 'status=TIMEOUT' in _e2e_blocked_probe.stdout
            or 'status=UNREACHABLE' in _e2e_blocked_probe.stdout
        fail_msg: >-
          Blocked-client probe from VPN subnet did not return REFUSED or timeout.
          The resolver accepted a query from a source IP outside DMZ/Private CIDRs.
          stdout={{ _e2e_blocked_probe.stdout | default('') }},
          stderr={{ _e2e_blocked_probe.stderr | default('') }}

    - name: "PHASE [e2e-blocked : END]"
      ansible.builtin.debug:
        msg: "E2E blocked-client probe complete"

# ──────────────────────────────────────────────────────────
# E2E: Propagation through resolver — dynamic4 end-to-end
# ──────────────────────────────────────────────────────────
- name: "E2E Propagation Through Resolver"
  hosts: primary-ns-01
  gather_facts: false
  become: true
  vars:
    _e2e_resolver: "{{ hostvars['dns-01'].bind9_listen_ipv4 | reject('equalto', '127.0.0.1') | first }}"
    _e2e_primary: "{{ bind9_listen_ipv4 | reject('equalto', '127.0.0.1') | first }}"
    _e2e_forward_zone: "{{ bind9_forward_zone_name }}"
    _e2e_prop_ip: "172.16.1.204"
  tasks:
    - name: "PHASE [e2e-prop : START]"
      ansible.builtin.debug:
        msg: "E2E dynamic4 propagation test through resolver"

    # Render a single-key keyfile so nsupdate gets the DDNS TSIG key in isolation.
    - name: "PHASE [e2e-prop : Render Scoped TSIG Keyfile]"
      ansible.builtin.include_tasks: roles/bind9/tasks/tsig_setup.yml
      vars:
        _keyfiles_label_prefix: "E2E - "

    - name: "PHASE [e2e-prop : Set Test Address]"
      ansible.builtin.set_fact:
        _e2e_prop_ip_rev: >-
          {{ _e2e_prop_ip.split('.')[3] }}.{{ _e2e_prop_ip.split('.')[2] }}.{{ _e2e_prop_ip.split('.')[1] }}.{{ _e2e_prop_ip.split('.')[0] }}.in-addr.arpa

    # Create dynamic4 A + matching PTR on the primary, then poll the
    # resolver until both records converge, and always clean up.
    - name: "PHASE [e2e-prop : Dynamic Update Exercise]"
      block:
        - name: "PHASE [e2e-prop : Create dynamic4 A Record]"
          ansible.builtin.command:
            cmd: nsupdate -k {{ _bind9_tsig_keyfile.path }}
            stdin: |
              server {{ _e2e_primary }}
              zone {{ _e2e_forward_zone }}
              update add dynamic4.{{ _e2e_forward_zone }}. 300 A {{ _e2e_prop_ip }}
              send
          changed_when: false

        - name: "PHASE [e2e-prop : Add Matching PTR Record]"
          ansible.builtin.command:
            cmd: nsupdate -k {{ _bind9_tsig_keyfile.path }}
            stdin: |
              server {{ _e2e_primary }}
              zone {{ bind9_internal_reverse_zone }}
              update add {{ _e2e_prop_ip_rev }}. 300 PTR dynamic4.{{ _e2e_forward_zone }}.
              send
          changed_when: false

        # Poll from dmz-agent-01 through the resolver
        - name: "PHASE [e2e-prop : Poll dynamic4 A From DMZ Agent Through Resolver]"
          ansible.builtin.command:
            cmd: >-
              docker exec nap-agent dig @{{ _e2e_resolver }} dynamic4.{{ _e2e_forward_zone }} A +short
          changed_when: false
          register: _e2e_prop_dmz_a
          delegate_to: dmz-agent-01
          until: "_e2e_prop_ip in _e2e_prop_dmz_a.stdout"
          retries: 10
          delay: 1

        - name: "PHASE [e2e-prop : Poll dynamic4 PTR From DMZ Agent Through Resolver]"
          ansible.builtin.command:
            cmd: >-
              docker exec nap-agent dig @{{ _e2e_resolver }} -x {{ _e2e_prop_ip }} +short
          changed_when: false
          register: _e2e_prop_dmz_ptr
          delegate_to: dmz-agent-01
          until: ('dynamic4.' + _e2e_forward_zone + '.') in _e2e_prop_dmz_ptr.stdout
          retries: 10
          delay: 1

        # Poll from internal-agent-01 through the resolver
        - name: "PHASE [e2e-prop : Poll dynamic4 A From Private Agent Through Resolver]"
          ansible.builtin.command:
            cmd: >-
              docker exec nap-agent dig @{{ _e2e_resolver }} dynamic4.{{ _e2e_forward_zone }} A +short
          changed_when: false
          register: _e2e_prop_internal_a
          delegate_to: internal-agent-01
          until: "_e2e_prop_ip in _e2e_prop_internal_a.stdout"
          retries: 10
          delay: 1

        - name: "PHASE [e2e-prop : Poll dynamic4 PTR From Private Agent Through Resolver]"
          ansible.builtin.command:
            cmd: >-
              docker exec nap-agent dig @{{ _e2e_resolver }} -x {{ _e2e_prop_ip }} +short
          changed_when: false
          register: _e2e_prop_internal_ptr
          delegate_to: internal-agent-01
          until: ('dynamic4.' + _e2e_forward_zone + '.') in _e2e_prop_internal_ptr.stdout
          retries: 10
          delay: 1

      always:
        - name: "PHASE [e2e-prop : Cleanup - Delete dynamic4 A Record]"
          ansible.builtin.command:
            cmd: nsupdate -k {{ _bind9_tsig_keyfile.path }}
            stdin: |
              server {{ _e2e_primary }}
              zone {{ _e2e_forward_zone }}
              update delete dynamic4.{{ _e2e_forward_zone }}. A
              send
              zone {{ bind9_internal_reverse_zone }}
              update delete {{ _e2e_prop_ip_rev }}. PTR
              send
          changed_when: false
          failed_when: false

        - name: "PHASE [e2e-prop : Cleanup - Remove Scoped TSIG Keyfile]"
          ansible.builtin.include_tasks: roles/bind9/tasks/tsig_teardown.yml
          vars:
            _keyfiles_label_prefix: "E2E - "

    - name: "PHASE [e2e-prop : END]"
      ansible.builtin.debug:
        msg: "E2E dynamic4 propagation test complete"

# ──────────────────────────────────────────────────────────
# E2E: DS extraction from primary for all 4 signed zones
# ──────────────────────────────────────────────────────────
- name: "E2E DS Extraction"
  hosts: primary-ns-01
  gather_facts: false
  become: true
  vars:
    _e2e_primary: "{{ bind9_listen_ipv4 | reject('equalto', '127.0.0.1') | first }}"
    _e2e_zone_specs:
      - name: "{{ bind9_forward_zone_name }}"
        view: private
      - name: "{{ bind9_vpn_child_reverse_zone_name }}"
        view: public
      - name: "{{ bind9_dmz_reverse_zone }}"
        view: private
      - name: "{{ bind9_internal_reverse_zone }}"
        view: private
      - name: "mail.{{ bind9_forward_zone_name }}"
        view: private
  tasks:
    - name: "PHASE [e2e-ds : START]"
      ansible.builtin.debug:
        msg: "E2E DS record extraction for all signed zones"

    - name: "PHASE [e2e-ds : Render Scoped TSIG Keyfile]"
      ansible.builtin.include_tasks: roles/bind9/tasks/tsig_setup.yml
      vars:
        _keyfiles_label_prefix: "E2E DS - "

    - name: "PHASE [e2e-ds : Extract DS Records For Each Zone]"
      block:
        - name: "PHASE [e2e-ds : Extract DS Records For Each Zone]"
          ansible.builtin.shell:
            cmd: >-
              set -o pipefail &&
              dig @{{ _e2e_primary }} {% if item.view == 'public' %}-k {{ _bind9_axfr_keyfile.path }} {% endif %}{{ item.name }} DNSKEY +noall +answer
              | dnssec-dsfromkey -f - {{ item.name }}
          changed_when: false
          register: _e2e_ds_extract
          loop: "{{ _e2e_zone_specs }}"
          loop_control:
            label: "{{ item.name }}"

        - name: "PHASE [e2e-ds : Assert DS Records Contain Algorithm 13 Digest 2]"
          ansible.builtin.assert:
            quiet: true
            that:
              - "' IN DS ' in _e2e_ds_extract.results[idx].stdout"
              - "' 13 2 ' in _e2e_ds_extract.results[idx].stdout"
            fail_msg: >-
              DS record for {{ item.name }} does not contain expected algorithm 13 and digest type 2.
              stdout={{ _e2e_ds_extract.results[idx].stdout | default('') }}
          loop: "{{ _e2e_zone_specs }}"
          loop_control:
            index_var: idx
            label: "{{ item.name }}"

        - name: "PHASE [e2e-ds : Display DS Records]"
          ansible.builtin.debug:
            msg: "{{ _e2e_ds_extract.results[idx].stdout }}"
          loop: "{{ _e2e_zone_specs }}"
          loop_control:
            index_var: idx
            label: "{{ item.name }}"
      always:
        - name: "PHASE [e2e-ds : Cleanup - Remove Scoped TSIG Keyfile]"
          ansible.builtin.include_tasks: roles/bind9/tasks/tsig_teardown.yml
          vars:
            _keyfiles_label_prefix: "E2E DS - "

    - name: "PHASE [e2e-ds : END]"
      ansible.builtin.debug:
        msg: "E2E DS extraction complete"

# ──────────────────────────────────────────────────────────
# E2E: Consecutive-run idempotency gate
# ──────────────────────────────────────────────────────────
- name: "E2E Idempotency Verification"
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: "PHASE [e2e-idempotency : START]"
      ansible.builtin.debug:
        msg: "E2E consecutive-run idempotency check"

    - name: "PHASE [e2e-idempotency : Re-run dns_configure.yml]"
      ansible.builtin.command:
        cmd: >-
          ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/dns_configure.yml
      args:
        chdir: "{{ playbook_dir | dirname | dirname }}"
      environment:
        ANSIBLE_CONFIG: ansible/ansible.cfg
      changed_when: false
      register: _e2e_idempotency_run

    - name: "PHASE [e2e-idempotency : Extract Changed Counts Per DNS Host]"
      ansible.builtin.set_fact:
        _e2e_idempotency_changed: >-
          {{ _e2e_idempotency_changed | default({}) | combine({
            item: (_e2e_idempotency_run.stdout | regex_search(item ~ '\s*:\s*ok=\d+\s+changed=(\d+)', '\1') | first | default('0') | int)
          }) }}
      loop:
        - primary-ns-01
        - secondary-ns-01
        - dns-01
      loop_control:
        label: "{{ item }}"
      changed_when: false

    - name: "PHASE [e2e-idempotency : Extract Failed Counts Per DNS Host]"
      ansible.builtin.set_fact:
        _e2e_idempotency_failed: >-
          {{ _e2e_idempotency_failed | default({}) | combine({
            item: (_e2e_idempotency_run.stdout | regex_search(item ~ '\s*:\s*.*failed=(\d+)', '\1') | first | default('0') | int)
          }) }}
      loop:
        - primary-ns-01
        - secondary-ns-01
        - dns-01
      loop_control:
        label: "{{ item }}"
      changed_when: false

    - name: "PHASE [e2e-idempotency : Assert Zero Changes And Zero Failures For Each DNS Host]"
      ansible.builtin.assert:
        quiet: true
        that:
          - _e2e_idempotency_changed[item] == 0
          - _e2e_idempotency_failed[item] == 0
        fail_msg: >-
          Idempotency check failed — {{ item }} reported
          changed={{ _e2e_idempotency_changed[item] | default('?') }},
          failed={{ _e2e_idempotency_failed[item] | default('?') }}
          in dns_configure.yml rerun (expected 0 changes, 0 failures).
      loop:
        - primary-ns-01
        - secondary-ns-01
        - dns-01
      loop_control:
        label: "{{ item }}"

    - name: "PHASE [e2e-idempotency : END]"
      ansible.builtin.debug:
        msg: "E2E idempotency check complete"
